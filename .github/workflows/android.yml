name: Build Buyucu APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
      
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Node Install
        run: npm install

      - name: Web Build (Fixed)
        run: |
          # TypeScript hatalarına takılmadan direkt Vite ile build alıyoruz
          npx vite build

      - name: Capacitor Setup & Fix
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          # Eğer dist klasörü yoksa build'den gelen klasörü kullan
          npx cap init "Buyucu" "com.burak.buyucu" --web-dir dist || npx cap init "Buyucu" "com.burak.buyucu" --web-dir build
          npx cap add android
          
          # Kotlin ve Duplicate Class hatalarını çözen kritik ayarlar
          sed -i '/dependencies {/a \    configurations.all { resolutionStrategy { force "org.jetbrains.kotlin:kotlin-stdlib:1.8.22"; force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22"; force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22" } }' android/app/build.gradle
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "kotlin.stdlib.default.dependency=false" >> android/gradle.properties

          # Java 21 uyumluluğunu zorla
          find android -name "build.gradle" -exec sed -i 's/JavaVersion.VERSION_17/JavaVersion.VERSION_21/g' {} +
          find android -name "build.gradle" -exec sed -i 's/JavaVersion.VERSION_1_8/JavaVersion.VERSION_21/g' {} +
          
          npx cap sync android

      - name: Build APK File
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Save APK
        uses: actions/upload-artifact@v4
        with:
          name: buyucu-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

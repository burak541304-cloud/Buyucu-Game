function drawMonsterSprite(ctx, type, x, y, dir, frame, hitFlash, atkAnim) {
  const cx = x + 10, cy = y + 10;
  if (hitFlash > 0) { ctx.globalAlpha = 0.5 + Math.sin(hitFlash * 30) * 0.5; }

  switch (type) {
    case "slime": {
      const squish = 1 + Math.sin(frame * Math.PI) * 0.15;
      const h = 12 * squish, w = 14 / squish;
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#40c040";
      ctx.beginPath();
      ctx.ellipse(cx, cy + 4, w / 2, h / 2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#60e060";
      ctx.beginPath(); ctx.ellipse(cx, cy + 2, w / 3, h / 3, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#fff";
      ctx.fillRect(cx - 4, cy - 1, 3, 3);
      ctx.fillRect(cx + 1, cy - 1, 3, 3);
      ctx.fillStyle = "#111";
      ctx.fillRect(cx - 3, cy, 2, 2);
      ctx.fillRect(cx + 2, cy, 2, 2);
      break;
    }
    case "wolf": {
      const run = Math.sin(frame * Math.PI) * 3;
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#707070";
      ctx.fillRect(cx - 8, cy - 3, 16, 10);
      ctx.fillStyle = hitFlash > 0 ? "#ff8080" : "#909090";
      ctx.fillRect(cx - 10, cy - 6, 7, 6);
      ctx.fillStyle = "#333";
      ctx.fillRect(cx - 8, cy - 4, 2, 2);
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#606060";
      ctx.fillRect(cx - 6 + run, cy + 6, 3, 5);
      ctx.fillRect(cx + 3 - run, cy + 6, 3, 5);
      ctx.fillStyle = "#808080";
      ctx.fillRect(cx + 6, cy - 2, 6, 3);
      if (atkAnim > 0) {
        ctx.fillStyle = "#fff";
        ctx.fillRect(cx - 11, cy - 3, 3, 2);
      }
      break;
    }
    case "skeleton": {
      const sway = Math.sin(frame * Math.PI * 0.5) * 1;
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#d0d0b0";
      ctx.fillRect(cx - 5 + sway, cy - 4, 10, 12);
      ctx.fillStyle = hitFlash > 0 ? "#ff8080" : "#e0e0c0";
      ctx.beginPath(); ctx.arc(cx + sway, cy - 7, 6, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#222";
      ctx.fillRect(cx - 3 + sway, cy - 9, 2, 3);
      ctx.fillRect(cx + 1 + sway, cy - 9, 2, 3);
      ctx.fillRect(cx - 2 + sway, cy - 5, 4, 2);
      ctx.fillStyle = "#b0b090";
      ctx.fillRect(cx - 7 + sway, cy, 4, 3);
      ctx.fillRect(cx + 3 + sway, cy, 4, 3);
      ctx.fillRect(cx - 4, cy + 7, 3, 5);
      ctx.fillRect(cx + 1, cy + 7, 3, 5);
      break;
    }
    case "orc": {
      const bounce = Math.sin(frame * Math.PI) * 2;
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#406030";
      ctx.fillRect(cx - 7, cy - 5 - bounce, 14, 14);
      ctx.fillStyle = hitFlash > 0 ? "#ff8080" : "#508030";
      ctx.beginPath(); ctx.arc(cx, cy - 8 - bounce, 7, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#222";
      ctx.fillRect(cx - 3, cy - 10 - bounce, 2, 3);
      ctx.fillRect(cx + 1, cy - 10 - bounce, 2, 3);
      ctx.fillStyle = "#c0c0c0";
      const atkOff = atkAnim > 0 ? -6 : 0;
      ctx.fillRect(cx + 7, cy - 6 - bounce + atkOff, 3, 12);
      ctx.fillRect(cx + 6, cy - 8 - bounce + atkOff, 5, 3);
      ctx.fillStyle = "#3a3a2a";
      ctx.fillRect(cx - 5, cy + 8, 4, 5);
      ctx.fillRect(cx + 1, cy + 8, 4, 5);
      break;
    }
    case "golem": {
      const shake = atkAnim > 0 ? Math.sin(atkAnim * 40) * 2 : 0;
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#6a6a6a";
      ctx.fillRect(cx - 9 + shake, cy - 8, 18, 18);
      ctx.fillStyle = hitFlash > 0 ? "#ff8080" : "#8a8a8a";
      ctx.fillRect(cx - 7 + shake, cy - 6, 14, 5);
      ctx.fillStyle = "#f08030";
      ctx.fillRect(cx - 4 + shake, cy - 4, 3, 3);
      ctx.fillRect(cx + 1 + shake, cy - 4, 3, 3);
      ctx.fillStyle = "#5a5a5a";
      ctx.fillRect(cx - 10 + shake, cy - 2, 5, 10);
      ctx.fillRect(cx + 5 + shake, cy - 2, 5, 10);
      ctx.fillRect(cx - 7, cy + 9, 6, 6);
      ctx.fillRect(cx + 1, cy + 9, 6, 6);
      break;
    }
    case "forest_treant": {
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#3a5020";
      ctx.fillRect(cx - 11, cy - 14, 22, 26);
      ctx.fillStyle = hitFlash > 0 ? "#ff8080" : "#5a7030";
      ctx.beginPath(); ctx.arc(cx, cy - 16, 10, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#2a4018";
      for (let i = -1; i <= 1; i++) ctx.fillRect(cx + i * 6 - 2, cy - 22, 4, 10);
      ctx.fillStyle = "#f0d040";
      ctx.fillRect(cx - 3, cy - 4, 2, 2); ctx.fillRect(cx + 1, cy - 4, 2, 2);
      break;
    }
    case "desert_titan": {
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#c0a060";
      ctx.fillRect(cx - 12, cy - 12, 24, 24);
      ctx.fillStyle = hitFlash > 0 ? "#ff8080" : "#e8d090";
      ctx.beginPath(); ctx.arc(cx, cy - 14, 9, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#705020";
      ctx.fillRect(cx - 10, cy + 10, 6, 5); ctx.fillRect(cx + 4, cy + 10, 6, 5);
      ctx.fillStyle = "#a02020";
      ctx.fillRect(cx - 4, cy - 8, 2, 2); ctx.fillRect(cx + 2, cy - 8, 2, 2);
      break;
    }
    case "rock_warden": {
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#6a6a72";
      ctx.beginPath(); ctx.moveTo(cx, cy - 16); ctx.lineTo(cx + 12, cy + 10); ctx.lineTo(cx - 12, cy + 10); ctx.fill();
      ctx.fillStyle = "#909098";
      ctx.fillRect(cx - 8, cy - 2, 16, 12);
      ctx.fillStyle = "#303038";
      ctx.fillRect(cx - 3, cy - 10, 2, 2); ctx.fillRect(cx + 1, cy - 10, 2, 2);
      break;
    }
    case "flower_queen": {
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#d060a0";
      for (let a = 0; a < 6; a++) {
        const ang = a * Math.PI / 3;
        ctx.beginPath(); ctx.arc(cx + Math.cos(ang) * 8, cy + Math.sin(ang) * 6, 6, 0, Math.PI * 2); ctx.fill();
      }
      ctx.fillStyle = "#f0e080";
      ctx.beginPath(); ctx.arc(cx, cy, 5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#222";
      ctx.fillRect(cx - 2, cy - 1, 2, 2); ctx.fillRect(cx + 0, cy - 1, 2, 2);
      break;
    }
    case "north_frost": {
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#a0d8f0";
      ctx.fillRect(cx - 10, cy - 14, 20, 26);
      ctx.fillStyle = "#e8f8ff";
      ctx.beginPath(); ctx.arc(cx, cy - 16, 8, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#4080c0";
      ctx.fillRect(cx - 12, cy + 2, 24, 8);
      ctx.fillStyle = "#102030";
      ctx.fillRect(cx - 3, cy - 18, 2, 2); ctx.fillRect(cx + 1, cy - 18, 2, 2);
      break;
    }
    case "south_shadow": {
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#403060";
      ctx.fillRect(cx - 10, cy - 12, 20, 24);
      ctx.fillStyle = "#7050a0";
      ctx.beginPath(); ctx.ellipse(cx, cy - 10, 9, 8, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#ff4080";
      ctx.fillRect(cx - 4, cy - 12, 2, 2); ctx.fillRect(cx + 2, cy - 12, 2, 2);
      ctx.globalAlpha = 0.35;
      ctx.fillStyle = "#000";
      ctx.fillRect(cx - 12, cy - 14, 24, 28);
      ctx.globalAlpha = 1;
      break;
    }
  }
  ctx.globalAlpha = 1;
}

class Monster {
  constructor(col, row, type, levelScale) {
    this.x = col * TILE_SIZE;
    this.y = row * TILE_SIZE;
    this.w = 20; this.h = 20;
    this.type = type;
    const mt = MONSTER_TYPES[type];
    const s = levelScale || 1;
    this.maxHp = Math.floor(mt.hp * s);
    this.hp = this.maxHp;
    this.dmg = Math.floor(mt.dmg * s);
    this.speed = mt.speed;
    this.xpReward = Math.floor(mt.xp * s);
    this.aggroRange = mt.aggroRange;
    this.atkRange = mt.atkRange;
    this.atkCd = mt.atkCd;
    this.loot = mt.loot;
    this.boss = !!mt.boss;
    this.alive = true;
    this.state = "idle";
    this.homeX = this.x; this.homeY = this.y;
    this.direction = DIR.DOWN;
    this.animTimer = 0; this.animFrame = 0;
    this.wanderTimer = 1 + Math.random() * 3;
    this.moveDir = { dx: 0, dy: 0 };
    this.moveTime = 0;
    this.atkTimer = 0;
    this.atkAnim = 0;
    this.hitFlash = 0;
    this.deathTimer = 0;
    this.respawnTime = 30 + Math.random() * 30;
    this.respawnTimer = 0;
    this.col = col; this.row = row;
    this.levelScale = s;
  }

  get cx() { return this.x + this.w / 2; }
  get cy() { return this.y + this.h / 2; }

  distTo(px, py) {
    const dx = this.cx - px, dy = this.cy - py;
    return Math.sqrt(dx * dx + dy * dy);
  }

  takeDamage(amount) {
    if (this.state === "dying") return;
    this.hp -= amount;
    this.hitFlash = 0.15;
    if (this.hp <= 0) {
      this.hp = 0;
      this.state = "dying";
      this.deathTimer = 0.6;
    } else if (this.state === "idle") {
      this.state = "chase";
    }
  }

  update(dt, map, player) {
    if (!this.alive) {
      this.respawnTimer += dt;
      if (this.respawnTimer >= this.respawnTime) {
        this.alive = true;
        this.hp = this.maxHp;
        this.x = this.col * TILE_SIZE;
        this.y = this.row * TILE_SIZE;
        this.state = "idle";
        this.respawnTimer = 0;
        this.respawnTime = 30 + Math.random() * 30;
      }
      return;
    }

    if (this.hitFlash > 0) this.hitFlash -= dt;
    if (this.atkAnim > 0) this.atkAnim -= dt;
    this.animTimer += dt;
    if (this.animTimer >= 0.18) { this.animTimer = 0; this.animFrame = (this.animFrame + 1) % 4; }

    if (this.state === "dying") {
      this.deathTimer -= dt;
      if (this.deathTimer <= 0) {
        this.alive = false;
        return "dead";
      }
      return;
    }

    const dist = this.distTo(player.centerX, player.centerY);

    if (this.state === "idle") {
      if (dist < this.aggroRange) {
        this.state = "chase";
      } else {
        this._wander(dt, map);
      }
    }

    if (this.state === "chase") {
      if (dist > this.aggroRange * 2) {
        this.state = "idle";
        return;
      }
      if (dist <= this.atkRange) {
        this.state = "attack";
        this.atkTimer = 0;
      } else {
        this._moveToward(player.centerX, player.centerY, dt, map);
      }
    }

    if (this.state === "attack") {
      if (dist > this.atkRange * 1.8) {
        this.state = "chase";
        return;
      }
      this.atkTimer += dt;
      if (this.atkTimer >= this.atkCd) {
        this.atkTimer = 0;
        this.atkAnim = 0.25;
        if (!(player.inBoat && map.isWaterPx(player.centerX, player.centerY))) {
          player.takeDamage(this.dmg);
        }
        return "hit";
      }
      this._faceTarget(player.centerX, player.centerY);
    }
  }

  _wander(dt, map) {
    this.wanderTimer -= dt;
    if (this.wanderTimer <= 0 && this.moveTime <= 0) {
      const angle = Math.random() * Math.PI * 2;
      this.moveDir = { dx: Math.cos(angle), dy: Math.sin(angle) };
      this.moveTime = 0.5 + Math.random() * 1.5;
      this._faceDir(this.moveDir.dx, this.moveDir.dy);
    }
    if (this.moveTime > 0) {
      this.moveTime -= dt;
      const nx = this.x + this.moveDir.dx * this.speed * 0.4 * dt;
      const ny = this.y + this.moveDir.dy * this.speed * 0.4 * dt;
      const ddx = nx - this.homeX, ddy = ny - this.homeY;
      if (Math.sqrt(ddx * ddx + ddy * ddy) < TILE_SIZE * 4 && !this._collides(nx, ny, map)) {
        this.x = nx; this.y = ny;
      }
      if (this.moveTime <= 0) this.wanderTimer = 2 + Math.random() * 3;
    }
  }

  _moveToward(tx, ty, dt, map) {
    const dx = tx - this.cx, dy = ty - this.cy;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d < 1) return;
    const nx = this.x + (dx / d) * this.speed * dt;
    const ny = this.y + (dy / d) * this.speed * dt;
    if (!this._collides(nx, this.y, map)) this.x = nx;
    if (!this._collides(this.x, ny, map)) this.y = ny;
    this._faceDir(dx, dy);
  }

  _faceTarget(tx, ty) { this._faceDir(tx - this.cx, ty - this.cy); }

  _faceDir(dx, dy) {
    if (Math.abs(dx) > Math.abs(dy)) this.direction = dx > 0 ? DIR.RIGHT : DIR.LEFT;
    else this.direction = dy > 0 ? DIR.DOWN : DIR.UP;
  }

  _collides(px, py, map) {
    const m = 3;
    return map.isSolidPx(px + m, py + m) || map.isSolidPx(px + this.w - m, py + m) ||
           map.isSolidPx(px + m, py + this.h - m) || map.isSolidPx(px + this.w - m, py + this.h - m);
  }

  render(ctx) {
    if (!this.alive) return;
    if (this.state === "dying") {
      ctx.globalAlpha = this.deathTimer / 0.6;
      const sc = 0.5 + this.deathTimer / 0.6 * 0.5;
      ctx.save();
      ctx.translate(this.cx, this.cy);
      ctx.scale(sc, sc);
      ctx.translate(-this.cx, -this.cy);
    }

    drawMonsterSprite(ctx, this.type, this.x, this.y, this.direction, this.animFrame, this.hitFlash, this.atkAnim);

    if (this.state !== "dying") {
      const barW = 22, barH = 3;
      const bx = this.cx - barW / 2, by = this.y - 6;
      ctx.fillStyle = "rgba(0,0,0,0.6)";
      ctx.fillRect(bx - 1, by - 1, barW + 2, barH + 2);
      ctx.fillStyle = this.hp > this.maxHp * 0.5 ? "#40c040" : this.hp > this.maxHp * 0.25 ? "#d0a030" : "#d04040";
      ctx.fillRect(bx, by, barW * (this.hp / this.maxHp), barH);
    }

    if (this.state === "dying") {
      ctx.restore();
      ctx.globalAlpha = 1;
    }
  }
}

/* ── NPC ─────────────────────────────────────────────────── */

class NPC {
  constructor({ col, row, name, color, dialog, wanderRadius = 0, merchant = false, stock = null }) {
    this.x = col * TILE_SIZE; this.y = row * TILE_SIZE;
    this.w = 20; this.h = 20;
    this.name = name; this.color = color || "#c06030";
    this.dialog = dialog || ["..."];
    this.merchant = merchant;
    this.stock = stock;
    this.direction = DIR.DOWN;
    this.homeX = this.x; this.homeY = this.y;
    this.wanderRadius = wanderRadius * TILE_SIZE;
    this.wanderTimer = 2 + Math.random() * 3;
    this.moving = false; this.moveDir = { dx: 0, dy: 0 }; this.moveTime = 0;
    this.speed = 40; this.animTimer = 0; this.animFrame = 0;
  }

  update(dt, map) {
    if (this.wanderRadius <= 0) return;
    this.wanderTimer -= dt;

    if (!this.moving && this.wanderTimer <= 0) {
      const angle = Math.random() * Math.PI * 2;
      this.moveDir = { dx: Math.cos(angle), dy: Math.sin(angle) };
      this.moveTime = 0.5 + Math.random() * 1.5;
      this.moving = true;
      if (Math.abs(this.moveDir.dx) > Math.abs(this.moveDir.dy))
        this.direction = this.moveDir.dx > 0 ? DIR.RIGHT : DIR.LEFT;
      else
        this.direction = this.moveDir.dy > 0 ? DIR.DOWN : DIR.UP;
    }

    if (this.moving) {
      this.moveTime -= dt;
      this.animTimer += dt;
      if (this.animTimer >= 0.2) { this.animTimer = 0; this.animFrame = (this.animFrame + 1) % 4; }

      const newX = this.x + this.moveDir.dx * this.speed * dt;
      const newY = this.y + this.moveDir.dy * this.speed * dt;
      const distX = newX - this.homeX, distY = newY - this.homeY;
      const dist = Math.sqrt(distX * distX + distY * distY);

      if (dist < this.wanderRadius && !this._collides(newX, newY, map)) {
        this.x = newX; this.y = newY;
      }
      if (this.moveTime <= 0) {
        this.moving = false; this.animFrame = 0;
        this.wanderTimer = 2 + Math.random() * 4;
      }
    }
  }

  _collides(px, py, map) {
    const m = 3;
    return map.isSolidPx(px + m, py + m) ||
           map.isSolidPx(px + this.w - m, py + m) ||
           map.isSolidPx(px + m, py + this.h - m) ||
           map.isSolidPx(px + this.w - m, py + this.h - m);
  }

  isNearPlayer(player, range = TILE_SIZE * 1.5) {
    const dx = (this.x + this.w / 2) - player.centerX;
    const dy = (this.y + this.h / 2) - player.centerY;
    return Math.sqrt(dx * dx + dy * dy) < range;
  }

  render(ctx) {
    const x = Math.round(this.x), y = Math.round(this.y);
    const bounce = this.moving ? Math.sin(this.animFrame * Math.PI / 2) : 0;

    ctx.fillStyle = "#3a3a5a";
    ctx.fillRect(x + 4, y + 16 - bounce, 4, 4);
    ctx.fillRect(x + 12, y + 16 - bounce, 4, 4);
    ctx.fillStyle = this.color;
    ctx.fillRect(x + 3, y + 6 - bounce, 14, 12);
    ctx.fillStyle = "#e8c870";
    ctx.fillRect(x + 5, y - 2 - bounce, 10, 10);

    ctx.fillStyle = "#222";
    switch (this.direction) {
      case DIR.DOWN:
        ctx.fillRect(x + 7, y + 3 - bounce, 2, 2);
        ctx.fillRect(x + 11, y + 3 - bounce, 2, 2);
        break;
      case DIR.LEFT:  ctx.fillRect(x + 5, y + 3 - bounce, 2, 2); break;
      case DIR.RIGHT: ctx.fillRect(x + 13, y + 3 - bounce, 2, 2); break;
    }
  }
}

/* ── Pet System ──────────────────────────────────────────── */

const PET_TYPES = {
  cat:    { name: "Kedi",    speed: 110, bodyColor: "#d4a040", earColor: "#b88030", tameFood: "fish" },
  dog:    { name: "K\u00f6pek",   speed: 130, bodyColor: "#b08050", earColor: "#8a6030", tameFood: "apple" },
  bunny:  { name: "Tav\u015fan",  speed: 140, bodyColor: "#d0d0d0", earColor: "#e8b0b0", tameFood: "flower" },
  bird:   { name: "Ku\u015f",     speed: 100, bodyColor: "#50a0e0", earColor: "#3080c0", tameFood: "seed" },
  fox:    { name: "Tilki",   speed: 120, bodyColor: "#d06020", earColor: "#a04010", tameFood: "apple" },
};

function drawPetSprite(ctx, type, x, y, dir, animFrame, moving) {
  const pt = PET_TYPES[type];
  const bounce = moving ? Math.sin(animFrame * Math.PI / 2) * 1.5 : 0;
  const legOff = moving ? Math.sin(animFrame * Math.PI) * 2 : 0;

  if (type === "bird") {
    const wingFlap = moving ? Math.sin(animFrame * Math.PI) * 4 : 0;
    ctx.fillStyle = pt.bodyColor;
    ctx.beginPath(); ctx.ellipse(x + 8, y + 8 - bounce, 6, 5, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = pt.earColor;
    ctx.beginPath(); ctx.moveTo(x + 2, y + 6 - bounce - wingFlap); ctx.lineTo(x + 6, y + 8 - bounce); ctx.lineTo(x + 2, y + 10 - bounce); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x + 14, y + 6 - bounce + wingFlap); ctx.lineTo(x + 10, y + 8 - bounce); ctx.lineTo(x + 14, y + 10 - bounce); ctx.fill();
    ctx.fillStyle = "#e8a020";
    ctx.beginPath(); ctx.moveTo(x + 12, y + 8 - bounce);
    if (dir === DIR.RIGHT) { ctx.lineTo(x + 17, y + 7 - bounce); ctx.lineTo(x + 12, y + 9 - bounce); }
    else if (dir === DIR.LEFT) { ctx.lineTo(x - 1, y + 7 - bounce); ctx.lineTo(x + 4, y + 9 - bounce); }
    else { ctx.lineTo(x + 9, y + 6 - bounce); ctx.lineTo(x + 7, y + 9 - bounce); }
    ctx.fill();
    ctx.fillStyle = "#111";
    if (dir !== DIR.UP) {
      ctx.fillRect(x + (dir === DIR.LEFT ? 5 : 9), y + 6 - bounce, 2, 2);
    }
    return;
  }

  ctx.fillStyle = pt.bodyColor;
  ctx.fillRect(x + 2, y + 6 - bounce, 12, 8);

  ctx.fillStyle = pt.earColor;
  if (type === "bunny") {
    ctx.fillRect(x + 3, y - 4 - bounce, 3, 8);
    ctx.fillRect(x + 10, y - 4 - bounce, 3, 8);
  } else if (type === "cat") {
    ctx.beginPath(); ctx.moveTo(x + 2, y + 2 - bounce); ctx.lineTo(x + 5, y + 6 - bounce); ctx.lineTo(x - 1, y + 6 - bounce); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x + 14, y + 2 - bounce); ctx.lineTo(x + 11, y + 6 - bounce); ctx.lineTo(x + 17, y + 6 - bounce); ctx.fill();
  } else if (type === "fox") {
    ctx.beginPath(); ctx.moveTo(x + 1, y + 1 - bounce); ctx.lineTo(x + 5, y + 6 - bounce); ctx.lineTo(x - 2, y + 6 - bounce); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x + 15, y + 1 - bounce); ctx.lineTo(x + 11, y + 6 - bounce); ctx.lineTo(x + 18, y + 6 - bounce); ctx.fill();
    ctx.fillStyle = "#fff"; ctx.fillRect(x + 4, y + 10 - bounce, 8, 4);
  } else {
    ctx.fillRect(x + 1, y + 2 - bounce, 4, 6);
    ctx.fillRect(x + 11, y + 2 - bounce, 4, 6);
  }

  ctx.fillStyle = pt.bodyColor;
  ctx.fillRect(x + 2, y + 2 - bounce, 12, 6);

  ctx.fillStyle = pt.earColor;
  ctx.fillRect(x + 3 + legOff, y + 14 - bounce, 3, 3);
  ctx.fillRect(x + 10 - legOff, y + 14 - bounce, 3, 3);

  if (type === "cat" || type === "fox") {
    ctx.fillStyle = pt.earColor;
    const tailWag = Math.sin(Date.now() / 200) * 3;
    if (dir === DIR.LEFT) ctx.fillRect(x + 14, y + 8 - bounce + tailWag, 5, 2);
    else if (dir === DIR.RIGHT) ctx.fillRect(x - 3, y + 8 - bounce + tailWag, 5, 2);
    else ctx.fillRect(x + 14, y + 6 - bounce + tailWag, 5, 2);
  }
  if (type === "dog") {
    ctx.fillStyle = pt.earColor;
    const tailWag = Math.sin(Date.now() / 150) * 4;
    ctx.fillRect(x + 13, y + 6 - bounce + tailWag, 3, 2);
    ctx.fillRect(x + 15, y + 5 - bounce + tailWag, 2, 2);
  }

  ctx.fillStyle = "#111";
  if (dir !== DIR.UP) {
    ctx.fillRect(x + (dir === DIR.LEFT ? 3 : 5), y + 5 - bounce, 2, 2);
    ctx.fillRect(x + (dir === DIR.LEFT ? 8 : 10), y + 5 - bounce, 2, 2);
  }

  ctx.fillStyle = "#222";
  if (dir === DIR.DOWN || dir === DIR.LEFT || dir === DIR.RIGHT) {
    ctx.fillRect(x + 6, y + 8 - bounce, 4, 1);
  }
}

class Pet {
  constructor(type, name) {
    this.type = type;
    this.name = name;
    this.x = 0; this.y = 0;
    this.w = 16; this.h = 16;
    this.direction = DIR.DOWN;
    this.animTimer = 0; this.animFrame = 0; this.moving = false;
    this.happiness = 80;
    this.lastFedTimer = 0;
    this.heartTimer = 0;
    this.posHistory = [];
    this.followDist = 28;
  }

  feed(itemId) {
    const pt = PET_TYPES[this.type];
    let gain = 5;
    if (itemId === pt.tameFood) gain = 20;
    else if (itemId === "apple" || itemId === "fish") gain = 10;
    this.happiness = Math.min(100, this.happiness + gain);
    this.lastFedTimer = 0;
    this.heartTimer = 1.5;
    return gain;
  }

  update(dt, player, map) {
    this.lastFedTimer += dt;
    if (this.lastFedTimer > 60) this.happiness = Math.max(0, this.happiness - dt * 0.5);
    if (this.heartTimer > 0) this.heartTimer -= dt;

    this.posHistory.push({ x: player.centerX, y: player.centerY });
    if (this.posHistory.length > 30) this.posHistory.shift();

    const targetIdx = Math.max(0, this.posHistory.length - 15);
    const target = this.posHistory[targetIdx];
    const dx = target.x - (this.x + this.w / 2);
    const dy = target.y - (this.y + this.h / 2);
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist > this.followDist) {
      const speed = PET_TYPES[this.type].speed;
      const moveSpeed = dist > 120 ? speed * 2 : speed;
      const nx = dx / dist, ny = dy / dist;

      const newX = this.x + nx * moveSpeed * dt;
      const newY = this.y + ny * moveSpeed * dt;

      const m = 2;
      if (!map.isSolidPx(newX + m, this.y + m) && !map.isSolidPx(newX + this.w - m, this.y + this.h - m))
        this.x = newX;
      if (!map.isSolidPx(this.x + m, newY + m) && !map.isSolidPx(this.x + this.w - m, newY + this.h - m))
        this.y = newY;

      this.moving = true;
      if (Math.abs(dx) > Math.abs(dy)) this.direction = dx > 0 ? DIR.RIGHT : DIR.LEFT;
      else this.direction = dy > 0 ? DIR.DOWN : DIR.UP;

      this.animTimer += dt;
      if (this.animTimer >= 0.12) { this.animTimer = 0; this.animFrame = (this.animFrame + 1) % 4; }
    } else {
      this.moving = false; this.animFrame = 0;
      this.direction = player.direction;
    }

    if (dist > 300) {
      this.x = player.x - 20; this.y = player.y + 10;
      this.posHistory = [];
    }
  }

  render(ctx) {
    drawPetSprite(ctx, this.type, Math.round(this.x), Math.round(this.y), this.direction, this.animFrame, this.moving);

    if (this.heartTimer > 0) {
      const hAlpha = Math.min(1, this.heartTimer / 0.3);
      const hOff = (1.5 - this.heartTimer) * 10;
      ctx.globalAlpha = hAlpha;
      ctx.fillStyle = "#ff4060"; ctx.font = "12px serif";
      ctx.fillText("\u2764", this.x + 4, this.y - 6 - hOff);
      ctx.globalAlpha = 1;
    }
  }

  get centerX() { return this.x + this.w / 2; }
  get centerY() { return this.y + this.h / 2; }
}

class WildPet {
  constructor(col, row, type) {
    this.x = col * TILE_SIZE; this.y = row * TILE_SIZE;
    this.w = 16; this.h = 16;
    this.type = type;
    this.alive = true;
    this.direction = DIR.DOWN;
    this.animTimer = 0; this.animFrame = 0;
    this.moving = false;
    this.wanderTimer = 1 + Math.random() * 3;
    this.moveDir = { dx: 0, dy: 0 }; this.moveTime = 0;
    this.homeX = this.x; this.homeY = this.y;
    this.tameProgress = 0;
    this.exclamTimer = 0;
  }

  update(dt, map) {
    if (!this.alive) return;
    if (this.exclamTimer > 0) this.exclamTimer -= dt;

    this.wanderTimer -= dt;
    if (!this.moving && this.wanderTimer <= 0) {
      const angle = Math.random() * Math.PI * 2;
      this.moveDir = { dx: Math.cos(angle), dy: Math.sin(angle) };
      this.moveTime = 0.4 + Math.random();
      this.moving = true;
      if (Math.abs(this.moveDir.dx) > Math.abs(this.moveDir.dy))
        this.direction = this.moveDir.dx > 0 ? DIR.RIGHT : DIR.LEFT;
      else
        this.direction = this.moveDir.dy > 0 ? DIR.DOWN : DIR.UP;
    }

    if (this.moving) {
      this.moveTime -= dt;
      this.animTimer += dt;
      if (this.animTimer >= 0.15) { this.animTimer = 0; this.animFrame = (this.animFrame + 1) % 4; }

      const spd = 30;
      const newX = this.x + this.moveDir.dx * spd * dt;
      const newY = this.y + this.moveDir.dy * spd * dt;
      const ddx = newX - this.homeX, ddy = newY - this.homeY;
      if (Math.sqrt(ddx * ddx + ddy * ddy) < TILE_SIZE * 3) {
        const m = 2;
        if (!map.isSolidPx(newX + m, newY + m) && !map.isSolidPx(newX + this.w - m, newY + this.h - m)) {
          this.x = newX; this.y = newY;
        }
      }
      if (this.moveTime <= 0) {
        this.moving = false; this.animFrame = 0;
        this.wanderTimer = 2 + Math.random() * 4;
      }
    }
  }

  isNear(player, range = TILE_SIZE * 1.5) {
    const dx = (this.x + this.w / 2) - player.centerX;
    const dy = (this.y + this.h / 2) - player.centerY;
    return Math.sqrt(dx * dx + dy * dy) < range;
  }

  tryTame(inventory) {
    const pt = PET_TYPES[this.type];
    const foodId = pt.tameFood;

    for (const container of [inventory.hotbar, inventory.slots]) {
      for (let i = 0; i < container.length; i++) {
        if (container[i] && container[i].id === foodId) {
          container[i].count--;
          if (container[i].count <= 0) container[i] = null;
          this.tameProgress += 34;
          this.exclamTimer = 1;
          if (this.tameProgress >= 100) {
            this.alive = false;
            return new Pet(this.type, pt.name);
          }
          return null;
        }
      }
    }
    return false;
  }

  render(ctx) {
    if (!this.alive) return;
    drawPetSprite(ctx, this.type, Math.round(this.x), Math.round(this.y), this.direction, this.animFrame, this.moving);

    if (this.tameProgress > 0) {
      const bw = 20, bh = 3;
      const bx = this.x + this.w / 2 - bw / 2, by = this.y - 8;
      ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(bx, by, bw, bh);
      ctx.fillStyle = "#f06080"; ctx.fillRect(bx, by, bw * this.tameProgress / 100, bh);
    }

    if (this.exclamTimer > 0) {
      ctx.fillStyle = "#ff4060"; ctx.font = "12px serif";
      ctx.fillText("\u2764", this.x + 4, this.y - 10);
    }
  }
}

/* ── PetPanel ────────────────────────────────────────────── */

class PetPanel {
  constructor() { this.open = false; }
  toggle() { this.open = !this.open; }
  close() { this.open = false; }

  render(ctx, canvasW, canvasH, pet) {
    if (!this.open || !pet) return;

    const pw = 240, ph = 180;
    const px = Math.floor((canvasW - pw) / 2);
    const py = Math.floor((canvasH - ph) / 2);

    ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(0, 0, canvasW, canvasH);

    ctx.fillStyle = "rgba(15, 15, 40, 0.95)";
    ctx.strokeStyle = "#c08060"; ctx.lineWidth = 2;
    roundRect(ctx, px, py, pw, ph, 10); ctx.fill(); ctx.stroke();

    ctx.fillStyle = "#f0d050"; ctx.font = "bold 16px monospace";
    ctx.fillText("Evcil Hayvan", px + 16, py + 26);
    ctx.fillStyle = "#888"; ctx.font = "11px monospace";
    ctx.fillText("[P] Kapat", px + pw - 80, py + 26);

    const previewX = px + 20, previewY = py + 50;
    ctx.fillStyle = "rgba(40,40,60,0.6)"; ctx.strokeStyle = "#505070"; ctx.lineWidth = 1;
    roundRect(ctx, previewX, previewY, 48, 48, 6); ctx.fill(); ctx.stroke();
    drawPetSprite(ctx, pet.type, previewX + 16, previewY + 14, DIR.DOWN, 0, false);

    ctx.fillStyle = "#e8e8f0"; ctx.font = "bold 14px monospace";
    ctx.fillText(pet.name, px + 80, py + 66);

    ctx.fillStyle = "#a0a0c0"; ctx.font = "12px monospace";
    ctx.fillText("T\u00fcr: " + PET_TYPES[pet.type].name, px + 80, py + 84);

    const barX = px + 20, barY = py + 115, barW = pw - 40, barH = 14;
    ctx.fillStyle = "#a0a0c0"; ctx.font = "11px monospace";
    ctx.fillText("Mutluluk", barX, barY - 4);
    ctx.fillStyle = "rgba(40,40,60,0.8)";
    roundRect(ctx, barX, barY, barW, barH, 4); ctx.fill();
    const hpColor = pet.happiness > 60 ? "#50c060" : pet.happiness > 30 ? "#d0a030" : "#d04040";
    ctx.fillStyle = hpColor;
    roundRect(ctx, barX, barY, barW * pet.happiness / 100, barH, 4); ctx.fill();
    ctx.fillStyle = "#fff"; ctx.font = "bold 10px monospace";
    ctx.fillText(Math.round(pet.happiness) + "%", barX + barW / 2 - 10, barY + 11);

    const favFood = PET_TYPES[pet.type].tameFood;
    const favName = ITEMS[favFood] ? ITEMS[favFood].name : favFood;
    ctx.fillStyle = "#a0a0c0"; ctx.font = "11px monospace";
    ctx.fillText("Favori yiyecek: " + favName, barX, barY + 34);
    ctx.fillText("Beslemek i\u00e7in: [F]", barX, barY + 50);
  }
}

/* ── Shop / Market ───────────────────────────────────────── */

const SHOP_SLOT = 44, SHOP_GAP = 4, SHOP_COLS = 4;

class Shop {
  constructor() {
    this.open = false;
    this.shopName = "";
    this.stock = [];
    this.tab = 0; // 0=buy, 1=sell
    this.scrollBuy = 0;
    this.scrollSell = 0;
    this.tooltipItem = null;
    this.tooltipX = 0;
    this.tooltipY = 0;
    this.feedbackText = "";
    this.feedbackTimer = 0;
    this.feedbackColor = "#50e050";
  }

  openShop(name, stock) {
    this.shopName = name;
    this.stock = stock;
    this.open = true;
    this.tab = 0;
    this.scrollBuy = 0;
    this.scrollSell = 0;
    this.tooltipItem = null;
  }

  close() { this.open = false; this.tooltipItem = null; }
  toggle() { if (this.open) this.close(); }

  update(dt) {
    if (this.feedbackTimer > 0) this.feedbackTimer -= dt;
  }

  _showFeedback(text, color) {
    this.feedbackText = text;
    this.feedbackTimer = 1.5;
    this.feedbackColor = color || "#50e050";
  }

  _layout(cw, ch) {
    const pw = 380, ph = 360;
    const px = Math.floor((cw - pw) / 2);
    const py = Math.floor((ch - ph) / 2);
    return { px, py, pw, ph };
  }

  _bulkSellButtonRect(L) {
    return { x: L.px + 16, y: L.py + L.ph - 38, w: L.pw - 32, h: 24 };
  }

  _sellBulkAll(inventory) {
    let totalGold = 0;
    let stacks = 0;
    for (const container of [inventory.hotbar, inventory.slots]) {
      for (let i = 0; i < container.length; i++) {
        const slot = container[i];
        if (!slot || slot.id === "coin") continue;
        const def = ITEMS[slot.id];
        if (!def || def.sellPrice <= 0) continue;
        totalGold += def.sellPrice * slot.count;
        stacks++;
        container[i] = null;
      }
    }
    if (totalGold > 0) {
      inventory.addItem("coin", totalGold);
      this._showFeedback("Toplu sat\u0131\u015f: +" + totalGold + " alt\u0131n (" + stacks + " y\u0131\u011f\u0131n)", "#f0d050");
    } else {
      this._showFeedback("Sat\u0131lacak e\u015fya yok!", "#888");
    }
  }

  handleClick(mx, my, cw, ch, inventory, shiftKey, button) {
    if (shiftKey === undefined) shiftKey = false;
    if (button === undefined) button = 0;
    if (!this.open) return false;
    const L = this._layout(cw, ch);

    const tabBuyX = L.px + 16, tabSellX = L.px + 16 + 100, tabY = L.py + 38, tabW = 90, tabH = 24;
    if (mx >= tabBuyX && mx < tabBuyX + tabW && my >= tabY && my < tabY + tabH) { this.tab = 0; return true; }
    if (mx >= tabSellX && mx < tabSellX + tabW && my >= tabY && my < tabY + tabH) { this.tab = 1; return true; }

    const gridX = L.px + 16, gridY = L.py + 76;
    const gold = inventory.countItem("coin");

    if (this.tab === 0) {
      if (button !== 0) return true;
      for (let i = 0; i < this.stock.length; i++) {
        const row = Math.floor(i / SHOP_COLS), col = i % SHOP_COLS;
        const sx = gridX + col * (SHOP_SLOT + SHOP_GAP);
        const sy = gridY + row * (SHOP_SLOT + SHOP_GAP + 14) - this.scrollBuy;
        if (sy < gridY - SHOP_SLOT || sy > L.py + L.ph) continue;
        if (mx >= sx && mx < sx + SHOP_SLOT && my >= sy && my < sy + SHOP_SLOT + 14) {
          const si = this.stock[i];
          const def = ITEMS[si.id];
          if (!def) return true;
          if (si.qty <= 0) { this._showFeedback("Stok tükendi!", "#d04040"); return true; }
          if (gold < def.buyPrice) { this._showFeedback("Yeterli altın yok!", "#d04040"); return true; }
          inventory.removeItem("coin", def.buyPrice);
          inventory.addItem(si.id, 1);
          si.qty--;
          this._showFeedback(def.name + " satın alındı! -" + def.buyPrice + " altın");
          return true;
        }
      }
    } else {
      const bulkBtn = this._bulkSellButtonRect(L);
      if (button === 0 && mx >= bulkBtn.x && mx < bulkBtn.x + bulkBtn.w && my >= bulkBtn.y && my < bulkBtn.y + bulkBtn.h) {
        this._sellBulkAll(inventory);
        return true;
      }
      const sellable = [];
      for (const container of [inventory.hotbar, inventory.slots]) {
        for (let i = 0; i < container.length; i++) {
          if (container[i] && container[i].id !== "coin" && ITEMS[container[i].id] && ITEMS[container[i].id].sellPrice > 0) {
            sellable.push({ containerRef: container, slotIdx: i, slot: container[i] });
          }
        }
      }
      for (let i = 0; i < sellable.length; i++) {
        const row = Math.floor(i / SHOP_COLS), col = i % SHOP_COLS;
        const sx = gridX + col * (SHOP_SLOT + SHOP_GAP);
        const sy = gridY + row * (SHOP_SLOT + SHOP_GAP + 14) - this.scrollSell;
        if (sy < gridY - SHOP_SLOT || sy > L.py + L.ph) continue;
        if (mx >= sx && mx < sx + SHOP_SLOT && my >= sy && my < sy + SHOP_SLOT + 14) {
          if (button !== 0 && button !== 2) return true;
          const s = sellable[i];
          const def = ITEMS[s.slot.id];
          if (button === 2 || shiftKey) {
            const stackN = s.slot.count;
            const totalGold = def.sellPrice * stackN;
            inventory.addItem("coin", totalGold);
            s.containerRef[s.slotIdx] = null;
            this._showFeedback(stackN + "x " + def.name + " sat\u0131ld\u0131! +" + totalGold + " alt\u0131n", "#f0d050");
            return true;
          }
          inventory.addItem("coin", def.sellPrice);
          s.slot.count--;
          if (s.slot.count <= 0) s.containerRef[s.slotIdx] = null;
          this._showFeedback(def.name + " satıldı! +" + def.sellPrice + " altın", "#f0d050");
          return true;
        }
      }
    }
    return true;
  }

  handleScroll(dy, mx, my, cw, ch) {
    if (!this.open) return;
    const L = this._layout(cw, ch);
    if (mx >= L.px && mx < L.px + L.pw && my >= L.py && my < L.py + L.ph) {
      if (this.tab === 0) this.scrollBuy = Math.max(0, this.scrollBuy + dy * 20);
      else this.scrollSell = Math.max(0, this.scrollSell + dy * 20);
    }
  }

  handleMouseMove(mx, my, cw, ch, inventory) {
    this.tooltipItem = null;
    if (!this.open) return;
    const L = this._layout(cw, ch);
    const gridX = L.px + 16, gridY = L.py + 76;

    if (this.tab === 0) {
      for (let i = 0; i < this.stock.length; i++) {
        const row = Math.floor(i / SHOP_COLS), col = i % SHOP_COLS;
        const sx = gridX + col * (SHOP_SLOT + SHOP_GAP);
        const sy = gridY + row * (SHOP_SLOT + SHOP_GAP + 14) - this.scrollBuy;
        if (mx >= sx && mx < sx + SHOP_SLOT && my >= sy && my < sy + SHOP_SLOT) {
          this.tooltipItem = this.stock[i].id;
          this.tooltipX = mx; this.tooltipY = my;
          return;
        }
      }
    } else {
      const sellable = [];
      for (const container of [inventory.hotbar, inventory.slots]) {
        for (let i = 0; i < container.length; i++) {
          if (container[i] && container[i].id !== "coin" && ITEMS[container[i].id] && ITEMS[container[i].id].sellPrice > 0)
            sellable.push(container[i]);
        }
      }
      for (let i = 0; i < sellable.length; i++) {
        const row = Math.floor(i / SHOP_COLS), col = i % SHOP_COLS;
        const sx = gridX + col * (SHOP_SLOT + SHOP_GAP);
        const sy = gridY + row * (SHOP_SLOT + SHOP_GAP + 14) - this.scrollSell;
        if (mx >= sx && mx < sx + SHOP_SLOT && my >= sy && my < sy + SHOP_SLOT) {
          this.tooltipItem = sellable[i].id;
          this.tooltipX = mx; this.tooltipY = my;
          return;
        }
      }
    }
  }

  render(ctx, cw, ch, inventory) {
    if (!this.open) return;
    const L = this._layout(cw, ch);
    const gold = inventory.countItem("coin");

    ctx.fillStyle = "rgba(0,0,0,0.55)"; ctx.fillRect(0, 0, cw, ch);

    ctx.fillStyle = "rgba(15,15,40,0.95)";
    ctx.strokeStyle = "#c0a050"; ctx.lineWidth = 2;
    roundRect(ctx, L.px, L.py, L.pw, L.ph, 10); ctx.fill(); ctx.stroke();

    ctx.fillStyle = "#f0d050"; ctx.font = "bold 16px monospace";
    ctx.fillText(this.shopName, L.px + 16, L.py + 24);

    ctx.fillStyle = "#888"; ctx.font = "11px monospace";
    ctx.fillText("[Esc] Kapat", L.px + L.pw - 90, L.py + 24);

    drawItemIcon(ctx, "coin", L.px + L.pw - 165, L.py + 12, 14);
    ctx.fillStyle = "#f0d050"; ctx.font = "bold 12px monospace";
    ctx.fillText(String(gold), L.px + L.pw - 148, L.py + 24);

    const tabBuyX = L.px + 16, tabSellX = L.px + 16 + 100, tabY = L.py + 38, tabW = 90, tabH = 24;
    ctx.fillStyle = this.tab === 0 ? "rgba(80,180,80,0.3)" : "rgba(40,40,60,0.5)";
    ctx.strokeStyle = this.tab === 0 ? "#60c060" : "#505070"; ctx.lineWidth = 1;
    roundRect(ctx, tabBuyX, tabY, tabW, tabH, 4); ctx.fill(); ctx.stroke();
    ctx.fillStyle = this.tab === 0 ? "#90ff90" : "#888"; ctx.font = "bold 12px monospace";
    ctx.fillText("Satın Al", tabBuyX + 12, tabY + 16);

    ctx.fillStyle = this.tab === 1 ? "rgba(200,160,50,0.3)" : "rgba(40,40,60,0.5)";
    ctx.strokeStyle = this.tab === 1 ? "#c0a030" : "#505070"; ctx.lineWidth = 1;
    roundRect(ctx, tabSellX, tabY, tabW, tabH, 4); ctx.fill(); ctx.stroke();
    ctx.fillStyle = this.tab === 1 ? "#f0d050" : "#888"; ctx.font = "bold 12px monospace";
    ctx.fillText("Sat", tabSellX + 28, tabY + 16);

    const gridX = L.px + 16, gridY = L.py + 76;
    const clipBottom = this.tab === 1 ? L.py + L.ph - 44 : L.py + L.ph - 10;

    ctx.save();
    ctx.beginPath();
    ctx.rect(L.px, gridY - 2, L.pw, clipBottom - gridY + 2);
    ctx.clip();

    if (this.tab === 0) {
      this._renderBuyTab(ctx, gridX, gridY, gold);
    } else {
      this._renderSellTab(ctx, gridX, gridY, inventory);
    }

    ctx.restore();

    if (this.tab === 1) {
      const b = this._bulkSellButtonRect(L);
      ctx.fillStyle = "rgba(100,70,35,0.9)";
      ctx.strokeStyle = "#d8a040"; ctx.lineWidth = 1;
      roundRect(ctx, b.x, b.y, b.w, b.h, 5); ctx.fill(); ctx.stroke();
      ctx.fillStyle = "#f0e8c0"; ctx.font = "bold 11px monospace";
      const bulkLabel = "T\u00fcm sat\u0131labilirleri sat";
      ctx.fillText(bulkLabel, b.x + (b.w - ctx.measureText(bulkLabel).width) / 2, b.y + 16);
      ctx.fillStyle = "#908070"; ctx.font = "9px monospace";
      ctx.fillText("Stek: sa\u011f t\u0131k veya Shift+t\u0131k", b.x + 8, b.y - 6);
    }

    if (this.tooltipItem) {
      const def = ITEMS[this.tooltipItem];
      if (def) {
        const ttW = 170, ttH = 58;
        let tx = this.tooltipX + 14, ty = this.tooltipY - ttH - 4;
        if (tx + ttW > cw) tx = this.tooltipX - ttW - 4;
        if (ty < 0) ty = this.tooltipY + 14;
        ctx.fillStyle = "rgba(5,5,20,0.95)"; ctx.strokeStyle = "#6060a0"; ctx.lineWidth = 1;
        roundRect(ctx, tx, ty, ttW, ttH, 5); ctx.fill(); ctx.stroke();
        ctx.fillStyle = "#f0d050"; ctx.font = "bold 12px monospace";
        ctx.fillText(def.name, tx + 8, ty + 16);
        ctx.fillStyle = "#a0a0c0"; ctx.font = "11px monospace";
        ctx.fillText(def.desc, tx + 8, ty + 32);
        ctx.fillStyle = "#80d080"; ctx.fillText("Al: " + def.buyPrice + "g", tx + 8, ty + 48);
        ctx.fillStyle = "#d0a040"; ctx.fillText("Sat: " + def.sellPrice + "g", tx + 85, ty + 48);
      }
    }

    if (this.feedbackTimer > 0) {
      const alpha = Math.min(1, this.feedbackTimer / 0.3);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = this.feedbackColor; ctx.font = "bold 13px monospace";
      const fw = ctx.measureText(this.feedbackText).width;
      ctx.fillText(this.feedbackText, L.px + (L.pw - fw) / 2, L.py + L.ph - 16);
      ctx.globalAlpha = 1;
    }
  }

  _renderBuyTab(ctx, gridX, gridY, gold) {
    for (let i = 0; i < this.stock.length; i++) {
      const si = this.stock[i];
      const def = ITEMS[si.id];
      if (!def) continue;
      const row = Math.floor(i / SHOP_COLS), col = i % SHOP_COLS;
      const sx = gridX + col * (SHOP_SLOT + SHOP_GAP);
      const sy = gridY + row * (SHOP_SLOT + SHOP_GAP + 14) - this.scrollBuy;

      const canBuy = gold >= def.buyPrice && si.qty > 0;
      ctx.fillStyle = canBuy ? "rgba(50,70,50,0.6)" : "rgba(40,40,60,0.4)";
      ctx.strokeStyle = canBuy ? "#60a060" : "#404060"; ctx.lineWidth = 1;
      roundRect(ctx, sx, sy, SHOP_SLOT, SHOP_SLOT, 4); ctx.fill(); ctx.stroke();

      drawItemIcon(ctx, si.id, sx + 6, sy + 4, SHOP_SLOT - 12);

      if (si.qty > 0) {
        ctx.fillStyle = "#aaa"; ctx.font = "9px monospace";
        ctx.fillText("x" + si.qty, sx + SHOP_SLOT - 18, sy + SHOP_SLOT - 3);
      } else {
        ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(sx, sy, SHOP_SLOT, SHOP_SLOT);
        ctx.fillStyle = "#d04040"; ctx.font = "bold 9px monospace";
        ctx.fillText("TÜKENDİ", sx + 2, sy + SHOP_SLOT / 2 + 3);
      }

      ctx.fillStyle = canBuy ? "#80d080" : "#806060"; ctx.font = "bold 10px monospace";
      const priceText = def.buyPrice + "g";
      ctx.fillText(priceText, sx + (SHOP_SLOT - ctx.measureText(priceText).width) / 2, sy + SHOP_SLOT + 11);
    }
  }

  _renderSellTab(ctx, gridX, gridY, inventory) {
    const sellable = [];
    for (const container of [inventory.hotbar, inventory.slots]) {
      for (let i = 0; i < container.length; i++) {
        if (container[i] && container[i].id !== "coin" && ITEMS[container[i].id] && ITEMS[container[i].id].sellPrice > 0)
          sellable.push(container[i]);
      }
    }

    if (sellable.length === 0) {
      ctx.fillStyle = "#666"; ctx.font = "12px monospace";
      ctx.fillText("Satılacak eşya yok.", gridX, gridY + 30);
      return;
    }

    for (let i = 0; i < sellable.length; i++) {
      const slot = sellable[i];
      const def = ITEMS[slot.id];
      const row = Math.floor(i / SHOP_COLS), col = i % SHOP_COLS;
      const sx = gridX + col * (SHOP_SLOT + SHOP_GAP);
      const sy = gridY + row * (SHOP_SLOT + SHOP_GAP + 14) - this.scrollSell;

      ctx.fillStyle = "rgba(60,50,30,0.6)";
      ctx.strokeStyle = "#a08040"; ctx.lineWidth = 1;
      roundRect(ctx, sx, sy, SHOP_SLOT, SHOP_SLOT, 4); ctx.fill(); ctx.stroke();

      drawItemIcon(ctx, slot.id, sx + 6, sy + 4, SHOP_SLOT - 12);

      if (slot.count > 1) {
        ctx.fillStyle = "#fff"; ctx.font = "bold 10px monospace";
        ctx.fillText(String(slot.count), sx + SHOP_SLOT - 14, sy + SHOP_SLOT - 3);
      }

      ctx.fillStyle = "#f0d050"; ctx.font = "bold 10px monospace";
      const priceText = "+" + def.sellPrice + "g";
      ctx.fillText(priceText, sx + (SHOP_SLOT - ctx.measureText(priceText).width) / 2, sy + SHOP_SLOT + 11);
    }
  }
}

/* ── DialogBox ───────────────────────────────────────────── */

class DialogBox {
  constructor() {
    this.active = false; this.lines = []; this.currentLine = 0;
    this.displayedText = ""; this.charIndex = 0;
    this.charTimer = 0; this.charSpeed = 0.03;
    this.speaker = ""; this.onComplete = null;
  }

  show(speaker, lines, onComplete) {
    this.active = true; this.speaker = speaker; this.lines = lines;
    this.currentLine = 0; this.displayedText = "";
    this.charIndex = 0; this.charTimer = 0;
    this.onComplete = onComplete || null;
  }

  advance() {
    if (!this.active) return;
    if (this.charIndex < this.lines[this.currentLine].length) {
      this.displayedText = this.lines[this.currentLine];
      this.charIndex = this.displayedText.length;
      return;
    }
    this.currentLine++;
    if (this.currentLine >= this.lines.length) { this.close(); return; }
    this.displayedText = ""; this.charIndex = 0; this.charTimer = 0;
  }

  close() { this.active = false; if (this.onComplete) this.onComplete(); }

  update(dt) {
    if (!this.active) return;
    if (this.charIndex >= this.lines[this.currentLine].length) return;
    this.charTimer += dt;
    while (this.charTimer >= this.charSpeed && this.charIndex < this.lines[this.currentLine].length) {
      this.charTimer -= this.charSpeed;
      this.charIndex++;
      this.displayedText = this.lines[this.currentLine].substring(0, this.charIndex);
    }
  }

  render(ctx, canvasW, canvasH) {
    if (!this.active) return;
    const boxH = 90, boxW = canvasW - 40, boxX = 20, boxY = canvasH - boxH - 20;

    ctx.fillStyle = "rgba(10, 10, 30, 0.92)";
    ctx.strokeStyle = "#8080c0"; ctx.lineWidth = 2;
    roundRect(ctx, boxX, boxY, boxW, boxH, 8);
    ctx.fill(); ctx.stroke();

    if (this.speaker) {
      ctx.fillStyle = "#f0d050"; ctx.font = "bold 14px monospace";
      ctx.fillText(this.speaker, boxX + 14, boxY + 22);
    }
    ctx.fillStyle = "#e8e8f0"; ctx.font = "13px monospace";
    ctx.fillText(this.displayedText, boxX + 14, boxY + 48);

    if (this.charIndex >= this.lines[this.currentLine].length) {
      if (Math.sin(Date.now() / 200) > 0) {
        ctx.fillStyle = "#8080c0";
        ctx.fillText("\u25bc", boxX + boxW - 30, boxY + boxH - 14);
      }
    }
  }
}

class HUD {

  showInteractPrompt(text) { this.interactPrompt = text; }

  render(ctx, canvasW, canvasH) {
    if (this.interactPrompt) {
      ctx.fillStyle = "rgba(10, 10, 30, 0.8)";
      ctx.strokeStyle = "#a0a0d0"; ctx.lineWidth = 1;
      ctx.font = "12px monospace";
      const tw = ctx.measureText(this.interactPrompt).width + 24;
      const tx = (canvasW - tw) / 2, ty = canvasH - 130;
      roundRect(ctx, tx, ty, tw, 28, 6);
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = "#e8e8f0";
      ctx.fillText(this.interactPrompt, tx + 12, ty + 18);
    }
    ctx.fillStyle = "#f0f0f0"; ctx.font = "11px monospace";
    if (touchState.mobileUI) {
      ctx.fillText(
        "Mobil: sol joystick | sa\u011f s\u00fctun: E/Q/I/P/M/B/F | \u2694 k\u0131sa: sald\u0131r\u0131, uzun: g\u00fc\u00e7l\u00fc ok | \u00d7 kapat",
        10,
        canvasH - 10
      );
    } else {
      ctx.fillText("WASD: Hareket | E: Etkile\u015fim | I: Envanter | Q: \u0130ksir | Shift: G\u00fc\u00e7l\u00fc At\u0131\u015f | B: Tekne | M: Harita", 10, canvasH - 10);
    }
  }
}

/* ── Procedural World Generation ─────────────────────────── */

const T = TileType;

function hashXY(x, y) {
  let h = (x * 374761393 + y * 668265263) | 0;
  h = ((h ^ (h >> 13)) * 1274126177) | 0;
  return ((h ^ (h >> 16)) >>> 0) / 4294967296;
}

function noise2D(x, y) {
  const ix = Math.floor(x), iy = Math.floor(y);
  const fx = x - ix, fy = y - iy;
  const sx = fx * fx * (3 - 2 * fx), sy = fy * fy * (3 - 2 * fy);
  const a = hashXY(ix, iy), b = hashXY(ix + 1, iy);
  const c = hashXY(ix, iy + 1), d = hashXY(ix + 1, iy + 1);
  return a + (b - a) * sx + (c - a) * sy + (a - b - c + d) * sx * sy;
}

function fbm(x, y, oct) {
  let v = 0, amp = 1, freq = 1, tot = 0;
  for (let i = 0; i < oct; i++) { v += noise2D(x * freq, y * freq) * amp; tot += amp; amp *= 0.5; freq *= 2; }
  return v / tot;
}

const WORLD_COLS = 280, WORLD_ROWS = 200;
const VCOLS = 40, VROWS = 30;

];

function islandInfluence(c, r) {
  let best = 9999;
  for (const isl of ISLANDS) {
    const dx = c - isl.cx, dy = r - isl.cy;
    const d = Math.sqrt(dx * dx + dy * dy) - isl.r;
    if (d < best) best = d;
  }
  return best;
}

function generateWorld() {
  const ground = new Array(WORLD_COLS * WORLD_ROWS);
  const detail = new Array(WORLD_COLS * WORLD_ROWS);
  const centerX = WORLD_COLS / 2, centerY = WORLD_ROWS / 2;
  const mainR = 56;

  for (let r = 0; r < WORLD_ROWS; r++) {
    for (let c = 0; c < WORLD_COLS; c++) {
      const idx = r * WORLD_COLS + c;
      const vc = c - VOX, vr = r - VOY;

      if (vc >= 0 && vc < VCOLS && vr >= 0 && vr < VROWS) {
        ground[idx] = ORIG_GROUND[vr * VCOLS + vc];
        detail[idx] = ORIG_DETAIL[vr * VCOLS + vc];
        continue;
      }

      const dxC = (c - centerX) / (WORLD_COLS * 0.45);
      const dyC = (r - centerY) / (WORLD_ROWS * 0.45);
      const distEdge = Math.sqrt(dxC * dxC + dyC * dyC);

      const dxM = c - centerX, dyM = r - centerY;
      const distMain = Math.sqrt(dxM * dxM + dyM * dyM);

      const islDist = islandInfluence(c, r);
      const onIsland = islDist < 0;
      const islandCoast = islDist >= 0 && islDist < 3;

      const nx = c / 40, ny = r / 30;
      const elevation = fbm(nx + 0.3, ny + 0.7, 4);
      const moisture = fbm(nx * 1.3 + 50, ny * 1.3 + 50, 3);
      const h = hashXY(c, r);

      let tile, det = -1;

      if (distEdge > 1.0 && !onIsland && !islandCoast) {
        tile = T.WATER;
      } else if (distMain > mainR && !onIsland && !islandCoast) {
        const fade = (distMain - mainR) / 15;
        if (fade > 1 + (elevation - 0.4) * 3) {
          tile = T.WATER;
        } else if (fade > 0.8 + (elevation - 0.4) * 2) {
          tile = T.SAND;
        } else {
          tile = elevation > 0.6 ? T.GRASS : T.SAND;
          if (h < 0.06 && tile === T.GRASS) det = T.TREE;
        }
      } else if (islandCoast) {
        tile = T.SAND;
      } else if (onIsland) {
        const iElev = elevation * 0.6 + 0.4;
        if (iElev > 0.75) { tile = T.STONE_FLOOR; if (h < 0.1) det = T.TREE; }
        else if (moisture > 0.5) { tile = T.TALL_GRASS; if (h < 0.18) det = T.TREE; else if (h < 0.22) det = T.FLOWER; }
        else { tile = T.GRASS; if (h < 0.12) det = T.TREE; else if (h < 0.15) det = T.FLOWER; }
      } else {
        if (elevation < 0.28) {
          tile = T.WATER;
        } else if (elevation < 0.33) {
          tile = T.SAND;
        } else if (elevation > 0.72) {
          tile = T.WALL;
        } else if (elevation > 0.65) {
          tile = T.STONE_FLOOR;
          if (h < 0.12) det = T.TREE;
        } else if (moisture > 0.55) {
          tile = T.TALL_GRASS;
          if (h < 0.15) det = T.TREE;
          else if (h < 0.18) det = T.FLOWER;
        } else if (moisture < 0.35) {
          tile = T.DIRT;
          if (h < 0.04) det = T.FLOWER;
        } else {
          tile = T.GRASS;
          if (h < 0.08) det = T.TREE;
          else if (h < 0.11) det = T.FLOWER;
        }
      }

      ground[idx] = tile;
      detail[idx] = det;
    }
  }

  const dockCol = VOX + 20;
  const gateVC = dockCol - VOX;
  for (let dc = -2; dc <= 2; dc++) {
    const c = dockCol + dc;
    for (let vr = VROWS - 1; vr >= VROWS - 2; vr--) {
      const idx = (VOY + vr) * WORLD_COLS + c;
      if (ground[idx] === T.WALL) { ground[idx] = T.DIRT; detail[idx] = -1; }
    }
  }
  for (let r = VOY + VROWS; r <= VOY + VROWS + 3; r++) {
    for (let dc = -2; dc <= 2; dc++) {
      const c = dockCol + dc;
      const idx = r * WORLD_COLS + c;
      ground[idx] = T.DIRT; detail[idx] = -1;
    }
  }

  const dockStartRow = VOY + VROWS + 2;

  for (let r = dockStartRow - 2; r <= dockStartRow + 1; r++) {
    for (let c = dockCol - 3; c <= dockCol + 3; c++) {
      const idx = r * WORLD_COLS + c;
      if (ground[idx] !== T.BRIDGE) { ground[idx] = T.SAND; detail[idx] = -1; }
    }
  }

  let dockEnd = dockStartRow;
  for (let r = dockStartRow; r < WORLD_ROWS - 1; r++) {
    const idx = r * WORLD_COLS + dockCol;
    if (r > dockStartRow + 3 && ground[idx] === T.WATER) {
      const ahead1 = (r + 2 < WORLD_ROWS) ? ground[(r + 2) * WORLD_COLS + dockCol] : T.WATER;
      const ahead2 = (r + 4 < WORLD_ROWS) ? ground[(r + 4) * WORLD_COLS + dockCol] : T.WATER;
      if (ahead1 === T.WATER && ahead2 === T.WATER) { dockEnd = r + 4; break; }
    }
    dockEnd = r + 1;
  }
  dockEnd = Math.min(dockEnd, WORLD_ROWS - 3);

  for (let r = dockStartRow; r <= dockEnd; r++) {
    for (let dc = -1; dc <= 1; dc++) {
      const c = dockCol + dc;
      const idx = r * WORLD_COLS + c;
      ground[idx] = T.BRIDGE;
      detail[idx] = -1;
    }
  }

  for (let dc = -3; dc <= 3; dc++) {
    const idx1 = dockEnd * WORLD_COLS + (dockCol + dc);
    const idx2 = (dockEnd - 1) * WORLD_COLS + (dockCol + dc);
    ground[idx1] = T.BRIDGE; detail[idx1] = -1;
    ground[idx2] = T.BRIDGE; detail[idx2] = -1;
  }

  return { ground, detail, dockEnd, dockCol };
}

const BOAT_RECIPE = { wood: 15, stone: 5, rope: 3 };

class CraftPanel {
  constructor() {
    this.open = false;
    this.feedbackText = "";
    this.feedbackTimer = 0;
    this.feedbackColor = "#50e050";
  }

  toggle() { this.open = !this.open; }
  close()  { this.open = false; }

  update(dt) {
    if (this.feedbackTimer > 0) this.feedbackTimer -= dt;
  }

  _showFeedback(text, color) {
    this.feedbackText = text;
    this.feedbackTimer = 2;
    this.feedbackColor = color || "#50e050";
  }

  canCraft(inv) {
    for (const [item, need] of Object.entries(BOAT_RECIPE)) {
      if (inv.countItem(item) < need) return false;
    }
    return true;
  }

  craft(inv, player) {
    if (player.hasBoat) {
      this._showFeedback("Zaten bir teknen var!", "#d0a030");
      return;
    }
    if (!this.canCraft(inv)) {
      this._showFeedback("Yeterli malzemen yok!", "#d04040");
      return;
    }
    for (const [item, need] of Object.entries(BOAT_RECIPE)) {
      inv.removeItem(item, need);
    }
    player.hasBoat = true;
    this._showFeedback("Tekne in\u015fa edildi!", "#50e050");
  }

  handleClick(mx, my, canvasW, canvasH, inv, player) {
    if (!this.open) return;
    const panW = 280, panH = 220;
    const px = (canvasW - panW) / 2, py = (canvasH - panH) / 2;

    const btnW = 120, btnH = 30;
    const btnX = px + (panW - btnW) / 2, btnY = py + panH - 50;
    if (mx >= btnX && mx <= btnX + btnW && my >= btnY && my <= btnY + btnH) {
      this.craft(inv, player);
    }
  }

  render(ctx, canvasW, canvasH, inv, player) {
    if (!this.open) return;
    const panW = 280, panH = 220;
    const px = (canvasW - panW) / 2, py = (canvasH - panH) / 2;

    ctx.fillStyle = "rgba(10,10,30,0.92)";
    ctx.strokeStyle = "#6080c0"; ctx.lineWidth = 2;
    roundRect(ctx, px, py, panW, panH, 10);
    ctx.fill(); ctx.stroke();

    ctx.fillStyle = "#80c0ff"; ctx.font = "bold 16px monospace";
    ctx.fillText("\u2693 Tekne Yap\u0131m\u0131", px + 70, py + 28);

    let iy = py + 50;
    ctx.font = "13px monospace";
    ctx.fillStyle = "#c0c0d0";
    ctx.fillText("Gerekli malzemeler:", px + 20, iy); iy += 22;

    for (const [item, need] of Object.entries(BOAT_RECIPE)) {
      const have = inv.countItem(item);
      const enough = have >= need;
      drawItemIcon(ctx, item, px + 22, iy - 10, 18);
      ctx.fillStyle = enough ? "#50e050" : "#d04040";
      ctx.font = "13px monospace";
      ctx.fillText(ITEMS[item].name + ": " + have + " / " + need, px + 46, iy + 2);
      ctx.fillStyle = enough ? "#50e050" : "#d04040";
      ctx.fillText(enough ? " \u2714" : " \u2718", px + 220, iy + 2);
      iy += 26;
    }

    if (player.hasBoat) {
      ctx.fillStyle = "#50e050"; ctx.font = "bold 13px monospace";
      ctx.fillText("\u2713 Teknen haz\u0131r! Su k\u0131y\u0131s\u0131nda B bas.", px + 30, iy + 14);
    } else {
      const btnW = 120, btnH = 30;
      const btnX = px + (panW - btnW) / 2, btnY = py + panH - 50;
      const canBuild = this.canCraft(inv);
      ctx.fillStyle = canBuild ? "rgba(50,120,50,0.9)" : "rgba(60,60,60,0.8)";
      roundRect(ctx, btnX, btnY, btnW, btnH, 6);
      ctx.fill();
      ctx.strokeStyle = canBuild ? "#60d060" : "#606060"; ctx.lineWidth = 1;
      roundRect(ctx, btnX, btnY, btnW, btnH, 6);
      ctx.stroke();
      ctx.fillStyle = canBuild ? "#f0f0f0" : "#808080";
      ctx.font = "bold 14px monospace";
      ctx.fillText("\u{1F6E0} \u0130n\u015fa Et", btnX + 16, btnY + 20);
    }

    if (this.feedbackTimer > 0) {
      const alpha = Math.min(1, this.feedbackTimer / 0.5);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = this.feedbackColor; ctx.font = "bold 14px monospace";
      ctx.fillText(this.feedbackText, px + panW / 2 - ctx.measureText(this.feedbackText).width / 2, py + panH + 20);
      ctx.globalAlpha = 1;
    }

    ctx.fillStyle = "#707090"; ctx.font = "10px monospace";
    ctx.fillText("[B] kapat", px + panW - 70, py + panH - 8);
  }
}

class Minimap {
  constructor(map) {
    this.visible = true;
    this.scale = 1;
    this.mapW = map.cols;
    this.mapH = map.rows;
    const maxDim = Math.max(this.mapW, this.mapH);
    if (maxDim > 200) this.scale = 200 / maxDim;
    this.w = Math.ceil(this.mapW * this.scale);
    this.h = Math.ceil(this.mapH * this.scale);
    this.offscreen = document.createElement("canvas");
    this.offscreen.width = this.w;
    this.offscreen.height = this.h;
    this._bakeMap(map);
  }

  _bakeMap(map) {
    const oc = this.offscreen.getContext("2d");
    const imgData = oc.createImageData(this.w, this.h);
    const d = imgData.data;

    const MINI_COLORS = {
      [T.GRASS]: [74,140,63], [T.DIRT]: [139,107,61], [T.WATER]: [49,114,184],
      [T.SAND]: [212,188,106], [T.STONE_FLOOR]: [138,138,138], [T.WALL]: [60,60,60],
      [T.TREE]: [30,90,20], [T.FLOWER]: [74,140,63], [T.BRIDGE]: [122,92,48],
      [T.TALL_GRASS]: [55,120,45],
    };

    for (let py = 0; py < this.h; py++) {
      for (let px = 0; px < this.w; px++) {
        const mc = Math.floor(px / this.scale);
        const mr = Math.floor(py / this.scale);
        let tile = map.getTile(mc, mr);
        const det = map.getDetail(mc, mr);
        if (det === T.TREE) tile = T.TREE;
        const rgb = MINI_COLORS[tile] || [255, 0, 255];
        const i = (py * this.w + px) * 4;
        d[i] = rgb[0]; d[i+1] = rgb[1]; d[i+2] = rgb[2]; d[i+3] = 255;
      }
    }
    oc.putImageData(imgData, 0, 0);
  }

  toggle() { this.visible = !this.visible; }

  render(ctx, canvasW, canvasH, cam, player, npcs, wildPets, activePet) {
    if (!this.visible) return;
    const pad = 10;
    const dx = canvasW - this.w - pad - 4;
    const dy = pad;

    ctx.fillStyle = "rgba(0,0,0,0.6)";
    roundRect(ctx, dx - 4, dy - 4, this.w + 8, this.h + 8, 6);
    ctx.fill();
    ctx.strokeStyle = "#606080"; ctx.lineWidth = 1;
    roundRect(ctx, dx - 4, dy - 4, this.w + 8, this.h + 8, 6);
    ctx.stroke();

    ctx.drawImage(this.offscreen, dx, dy);

    const vpx = dx + cam.x / TILE_SIZE * this.scale;
    const vpy = dy + cam.y / TILE_SIZE * this.scale;
    const vpw = cam.viewW / TILE_SIZE * this.scale;
    const vph = cam.viewH / TILE_SIZE * this.scale;
    ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.lineWidth = 1;
    ctx.strokeRect(vpx, vpy, vpw, vph);

    for (const npc of npcs) {
      ctx.fillStyle = npc.color;
      ctx.fillRect(dx + npc.x / TILE_SIZE * this.scale - 1, dy + npc.y / TILE_SIZE * this.scale - 1, 3, 3);
    }
    for (const wp of wildPets) {
      if (!wp.alive) continue;
      ctx.fillStyle = "#ff80a0";
      ctx.fillRect(dx + wp.x / TILE_SIZE * this.scale - 1, dy + wp.y / TILE_SIZE * this.scale - 1, 2, 2);
    }
    if (activePet) {
      ctx.fillStyle = "#f0d050";
      ctx.fillRect(dx + activePet.x / TILE_SIZE * this.scale - 1, dy + activePet.y / TILE_SIZE * this.scale - 1, 3, 3);
    }

    const blink = Math.sin(Date.now() / 250) > 0;
    ctx.fillStyle = blink ? "#fff" : "#ff4040";
    const px = dx + player.centerX / TILE_SIZE * this.scale;
    const py2 = dy + player.centerY / TILE_SIZE * this.scale;
    ctx.fillRect(px - 2, py2 - 2, 4, 4);

    for (const isl of ISLANDS) {
      const ix = dx + isl.cx * this.scale;
      const iy = dy + isl.cy * this.scale;
      ctx.fillStyle = "rgba(255,200,80,0.6)";
      ctx.font = "7px monospace";
      ctx.fillText("\u25C6", ix - 3, iy + 3);
    }

    if (worldData.dockCol && worldData.dockEnd) {
      const dkx = dx + worldData.dockCol * this.scale;
      const dky = dy + (VOY + VROWS + 2) * this.scale;
      const dkh = (worldData.dockEnd - VOY - VROWS - 2) * this.scale;
      ctx.fillStyle = "#a08040";
      ctx.fillRect(dkx - 1, dky, 3, dkh);
      ctx.fillStyle = "#80c0ff";
      ctx.font = "7px monospace";
      ctx.fillText("\u2693", dkx - 4, dky - 2);
    }

    ctx.fillStyle = "#888"; ctx.font = "9px monospace";
    ctx.fillText("[M]", dx, dy + this.h + 12);
  }
}

  const tries = [[0, 0], [2, 0], [-2, 0], [0, 2], [0, -2], [3, 2], [-2, 3], [4, 0], [0, 4], [-3, -2]];
  for (const [ox, oy] of tries) {

    if (mc >= 0 && mc < WORLD_COLS && mr >= 0 && mr < WORLD_ROWS && isSafeSpawn(mc, mr))

}

function spawnMonsters() {
  const list = [];
  for (const md of MAINLAND_MONSTERS) {
    if (isSafeSpawn(md.col, md.row)) list.push(new Monster(md.col, md.row, md.type, 1));
  }
  for (const isl of ISLANDS) {
    if (!isl.monsters) continue;
    const mList = isl.monsters;
    for (let i = 0; i < mList.length; i++) {
      const angle = (i / mList.length) * Math.PI * 2;
      const dist = isl.r * 0.5;
      const mc = Math.floor(isl.cx + Math.cos(angle) * dist);
      const mr = Math.floor(isl.cy + Math.sin(angle) * dist);
      if (isSafeSpawn(mc, mr)) list.push(new Monster(mc, mr, mList[i], isl.scale || 1));
    }
    if (isl.boss && MONSTER_TYPES[isl.boss]) {
      const sp = findBossSpawn(isl);
      if (sp) list.push(new Monster(sp.col, sp.row, isl.boss, (isl.scale || 1) * 1.65));
    }
  }
  return list;
}

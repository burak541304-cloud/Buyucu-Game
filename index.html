<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>Karanlık Diyar - Yatay RPG</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:none}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0a;font-family:'Segoe UI',sans-serif;touch-action:none;user-select:none;-webkit-user-select:none;position:fixed}
body{display:flex;justify-content:center;align-items:center}
canvas{image-rendering:pixelated;touch-action:none;position:absolute;width:100%;height:100%}

/* UI GENEL */
#ui-layer{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:20}
.ui-element{pointer-events:auto;position:absolute}

/* HP/MP BARLARI (SOL ÜST) */
#stats-container{top:10px;left:10px;width:220px}
.stat-bar{height:14px;background:rgba(0,0,0,0.6);border-radius:7px;margin-bottom:4px;overflow:hidden;border:1px solid #444;position:relative}
.stat-fill{height:100%;transition:width 0.2s}
.hp-fill{background:linear-gradient(90deg,#c22,#4c4)}
.mp-fill{background:linear-gradient(90deg,#248,#48f)}
.stat-text{position:absolute;top:0;left:0;width:100%;text-align:center;font-size:10px;color:#fff;text-shadow:1px 1px 2px #000;line-height:14px;font-weight:bold}
#gold-display{color:#ffd700;font-size:12px;font-weight:bold;text-shadow:1px 1px 2px #000;margin-top:2px}

/* MİNİHARİTA (SAĞ ÜST) */
#minimap{top:10px;right:10px;border:2px solid #555;border-radius:6px;background:#000;box-shadow:0 0 10px rgba(0,0,0,0.5)}

/* MENÜ BUTONLARI (SAĞ ÜST, MİNİHARİTA ALTI) */
#menu-buttons{top:75px;right:10px;display:flex;flex-direction:column;gap:8px}
.menu-btn{width:40px;height:40px;border-radius:8px;background:rgba(30,30,30,0.8);border:1px solid #666;color:#fff;font-size:18px;display:flex;justify-content:center;align-items:center;box-shadow:0 2px 5px rgba(0,0,0,0.5)}
.menu-btn:active{transform:scale(0.9);background:rgba(50,50,50,0.9)}

/* JOYSTICK (SOL ALT) */
#joystick-zone{bottom:30px;left:30px;width:140px;height:140px}
#joystick-base{width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.2);position:relative;backdrop-filter:blur(2px)}
#joystick-thumb{width:55px;height:55px;border-radius:50%;background:rgba(255,255,255,0.3);border:2px solid rgba(255,255,255,0.5);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 10px rgba(0,0,0,0.3)}

/* AKSİYON BUTONLARI (SAĞ ALT) */
#action-zone{bottom:30px;right:30px;display:flex;flex-direction:column;align-items:flex-end;gap:15px}
#attack-btn{width:75px;height:75px;border-radius:50%;background:rgba(200,50,50,0.7);border:3px solid rgba(255,100,100,0.5);color:#fff;font-size:32px;display:flex;justify-content:center;align-items:center;box-shadow:0 0 15px rgba(200,0,0,0.4)}
#attack-btn:active{transform:scale(0.9);background:rgba(255,50,50,0.8)}
#sub-actions{display:flex;gap:12px}
.sub-btn{width:55px;height:55px;border-radius:50%;background:rgba(50,50,50,0.7);border:2px solid rgba(255,255,255,0.3);color:#fff;font-size:22px;display:flex;justify-content:center;align-items:center}
.sub-btn:active{transform:scale(0.9);background:rgba(80,80,80,0.8)}

/* BÜYÜLER (AKSİYON ÜSTÜ) */
#spell-bar{bottom:120px;right:30px;display:flex;gap:10px}
.spell-btn{width:50px;height:50px;border-radius:10px;background:rgba(20,20,40,0.8);border:2px solid rgba(100,100,255,0.4);color:#fff;font-size:22px;display:flex;flex-direction:column;justify-content:center;align-items:center;position:relative}
.spell-btn:active{transform:scale(0.9);border-color:#fff}
.spell-cd{position:absolute;bottom:0;left:0;width:100%;background:rgba(0,0,0,0.7);color:#fff;font-size:9px;text-align:center;border-radius:0 0 8px 8px}
.spell-key{position:absolute;top:2px;right:4px;font-size:8px;color:#aaa}

/* PANEELLER (ORTA) */
.panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(15,10,10,0.95);border:2px solid #8B7355;border-radius:12px;padding:15px;color:#f0e6d2;display:none;z-index:50;max-width:90%;max-height:85%;overflow-y:auto;box-shadow:0 0 30px rgba(0,0,0,0.8)}
.panel h2{color:#ffd700;text-align:center;margin-bottom:10px;font-size:18px;border-bottom:1px solid #5a4a3a;padding-bottom:5px}
.close-panel{display:block;margin:15px auto 0;padding:8px 30px;background:#8B7355;border:none;border-radius:6px;color:#fff;font-size:14px;cursor:pointer}

/* ENVANTER */
#inventory-panel{min-width:350px}
.inv-grid{display:grid;grid-template-columns:repeat(8,45px);gap:6px;justify-content:center;margin:10px 0}
.inv-slot{width:45px;height:45px;background:rgba(40,30,20,0.6);border:1px solid #5a4a3a;border-radius:6px;display:flex;justify-content:center;align-items:center;font-size:20px;position:relative;cursor:pointer}
.inv-slot.rarity-common{border-color:#9d9d9d}
.inv-slot.rarity-uncommon{border-color:#1eff00;box-shadow:0 0 5px rgba(30,255,0,0.3)}
.inv-slot.rarity-rare{border-color:#0070ff;box-shadow:0 0 5px rgba(0,112,255,0.3)}
.inv-slot.rarity-epic{border-color:#a335ee;box-shadow:0 0 8px rgba(163,53,238,0.4)}
.inv-slot.rarity-legendary{border-color:#ff8000;box-shadow:0 0 10px rgba(255,128,0,0.5)}
.inv-slot .count{position:absolute;bottom:2px;right:3px;font-size:9px;color:#fff;text-shadow:1px 1px 2px #000}
.inv-nav{display:flex;justify-content:center;gap:10px;margin-bottom:5px}
.nav-btn{padding:5px 15px;background:#5a4a3a;border:none;border-radius:4px;color:#fff;cursor:pointer}

/* YETENEK */
#skill-panel{min-width:380px}
.skill-tree{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:10px 0}
.skill-node{padding:10px;background:rgba(30,20,10,0.8);border:2px solid #5a4a3a;border-radius:8px;text-align:center;cursor:pointer}
.skill-node.unlocked{border-color:#ffd700;background:rgba(60,40,10,0.9)}
.skill-node.locked{opacity:0.4;cursor:not-allowed}
.skill-node .icon{font-size:24px}
.skill-node .name{font-size:11px;color:#ffd700;margin:4px 0}
.skill-node .desc{font-size:9px;color:#aaa}

/* MARKET */
#shop-panel{min-width:350px}
.shop-section{margin-bottom:15px}
.shop-section h3{color:#aaa;font-size:13px;margin-bottom:8px;border-bottom:1px solid #444;padding-bottom:3px}
.shop-item{display:flex;justify-content:space-between;align-items:center;padding:6px;background:rgba(40,30,20,0.4);border-radius:6px;margin-bottom:4px}
.shop-btn{padding:4px 10px;border:none;border-radius:4px;color:#fff;font-size:11px;cursor:pointer}
.btn-buy{background:#4a8}
.btn-sell{background:#a54}

/* DİĞER UI */
#dialog-box{position:fixed;bottom:180px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.9);border:2px solid #8B7355;border-radius:8px;padding:12px 20px;color:#f0e6d2;font-size:13px;max-width:400px;width:80%;display:none;text-align:center;z-index:40;pointer-events:auto}
#dialog-box .name{color:#ffd700;font-weight:bold;margin-bottom:4px}
#quest-notify{position:fixed;top:80px;left:50%;transform:translateX(-50%);color:#ffd700;font-size:13px;background:rgba(0,0,0,0.7);padding:8px 15px;border-radius:6px;display:none;z-index:30;animation:fadeNotify 3s forwards}
#death-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(60,0,0,0.9);display:none;justify-content:center;align-items:center;flex-direction:column;z-index:60}
#death-screen h1{color:#ff3333;font-size:48px;margin-bottom:10px;text-shadow:0 0 20px #f00}
#death-screen button{padding:12px 40px;background:#800;border:2px solid #f33;border-radius:8px;color:#fff;font-size:18px;cursor:pointer}
#rotate-msg{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:100;display:none;justify-content:center;align-items:center;flex-direction:column;color:#fff;text-align:center}
@keyframes fadeNotify{0%,100%{opacity:0}15%,85%{opacity:1}}

/* YATAY OPTİMİZASYON */
@media (orientation: landscape) {
    #rotate-msg{display:none!important}
    canvas{width:100vw;height:100vh}
    #stats-container{width:240px}
    #joystick-zone{width:150px;height:150px;bottom:20px;left:20px}
    #joystick-base{width:150px;height:150px}
    #joystick-thumb{width:60px;height:60px}
    #action-zone{bottom:20px;right:20px}
    #attack-btn{width:80px;height:80px;font-size:36px}
    #spell-bar{bottom:115px;right:20px}
    #menu-buttons{top:10px;right:10px;flex-direction:row;gap:10px}
    .menu-btn{width:45px;height:45px}
    #minimap{top:10px;right:160px;width:140px!important;height:100px!important}
    #dialog-box{bottom:140px}
    .panel{min-width:400px}
    .inv-grid{grid-template-columns:repeat(10,48px)}
}

/* DİKEY UYARI */
@media (orientation: portrait) {
    #rotate-msg{display:flex}
    canvas{display:none}
    #ui-layer{display:none}
}
</style>
</head>
<body>

<canvas id="game"></canvas>
<canvas id="minimap" width="140" height="100"></canvas>

<div id="rotate-msg">
    <div style="font-size:60px;margin-bottom:20px">📱</div>
    <div style="font-size:20px;font-weight:bold">Lütfen Telefonunuzu Yatay Tutun</div>
    <div style="color:#aaa;margin-top:10px">Oyun yatay ekran için optimize edilmiştir</div>
</div>

<div id="ui-layer">
    <!-- SOL ÜST: STATS -->
    <div id="stats-container" class="ui-element">
        <div class="stat-bar"><div class="stat-fill hp-fill" id="hp-bar" style="width:100%"></div><div class="stat-text" id="hp-text">100/100</div></div>
        <div class="stat-bar"><div class="stat-fill mp-fill" id="mp-bar" style="width:100%"></div><div class="stat-text" id="mp-text">50/50</div></div>
        <div id="gold-display">🪙 0</div>
        <div style="font-size:10px;color:#aaa;margin-top:2px" id="level-display">Lv.1 | XP: 0/50</div>
    </div>

    <!-- SAĞ ÜST: MENÜ -->
    <div id="menu-buttons" class="ui-element">
        <div class="menu-btn" onclick="toggleInventory()" title="Envanter">🎒</div>
        <div class="menu-btn" onclick="toggleSkills()" title="Yetenek">🌟</div>
        <div class="menu-btn" onclick="toggleShop()" title="Market">🏪</div>
    </div>

    <!-- SOL ALT: JOYSTICK -->
    <div id="joystick-zone" class="ui-element">
        <div id="joystick-base"><div id="joystick-thumb"></div></div>
    </div>

    <!-- SAĞ ALT: AKSİYONLAR -->
    <div id="action-zone" class="ui-element">
        <div id="spell-bar">
            <div class="spell-btn" onclick="castSpell(0)">🔥<div class="spell-key">1</div><div class="spell-cd" id="cd-0"></div></div>
            <div class="spell-btn" onclick="castSpell(1)">❄️<div class="spell-key">2</div><div class="spell-cd" id="cd-1"></div></div>
            <div class="spell-btn" onclick="castSpell(2)">⚡<div class="spell-key">3</div><div class="spell-cd" id="cd-2"></div></div>
        </div>
        <div id="sub-actions">
            <div class="sub-btn" onclick="doRoll()" title="Yuvarlan (Space)">💨</div>
            <div class="sub-btn" onclick="doInteract()" title="Etkileşim (E)">✋</div>
        </div>
        <div id="attack-btn" title="Saldırı">⚔️</div>
    </div>
</div>

<!-- DİYALOG -->
<div id="dialog-box"><div class="name"></div><div class="text"></div></div>

<!-- BİLDİRİM -->
<div id="quest-notify"></div>

<!-- ÖLÜM EKRANI -->
<div id="death-screen"><h1>💀 ÖLDÜN</h1><button onclick="respawnPlayer()">Yeniden Başla</button></div>

<!-- ENVANTER PANELİ -->
<div id="inventory-panel" class="panel">
    <h2>🎒 Envanter</h2>
    <div class="inv-nav"><button class="nav-btn" onclick="invPage(-1)">◀</button><span id="inv-page" style="color:#ffd700;margin:0 10px">1/1</span><button class="nav-btn" onclick="invPage(1)">▶</button></div>
    <div class="inv-grid" id="inv-grid"></div>
    <button class="close-panel" onclick="toggleInventory()">Kapat</button>
</div>

<!-- YETENEK PANELİ -->
<div id="skill-panel" class="panel">
    <h2>🌟 Yetenek Ağacı</h2>
    <div style="text-align:center;color:#a335ee;margin-bottom:10px" id="sp-display">Puan: 0</div>
    <div class="skill-tree" id="skill-tree"></div>
    <button class="close-panel" onclick="toggleSkills()">Kapat</button>
</div>

<!-- MARKET PANELİ -->
<div id="shop-panel" class="panel">
    <h2>🏪 Tüccar</h2>
    <div class="shop-section"><h3>Satış</h3><div id="shop-sell"></div></div>
    <div class="shop-section"><h3>Alış</h3><div id="shop-buy"></div></div>
    <button class="close-panel" onclick="toggleShop()">Kapat</button>
</div>

<script>
// ============ AYARLAR ============
const TILE=32,COLS=200,ROWS=200;
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const mCanvas=document.getElementById('minimap'),mCtx=mCanvas.getContext('2d');

let isMobile=('ontouchstart' in window)||navigator.maxTouchPoints>0;
let joystick={active:false,dx:0,dy:0,id:null};
let attackHeld=false;

// ============ OYUNCU ============
let player={
    x:100*TILE,y:100*TILE,hp:80,maxHp:80,mp:80,maxMp:80,
    atk:8,def:3,speed:3,crit:5,spellPower:30,
    level:1,xp:0,xpNext:50,gold:0,
    inv:[],equip:{w:null,a:null},skills:{},skillPts:0,
    spells:[
        {name:'Ateş',cost:6,dmg:35,cd:0,maxCd:30,col:'#f40'},
        {name:'Buz',cost:12,dmg:40,cd:0,maxCd:40,col:'#8cf'},
        {name:'Şimşek',cost:8,dmg:50,cd:0,maxCd:35,col:'#ff0'}
    ]
};

let map=[],enemies=[],npcs=[],chests=[],drops=[],
    particles=[],damageNums=[],camera={x:0,y:0},
    gameTime=0,dialog=null,uiOpen=false;

// ============ VERİTABANI ============
const ITEMS={
    w:{
        staff_oak:{n:'Meşe Asa',i:'🪄',atk:10,sp:10},
        staff_arcane:{n:'Arkane Asa',i:'🪄',atk:16,sp:20},
        sword_iron:{n:'Demir Kılıç',i:'🗡️',atk:6},
        sword_steel:{n:'Çelik Kılıç',i:'🗡️',atk:10},
        sword_dragon:{n:'Ejder Kılıcı',i:'⚔️',atk:35}
    },
    a:{
        robe cloth:{n:'Kumaş Cüppe',i:'👘',def:2,mp:15},
        robe_mage:{n:'Büyücü Cüppesi',i:'👘',def:4,mp:25,sp:10},
        armor_leather:{n:'Deri Zırh',i:'🛡️',def:3},
        armor_dragon:{n:'Ejder Zırhı',i:'🛡️',def:22,hp:50}
    },
    c:{
        herb:{n:'Şifalı Ot',i:'🌿',hp:25},
        mana:{n:'Mana İksiri',i:'💙',mp:20},
        bomb:{n:'Ateş Bombası',i:'🔥',dmg:50}
    },
    m:{
        bone:{n:'Kemik',i:'🦴',v:3},
        scale:{n:'Ejder Pulu',i:'🐉',v:25},
        ore:{n:'Demir Cevheri',i:'⛏️',v:5}
    }
};
// Düzeltme: ITEM anahtarları boşluk içermemeli
ITEMS.a['robe_cloth'] = ITEMS.a['robe cloth']; delete ITEMS.a['robe cloth'];

const ENEMIES={
    slime:{hp:30,atk:5,xp:10,col:'#4c4',drop:['c.herb','m.bone']},
    skeleton:{hp:55,atk:12,xp:20,col:'#ddd',drop:['w.sword_iron','m.bone']},
    demon:{hp:110,atk:20,xp:55,col:'#c20',drop:['c.bomb','m.scale']},
    boss:{hp:600,atk:35,xp:600,col:'#f40',drop:['w.sword_dragon','a.armor_dragon'],boss:true}
};

// ============ BAŞLANGIÇ ============
function init(){
    resize();
    window.addEventListener('resize',resize);
    setupControls();
    generateWorld();
    player.x=100*TILE;player.y=100*TILE;
    addItem('w.staff_oak');addItem('a.robe_cloth');addItem('c.herb',3);
    updateStats();
    loop();
    setTimeout(()=>showDialog('Bilge Eldrin','Hoş geldin Büyücü! Yatay modda kontroller parmaklarının altında. Maceraya başla!'),500);
}

function resize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
    if(window.innerWidth>window.innerHeight){
        // Yatay
        mCanvas.style.width='140px';mCanvas.style.height='100px';
    }
}

function generateWorld(){
    // Basit harita
    for(let y=0;y<ROWS;y++){map[y]=[];for(let x=0;x<COLS;x++)map[y][x]=0;}
    // Yollar
    for(let x=0;x<COLS;x++)map[100][x]=1;
    for(let y=0;y<ROWS;y++)map[y][100]=1;
    
    // Düşmanlar
    for(let i=0;i<50;i++){
        let x=rand(10,COLS-10)*TILE,y=rand(10,ROWS-10)*TILE;
        let type=Math.random()<0.7?'slime':'skeleton';
        if(Math.random()<0.1)type='demon';
        enemies.push({x:x,y:y,type:type,...ENEMIES[type],maxHp:ENEMIES[type].hp,alive:true});
    }
    // Boss
    enemies.push({x:150*TILE,y:150*TILE,type:'boss',...ENEMIES.boss,maxHp:ENEMIES.boss.hp,alive:true});
    
    // NPC
    npcs.push({x:98*TILE,y:100*TILE,name:'Bilge Eldrin',col:'#fd0',dialog:['Güçlenmek için eşya topla.','Boss\'lar nadir eşya düşürür.']});
    npcs.push({x:102*TILE,y:100*TILE,name:'Tüccar',col:'#f6f',dialog:['Eşya alıp satabilirsin.'],shop:true});
    
    // Sandıklar
    for(let i=0;i<30;i++)chests.push({x:rand(5,COLS-5)*TILE,y:rand(5,ROWS-5)*TILE,open:false});
}

// ============ KONTROLLER ============
function setupControls(){
    const zone=document.getElementById('joystick-zone');
    const thumb=document.getElementById('joystick-thumb');
    const base=document.getElementById('joystick-base');
    const attackBtn=document.getElementById('attack-btn');
    
    // Joystick
    zone.addEventListener('touchstart',e=>{
        e.preventDefault();
        const t=e.changedTouches[0];
        joystick.id=t.identifier;
        joystick.active=true;
        updateJoy(t,base,thumb);
    },{passive:false});
    
    zone.addEventListener('touchmove',e=>{
        e.preventDefault();
        for(let i=0;i<e.changedTouches.length;i++){
            if(e.changedTouches[i].identifier===joystick.id)updateJoy(e.changedTouches[i],base,thumb);
        }
    },{passive:false});
    
    zone.addEventListener('touchend',e=>{
        e.preventDefault();
        joystick.active=false;joystick.dx=0;joystick.dy=0;
        thumb.style.transform='translate(-50%,-50%)';
    });
    
    // Attack
    attackBtn.addEventListener('touchstart',e=>{e.preventDefault();attackHeld=true;},{passive:false});
    attackBtn.addEventListener('touchend',e=>{e.preventDefault();attackHeld=false;});
    attackBtn.addEventListener('mousedown',()=>attackHeld=true);
    attackBtn.addEventListener('mouseup',()=>attackHeld=false);
    
    // Klavye
    document.addEventListener('keydown',e=>{
        if(e.key===' ')doRoll();
        if(e.key==='e')doInteract();
        if(e.key==='1')castSpell(0);
        if(e.key==='2')castSpell(1);
        if(e.key==='3')castSpell(2);
        if(e.key==='i')toggleInventory();
    });
}

function updateJoy(t,base,thumb){
    const r=base.getBoundingClientRect();
    const cx=r.left+r.width/2,cy=r.top+r.height/2;
    let dx=t.clientX-cx,dy=t.clientY-cy;
    const dist=Math.hypot(dx,dy),max=45;
    if(dist>max){dx=dx/dist*max;dy=dy/dist*max;}
    joystick.dx=dx/max;joystick.dy=dy/max;
    thumb.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;
}

function doRoll(){
    if(player.rollCd)return;
    player.roll=15;player.rollCd=40;player.invuln=15;
}

function doInteract(){
    if(dialog){
        dialog.idx++;
        if(dialog.idx>=dialog.txt.length){dialog=null;document.getElementById('dialog-box').style.display='none';}
        else updateDialog();
        return;
    }
    // NPC
    npcs.forEach(n=>{
        if(dist(player,n)<60){
            if(n.shop)toggleShop();
            else{dialog={n:n.name,txt:n.dialog,idx:0};updateDialog();}
        }
    });
    // Sandık
    chests.forEach(c=>{
        if(!c.open&&dist(player,c)<50){
            c.open=true;
            addItem('c.herb');addItem('c.mana');
            player.gold+=rand(5,20);
            showNotify('📦 Sandık Açıldı!');
            updateStats();
        }
    });
}

function updateDialog(){
    const b=document.getElementById('dialog-box');
    b.style.display='block';
    b.querySelector('.name').textContent=dialog.n;
    b.querySelector('.text').textContent=dialog.txt[dialog.idx];
}

function showDialog(name,text){
    dialog={n:name,txt:[text],idx:0};
    updateDialog();
}

// ============ OYUN DÖNGÜSÜ ============
function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

function update(){
    gameTime++;
    
    // Hareket
    let dx=0,dy=0;
    if(joystick.active){dx=joystick.dx;dy=joystick.dy;}
    if(Math.abs(dx)>0.1||Math.abs(dy)>0.1){
        let nx=player.x+dx*player.speed,ny=player.y+dy*player.speed;
        if(!solid(nx,player.y))player.x=nx;
        if(!solid(player.x,ny))player.y=ny;
    }
    
    // Saldırı
    if(attackHeld&&gameTime%15===0){
        enemies.forEach(e=>{
            if(e.alive&&dist(player,e)<50){
                e.hp-=player.atk;
                addDmg(e.x,e.y,player.atk,'#fff');
                if(e.hp<=0)killEnemy(e);
            }
        });
    }
    
    // Düşmanlar
    enemies.forEach(e=>{
        if(!e.alive)return;
        if(dist(player,e)<150){
            let a=Math.atan2(player.y-e.y,player.x-e.x);
            e.x+=Math.cos(a)*e.speed;e.y+=Math.sin(a)*e.speed;
            if(dist(player,e)<30&&gameTime%60===0){
                if(!player.invuln){player.hp-=e.atk;updateStats();addDmg(player.x,player.y,e.atk,'#f00');}
            }
        }
        if(e.hp<=0)killEnemy(e);
    });
    
    // Toplama
    drops.forEach((d,i)=>{
        if(dist(player,d)<30){
            addItem(d.id);
            drops.splice(i,1);
            showNotify('+ '+ITEMS[d.id.split('.')[0]][d.id.split('.')[1]].n);
            updateStats();
        }
    });
    
    // Kamera
    camera.x+= (player.x-canvas.width/2-camera.x)*0.1;
    camera.y+= (player.y-canvas.height/2-camera.y)*0.1;
    
    // UI Güncelle
    if(gameTime%10===0){
        document.getElementById('hp-bar').style.width=(player.hp/player.maxHp*100)+'%';
        document.getElementById('hp-text').textContent=Math.floor(player.hp)+'/'+player.maxHp;
        document.getElementById('mp-bar').style.width=(player.mp/player.maxMp*100)+'%';
        document.getElementById('mp-text').textContent=Math.floor(player.mp)+'/'+player.maxMp;
        document.getElementById('gold-display').textContent='🪙 '+player.gold;
        document.getElementById('level-display').textContent='Lv.'+player.level+' | XP:'+player.xp+'/'+player.xpNext;
        
        player.spells.forEach((s,i)=>{
            if(s.cd>0)s.cd--;
            document.getElementById('cd-'+i).style.height=(s.cd/s.maxCd*100)+'%';
        });
    }
    
    if(player.hp<=0)document.getElementById('death-screen').style.display='flex';
}

function draw(){
    ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.save();
    ctx.translate(-camera.x,-camera.y);
    
    // Harita
    const sx=Math.floor(camera.x/TILE),sy=Math.floor(camera.y/TILE);
    const ex=sx+Math.ceil(canvas.width/TILE)+1,ey=sy+Math.ceil(canvas.height/TILE)+1;
    
    for(let y=sy;y<ey;y++){
        for(let x=sx;x<ex;x++){
            if(y<0||y>=ROWS||x<0||x>=COLS)continue;
            let t=map[y][x],px=x*TILE,py=y*TILE;
            ctx.fillStyle=t===0?'#2d5a1e':'#a08060';
            ctx.fillRect(px,py,TILE,TILE);
            if(t===0&&((x+y)%5===0)){ctx.fillStyle='#3a7a2a';ctx.fillRect(px+10,py+10,4,4);}
        }
    }
    
    // Sandıklar
    chests.forEach(c=>{
        if(c.open)return;
        ctx.fillStyle='#8B6914';ctx.fillRect(c.x-10,c.y-10,20,20);
        ctx.fillStyle='#ffd700';ctx.fillRect(c.x-3,c.y-3,6,6);
    });
    
    // NPC
    npcs.forEach(n=>{
        ctx.fillStyle=n.col;ctx.beginPath();ctx.arc(n.x,n.y,15,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#fff';ctx.font='12px sans-serif';ctx.textAlign='center';ctx.fillText(n.name,n.x,n.y-20);
    });
    
    // Düşmanlar
    enemies.forEach(e=>{
        if(!e.alive)return;
        ctx.fillStyle=e.col;
        if(e.type==='slime'){ctx.beginPath();ctx.ellipse(e.x,e.y,12,10,0,0,Math.PI*2);ctx.fill();}
        else if(e.type==='skeleton'){ctx.fillRect(e.x-10,e.y-15,20,30);ctx.fillStyle='#c00';ctx.fillRect(e.x-5,e.y-10,4,4);ctx.fillRect(e.x+1,e.y-10,4,4);}
        else if(e.type==='boss'){ctx.beginPath();ctx.arc(e.x,e.y,25,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#f00';ctx.lineWidth=3;ctx.stroke();}
        
        // HP Bar
        ctx.fillStyle='#333';ctx.fillRect(e.x-15,e.y-25,30,4);
        ctx.fillStyle='#f00';ctx.fillRect(e.x-15,e.y-25,30*(e.hp/e.maxHp),4);
    });
    
    // Eşyalar
    drops.forEach(d=>{
        let it=ITEMS[d.id.split('.')[0]][d.id.split('.')[1]];
        ctx.font='20px sans-serif';ctx.textAlign='center';ctx.fillText(it.i,d.x,d.y);
    });
    
    // Oyuncu
    ctx.fillStyle='#64a';ctx.fillRect(player.x-10,player.y-15,20,30);
    ctx.fillStyle='#fc8';ctx.beginPath();ctx.arc(player.x,player.y-20,10,0,Math.PI*2);ctx.fill();
    
    // Efektler
    particles.forEach((p,i)=>{
        p.life--;p.y+=p.vy;
        ctx.fillStyle=p.col;ctx.font='14px sans-serif';ctx.fillText(p.t,p.x,p.y);
        if(p.life<=0)particles.splice(i,1);
    });
    
    damageNums.forEach((d,i)=>{
        d.life--;d.y-=1;
        ctx.fillStyle=d.col;ctx.font='bold 16px sans-serif';ctx.strokeStyle='#000';ctx.lineWidth=3;
        ctx.strokeText(d.t,d.x,d.y);ctx.fillText(d.t,d.x,d.y);
        if(d.life<=0)damageNums.splice(i,1);
    });
    
    ctx.restore();
}

// ============ YARDIMCI ============
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
function solid(x,y){
    let tx=Math.floor(x/TILE),ty=Math.floor(y/TILE);
    if(tx<0||ty<0||tx>=COLS||ty>=ROWS)return true;
    return false; // Basitlik için sadece harita dışı kontrol
}
function addItem(id){player.inv.push({id:id});}
function updateStats(){
    let atk=8,def=3,hp=80,mp=80,sp=30;
    player.inv.forEach(it=>{
        let d=ITEMS[it.id.split('.')[0]][it.id.split('.')[1]];
        if(d.atk)atk+=d.atk;if(d.def)def+=d.def;if(d.hp)hp+=d.hp;if(d.mp)mp+=d.mp;if(d.sp)sp+=d.sp;
    });
    player.atk=atk;player.def=def;player.maxHp=hp;player.maxMp=mp;player.spellPower=sp;
    if(player.hp>player.maxHp)player.hp=player.maxHp;
    if(player.mp>player.maxMp)player.mp=player.maxMp;
}
function addDmg(x,y,t,c){damageNums.push({x:x,y:y,t:'-'+t,col:c,life:30});}
function showNotify(t){
    let n=document.getElementById('quest-notify');
    n.textContent=t;n.style.display='block';
    setTimeout(()=>n.style.display='none',3000);
}
function killEnemy(e){
    e.alive=false;
    player.xp+=e.xp;
    if(player.xp>=player.xpNext){player.level++;player.xp=0;player.xpNext*=1.5;player.maxHp+=10;player.hp=player.maxHp;showNotify('🎉 SEVİYE ATLANDI!');}
    e.drop.forEach(d=>drops.push({x:e.x+rand(-20,20),y:e.y+rand(-20,20),id:d}));
    if(e.boss){showNotify('🏆 BOSS YENİLDİ!');player.gold+=500;}
    updateStats();
}
function respawnPlayer(){
    player.hp=player.maxHp;player.x=100*TILE;player.y=100*TILE;
    document.getElementById('death-screen').style.display='none';
}

// ============ MENÜLER ============
let invPage=0;
function toggleInventory(){
    uiOpen=!uiOpen;
    document.getElementById('inventory-panel').style.display=uiOpen?'block':'none';
    if(uiOpen)renderInv();
}
function renderInv(){
    const g=document.getElementById('inv-grid');g.innerHTML='';
    const start=invPage*16,end=Math.min(start+16,player.inv.length);
    document.getElementById('inv-page').textContent=(invPage+1)+'/'+Math.ceil(player.inv.length/16||1);
    for(let i=start;i<end;i++){
        let it=player.inv[i],d=ITEMS[it.id.split('.')[0]][it.id.split('.')[1]];
        let s=document.createElement('div');s.className='inv-slot';
        s.innerHTML=d.i;
        s.onclick=()=>{useItem(i);};
        g.appendChild(s);
    }
}
function invPage(d){invPage+=d;if(invPage<0)invPage=0;renderInv();}
function useItem(i){
    let it=player.inv[i],d=ITEMS[it.id.split('.')[0]][it.id.split('.')[1]];
    if(d.hp){player.hp=Math.min(player.maxHp,player.hp+d.hp);showNotify('+HP');}
    if(d.mp){player.mp=Math.min(player.maxMp,player.mp+d.mp);showNotify('+MP');}
    player.inv.splice(i,1);renderInv();updateStats();
}

function toggleSkills(){
    uiOpen=!uiOpen;
    document.getElementById('skill-panel').style.display=uiOpen?'block':'none';
    if(uiOpen){
        document.getElementById('sp-display').textContent='Puan: '+player.skillPts;
        const t=document.getElementById('skill-tree');t.innerHTML='';
        ['🔥 Ateş Gücü','❄️ Buz Direnci','⚡ Hız'].forEach((s,idx)=>{
            let n=document.createElement('div');n.className='skill-node';
            n.innerHTML='<div class="icon">'+s.split(' ')[0]+'</div><div class="name">'+s.split(' ')[1]+'</div><div class="desc">1 Puan</div>';
            n.onclick=()=>{if(player.skillPts>0){player.skillPts--;player.atk+=2;updateStats();toggleSkills();}};
            t.appendChild(n);
        });
    }
}

function toggleShop(){
    uiOpen=!uiOpen;
    document.getElementById('shop-panel').style.display=uiOpen?'block':'none';
    if(uiOpen){
        const s=document.getElementById('shop-sell');s.innerHTML='';
        player.inv.forEach((it,idx)=>{
            let d=ITEMS[it.id.split('.')[0]][it.id.split('.')[1]];
            if(d.v){
                let div=document.createElement('div');div.className='shop-item';
                div.innerHTML='<span>'+d.i+' '+d.n+'</span><button class="shop-btn btn-sell" onclick="sellItem('+idx+')">Sat ('+d.v+'g)</button>';
                s.appendChild(div);
            }
        });
        const b=document.getElementById('shop-buy');b.innerHTML='';
        [{id:'c.herb',p:10},{id:'c.mana',p:15},{id:'w.sword_steel',p:100}].forEach(it=>{
            let div=document.createElement('div');div.className='shop-item';
            let d=ITEMS[it.id.split('.')[0]][it.id.split('.')[1]];
            div.innerHTML='<span>'+d.i+' '+d.n+'</span><button class="shop-btn btn-buy" onclick="buyItem(\''+it.id+'\','+it.p+')">Al ('+it.p+'g)</button>';
            b.appendChild(div);
        });
    }
}
function sellItem(i){
    let it=player.inv[i],d=ITEMS[it.id.split('.')[0]][it.id.split('.')[1]];
    player.gold+=d.v;player.inv.splice(i,1);updateStats();toggleShop();
}
function buyItem(id,p){
    if(player.gold>=p){player.gold-=p;addItem(id);updateStats();toggleShop();}
    else showNotify('Yetersiz Altın!');
}

function castSpell(i){
    let s=player.spells[i];
    if(player.mp<s.cost||s.cd>0)return;
    player.mp-=s.cost;s.cd=s.maxCd;
    // En yakın düşmana
    let target=null,minDst=9999;
    enemies.forEach(e=>{if(e.alive){let d=dist(player,e);if(d<minDst){minDst=d;target=e;}}});
    if(target){
        target.hp-=s.dmg;
        addDmg(target.x,target.y,s.dmg,s.col);
        if(target.hp<=0)killEnemy(target);
    }
    updateStats();
}

// Başlat
init();
</script>

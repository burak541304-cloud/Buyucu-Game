<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Savaşçının Yolculuğu - 2D RPG</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0d1420;--fg:#e8dcc8;--card:rgba(20,28,40,0.92);--card-solid:#141c28;
--border:#1e2a3a;--muted:#1a2233;--muted-fg:#6b7a8d;
--primary-h:45;--primary-s:90%;--primary-l:55%;
--primary:hsl(45,90%,55%);--primary-fg:#0d1420;
--secondary:hsl(0,70%,45%);--secondary-fg:#f5f0e8;
--accent:hsl(280,50%,40%);
}
body{background:var(--bg);color:var(--fg);font-family:'Inter',sans-serif;overflow:hidden;user-select:none;-webkit-user-select:none;touch-action:none;margin:0;padding:0}
canvas{display:block;position:absolute;top:0;left:0}
.hud-bars{position:absolute;top:8px;left:8px;width:220px;z-index:10;pointer-events:none}
.hud-card{background:var(--card);backdrop-filter:blur(8px);border-radius:6px;padding:8px;border:1px solid var(--border)}
.bar-row{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.bar-icon{font-size:11px;width:16px;text-align:center}
.bar-track{flex:1;height:16px;background:var(--muted);border-radius:3px;overflow:hidden;position:relative}
.bar-fill{height:100%;transition:width .3s}
.bar-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--fg);text-shadow:0 1px 2px rgba(0,0,0,.6)}
.bar-hp .bar-fill{background:linear-gradient(90deg,hsl(0,70%,35%),hsl(0,70%,50%))}
.bar-mp .bar-fill{background:linear-gradient(90deg,hsl(220,70%,35%),hsl(220,70%,55%))}
.bar-pwr .bar-fill{background:linear-gradient(90deg,hsl(30,80%,40%),hsl(45,90%,55%))}
.bar-xp .bar-fill{background:linear-gradient(90deg,hsl(120,40%,25%),hsl(120,50%,45%))}
.hud-stats{display:flex;justify-content:space-between;font-size:9px;color:var(--muted-fg);margin-top:3px}
.player-info{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px}
.player-name{font-family:'Cinzel',serif;font-weight:700;color:var(--primary)}
.combat-log{position:absolute;bottom:8px;left:8px;width:260px;z-index:10;pointer-events:none}
.log-card{background:var(--card);backdrop-filter:blur(8px);border-radius:6px;padding:8px;border:1px solid var(--border);max-height:90px;overflow:hidden}
.log-line{font-size:9px;line-height:1.4}
.log-line:first-child{color:var(--fg)}.log-line:not(:first-child){color:var(--muted-fg)}
.menu-btns{position:absolute;z-index:20;display:flex;gap:6px}
.menu-btn{display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:4px;background:var(--card);border:1px solid var(--border);color:var(--fg);font-size:11px;cursor:pointer;transition:background .2s}
.menu-btn:hover{background:var(--muted)}
.menu-shortcut{font-size:7px;color:var(--muted-fg)}
.skill-bar{position:absolute;z-index:20;display:flex;gap:8px}
.skill-btn{position:relative;width:56px;height:56px;border-radius:6px;border:2px solid var(--primary);background:var(--card-solid);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.skill-btn:hover:not(.disabled){background:rgba(200,170,50,.15)}
.skill-btn:active:not(.disabled){transform:scale(.93)}
.skill-btn.disabled{border-color:var(--muted);opacity:.5;cursor:not-allowed}
.skill-btn.ultimate{border-color:#f59e0b;animation:pulse 1.5s infinite}
.skill-icon{font-size:20px;z-index:1}.skill-key{font-size:7px;color:var(--muted-fg);z-index:1}
.skill-mana{position:absolute;top:-4px;right:-4px;background:hsl(220,70%,50%);font-size:6px;color:#fff;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-weight:700}
.skill-cd{position:absolute;inset:0;background:rgba(26,34,51,.7);border-radius:4px}
.potion-btn{width:48px;height:56px;border-radius:6px;border:1px solid var(--border);background:var(--card-solid);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.potion-btn:hover:not(.disabled){background:rgba(200,170,50,.1)}
.potion-btn.disabled{opacity:.3;cursor:not-allowed}
.potion-icon{font-size:18px}.potion-count{font-size:7px;color:var(--muted-fg)}
@keyframes pulse{0%,100%{box-shadow:0 0 5px rgba(245,158,11,.3)}50%{box-shadow:0 0 15px rgba(245,158,11,.6)}}
.joystick-area{position:absolute;width:140px;height:140px;z-index:20;display:none;pointer-events:none}
.joystick-base{position:absolute;inset:0;border-radius:50%;background:rgba(26,34,51,.35);border:2px solid rgba(30,42,58,.5);box-shadow:0 0 20px rgba(0,0,0,.3)}
.joystick-knob{position:absolute;width:52px;height:52px;border-radius:50%;background:rgba(200,170,50,.5);border:2px solid var(--primary);box-shadow:0 2px 12px rgba(0,0,0,.4);transition:none}
.panel-overlay{position:absolute;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;background:rgba(13,20,32,.8);backdrop-filter:blur(4px)}
.panel{background:var(--card-solid);border:1px solid var(--border);border-radius:8px;padding:16px;width:90vw;max-width:480px;max-height:80vh;overflow-y:auto}
.panel h2{font-family:'Cinzel',serif;color:var(--primary);font-size:18px;font-weight:700}
.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.close-btn{color:var(--muted-fg);font-size:20px;cursor:pointer;background:none;border:none}
.close-btn:hover{color:var(--fg)}
.equip-row{display:flex;gap:8px;margin-bottom:12px;padding:8px;background:rgba(26,34,51,.3);border-radius:6px}
.equip-slot{flex:1;padding:8px;background:var(--card-solid);border-radius:4px;border:1px solid var(--border);text-align:center}
.equip-label{font-size:9px;color:var(--muted-fg);margin-bottom:4px}
.equip-icon{font-size:20px}
.equip-name{font-size:8px;margin-top:2px}
.equip-stats{font-size:7px;color:var(--muted-fg)}
.inv-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.inv-slot{aspect-ratio:1;border-radius:4px;border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;cursor:pointer;transition:border-color .2s;background:rgba(26,34,51,.15)}
.inv-slot:hover{border-color:var(--primary)}.inv-slot.equipped{box-shadow:0 0 0 1px var(--primary)}
.inv-slot .item-icon{font-size:16px}.inv-slot .item-name{font-size:6px;line-height:1.2}
.inv-slot .lock-icon{position:absolute;top:1px;left:3px;font-size:7px}
.inv-actions{position:absolute;bottom:0;left:0;right:0;display:flex;font-size:6px}
.inv-actions button{flex:1;border:none;cursor:pointer;padding:1px 0;font-size:6px}
.act-equip{background:rgba(200,170,50,.7);color:var(--primary-fg)}.act-equip:hover{background:var(--primary)}
.act-sell{background:rgba(180,50,50,.7);color:var(--secondary-fg)}.act-sell:hover{background:var(--secondary)}
.act-lock{background:var(--muted);color:var(--muted-fg)}.act-lock:hover{background:var(--accent)}
.trash-btn{width:100%;padding:6px;margin-bottom:8px;border-radius:4px;background:var(--secondary);color:var(--secondary-fg);border:none;cursor:pointer;font-size:11px;transition:opacity .2s}
.trash-btn:hover{opacity:.8}
.shop-item{display:flex;align-items:center;justify-content:space-between;padding:8px;background:rgba(26,34,51,.2);border-radius:4px;margin-bottom:4px}
.shop-item:hover{background:rgba(26,34,51,.4)}
.shop-info{display:flex;align-items:center;gap:8px}
.shop-icon{font-size:18px}
.shop-name{font-size:12px;font-weight:500}
.shop-stats{font-size:9px;color:var(--muted-fg)}
.buy-btn{font-size:11px;padding:4px 8px;border-radius:4px;border:none;cursor:pointer;transition:opacity .2s}
.buy-btn.can-buy{background:var(--primary);color:var(--primary-fg)}.buy-btn.can-buy:hover{opacity:.8}
.buy-btn.no-buy{background:var(--muted);color:var(--muted-fg);cursor:not-allowed}
.quest-block{padding:12px;background:rgba(26,34,51,.3);border-radius:6px;border:1px solid var(--border)}
.quest-title{font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:var(--primary)}
.quest-desc{font-size:11px;color:var(--muted-fg);margin-top:4px}
.quest-progress{margin-top:8px;display:flex;align-items:center;gap:8px}
.quest-bar{flex:1;height:8px;background:var(--muted);border-radius:4px;overflow:hidden}
.quest-bar-fill{height:100%;background:linear-gradient(90deg,hsl(120,40%,25%),hsl(120,50%,45%));transition:width .3s}
.quest-count{font-size:11px;font-weight:700}
.quest-rewards{font-size:9px;color:var(--muted-fg);margin-top:8px}
.quest-accept-btn,.quest-turnin-btn{width:100%;padding:8px;margin-top:12px;border-radius:4px;border:none;cursor:pointer;font-family:'Cinzel',serif;font-size:13px;transition:opacity .2s}
.quest-accept-btn{background:var(--primary);color:var(--primary-fg)}.quest-accept-btn:hover{opacity:.85}
.quest-turnin-btn{background:var(--primary);color:var(--primary-fg)}.quest-turnin-btn:hover{opacity:.85}
.quest-tracker{position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:none}
.tracker-card{background:var(--card);backdrop-filter:blur(4px);border-radius:4px;padding:4px 12px;border:1px solid var(--border);text-align:center;white-space:nowrap}
.tracker-name{font-size:10px;color:var(--primary);font-family:'Cinzel',serif}
.tracker-count{font-size:10px;color:var(--muted-fg);margin-left:8px}
.death-overlay{position:absolute;inset:0;z-index:40;display:flex;align-items:center;justify-content:center;background:rgba(13,20,32,.92);backdrop-filter:blur(8px)}
.death-title{font-family:'Cinzel',serif;font-size:36px;font-weight:700;color:var(--secondary);text-shadow:0 0 10px rgba(180,50,50,.6)}
.death-sub{color:var(--muted-fg);font-size:13px;margin:12px 0 20px}
.respawn-btn{padding:12px 24px;border-radius:6px;background:var(--primary);color:var(--primary-fg);font-family:'Cinzel',serif;font-size:16px;border:none;cursor:pointer;transition:opacity .2s}
.respawn-btn:hover{opacity:.85}
.kb-hints{position:absolute;bottom:8px;right:8px;z-index:10;pointer-events:none}
.kb-card{background:rgba(20,28,40,.6);backdrop-filter:blur(4px);border-radius:4px;padding:6px;border:1px solid var(--border);font-size:7px;color:var(--muted-fg);line-height:1.6}
.gold-display{font-size:12px;color:hsl(45,90%,55%)}
.rarity-common{color:#9ca3af}.rarity-uncommon{color:#22c55e}.rarity-rare{color:#3b82f6}.rarity-epic{color:#a855f7}.rarity-legendary{color:#f59e0b}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui-root"></div>
<div id="joystick-root" style="display:none;">
  <div id="joystickTouchZone" style="position:absolute;bottom:0;left:0;width:50%;height:60%;z-index:15;"></div>
  <div class="joystick-area" id="joystickArea"><div class="joystick-base"></div><div class="joystick-knob" id="joystickKnob"></div></div>
</div>
<script>
const RARITY_COLORS={common:'#9ca3af',uncommon:'#22c55e',rare:'#3b82f6',epic:'#a855f7',legendary:'#f59e0b'};
const SAFE_ZONE={x:0,y:0,radius:30};
const WORM_ZONE={x:50,y:50};
const INVENTORY_SIZE=20;
const BASE_STATS={maxHp:150,hp:150,maxMp:50,mp:50,attack:15,defense:10,speed:3};
const STATS_PER_LEVEL={maxHp:20,maxMp:8,attack:3,defense:2,speed:0.1};
const EXP_BASE=100,EXP_GROWTH=1.5;
const SCALE=4;

const WARRIOR_SKILLS=[
  {id:'basic_attack',name:'Temel Vuruş',description:'Basit bir kılıç darbesi.',unlockLevel:1,manaCost:0,cooldown:0.8,damageMultiplier:1,isAoe:false,aoeRadius:0,requiresPowerBar:false,currentCooldown:0,icon:'⚔️',key:'1'},
  {id:'power_strike',name:'Güçlü Vuruş',description:'%150 hasar, 20 Mana harcar.',unlockLevel:3,manaCost:20,cooldown:5,damageMultiplier:1.5,isAoe:false,aoeRadius:0,requiresPowerBar:false,currentCooldown:0,icon:'🗡️',key:'2'},
  {id:'sword_spin',name:'Kılıç Döngüsü',description:'AOE hasar, 35 Mana harcar.',unlockLevel:7,manaCost:35,cooldown:10,damageMultiplier:1.2,isAoe:true,aoeRadius:80,requiresPowerBar:false,currentCooldown:0,icon:'🌀',key:'3'},
  {id:'dragon_strike',name:'Ejderha Vuruşu',description:'5x hasar! Power Bar doluyken.',unlockLevel:10,manaCost:0,cooldown:0,damageMultiplier:5,isAoe:true,aoeRadius:999,requiresPowerBar:true,currentCooldown:0,icon:'🐉',key:'4'},
];

const SHOP_ITEMS=[
  {name:'Demir Kılıç',type:'sword',rarity:'common',value:50,attackBonus:5,defenseBonus:0,healAmount:0,manaAmount:0,locked:false,equipped:false,icon:'🗡️'},
  {name:'Çelik Kılıç',type:'sword',rarity:'uncommon',value:150,attackBonus:12,defenseBonus:0,healAmount:0,manaAmount:0,locked:false,equipped:false,icon:'⚔️'},
  {name:'Deri Zırh',type:'armor',rarity:'common',value:40,attackBonus:0,defenseBonus:5,healAmount:0,manaAmount:0,locked:false,equipped:false,icon:'🛡️'},
  {name:'Zincir Zırh',type:'armor',rarity:'uncommon',value:120,attackBonus:0,defenseBonus:10,healAmount:0,manaAmount:0,locked:false,equipped:false,icon:'🛡️'},
  {name:'Can Potu',type:'hp_potion',rarity:'common',value:20,attackBonus:0,defenseBonus:0,healAmount:50,manaAmount:0,locked:false,equipped:false,icon:'❤️'},
  {name:'Mana Potu',type:'mp_potion',rarity:'common',value:25,attackBonus:0,defenseBonus:0,healAmount:0,manaAmount:30,locked:false,equipped:false,icon:'💙'},
];

const QUEST_TEMPLATES=[
  {name:'Solucan Avı',description:'3 solucan öldür.',target:'worm',targetCount:3,rewardExp:150,rewardGold:80,
   rewardItem:{id:'qs1',name:'Solucan Kırıcı',type:'sword',rarity:'rare',value:200,attackBonus:18,defenseBonus:0,healAmount:0,manaAmount:0,locked:true,equipped:false,icon:'🔥'}},
  {name:'Büyük Tehdit',description:'Boss Solucanı yenilgiye uğrat!',target:'boss',targetCount:1,rewardExp:500,rewardGold:300,
   rewardItem:{id:'qa1',name:'Ejderha Zırhı',type:'armor',rarity:'epic',value:500,attackBonus:5,defenseBonus:25,healAmount:0,manaAmount:0,locked:true,equipped:false,icon:'🐲'}},
  {name:'Solucan Katliamı',description:'7 solucan öldür.',target:'worm',targetCount:7,rewardExp:400,rewardGold:200,
   rewardItem:{id:'qs2',name:'Kaos Kılıcı',type:'sword',rarity:'epic',value:600,attackBonus:30,defenseBonus:0,healAmount:0,manaAmount:0,locked:true,equipped:false,icon:'⚡'}},
];

let nextId=1;
function uid(){return 'id_'+(nextId++)}
function dist(a,b){return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2)}
function calcDamage(atk,def,mult){const base=Math.max(1,atk*mult-def*.5);return Math.floor(base*(.9+Math.random()*.2))}

function trimLog(){while(state.combatLog.length>50)state.combatLog.shift()}

function createPlayer(){
  return{
    name:'Savaşçı',level:1,exp:0,expToNext:EXP_BASE,
    stats:{...BASE_STATS},baseStats:{...BASE_STATS},
    position:{x:0,y:0},gold:100,powerBar:0,maxPowerBar:100,
    inventory:new Array(INVENTORY_SIZE).fill(null),
    equippedSword:null,equippedArmor:null,
    skills:WARRIOR_SKILLS.map(s=>({...s})),
    activeQuest:null,killCount:{worm:0,boss:0},
    isAlive:true,attackRange:60,facingRight:true,isAttacking:false,attackAnimTimer:0
  };
}

function recalcStats(p){
  let ba=0,bd=0;
  if(p.equippedSword)ba+=p.equippedSword.attackBonus;
  if(p.equippedArmor)bd+=p.equippedArmor.defenseBonus;
  p.stats.maxHp=p.baseStats.maxHp;p.stats.maxMp=p.baseStats.maxMp;
  p.stats.attack=p.baseStats.attack+ba;p.stats.defense=p.baseStats.defense+bd;
  p.stats.speed=p.baseStats.speed;
  p.stats.hp=Math.min(p.stats.hp,p.stats.maxHp);
  p.stats.mp=Math.min(p.stats.mp,p.stats.maxMp);
}

function checkLevelUp(p,log){
  while(p.exp>=p.expToNext){
    p.exp-=p.expToNext;p.level++;
    p.expToNext=Math.floor(EXP_BASE*Math.pow(EXP_GROWTH,p.level-1));
    p.baseStats.maxHp+=STATS_PER_LEVEL.maxHp;p.baseStats.maxMp+=STATS_PER_LEVEL.maxMp;
    p.baseStats.attack+=STATS_PER_LEVEL.attack;p.baseStats.defense+=STATS_PER_LEVEL.defense;
    p.baseStats.speed+=STATS_PER_LEVEL.speed;
    recalcStats(p);p.stats.hp=p.stats.maxHp;p.stats.mp=p.stats.maxMp;
    log.push('⬆️ Seviye '+p.level+'! Statlar arttı.');
    p.skills.forEach(s=>{if(s.unlockLevel===p.level)log.push('🔓 Yeni yetenek: '+s.name+'!')});
    trimLog();
  }
}

function addToInventory(p,item){
  const slot=p.inventory.findIndex(s=>s===null);
  if(slot===-1)return false;
  p.inventory[slot]={...item,id:uid()};return true;
}

function createWorm(level,isBoss=false){
  const m=1+(level-1)*.2,bm=isBoss?5:1;
  const hp=Math.floor(60*m*bm),atk=Math.floor(8*m*bm),def=Math.floor(3*m*bm);
  const angle=Math.random()*Math.PI*2,d=10+Math.random()*30;
  const items=[];
  const roll=Math.random();
  if(isBoss||roll<.4){
    const rarities=isBoss?['rare','epic','legendary']:['common','uncommon','rare'];
    const rarity=rarities[Math.floor(Math.random()*rarities.length)];
    const isW=Math.random()>.5;
    items.push({id:uid(),name:isW?(rarity==='legendary'?'Efsane':'Savaş')+' Kılıcı':(rarity==='legendary'?'Efsane':'Savaş')+' Zırhı',
      type:isW?'sword':'armor',rarity,value:Math.floor(30*(1+level*.5)*(isBoss?3:1)),
      attackBonus:isW?Math.floor(5+level*3*(isBoss?2:1)):0,
      defenseBonus:!isW?Math.floor(4+level*2*(isBoss?2:1)):0,
      healAmount:0,manaAmount:0,locked:false,equipped:false,icon:isW?'⚔️':'🛡️'});
  }
  if(Math.random()<.6){
    items.push({id:uid(),name:'Solucan Derisi',type:'trash',rarity:'common',value:Math.floor(5+level*2),
      attackBonus:0,defenseBonus:0,healAmount:0,manaAmount:0,locked:false,equipped:false,icon:'🪱'});
  }
  return{id:uid(),name:isBoss?'Büyük Solucan':'Solucan Lv.'+level,level,
    stats:{maxHp:hp,hp,maxMp:0,mp:0,attack:atk,defense:def,speed:1.5},
    position:{x:WORM_ZONE.x+Math.cos(angle)*d,y:WORM_ZONE.y+Math.sin(angle)*d},
    isBoss,reward:{exp:Math.floor((isBoss?200:30)*m),gold:Math.floor((isBoss?100:15)*m),items},
    attackCooldown:isBoss?2:1.5,currentAttackCooldown:0};
}

function spawnEnemies(){
  const e=[];for(let i=0;i<5;i++)e.push(createWorm(Math.floor(Math.random()*5)+1));
  e.push(createWorm(5,true));return e;
}

function generateQuest(){
  const t=QUEST_TEMPLATES[Math.floor(Math.random()*QUEST_TEMPLATES.length)];
  return{...t,id:uid(),currentCount:0,completed:false,turnedIn:false,
    rewardItem:t.rewardItem?{...t.rewardItem,id:uid()}:null};
}

function saveGame(state){
  try{localStorage.setItem('warriors_journey_save',JSON.stringify({player:state.player,gameTime:state.gameTime}))}catch(e){}
}
function loadGame(){
  try{const d=localStorage.getItem('warriors_journey_save');if(!d)return null;const p=JSON.parse(d);if(!p.player||typeof p.player.level!=='number')return null;return p}catch(e){localStorage.removeItem('warriors_journey_save');return null}
}

const isMobile=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)||window.innerWidth<768;
const saved=loadGame();
const player=saved?.player?{...createPlayer(),...saved.player}:createPlayer();
while(player.inventory.length<INVENTORY_SIZE)player.inventory.push(null);
player.inventory=player.inventory.slice(0,INVENTORY_SIZE);
if(!player.skills||!player.skills.length)player.skills=WARRIOR_SKILLS.map(s=>({...s}));
recalcStats(player);

const state={
  player,enemies:spawnEnemies(),gameTime:saved?.gameTime??0,
  combatLog:['⚔️ Savaşçının Yolculuğu başladı!'],
  showInventory:false,showShop:false,showQuest:false,
  joystickDir:{x:0,y:0},
  availQuest:null
};

const keys=new Set();

const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
window.addEventListener('resize',resize);resize();

function drawNPC(x,y,emoji,label){
  ctx.font='24px serif';ctx.textAlign='center';ctx.fillText(emoji,x,y);
  ctx.fillStyle='#fbbf24';ctx.font='bold 10px Inter';ctx.fillText(label,x,y+20);
}

function drawGame(){
  const W=canvas.width,H=canvas.height;
  const p=state.player;
  const cx=W/2,cy=H/2;
  const ox=cx-p.position.x*SCALE,oy=cy-p.position.y*SCALE;

  ctx.fillStyle='#0d1117';ctx.fillRect(0,0,W,H);

  ctx.strokeStyle='#1a2233';ctx.lineWidth=1;
  const gs=40;
  const sx=Math.floor(-ox/gs)*gs,sy=Math.floor(-oy/gs)*gs;
  for(let gx=sx;gx<W-ox;gx+=gs){ctx.beginPath();ctx.moveTo(gx+ox,0);ctx.lineTo(gx+ox,H);ctx.stroke()}
  for(let gy=sy;gy<H-oy;gy+=gs){ctx.beginPath();ctx.moveTo(0,gy+oy);ctx.lineTo(W,gy+oy);ctx.stroke()}

  ctx.fillStyle='rgba(34,197,94,.08)';ctx.beginPath();
  ctx.arc(SAFE_ZONE.x*SCALE+ox,SAFE_ZONE.y*SCALE+oy,SAFE_ZONE.radius*SCALE,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(34,197,94,.3)';ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='#22c55e';ctx.font='bold 12px Inter';ctx.textAlign='center';
  ctx.fillText('🏠 Güvenli Bölge',SAFE_ZONE.x*SCALE+ox,SAFE_ZONE.y*SCALE+oy-SAFE_ZONE.radius*SCALE-10);

  drawNPC(-15*SCALE+ox,-5*SCALE+oy,'🏪','Market');
  drawNPC(15*SCALE+ox,-5*SCALE+oy,'📜','Görevler');

  ctx.fillStyle='rgba(239,68,68,.06)';ctx.beginPath();
  ctx.arc(WORM_ZONE.x*SCALE+ox,WORM_ZONE.y*SCALE+oy,40*SCALE,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(239,68,68,.2)';ctx.lineWidth=1;ctx.stroke();
  ctx.fillStyle='#ef4444';ctx.font='bold 12px Inter';
  ctx.fillText('☠️ Solucan Bölgesi',WORM_ZONE.x*SCALE+ox,WORM_ZONE.y*SCALE+oy-42*SCALE);

  state.enemies.forEach(e=>{
    if(e.stats.hp<=0)return;
    const ex=e.position.x*SCALE+ox,ey=e.position.y*SCALE+oy;
    ctx.fillStyle='rgba(0,0,0,.3)';ctx.beginPath();
    ctx.ellipse(ex,ey+(e.isBoss?24:16),e.isBoss?20:12,5,0,0,Math.PI*2);ctx.fill();
    const sz=e.isBoss?20:12;
    ctx.fillStyle=e.isBoss?'#dc2626':'#a855f7';
    for(let i=0;i<4;i++){const sx2=ex+Math.sin(Date.now()/300+i)*3,sy2=ey-i*(sz/3);
      ctx.beginPath();ctx.arc(sx2,sy2,sz/2-i,0,Math.PI*2);ctx.fill()}
    ctx.fillStyle='#fff';ctx.beginPath();
    ctx.arc(ex-3,ey-sz+2,2,0,Math.PI*2);ctx.arc(ex+3,ey-sz+2,2,0,Math.PI*2);ctx.fill();
    const bw=e.isBoss?60:40,bh=6,by=ey-sz-20;
    ctx.fillStyle='#1f2937';ctx.fillRect(ex-bw/2,by,bw,bh);
    const hr=e.stats.hp/e.stats.maxHp;
    ctx.fillStyle=hr>.5?'#22c55e':hr>.25?'#f59e0b':'#ef4444';
    ctx.fillRect(ex-bw/2,by,bw*hr,bh);
    ctx.fillStyle='#fff';ctx.font='bold 9px Inter';ctx.textAlign='center';
    ctx.fillText(e.stats.hp+'/'+e.stats.maxHp,ex,by-3);
    ctx.fillStyle=e.isBoss?'#f59e0b':'#d1d5db';
    ctx.font='bold '+(e.isBoss?11:9)+'px Inter';ctx.fillText(e.name,ex,by-14);
  });

  const px=cx,py=cy;
  ctx.fillStyle='rgba(0,0,0,.4)';ctx.beginPath();ctx.ellipse(px,py+18,14,5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#3b82f6';ctx.fillRect(px-8,py-10,16,20);
  ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(px,py-16,8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#6b7280';ctx.beginPath();ctx.arc(px,py-18,9,Math.PI,0);ctx.fill();
  const sa=state.player.isAttacking?(state.player.facingRight?-.5:.5):(state.player.facingRight?.3:-.3);
  const swX=state.player.facingRight?px+12:px-12;
  ctx.save();ctx.translate(swX,py-5);ctx.rotate(sa);
  ctx.fillStyle='#d1d5db';ctx.fillRect(-2,-18,4,20);
  ctx.fillStyle='#fbbf24';ctx.fillRect(-4,0,8,4);ctx.restore();
  ctx.fillStyle='#fbbf24';ctx.font='bold 11px Cinzel';ctx.textAlign='center';
  ctx.fillText(state.player.name+' Lv.'+state.player.level,px,py-30);

  ctx.fillStyle='#6b7280';ctx.font='10px Inter';ctx.textAlign='left';
  ctx.fillText('X:'+Math.round(state.player.position.x)+' Y:'+Math.round(state.player.position.y),10,H-10);

  const ms=120,mx=W-ms-10,my=10;
  var mmRange=80;
  var msc2=ms/mmRange;
  var mmCx=mx+ms/2,mmCy=my+ms/2;
  var ppx=p.position.x,ppy=p.position.y;
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(mx,my,ms,ms);
  ctx.strokeStyle='#374151';ctx.lineWidth=1;ctx.strokeRect(mx,my,ms,ms);
  ctx.beginPath();ctx.rect(mx,my,ms,ms);ctx.clip();
  // Safe zone on minimap
  var szMx=mmCx+(SAFE_ZONE.x-ppx)*msc2,szMy=mmCy+(SAFE_ZONE.y-ppy)*msc2;
  ctx.fillStyle='rgba(34,197,94,.3)';ctx.beginPath();
  ctx.arc(szMx,szMy,SAFE_ZONE.radius*msc2,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(34,197,94,.5)';ctx.lineWidth=1;ctx.stroke();
  // Worm zone on minimap
  var wzMx=mmCx+(WORM_ZONE.x-ppx)*msc2,wzMy=mmCy+(WORM_ZONE.y-ppy)*msc2;
  ctx.fillStyle='rgba(239,68,68,.15)';ctx.beginPath();
  ctx.arc(wzMx,wzMy,40*msc2,0,Math.PI*2);ctx.fill();
  // Enemies on minimap
  state.enemies.forEach(function(e){if(e.stats.hp<=0)return;ctx.fillStyle=e.isBoss?'#f59e0b':'#ef4444';
    ctx.beginPath();ctx.arc(mmCx+(e.position.x-ppx)*msc2,mmCy+(e.position.y-ppy)*msc2,e.isBoss?4:2,0,Math.PI*2);ctx.fill()});
  // Player dot (always center)
  ctx.fillStyle='#3b82f6';ctx.beginPath();ctx.arc(mmCx,mmCy,4,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#93c5fd';ctx.lineWidth=1;ctx.stroke();
  // NPC markers
  var npc1x=mmCx+(-15-ppx)*msc2,npc1y=mmCy+(-5-ppy)*msc2;
  var npc2x=mmCx+(15-ppx)*msc2,npc2y=mmCy+(-5-ppy)*msc2;
  ctx.fillStyle='#fbbf24';ctx.font='8px serif';ctx.textAlign='center';
  ctx.fillText('🏪',npc1x,npc1y);ctx.fillText('📜',npc2x,npc2y);
  ctx.restore();
  // Minimap label
  ctx.fillStyle='#6b7a8d';ctx.font='bold 8px Inter';ctx.textAlign='center';
  ctx.fillText('MİNİ HARİTA',mx+ms/2,my+ms+10);
}

function useSkill(skillId){
  const p=state.player;const log=state.combatLog;
  if(!p.isAlive)return;

  if(skillId==='potion_hp'||skillId==='potion_mp'){
    const pt=skillId==='potion_hp'?'hp_potion':'mp_potion';
    const idx=p.inventory.findIndex(i=>i?.type===pt);if(idx===-1)return;
    const pot=p.inventory[idx];
    if(pt==='hp_potion'){p.stats.hp=Math.min(p.stats.maxHp,p.stats.hp+pot.healAmount);log.push('❤️ Can Potu kullanıldı! +'+pot.healAmount+' HP')}
    else{p.stats.mp=Math.min(p.stats.maxMp,p.stats.mp+pot.manaAmount);log.push('💙 Mana Potu kullanıldı! +'+pot.manaAmount+' MP')}
    p.inventory[idx]=null;trimLog();renderUI();return;
  }

  const skill=p.skills.find(s=>s.id===skillId);if(!skill)return;
  if(skill.unlockLevel>p.level||skill.currentCooldown>0)return;
  if(skill.manaCost>p.stats.mp){log.push('⚠️ Yeterli mana yok!');trimLog();renderUI();return}
  if(skill.requiresPowerBar&&p.powerBar<p.maxPowerBar){log.push('⚠️ Power Bar dolu değil!');trimLog();renderUI();return}

  p.stats.mp-=skill.manaCost;
  if(skill.requiresPowerBar)p.powerBar=0;
  skill.currentCooldown=skill.cooldown;
  p.isAttacking=true;p.attackAnimTimer=.3;

  let hitCount=0;
  state.enemies.forEach(e=>{
    if(e.stats.hp<=0)return;
    const d=dist(p.position,e.position);
    const inRange=skill.isAoe?(skill.aoeRadius>=999||d<=skill.aoeRadius):d<=p.attackRange;
    if(!inRange)return;
    const dmg=calcDamage(p.stats.attack,e.stats.defense,skill.damageMultiplier);
    e.stats.hp=Math.max(0,e.stats.hp-dmg);hitCount++;
    log.push('⚔️ '+skill.name+' → '+e.name+': '+dmg+' hasar!');
    if(!skill.requiresPowerBar)p.powerBar=Math.min(p.maxPowerBar,p.powerBar+8);
    if(e.stats.hp<=0){
      log.push('💀 '+e.name+' yenildi! +'+e.reward.exp+'EXP +'+e.reward.gold+'G');
      p.exp+=e.reward.exp;p.gold+=e.reward.gold;
      p.killCount[e.isBoss?'boss':'worm']++;
      e.reward.items.forEach(item=>{if(addToInventory(p,item))log.push('📦 '+item.name+' bulundu!');else log.push('⚠️ Envanter dolu!')});
      if(p.activeQuest&&!p.activeQuest.turnedIn){
        const q=p.activeQuest;
        if((q.target==='worm'&&!e.isBoss)||(q.target==='boss'&&e.isBoss)){
          q.currentCount++;if(q.currentCount>=q.targetCount){q.completed=true;log.push('🎯 Görev tamamlandı! NPC\'ye git.')}
        }
      }
      checkLevelUp(p,log);
    }
  });
  if(hitCount===0)log.push('💨 Hedef menzil dışında!');

  const alive=state.enemies.filter(e=>e.stats.hp>0&&!e.isBoss).length;
  if(alive<3)state.enemies.push(createWorm(Math.floor(Math.random()*5)+1));
  if(!state.enemies.some(e=>e.isBoss&&e.stats.hp>0))state.enemies.push(createWorm(5,true));
  trimLog();renderUI();
}

function tick(delta){
  const p=state.player;const log=state.combatLog;
  state.gameTime+=delta;

  p.skills.forEach(s=>{if(s.currentCooldown>0)s.currentCooldown=Math.max(0,s.currentCooldown-delta)});
  if(p.attackAnimTimer>0){p.attackAnimTimer-=delta;if(p.attackAnimTimer<=0)p.isAttacking=false}

  if(p.isAlive){
    state.enemies.forEach(e=>{
      if(e.stats.hp<=0)return;
      const d=dist(p.position,e.position);
      if(d<100&&d>30){
        const dx=p.position.x-e.position.x,dy=p.position.y-e.position.y;
        const len=Math.sqrt(dx*dx+dy*dy);
        e.position.x+=(dx/len)*e.stats.speed*delta;
        e.position.y+=(dy/len)*e.stats.speed*delta;
      }
      e.currentAttackCooldown-=delta;
      if(d<=40&&e.currentAttackCooldown<=0){
        const dmg=calcDamage(e.stats.attack,p.stats.defense,1);
        p.stats.hp=Math.max(0,p.stats.hp-dmg);
        e.currentAttackCooldown=e.attackCooldown;
        log.push('🔴 '+e.name+' sana '+dmg+' hasar verdi!');
        if(p.stats.hp<=0){p.isAlive=false;log.push('💀 Öldün! Yeniden doğmak için butona bas.')}
      }
    });

    if(dist(p.position,{x:0,y:0})<SAFE_ZONE.radius){
      p.stats.hp=Math.min(p.stats.maxHp,p.stats.hp+p.stats.maxHp*.02*delta);
      p.stats.mp=Math.min(p.stats.maxMp,p.stats.mp+p.stats.maxMp*.03*delta);
    }
  }
  trimLog();
}

function movePlayer(dx,dy){
  if(!state.player.isAlive)return;
  const s=state.player.stats.speed;
  state.player.position.x+=dx*s;state.player.position.y+=dy*s;
  if(dx!==0)state.player.facingRight=dx>0;
}

const uiRoot=document.getElementById('ui-root');

function renderUI(){
  const p=state.player;
  const inSafe=dist(p.position,{x:0,y:0})<SAFE_ZONE.radius;
  let html='';

  html+='<div class="hud-bars"><div class="hud-card">';
  html+='<div class="player-info"><span class="player-name">'+p.name+'</span><span style="color:var(--muted-fg);font-size:10px">Lv.'+p.level+'</span></div>';
  html+=bar(p.stats.hp,p.stats.maxHp,'bar-hp','HP','❤️');
  html+=bar(p.stats.mp,p.stats.maxMp,'bar-mp','MP','💎');
  html+=bar(p.powerBar,p.maxPowerBar,'bar-pwr','PWR','⚡');
  html+=bar(p.exp,p.expToNext,'bar-xp','EXP','✨');
  html+='<div class="hud-stats"><span>⚔️ ATK: '+p.stats.attack+'</span><span>🛡️ DEF: '+p.stats.defense+'</span><span>💰 '+p.gold+'G</span></div>';
  html+='</div></div>';

  html+='<div class="combat-log"><div class="log-card">';
  state.combatLog.slice(-5).reverse().forEach((m,i)=>{
    html+='<div class="log-line" style="color:'+(i===0?'var(--fg)':'var(--muted-fg)')+'">'+m+'</div>';
  });
  html+='</div></div>';

  html+='<div class="menu-btns" style="'+(isMobile?'top:8px;right:8px;flex-direction:column':'top:8px;right:120px;flex-direction:row')+'">';
  html+='<button class="menu-btn" onclick="toggleInventory()">🎒 <span class="menu-shortcut">[I]</span></button>';
  if(inSafe){
    html+='<button class="menu-btn" onclick="toggleShop()">🏪 <span class="menu-shortcut">[B]</span></button>';
    html+='<button class="menu-btn" onclick="toggleQuest()">📜 <span class="menu-shortcut">[J]</span></button>';
  }
  html+='</div>';

  if(p.activeQuest&&!p.activeQuest.turnedIn){
    const q=p.activeQuest;
    html+='<div class="quest-tracker"><div class="tracker-card"><span class="tracker-name">'+q.name+'</span><span class="tracker-count">'+q.currentCount+'/'+q.targetCount+'</span></div></div>';
  }

  const avail=p.skills.filter(s=>s.unlockLevel<=p.level);
  html+='<div class="skill-bar" style="'+(isMobile?'bottom:16px;right:16px;flex-direction:column':'bottom:16px;left:50%;transform:translateX(-50%);flex-direction:row')+'">';
  avail.forEach(sk=>{
    const onCd=sk.currentCooldown>0;const noMana=p.stats.mp<sk.manaCost;
    const noPwr=sk.requiresPowerBar&&p.powerBar<p.maxPowerBar;
    const dis=onCd||noMana||noPwr;
    const cdPct=onCd?(sk.currentCooldown/sk.cooldown)*100:0;
    const cls='skill-btn'+(dis?' disabled':'')+(sk.requiresPowerBar&&!noPwr?' ultimate':'');
    html+='<button class="'+cls+'" onclick="useSkill(&quot;'+sk.id+'&quot;)"><span class="skill-icon">'+sk.icon+'</span>';
    if(onCd)html+='<div class="skill-cd" style="clip-path:inset('+(100-cdPct)+'% 0 0 0)"></div>';
    html+='<span class="skill-key">'+(onCd?Math.ceil(sk.currentCooldown)+'s':'['+sk.key+']')+'</span>';
    if(sk.manaCost>0)html+='<span class="skill-mana">'+sk.manaCost+'</span>';
    html+='</button>';
  });
  const hpCount=p.inventory.filter(i=>i?.type==='hp_potion').length;
  const mpCount=p.inventory.filter(i=>i?.type==='mp_potion').length;
  html+='<div style="display:flex;gap:8px;margin-left:16px">';
  html+='<button class="potion-btn'+(hpCount===0?' disabled':'')+'" onclick="useSkill(&quot;potion_hp&quot;)"><span class="potion-icon">❤️</span><span class="potion-count">'+hpCount+'x'+(isMobile?'':' [Q]')+'</span></button>';
  html+='<button class="potion-btn'+(mpCount===0?' disabled':'')+'" onclick="useSkill(&quot;potion_mp&quot;)"><span class="potion-icon">💙</span><span class="potion-count">'+mpCount+'x'+(isMobile?'':' [E]')+'</span></button>';
  html+='</div></div>';

  if(isMobile){
    document.getElementById('joystick-root').style.display='block';
  }

  if(state.showInventory||state.showShop)html+=renderInventoryPanel();
  if(state.showQuest)html+=renderQuestPanel();

  if(!p.isAlive){
    html+='<div class="death-overlay"><div style="text-align:center"><div class="death-title">💀 ÖLDÜN</div><div class="death-sub">Güvenli bölgede yeniden doğacaksın.</div><button class="respawn-btn" onclick="respawn()">🔄 Yeniden Doğ</button></div></div>';
  }

  if(!isMobile){
    html+='<div class="kb-hints"><div class="kb-card"><div>WASD: Hareket | 1-4: Yetenekler</div><div>Q: Can Potu | E: Mana Potu</div><div>I: Envanter | B: Market | J: Görev</div></div></div>';
  }

  uiRoot.innerHTML=html;
}

function bar(val,max,cls,label,icon){
  const pct=Math.max(0,Math.min(100,(val/max)*100));
  return '<div class="bar-row"><span class="bar-icon">'+icon+'</span><div class="bar-track '+cls+'"><div class="bar-fill" style="width:'+pct+'%"></div><span class="bar-text">'+Math.floor(val)+'/'+max+' '+label+'</span></div></div>';
}

function renderInventoryPanel(){
  const p=state.player;let h='';
  h+='<div class="panel-overlay" onclick="if(event.target===this)closePanel()"><div class="panel">';
  h+='<div class="panel-header"><h2>'+(state.showShop?'🏪 Market':'🎒 Envanter')+'</h2><div style="display:flex;align-items:center;gap:8px"><span class="gold-display">💰 '+p.gold+'G</span><button class="close-btn" onclick="closePanel()">✕</button></div></div>';

  h+='<div class="equip-row">'+equipSlot('Kılıç',p.equippedSword)+equipSlot('Zırh',p.equippedArmor)+'</div>';

  if(state.showShop){
    SHOP_ITEMS.forEach((item,i)=>{
      h+='<div class="shop-item"><div class="shop-info"><span class="shop-icon">'+item.icon+'</span><div><div class="shop-name rarity-'+item.rarity+'">'+item.name+'</div><div class="shop-stats">';
      if(item.attackBonus>0)h+='⚔️+'+item.attackBonus+' ';if(item.defenseBonus>0)h+='🛡️+'+item.defenseBonus+' ';
      if(item.healAmount>0)h+='❤️+'+item.healAmount+' ';if(item.manaAmount>0)h+='💙+'+item.manaAmount;
      h+='</div></div></div><button class="buy-btn '+(p.gold>=item.value?'can-buy':'no-buy')+'" onclick="buyItem('+i+')">'+item.value+'G</button></div>';
    });
  }else{
    const trashItems=p.inventory.filter(i=>i?.type==='trash'&&!i.locked);
    const trashVal=trashItems.reduce((s,i)=>s+(i?.value??0),0);
    if(trashItems.length>0)h+='<button class="trash-btn" onclick="sellAllTrash()">🗑️ Tüm Çöpleri Sat ('+trashItems.length+' eşya = '+trashVal+'G)</button>';
    h+='<div class="inv-grid">';
    p.inventory.forEach((item,i)=>{
      h+='<div class="inv-slot'+(item?.equipped?' equipped':'')+'">';
      if(item){
        h+='<span class="item-icon">'+item.icon+'</span><span class="item-name rarity-'+item.rarity+'">'+item.name.slice(0,8)+'</span>';
        if(item.locked)h+='<span class="lock-icon">🔒</span>';
        h+='<div class="inv-actions">';
        if((item.type==='sword'||item.type==='armor')&&!item.equipped)h+='<button class="act-equip" onclick="event.stopPropagation();equipItem('+i+')">E</button>';
        if(!item.locked)h+='<button class="act-sell" onclick="event.stopPropagation();sellItem('+i+')">S</button>';
        h+='<button class="act-lock" onclick="event.stopPropagation();lockItem('+i+')">'+(item.locked?'🔓':'🔒')+'</button></div>';
      }
      h+='</div>';
    });
    h+='</div>';
  }
  h+='</div></div>';return h;
}

function equipSlot(label,item){
  let h='<div class="equip-slot"><div class="equip-label">'+label+'</div>';
  if(item){
    h+='<div class="equip-icon">'+item.icon+'</div><div class="equip-name rarity-'+item.rarity+'">'+item.name+'</div>';
    h+='<div class="equip-stats">';if(item.attackBonus>0)h+='⚔️+'+item.attackBonus+' ';if(item.defenseBonus>0)h+='🛡️+'+item.defenseBonus;h+='</div>';
  }else h+='<span style="color:var(--muted-fg);font-size:11px">Boş</span>';
  return h+'</div>';
}

function renderQuestPanel(){
  const p=state.player;const q=p.activeQuest;let h='';
  h+='<div class="panel-overlay" onclick="if(event.target===this)closePanel()"><div class="panel">';
  h+='<div class="panel-header"><h2>📜 Görevler</h2><button class="close-btn" onclick="closePanel()">✕</button></div>';

  if(q&&!q.turnedIn){
    h+='<div class="quest-block"><div class="quest-title">'+q.name+'</div><div class="quest-desc">'+q.description+'</div>';
    const qpct=Math.min(100,(q.currentCount/q.targetCount)*100);
    h+='<div class="quest-progress"><div class="quest-bar"><div class="quest-bar-fill" style="width:'+qpct+'%"></div></div><span class="quest-count">'+q.currentCount+'/'+q.targetCount+'</span></div>';
    h+='<div class="quest-rewards">Ödül: ✨'+q.rewardExp+' EXP | 💰'+q.rewardGold+'G';
    if(q.rewardItem)h+=' | <span class="rarity-'+q.rewardItem.rarity+'">'+q.rewardItem.icon+' '+q.rewardItem.name+'</span>';
    h+='</div></div>';
    if(q.completed&&!q.turnedIn)h+='<button class="quest-turnin-btn" onclick="turnInQuest()">✅ Görevi Teslim Et</button>';
  }else{
    if(!state.availQuest)state.availQuest=generateQuest();
    const aq=state.availQuest;
    h+='<p style="font-size:11px;color:var(--muted-fg);margin-bottom:8px">Görevci NPC yeni bir görev sunuyor:</p>';
    h+='<div class="quest-block"><div class="quest-title">'+aq.name+'</div><div class="quest-desc">'+aq.description+'</div>';
    h+='<div class="quest-rewards">Ödül: ✨'+aq.rewardExp+' EXP | 💰'+aq.rewardGold+'G';
    if(aq.rewardItem)h+=' | <span class="rarity-'+aq.rewardItem.rarity+'">'+aq.rewardItem.icon+' '+aq.rewardItem.name+'</span>';
    h+='</div></div>';
    h+='<button class="quest-accept-btn" onclick="acceptQuest()">📜 Görevi Kabul Et</button>';
  }
  h+='</div></div>';return h;
}

function toggleInventory(){state.showInventory=!state.showInventory;state.showShop=false;state.showQuest=false;renderUI()}
function toggleShop(){state.showShop=!state.showShop;state.showInventory=false;state.showQuest=false;renderUI()}
function toggleQuest(){state.showQuest=!state.showQuest;state.showInventory=false;state.showShop=false;renderUI()}
function closePanel(){state.showInventory=false;state.showShop=false;state.showQuest=false;renderUI()}

function equipItem(i){
  const p=state.player;const item=p.inventory[i];if(!item)return;
  if(item.type==='sword'){
    if(p.equippedSword){p.equippedSword.equipped=false;p.inventory[i]=p.equippedSword}else p.inventory[i]=null;
    item.equipped=true;p.equippedSword=item;
  }else if(item.type==='armor'){
    if(p.equippedArmor){p.equippedArmor.equipped=false;p.inventory[i]=p.equippedArmor}else p.inventory[i]=null;
    item.equipped=true;p.equippedArmor=item;
  }
  recalcStats(p);state.combatLog.push('🔧 '+item.name+' kuşanıldı!');trimLog();renderUI();
}

function sellItem(i){
  const p=state.player;const item=p.inventory[i];if(!item||item.locked)return;
  p.gold+=item.value;state.combatLog.push('💰 '+item.name+' satıldı: '+item.value+'G');
  p.inventory[i]=null;trimLog();renderUI();
}

function sellAllTrash(){
  const p=state.player;let total=0;
  p.inventory.forEach((item,i)=>{if(item?.type==='trash'&&!item.locked){total+=item.value;p.inventory[i]=null}});
  if(total>0){p.gold+=total;state.combatLog.push('🗑️ Tüm çöpler satıldı: '+total+'G')}
  trimLog();renderUI();
}

function lockItem(i){const item=state.player.inventory[i];if(item)item.locked=!item.locked;renderUI()}

function buyItem(shopIdx){
  const p=state.player;const item=SHOP_ITEMS[shopIdx];
  if(p.gold<item.value){state.combatLog.push('⚠️ Yeterli altın yok!');trimLog();renderUI();return}
  const newItem={...item,id:uid()};
  if(!addToInventory(p,newItem)){state.combatLog.push('⚠️ Envanter dolu!');trimLog();renderUI();return}
  p.gold-=item.value;state.combatLog.push('🛒 '+newItem.name+' satın alındı!');trimLog();renderUI();
}

function acceptQuest(){
  if(!state.availQuest)return;
  state.player.activeQuest=state.availQuest;
  state.combatLog.push('📜 Görev kabul edildi: '+state.availQuest.name);
  state.availQuest=null;state.showQuest=false;trimLog();renderUI();
}

function turnInQuest(){
  const p=state.player;const q=p.activeQuest;if(!q||!q.completed)return;
  p.exp+=q.rewardExp;p.gold+=q.rewardGold;
  if(q.rewardItem){if(addToInventory(p,q.rewardItem))state.combatLog.push('🎁 '+q.rewardItem.name+' ödül olarak alındı!');
    else state.combatLog.push('⚠️ Envanter dolu!')}
  state.combatLog.push('✅ '+q.name+' tamamlandı! +'+q.rewardExp+'EXP +'+q.rewardGold+'G');
  q.turnedIn=true;p.activeQuest=null;checkLevelUp(p,state.combatLog);
  state.showQuest=false;trimLog();renderUI();
}

function respawn(){
  const p=state.player;p.isAlive=true;p.stats.hp=p.stats.maxHp;p.stats.mp=p.stats.maxMp;
  p.position={x:0,y:0};p.powerBar=0;
  state.combatLog.push('🔄 Güvenli bölgede yeniden doğdun!');trimLog();renderUI();
}

function setupJoystick(){
  const area=document.getElementById('joystickArea');
  const knob=document.getElementById('joystickKnob');
  const zone=document.getElementById('joystickTouchZone');
  if(!area||!knob||!zone)return;
  let active=false;const maxR=50;
  let originX=0,originY=0;

  function show(cx,cy){
    active=true;
    originX=cx;originY=cy;
    area.style.display='block';
    area.style.left=(cx-70)+'px';
    area.style.top=(cy-70)+'px';
    knob.style.left='calc(50% - 26px)';
    knob.style.top='calc(50% - 26px)';
  }
  function update(cx,cy){
    let dx=cx-originX,dy=cy-originY;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d>maxR){dx=(dx/d)*maxR;dy=(dy/d)*maxR}
    knob.style.left='calc(50% + '+dx+'px - 26px)';
    knob.style.top='calc(50% + '+dy+'px - 26px)';
    state.joystickDir={x:dx/maxR,y:dy/maxR};
  }
  function end(){
    active=false;
    area.style.display='none';
    state.joystickDir={x:0,y:0};
  }

  zone.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];show(t.clientX,t.clientY)},{passive:false});
  zone.addEventListener('touchmove',e=>{e.preventDefault();if(active)update(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});
  zone.addEventListener('touchend',e=>{e.preventDefault();end()},{passive:false});
  zone.addEventListener('touchcancel',e=>{e.preventDefault();end()},{passive:false});
}

if(!isMobile){
  window.addEventListener('keydown',e=>{
    keys.add(e.key.toLowerCase());
    switch(e.key){
      case '1':useSkill('basic_attack');break;case '2':useSkill('power_strike');break;
      case '3':useSkill('sword_spin');break;case '4':useSkill('dragon_strike');break;
      case 'q':useSkill('potion_hp');break;case 'e':useSkill('potion_mp');break;
      case 'i':case 'I':toggleInventory();break;case 'b':case 'B':toggleShop();break;case 'j':case 'J':toggleQuest();break;
    }
  });
  window.addEventListener('keyup',e=>keys.delete(e.key.toLowerCase()));
}

let lastTime=performance.now();
let uiTimer=0;
let saveTimer=0;

function gameLoop(time){
  const delta=Math.min((time-lastTime)/1000,.1);
  lastTime=time;

  if(!isMobile){
    let dx=0,dy=0;
    if(keys.has('w')||keys.has('arrowup'))dy=-1;
    if(keys.has('s')||keys.has('arrowdown'))dy=1;
    if(keys.has('a')||keys.has('arrowleft'))dx=-1;
    if(keys.has('d')||keys.has('arrowright'))dx=1;
    if(dx||dy){const len=Math.sqrt(dx*dx+dy*dy);movePlayer(dx/len,dy/len)}
  }else{
    if(state.joystickDir.x||state.joystickDir.y)movePlayer(state.joystickDir.x,state.joystickDir.y);
  }

  tick(delta);
  drawGame();

  uiTimer+=delta;
  if(uiTimer>.5){uiTimer=0;renderUI()}

  saveTimer+=delta;
  if(saveTimer>10){saveTimer=0;saveGame(state)}

  requestAnimationFrame(gameLoop);
}

renderUI();
if(isMobile)setupJoystick();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knight Online 2D - RPG</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #gameContainer { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        canvas { background: #1a3d1a; border: 2px solid #333; }
        .hud { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; }
        .panel { background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .title { color: #f8c447; font-weight: bold; margin-bottom: 5px; }
        .bar { height: 10px; background: #333; border-radius: 5px; margin: 5px 0; }
        .hp { background: #64e87f; height: 100%; border-radius: 5px; }
        .mana { background: #4ed0ff; height: 100%; border-radius: 5px; }
        .xp { background: #f8c447; height: 100%; border-radius: 5px; }
        #storyPanel { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; color: white; }
        #storyText { font-size: 20px; max-width: 600px; text-align: center; margin-bottom: 20px; }
        #storyBtn { padding: 15px 30px; background: #4ed0ff; border: none; border-radius: 8px; color: white; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="960" height="540"></canvas>
        <div class="hud">
            <div class="panel">
                <div class="title">Battle Mage - Seviye <span id="level">1</span></div>
                <div>Altın: <span id="gold">0</span> | İksir: <span id="potion">3</span></div>
                <div class="bar"><div class="hp" id="hpBar" style="width:100%"></div></div>
                <div>HP: <span id="hp">120/120</span></div>
                <div class="bar"><div class="mana" id="manaBar" style="width:100%"></div></div>
                <div>Mana: <span id="mana">100/100</span></div>
                <div class="bar"><div class="xp" id="xpBar" style="width:0%"></div></div>
                <div>XP: <span id="xp">0/100</span></div>
            </div>
            <div class="panel">
                <div class="title">Görev: <span id="questTarget">Goblin</span></div>
                <div>İlerleme: <span id="questProgress">0/5</span></div>
            </div>
            <div class="panel" style="position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);">
                WASD: Hareket | SPACE: Kılıç | TIK: Buz | Q: İksir
            </div>
        </div>
        <div id="storyPanel">
            <div id="storyText"></div>
            <button id="storyBtn">Devam Et</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // OYUN DURUMU
        const player = { x: 480, y: 270, hp: 120, maxHp: 120, mana: 100, maxMana: 100, xp: 0, xpNeed: 100, level: 1, gold: 0, potions: 3, speed: 2.5, damage: 25, alive: true };
        const camera = { x: 480, y: 270 };
        const keys = {};
        let enemies = [];
        let projectiles = [];
        let particles = [];
        let quest = { target: 'Goblin', killed: 0, need: 5 };
        
        // CANAVARLAR
        const enemyTypes = {
            Goblin: { hp: 40, damage: 8, speed: 1.2, xp: 15, gold: 3, color: '#8b4513', icon: '👺' },
            Orc: { hp: 80, damage: 15, speed: 0.9, xp: 30, gold: 8, color: '#2d5016', icon: '👹' },
            Wolf: { hp: 50, damage: 12, speed: 1.8, xp: 20, gold: 5, color: '#555', icon: '🐺' }
        };
        
        // SES
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if (type === 'sword') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(40, now + 0.15);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now);
                osc.stop(now + 0.15);
            }
        }
        
        // HIKAYE
        const storyLines = [
            "Moradon Kralligi'nda esrarengiz bir karanlik yukseliyor...",
            "Koyluler korku icinde, goblinler her gece saldiriyor.",
            "Sen, son Battle Mage, kralligin son umudusun!",
            "Hemen goblin avina basla!"
        ];
        let storyIndex = 0;
        
        function showStory() {
            document.getElementById('storyPanel').style.display = 'flex';
            document.getElementById('storyText').textContent = storyLines[storyIndex];
        }
        
        function advanceStory() {
            storyIndex++;
            if (storyIndex < storyLines.length) {
                document.getElementById('storyText').textContent = storyLines[storyIndex];
            } else {
                document.getElementById('storyPanel').style.display = 'none';
            }
        }
        
        document.getElementById('storyBtn').addEventListener('click', advanceStory);
        
        // CANAVAR URET
        function spawnEnemy() {
            const types = ['Goblin', 'Orc', 'Wolf'];
            const type = types[Math.floor(Math.random() * types.length)];
            const data = enemyTypes[type];
            const angle = Math.random() * Math.PI * 2;
            const dist = 150 + Math.random() * 100;
            enemies.push({
                x: player.x + Math.cos(angle) * dist,
                y: player.y + Math.sin(angle) * dist,
                type: type, hp: data.hp, maxHp: data.hp,
                speed: data.speed, damage: data.damage, alive: true,
                attackCooldown: 0, xp: data.xp, gold: data.gold,
                icon: data.icon, color: data.color
            });
        }
        
        // CIzIM
        function drawMap() {
            ctx.fillStyle = '#0d2610';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#1a3d1a';
            for (let x = 0; x < canvas.width; x += 100) {
                for (let y = 0; y < canvas.height; y += 100) {
                    if ((Math.floor((x + camera.x) / 100) + Math.floor((y + camera.y) / 100)) % 2 === 0) {
                        ctx.fillRect(x, y, 100, 100);
                    }
                }
            }
        }
        
        function drawPlayer() {
            const sx = canvas.width / 2;
            const sy = canvas.height / 2;
            ctx.fillStyle = '#4a90e2';
            ctx.beginPath();
            ctx.arc(sx, sy, 18, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#f4d03f';
            ctx.beginPath();
            ctx.arc(sx, sy - 8, 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#c0c0c0';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(sx + 15, sy + 5);
            ctx.lineTo(sx + 35, sy - 10);
            ctx.stroke();
        }
        
        function drawEnemy(enemy) {
            const sx = enemy.x - camera.x + canvas.width / 2;
            const sy = enemy.y - camera.y + canvas.height / 2;
            if (sx < -50 || sx > canvas.width + 50 || sy < -50 || sy > canvas.height + 50) return;
            ctx.fillStyle = enemy.color;
            ctx.beginPath();
            ctx.arc(sx, sy, 16, 0, Math.PI * 2);
            ctx.fill();
            ctx.font = '18px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(enemy.icon, sx, sy + 6);
        }
        
        function drawProjectile(proj) {
            const sx = proj.x - camera.x + canvas.width / 2;
            const sy = proj.y - camera.y + canvas.height / 2;
            ctx.fillStyle = '#00ccff';
            ctx.beginPath();
            ctx.arc(sx, sy, 8, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function drawParticle(p) {
            const sx = p.x - camera.x + canvas.width / 2;
            const sy = p.y - camera.y + canvas.height / 2;
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life;
            ctx.beginPath();
            ctx.arc(sx, sy, p.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
        }
        
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawMap();
            particles.forEach(drawParticle);
            projectiles.forEach(drawProjectile);
            enemies.forEach(drawEnemy);
            if (player.alive) drawPlayer();
        }
        
        // GUNCELLEME
        function update() {
            if (!player.alive) return;
            
            let dx = 0, dy = 0;
            if (keys['w'] || keys['arrowup']) dy = -1;
            if (keys['s'] || keys['arrowdown']) dy = 1;
            if (keys['a'] || keys['arrowleft']) dx = -1;
            if (keys['d'] || keys['arrowright']) dx = 1;
            if (dx !== 0 || dy !== 0) {
                const len = Math.sqrt(dx * dx + dy * dy);
                player.x += (dx / len) * player.speed;
                player.y += (dy / len) * player.speed;
            }
            
            camera.x = player.x;
            camera.y = player.y;
            
            if (player.mana < player.maxMana) player.mana += 0.1;
            
            enemies.forEach(enemy => {
                if (!enemy.alive) return;
                const dist = Math.hypot(player.x - enemy.x, player.y - enemy.y);
                if (dist < 300 && dist > 40) {
                    enemy.x += (player.x - enemy.x) / dist * enemy.speed;
                    enemy.y += (player.y - enemy.y) / dist * enemy.speed;
                }
                if (dist < 40 && enemy.attackCooldown <= 0) {
                    player.hp -= enemy.damage;
                    enemy.attackCooldown = 60;
                    addParticle(player.x, player.y, '#ff0000', 20);
                }
                if (enemy.attackCooldown > 0) enemy.attackCooldown--;
            });
            
            projectiles.forEach(proj => {
                proj.x += proj.vx;
                proj.y += proj.vy;
                proj.life--;
                enemies.forEach(enemy => {
                    if (!enemy.alive) return;
                    const dist = Math.hypot(proj.x - enemy.x, proj.y - enemy.y);
                    if (dist < 25) {
                        enemy.hp -= proj.damage;
                        addParticle(enemy.x, enemy.y, '#ff6600', 15);
                        if (enemy.hp <= 0) killEnemy(enemy);
                        proj.life = 0;
                    }
                });
            });
            projectiles = projectiles.filter(p => p.life > 0);
            
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
            });
            particles = particles.filter(p => p.life > 0);
            enemies = enemies.filter(e => e.alive);
            
            if (enemies.length < 5 && Math.random() < 0.02) spawnEnemy();
            
            if (player.hp <= 0) {
                player.alive = false;
                alert('Yenildin! Sayfa yenilenecek.');
                location.reload();
            }
            
            updateUI();
        }
        
        function killEnemy(enemy) {
            enemy.alive = false;
            playSound('sword');
            player.xp += enemy.xp;
            player.gold += enemy.gold;
            addParticle(enemy.x, enemy.y, '#ffff00', 10);
            
            if (enemy.type === quest.target) {
                quest.killed++;
                if (quest.killed >= quest.need) {
                    quest.killed = 0;
                    quest.need += 2;
                    player.gold += 50;
                    player.xp += 100;
                    alert('Görev tamamlandı! +50 altın, +100 XP');
                }
            }
            
            if (player.xp >= player.xpNeed) {
                player.level++;
                player.xp -= player.xpNeed;
                player.xpNeed = Math.floor(player.xpNeed * 1.5);
                player.maxHp += 20;
                player.hp = player.maxHp;
                player.maxMana += 15;
                player.mana = player.maxMana;
                player.damage += 5;
                alert('Seviye atladın! Seviye ' + player.level);
            }
        }
        
        function addParticle(x, y, color, size) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 4,
                vy: (Math.random() - 0.5) * 4,
                life: 1, color: color,
                size: Math.random() * size / 2 + 2
            });
        }
        
        function updateUI() {
            document.getElementById('level').textContent = player.level;
            document.getElementById('gold').textContent = player.gold;
            document.getElementById('potion').textContent = player.potions;
            document.getElementById('hp').textContent = Math.floor(player.hp) + '/' + player.maxHp;
            document.getElementById('mana').textContent = Math.floor(player.mana) + '/' + player.maxMana;
            document.getElementById('xp').textContent = Math.floor(player.xp) + '/' + player.xpNeed;
            document.getElementById('hpBar').style.width = (player.hp / player.maxHp * 100) + '%';
            document.getElementById('manaBar').style.width = (player.mana / player.maxMana * 100) + '%';
            document.getElementById('xpBar').style.width = (player.xp / player.xpNeed * 100) + '%';
            document.getElementById('questTarget').textContent = quest.target;
            document.getElementById('questProgress').textContent = quest.killed + '/' + quest.need;
        }
        
        function meleeSlash() {
            enemies.forEach(enemy => {
                const dist = Math.hypot(player.x - enemy.x, player.y - enemy.y);
                if (dist < 60) {
                    enemy.hp -= player.damage;
                    addParticle(enemy.x, enemy.y, '#ff0000', 12);
                    if (enemy.hp <= 0) killEnemy(enemy);
                }
            });
        }
        
        function usePotion() {
            if (player.potions > 0 && player.hp < player.maxHp) {
                player.potions--;
                player.hp = Math.min(player.hp + 60, player.maxHp);
                addParticle(player.x, player.y, '#00ff00', 15);
            }
        }
        
        function castSkill(tx, ty) {
            if (player.mana < 12) return;
            player.mana -= 12;
            const angle = Math.atan2(ty - player.y, tx - player.x);
            projectiles.push({
                x: player.x, y: player.y,
                vx: Math.cos(angle) * 5,
                vy: Math.sin(angle) * 5,
                damage: 25, life: 100
            });
        }
        
        window.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            if (e.code === 'Space') meleeSlash();
            if (e.key.toLowerCase() === 'q') usePotion();
        });
        
        window.addEventListener('keyup', e => {
            keys[e.key.toLowerCase()] = false;
        });
        
        canvas.addEventListener('click', e => {
            if (!player.alive) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const tx = (e.clientX - rect.left) * scaleX - canvas.width / 2 + camera.x;
            const ty = (e.clientY - rect.top) * scaleY - canvas.height / 2 + camera.y;
            castSkill(tx, ty);
        });
        
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // BASLAT
        showStory();
        for (let i = 0; i < 3; i++) spawnEnemy();
        gameLoop();
    </script>
</body>
</html>

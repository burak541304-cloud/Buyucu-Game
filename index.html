/* ── helpers ─────────────────────────────────────────────── */

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

/* ── input ───────────────────────────────────────────────── */

const keys = {};
const justPressed = {};
let mouseX = 0, mouseY = 0;

window.addEventListener("keydown", (e) => {
  if (!keys[e.code]) justPressed[e.code] = true;
  keys[e.code] = true;
  e.preventDefault();
});
window.addEventListener("keyup", (e) => { keys[e.code] = false; });
window.addEventListener("mousemove", (e) => { mouseX = e.clientX; mouseY = e.clientY; });

function isDown(code) { return !!keys[code]; }
function wasJustPressed(code) { const v = !!justPressed[code]; justPressed[code] = false; return v; }
function clearJustPressed() { for (const k in justPressed) justPressed[k] = false; }

const touchState = {
  mobileUI: false,
  joyId: -1,
  joyOx: 0,
  joyOy: 0,
  joyDx: 0,
  joyDy: 0,
  joyR: 64,
  joyCx: 80,
  joyCy: 200,
  aimId: -1,
  aimX: 0,
  aimY: 0,
  attackId: -1,
  attackT0: 0,
  btnDown: new Map(),
};

function refreshMobileUI() {
  const narrow = Math.min(window.innerWidth, window.innerHeight) <= 1080;
  touchState.mobileUI = window.matchMedia("(pointer: coarse)").matches ||
    (navigator.maxTouchPoints > 0 && narrow);
}

function updateTouchLayout() {
  const ch = window.innerHeight, cw = window.innerWidth;
  const r = Math.min(70, Math.min(cw, ch) * 0.1);
  touchState.joyR = r;
  touchState.joyCx = r + 22;
  touchState.joyCy = ch - r - 22;
}

function inJoyZone(mx, my) {
  return Math.hypot(mx - touchState.joyCx, my - touchState.joyCy) <= touchState.joyR * 1.55;
}

function mobileButtonsLayout(cw, ch) {
  const pad = 8, w = 52, gap = 5;
  const x = cw - w - pad;
  const out = [];
  let y = ch - pad - 46;
  out.push({ key: "attack", label: "\u2694", x, y, w, h: 44 });
  y -= gap + 34;
  const row = [
    { key: "KeyE", label: "E" },
    { key: "KeyQ", label: "Q" },
    { key: "KeyI", label: "I" },
    { key: "KeyP", label: "P" },
    { key: "KeyM", label: "M" },
    { key: "KeyB", label: "B" },
    { key: "KeyF", label: "F" },
  ];
  for (const b of row) {
    out.push({ key: b.key, label: b.label, x, y, w, h: 32 });
    y -= gap + 32;
  }
  return out;
}

function hitMobileButton(mx, my, cw, ch) {
  if (!touchState.mobileUI) return null;
  for (const b of mobileButtonsLayout(cw, ch)) {
    if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) return b;
  }
  return null;
}

function hitMobileCloseChip(mx, my, cw) {
  return mx >= cw - 52 && mx <= cw - 4 && my >= 6 && my <= 50;
}

function pulseJust(code) {
  justPressed[code] = true;
}

function getMovementVector() {
  let dx = 0, dy = 0;
  if (isDown("ArrowUp")    || isDown("KeyW")) dy -= 1;
  if (isDown("ArrowDown")  || isDown("KeyS")) dy += 1;
  if (isDown("ArrowLeft")  || isDown("KeyA")) dx -= 1;
  if (isDown("ArrowRight") || isDown("KeyD")) dx += 1;
  if (touchState.mobileUI && touchState.joyId >= 0) {
    dx += touchState.joyDx;
    dy += touchState.joyDy;
  }
  const len = Math.hypot(dx, dy);
  if (len > 1.0001) { dx /= len; dy /= len; }
  return { dx, dy };
}

function isActionPressed() { return isDown("KeyE") || isDown("Space"); }

const RARITY_COLOR = {
  common: "#a0a0a0",
  rare: "#4080ff",
  epic: "#a040d0",
  legendary: "#f0a020",
};

function getItemRarityColor(itemId) {
  const d = ITEMS[itemId];
  return d && d.rarity ? RARITY_COLOR[d.rarity] || "#ccc" : "#ccc";
}

function drawItemIcon(ctx, itemId, x, y, size) {
  const s = size;
  const cx = x + s / 2, cy = y + s / 2;
  switch (itemId) {
    case "wood":
      ctx.fillStyle = "#8B5E3C"; ctx.fillRect(x + s*0.3, y + s*0.15, s*0.4, s*0.7);
      ctx.fillStyle = "#A0724D"; ctx.fillRect(x + s*0.35, y + s*0.2, s*0.3, s*0.15);
      ctx.fillStyle = "#6B4226"; ctx.fillRect(x + s*0.25, y + s*0.1, s*0.5, s*0.06);
      ctx.fillRect(x + s*0.25, y + s*0.84, s*0.5, s*0.06);
      break;
    case "stone":
      ctx.fillStyle = "#888"; ctx.beginPath(); ctx.arc(cx, cy+s*0.05, s*0.35, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "#aaa"; ctx.beginPath(); ctx.arc(cx-s*0.08, cy-s*0.05, s*0.2, 0, Math.PI*2); ctx.fill();
      break;
    case "flower":
      ctx.fillStyle = "#2d8e1e"; ctx.fillRect(cx-1, cy, 2, s*0.35);
      ctx.fillStyle = "#e84040";
      for (let a = 0; a < 5; a++) {
        const ang = a * Math.PI * 2 / 5 - Math.PI/2;
        ctx.beginPath(); ctx.arc(cx + Math.cos(ang)*s*0.15, cy - s*0.05 + Math.sin(ang)*s*0.15, s*0.1, 0, Math.PI*2); ctx.fill();
      }
      ctx.fillStyle = "#f0d040"; ctx.beginPath(); ctx.arc(cx, cy-s*0.05, s*0.08, 0, Math.PI*2); ctx.fill();
      break;
    case "apple":
      ctx.fillStyle = "#d03030"; ctx.beginPath(); ctx.arc(cx, cy+s*0.05, s*0.3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "#e05050"; ctx.beginPath(); ctx.arc(cx-s*0.08, cy-s*0.02, s*0.12, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "#5a3a1a"; ctx.fillRect(cx-1, y+s*0.12, 2, s*0.2);
      ctx.fillStyle = "#3a8a2a"; ctx.fillRect(cx, y+s*0.1, s*0.15, s*0.1);
      break;
    case "fish":
      ctx.fillStyle = "#5090d0"; ctx.beginPath(); ctx.ellipse(cx, cy, s*0.35, s*0.18, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "#3070b0";
      ctx.beginPath(); ctx.moveTo(x+s*0.8, cy); ctx.lineTo(x+s*0.95, cy-s*0.2); ctx.lineTo(x+s*0.95, cy+s*0.2); ctx.fill();
      ctx.fillStyle = "#222"; ctx.beginPath(); ctx.arc(x+s*0.25, cy-s*0.03, s*0.05, 0, Math.PI*2); ctx.fill();
      break;
    case "axe":
      ctx.fillStyle = "#8B6B3D"; ctx.save(); ctx.translate(cx, cy); ctx.rotate(-0.7);
      ctx.fillRect(-s*0.04, -s*0.35, s*0.08, s*0.7); ctx.restore();
      ctx.fillStyle = "#a0a0a0"; ctx.save(); ctx.translate(cx, cy); ctx.rotate(-0.7);
      ctx.fillRect(-s*0.22, -s*0.35, s*0.3, s*0.2); ctx.restore();
      break;
    case "sword":
    case "sword_rusty":
    case "sword_steel":
    case "sword_elven": {
      const blade = itemId === "sword_elven" ? "#b0e8ff" : itemId === "sword_steel" ? "#d8e4f0" : itemId === "sword_rusty" ? "#9a8a78" : "#c0c0c0";
      const hilt = itemId === "sword_elven" ? "#4a6a50" : "#8B6B3D";
      ctx.fillStyle = blade; ctx.save(); ctx.translate(cx, cy); ctx.rotate(-0.5);
      ctx.fillRect(-s*0.04, -s*0.4, s*0.08, s*0.55); ctx.restore();
      ctx.fillStyle = "#e8e8e8"; ctx.save(); ctx.translate(cx, cy); ctx.rotate(-0.5);
      ctx.fillRect(-s*0.06, -s*0.42, s*0.12, s*0.1); ctx.restore();
      ctx.fillStyle = hilt; ctx.save(); ctx.translate(cx, cy); ctx.rotate(-0.5);
      ctx.fillRect(-s*0.14, s*0.12, s*0.28, s*0.06);
      ctx.fillRect(-s*0.04, s*0.15, s*0.08, s*0.22); ctx.restore();
      break;
    }
    case "potion":
      ctx.fillStyle = "#d040d0"; ctx.beginPath();
      ctx.arc(cx, cy+s*0.1, s*0.22, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "#e070e0"; ctx.beginPath();
      ctx.arc(cx-s*0.05, cy+s*0.03, s*0.1, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "#a0a0a0"; ctx.fillRect(cx-s*0.06, y+s*0.12, s*0.12, s*0.2);
      ctx.fillStyle = "#808080"; ctx.fillRect(cx-s*0.1, y+s*0.1, s*0.2, s*0.06);
      break;
    case "seed":
      ctx.fillStyle = "#8a6a30";
      ctx.beginPath(); ctx.arc(cx-s*0.12, cy+s*0.05, s*0.1, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx+s*0.1, cy-s*0.05, s*0.08, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx, cy+s*0.15, s*0.09, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "#3a8a2a"; ctx.fillRect(cx-s*0.12, cy-s*0.2, 2, s*0.2);
      ctx.fillRect(cx+s*0.1-1, cy-s*0.3, 2, s*0.2);
      break;
    case "coin":
      ctx.fillStyle = "#d4a020"; ctx.beginPath(); ctx.arc(cx, cy, s*0.3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "#e8c040"; ctx.beginPath(); ctx.arc(cx-s*0.04, cy-s*0.04, s*0.2, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "#d4a020"; ctx.font = (s*0.3)+"px monospace"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText("$", cx-s*0.02, cy); ctx.textAlign = "start"; ctx.textBaseline = "alphabetic";
      break;
    case "arrow":
      ctx.save(); ctx.translate(cx, cy); ctx.rotate(-0.6);
      ctx.fillStyle = "#8B6B3D"; ctx.fillRect(-s*0.03, -s*0.35, s*0.06, s*0.6);
      ctx.fillStyle = "#c0c0c0";
      ctx.beginPath(); ctx.moveTo(0, -s*0.4); ctx.lineTo(-s*0.08, -s*0.25); ctx.lineTo(s*0.08, -s*0.25); ctx.fill();
      ctx.fillStyle = "#d04040";
      ctx.fillRect(-s*0.08, s*0.2, s*0.04, s*0.12);
      ctx.fillRect(s*0.04, s*0.2, s*0.04, s*0.12);
      ctx.restore();
      break;
    case "bow":
      ctx.save(); ctx.translate(cx, cy); ctx.rotate(-0.3);
      ctx.strokeStyle = "#8B5E3C"; ctx.lineWidth = s*0.08;
      ctx.beginPath(); ctx.arc(s*0.05, 0, s*0.3, -Math.PI*0.7, Math.PI*0.7); ctx.stroke();
      ctx.strokeStyle = "#a0a0a0"; ctx.lineWidth = s*0.03;
      ctx.beginPath();
      ctx.moveTo(s*0.05 + Math.cos(-Math.PI*0.7)*s*0.3, Math.sin(-Math.PI*0.7)*s*0.3);
      ctx.lineTo(s*0.05 + Math.cos(Math.PI*0.7)*s*0.3, Math.sin(Math.PI*0.7)*s*0.3);
      ctx.stroke();
      ctx.restore();
      break;
    case "rope":
      ctx.strokeStyle = "#a08040"; ctx.lineWidth = s*0.1;
      ctx.beginPath();
      ctx.arc(cx - s*0.05, cy - s*0.05, s*0.2, 0, Math.PI*1.6);
      ctx.stroke();
      ctx.strokeStyle = "#c0a050"; ctx.lineWidth = s*0.06;
      ctx.beginPath();
      ctx.arc(cx + s*0.05, cy + s*0.05, s*0.15, Math.PI*0.3, Math.PI*1.8);
      ctx.stroke();
      break;
    case "helm_leather":
    case "helm_iron":
    case "helm_epic":
    case "helm_legendary":
      ctx.fillStyle = itemId.includes("legendary") ? "#a06020" : itemId.includes("epic") ? "#8040a0" : itemId.includes("iron") ? "#708090" : "#8B6B3D";
      ctx.beginPath(); ctx.arc(cx, cy - s*0.05, s*0.28, Math.PI, 0); ctx.fill();
      ctx.fillRect(cx - s*0.28, cy - s*0.05, s*0.56, s*0.15);
      break;
    case "chest_leather":
    case "chest_steel":
    case "chest_epic":
    case "chest_legendary":
      ctx.fillStyle = itemId.includes("legendary") ? "#303030" : itemId.includes("epic") ? "#206040" : itemId.includes("steel") ? "#606878" : "#6B4426";
      ctx.fillRect(x + s*0.15, y + s*0.2, s*0.7, s*0.55);
      ctx.strokeStyle = getItemRarityColor(itemId); ctx.lineWidth = 1;
      ctx.strokeRect(x + s*0.15, y + s*0.2, s*0.7, s*0.55);
      break;
    case "boots_swift":
    case "boots_epic":
      ctx.fillStyle = itemId.includes("epic") ? "#5080a0" : "#5a4a3a";
      ctx.fillRect(x + s*0.25, y + s*0.35, s*0.22, s*0.45);
      ctx.fillRect(x + s*0.53, y + s*0.35, s*0.22, s*0.45);
      break;
    case "ring_power":
      ctx.strokeStyle = "#c080ff"; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(cx, cy, s*0.22, 0, Math.PI * 2); ctx.stroke();
      ctx.fillStyle = "#d0a0ff"; ctx.beginPath(); ctx.arc(cx, cy, s*0.1, 0, Math.PI * 2); ctx.fill();
      break;
    case "amulet_wisdom":
      ctx.fillStyle = "#f0d050"; ctx.fillRect(cx - 2, cy - s*0.25, 4, s*0.35);
      ctx.beginPath(); ctx.arc(cx, cy + s*0.15, s*0.2, 0, Math.PI * 2); ctx.fill();
      break;
    case "gloves_archer":
      ctx.fillStyle = "#8B5E3C";
      ctx.fillRect(x + s*0.2, y + s*0.3, s*0.25, s*0.35);
      ctx.fillRect(x + s*0.55, y + s*0.3, s*0.25, s*0.35);
      break;
    case "boss_chest":
      ctx.fillStyle = "#8B6914"; ctx.fillRect(x + s*0.15, y + s*0.35, s*0.7, s*0.45);
      ctx.fillStyle = "#f0d050"; ctx.strokeStyle = "#ffd700"; ctx.lineWidth = 2;
      ctx.strokeRect(x + s*0.15, y + s*0.35, s*0.7, s*0.45);
      ctx.fillStyle = "#ffd700"; ctx.font = "bold " + (s*0.35) + "px monospace";
      ctx.fillText("\u2605", cx - s*0.12, cy + s*0.15);
      break;
  }
}

/* ── Inventory ───────────────────────────────────────────── */

const EQ_SLOTS = ["blade", "bow", "head", "chest", "hands", "feet", "ring", "amulet"];
const EQ_LABELS = { blade: "K\u0131l\u0131\u00e7", bow: "Yay", head: "Kafa", chest: "G\u00f6vde", hands: "Eller", feet: "Ayak", ring: "Y\u00fcz\u00fck", amulet: "T\u0131ls\u0131m" };

const INV_COLS = 5, INV_ROWS = 4, INV_SLOTS = INV_COLS * INV_ROWS;
const HOTBAR_SLOTS = 5;
const SLOT_SIZE = 48, SLOT_GAP = 4;

class Inventory {
  constructor() {
    this.slots = new Array(INV_SLOTS).fill(null);
    this.hotbar = new Array(HOTBAR_SLOTS).fill(null);
    this.equipped = { blade: null, bow: null, head: null, chest: null, hands: null, feet: null, ring: null, amulet: null };
    this.gold = 0;
    this.open = false;
    this.selectedHotbar = 0;
    this.heldItem = null;
    this.tooltipSlot = null;
    this.tooltipSource = null;
    this.tooltipEquipKey = null;
  }

  _mergeSlotCoinsIntoGold() {
    for (const container of [this.hotbar, this.slots]) {
      for (let i = 0; i < container.length; i++) {
        if (container[i] && container[i].id === "coin") {
          this.gold += container[i].count;
          container[i] = null;
        }
      }
    }
  }

  addItem(itemId, count = 1) {
    const def = ITEMS[itemId];
    if (!def) return count;

    if (itemId === "coin") {
      this.gold += count;
      return 0;
    }

    if (def.stackable) {
      for (const container of [this.hotbar, this.slots]) {
        for (let i = 0; i < container.length; i++) {
          if (container[i] && container[i].id === itemId && container[i].count < def.maxStack) {
            const space = def.maxStack - container[i].count;
            const add = Math.min(count, space);
            container[i].count += add;
            count -= add;
            if (count <= 0) return 0;
          }
        }
      }
    }

    for (const container of [this.hotbar, this.slots]) {
      for (let i = 0; i < container.length; i++) {
        if (!container[i]) {
          const add = Math.min(count, def.maxStack);
          container[i] = { id: itemId, count: add };
          count -= add;
          if (count <= 0) return 0;
        }
      }
    }
    return count;
  }

  countItem(itemId) {
    if (itemId === "coin") {
      this._mergeSlotCoinsIntoGold();
      return this.gold;
    }
    let total = 0;
    for (const s of this.hotbar) if (s && s.id === itemId) total += s.count;
    for (const s of this.slots) if (s && s.id === itemId) total += s.count;
    return total;
  }

  removeItem(itemId, amount) {
    if (itemId === "coin") {
      this._mergeSlotCoinsIntoGold();
      const take = Math.min(amount, this.gold);
      this.gold -= take;
      return take;
    }
    let left = amount;
    for (const container of [this.hotbar, this.slots]) {
      for (let i = 0; i < container.length && left > 0; i++) {
        if (container[i] && container[i].id === itemId) {
          const take = Math.min(left, container[i].count);
          container[i].count -= take;
          left -= take;
          if (container[i].count <= 0) container[i] = null;
        }
      }
    }
    return amount - left;
  }

  toggle() {
    if (!this.open) this._mergeSlotCoinsIntoGold();
    this.open = !this.open;
    if (!this.open && this.heldItem) this._dropHeld();
  }

  close() {
    if (!this.open) return;
    this._mergeSlotCoinsIntoGold();
    this.open = false;
    if (this.heldItem) this._dropHeld();
  }

  _dropHeld() {
    if (!this.heldItem) return;
    const left = this.addItem(this.heldItem.id, this.heldItem.count);
    this.heldItem = null;
    return left;
  }

  handleClick(mx, my, canvasW, canvasH, rightClick = false) {
    if (!this.open) {
      const hbInfo = this._hotbarLayout(canvasW, canvasH);
      const idx = this._hitTestSlots(mx, my, hbInfo.x, hbInfo.y, HOTBAR_SLOTS, 1);
      if (idx >= 0) { this.selectedHotbar = idx; return true; }
      return false;
    }

    const layout = this._invLayout(canvasW, canvasH);
    const eqIdx = this._hitTestEquip(mx, my, layout);
    if (eqIdx >= 0) { this._equipSlotClick(EQ_SLOTS[eqIdx], rightClick); return true; }

    const invIdx = this._hitTestSlots(mx, my, layout.slotsX, layout.slotsY, INV_SLOTS, INV_COLS);
    if (invIdx >= 0) { this._slotClick(this.slots, invIdx, rightClick); return true; }

    const hbIdx = this._hitTestSlots(mx, my, layout.hbX, layout.hbY, HOTBAR_SLOTS, HOTBAR_SLOTS);
    if (hbIdx >= 0) { this._slotClick(this.hotbar, hbIdx, rightClick); return true; }

    return false;
  }

  _hitTestEquip(mx, my, layout) {
    for (let i = 0; i < EQ_SLOTS.length; i++) {
      const sx = layout.eqX, sy = layout.eqY + i * (layout.eqSlotSize + 2);
      if (mx >= sx && mx < sx + layout.eqSlotSize && my >= sy && my < sy + layout.eqSlotSize) return i;
    }
    return -1;
  }

  _equipSlotClick(slotKey, rightClick) {
    const cur = this.equipped[slotKey];
    if (rightClick && cur && !this.heldItem) {
      this.heldItem = { id: cur.id, count: 1 };
      this.equipped[slotKey] = null;
      return;
    }
    if (this.heldItem) {
      const def = ITEMS[this.heldItem.id];
      if (!def || !def.equipSlot) return;
      if (def.equipSlot !== slotKey) return;
      const oneId = this.heldItem.id;
      this.heldItem.count--;
      if (this.heldItem.count <= 0) this.heldItem = null;
      if (cur) {
        const left = this.addItem(cur.id, 1);
        if (left > 0) {
          if (!this.heldItem) this.heldItem = { id: oneId, count: 1 };
          else this.heldItem.count++;
          return;
        }
      }
      this.equipped[slotKey] = { id: oneId, count: 1 };
      return;
    }
    if (cur && !this.heldItem) {
      this.heldItem = { id: cur.id, count: 1 };
      this.equipped[slotKey] = null;
    }
  }

  _slotClick(container, idx, rightClick) {
    const slot = container[idx];
    if (rightClick && slot && slot.id === "boss_chest" && slot.count > 0) {
      slot.count--;
      if (slot.count <= 0) container[idx] = null;
      const pool = ["helm_epic", "chest_epic", "boots_epic", "ring_power", "helm_legendary", "chest_legendary", "amulet_wisdom", "helm_iron", "chest_steel", "sword_elven", "bow_long", "sword_steel", "bow_hunter"];
      this.addItem(pool[Math.floor(Math.random() * pool.length)], 1);
      return;
    }
    if (rightClick) {
      if (this.heldItem && !slot) {
        container[idx] = { id: this.heldItem.id, count: 1 };
        this.heldItem.count--;
        if (this.heldItem.count <= 0) this.heldItem = null;
      } else if (this.heldItem && slot && slot.id === this.heldItem.id) {
        const def = ITEMS[slot.id];
        if (slot.count < def.maxStack) { slot.count++; this.heldItem.count--; if (this.heldItem.count <= 0) this.heldItem = null; }
      } else if (!this.heldItem && slot && slot.count > 1) {
        const half = Math.ceil(slot.count / 2);
        this.heldItem = { id: slot.id, count: half };
        slot.count -= half;
        if (slot.count <= 0) container[idx] = null;
      } else {
        this._swapOrMerge(container, idx);
      }
    } else {
      this._swapOrMerge(container, idx);
    }
  }

  _swapOrMerge(container, idx) {
    const slot = container[idx];
    if (!this.heldItem) {
      this.heldItem = slot;
      container[idx] = null;
    } else if (!slot) {
      container[idx] = this.heldItem;
      this.heldItem = null;
    } else if (slot.id === this.heldItem.id && ITEMS[slot.id].stackable) {
      const def = ITEMS[slot.id];
      const space = def.maxStack - slot.count;
      const add = Math.min(this.heldItem.count, space);
      slot.count += add;
      this.heldItem.count -= add;
      if (this.heldItem.count <= 0) this.heldItem = null;
    } else {
      const tmp = container[idx];
      container[idx] = this.heldItem;
      this.heldItem = tmp;
    }
  }

  handleMouseMove(mx, my, canvasW, canvasH) {
    this.tooltipSlot = null; this.tooltipSource = null;
    this.tooltipEquipKey = null;
    if (!this.open) return;
    const layout = this._invLayout(canvasW, canvasH);
    const eqIdx = this._hitTestEquip(mx, my, layout);
    if (eqIdx >= 0) {
      const sk = EQ_SLOTS[eqIdx];
      const es = this.equipped[sk];
      if (es) { this.tooltipSlot = es; this.tooltipSource = "eq"; this.tooltipEquipKey = sk; return; }
    }
    let idx = this._hitTestSlots(mx, my, layout.slotsX, layout.slotsY, INV_SLOTS, INV_COLS);
    if (idx >= 0 && this.slots[idx]) { this.tooltipSlot = this.slots[idx]; this.tooltipSource = "inv"; return; }
    idx = this._hitTestSlots(mx, my, layout.hbX, layout.hbY, HOTBAR_SLOTS, HOTBAR_SLOTS);
    if (idx >= 0 && this.hotbar[idx]) { this.tooltipSlot = this.hotbar[idx]; this.tooltipSource = "hb"; }
  }

  _hitTestSlots(mx, my, startX, startY, count, cols) {
    for (let i = 0; i < count; i++) {
      const col = i % cols, row = Math.floor(i / cols);
      const sx = startX + col * (SLOT_SIZE + SLOT_GAP);
      const sy = startY + row * (SLOT_SIZE + SLOT_GAP);
      if (mx >= sx && mx < sx + SLOT_SIZE && my >= sy && my < sy + SLOT_SIZE) return i;
    }
    return -1;
  }

  _invLayout(canvasW, canvasH) {
    const eqSlotSize = 44;
    const eqColW = eqSlotSize + 56;
    const panelW = eqColW + INV_COLS * (SLOT_SIZE + SLOT_GAP) - SLOT_GAP + 32;
    const eqPanelH = EQ_SLOTS.length * (eqSlotSize + 2);
    const gridH = (INV_ROWS + 1) * (SLOT_SIZE + SLOT_GAP) - SLOT_GAP + 80;
    const panelH = Math.max(gridH, eqPanelH + 88);
    const px = Math.floor((canvasW - panelW) / 2);
    const py = Math.floor((canvasH - panelH) / 2);
    const eqX = px + 12, eqY = py + 48;
    const slotsX = px + eqColW + 8, slotsY = py + 40;
    const hbX = px + eqColW + 8, hbY = slotsY + INV_ROWS * (SLOT_SIZE + SLOT_GAP) + 16;
    return { px, py, panelW, panelH, slotsX, slotsY, hbX, hbY, eqX, eqY, eqSlotSize, eqColW };
  }

  _hotbarLayout(canvasW, canvasH) {
    const totalW = HOTBAR_SLOTS * (SLOT_SIZE + SLOT_GAP) - SLOT_GAP;
    const hx = Math.floor((canvasW - totalW) / 2);
    const hy = canvasH - SLOT_SIZE - 28;
    return { x: hx, y: hy };
  }

  render(ctx, canvasW, canvasH, mouseX, mouseY) {
    if (this.open) this._renderFullInventory(ctx, canvasW, canvasH, mouseX, mouseY);
    else this._renderHotbar(ctx, canvasW, canvasH);
  }

  _renderHotbar(ctx, canvasW, canvasH) {
    const { x, y } = this._hotbarLayout(canvasW, canvasH);
    ctx.fillStyle = "rgba(10, 10, 30, 0.7)";
    roundRect(ctx, x - 6, y - 6, HOTBAR_SLOTS * (SLOT_SIZE + SLOT_GAP) - SLOT_GAP + 12, SLOT_SIZE + 12, 6);
    ctx.fill();
    for (let i = 0; i < HOTBAR_SLOTS; i++) {
      const sx = x + i * (SLOT_SIZE + SLOT_GAP);
      const selected = i === this.selectedHotbar;
      ctx.fillStyle = selected ? "rgba(255,255,200,0.25)" : "rgba(40,40,60,0.6)";
      ctx.strokeStyle = selected ? "#f0d050" : "#606080";
      ctx.lineWidth = selected ? 2 : 1;
      roundRect(ctx, sx, y, SLOT_SIZE, SLOT_SIZE, 4); ctx.fill(); ctx.stroke();
      if (this.hotbar[i]) this._renderSlotContent(ctx, this.hotbar[i], sx, y);
      ctx.fillStyle = "#888"; ctx.font = "10px monospace";
      ctx.fillText(String(i + 1), sx + 3, y + 12);
    }
  }

  _renderFullInventory(ctx, canvasW, canvasH, mouseX, mouseY) {
    const layout = this._invLayout(canvasW, canvasH);

    ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(0, 0, canvasW, canvasH);

    ctx.fillStyle = "rgba(15, 15, 40, 0.95)";
    ctx.strokeStyle = "#8080c0"; ctx.lineWidth = 2;
    roundRect(ctx, layout.px, layout.py, layout.panelW, layout.panelH, 10);
    ctx.fill(); ctx.stroke();

    ctx.fillStyle = "#f0d050"; ctx.font = "bold 16px monospace";
    ctx.fillText("Envanter", layout.px + layout.eqColW + 4, layout.py + 26);

    ctx.fillStyle = "#888"; ctx.font = "11px monospace";
    ctx.fillText("[I] Kapat", layout.px + layout.panelW - 80, layout.py + 26);

    ctx.fillStyle = "#a0c0ff"; ctx.font = "bold 11px monospace";
    ctx.fillText("Ekipman", layout.eqX, layout.eqY - 6);
    for (let i = 0; i < EQ_SLOTS.length; i++) {
      const sk = EQ_SLOTS[i];
      const sx = layout.eqX, sy = layout.eqY + i * (layout.eqSlotSize + 2);
      ctx.fillStyle = "rgba(30,35,55,0.9)"; ctx.strokeStyle = "#506080"; ctx.lineWidth = 1;
      roundRect(ctx, sx, sy, layout.eqSlotSize, layout.eqSlotSize, 4); ctx.fill(); ctx.stroke();
      ctx.fillStyle = "#707090"; ctx.font = "9px monospace";
      ctx.fillText(EQ_LABELS[sk], sx + layout.eqSlotSize + 4, sy + 12);
      const es = this.equipped[sk];
      if (es) {
        drawItemIcon(ctx, es.id, sx + 4, sy + 4, layout.eqSlotSize - 8);
        const rc = getItemRarityColor(es.id);
        if (ITEMS[es.id] && ITEMS[es.id].rarity && ITEMS[es.id].rarity !== "common") {
          ctx.strokeStyle = rc; ctx.lineWidth = 2;
          roundRect(ctx, sx + 1, sy + 1, layout.eqSlotSize - 2, layout.eqSlotSize - 2, 3);
          ctx.stroke();
        }
      }
    }

    for (let i = 0; i < INV_SLOTS; i++) {
      const col = i % INV_COLS, row = Math.floor(i / INV_COLS);
      const sx = layout.slotsX + col * (SLOT_SIZE + SLOT_GAP);
      const sy = layout.slotsY + row * (SLOT_SIZE + SLOT_GAP);
      ctx.fillStyle = "rgba(40,40,60,0.6)"; ctx.strokeStyle = "#505070"; ctx.lineWidth = 1;
      roundRect(ctx, sx, sy, SLOT_SIZE, SLOT_SIZE, 4); ctx.fill(); ctx.stroke();
      if (this.slots[i]) this._renderSlotContent(ctx, this.slots[i], sx, sy);
    }

    ctx.fillStyle = "#a0a0c0"; ctx.font = "11px monospace";
    ctx.fillText("H\u0131zl\u0131 Eri\u015fim", layout.hbX, layout.hbY - 4);
    for (let i = 0; i < HOTBAR_SLOTS; i++) {
      const sx = layout.hbX + i * (SLOT_SIZE + SLOT_GAP);
      const selected = i === this.selectedHotbar;
      ctx.fillStyle = selected ? "rgba(255,255,200,0.25)" : "rgba(40,40,60,0.6)";
      ctx.strokeStyle = selected ? "#f0d050" : "#505070";
      ctx.lineWidth = selected ? 2 : 1;
      roundRect(ctx, sx, layout.hbY, SLOT_SIZE, SLOT_SIZE, 4); ctx.fill(); ctx.stroke();
      if (this.hotbar[i]) this._renderSlotContent(ctx, this.hotbar[i], sx, layout.hbY);
      ctx.fillStyle = "#888"; ctx.font = "10px monospace";
      ctx.fillText(String(i + 1), sx + 3, layout.hbY + 12);
    }

    if (this.tooltipSlot) {
      const def = ITEMS[this.tooltipSlot.id];
      if (def) {
        const st = def.stats;
        let extra = 0;
        if (def.rarity) extra += 14;
        if (st) extra += 16;
        if (def.desc.length > 42) extra += 14;
        const ttW = 180, ttH = 48 + extra;
        let tx = mouseX + 14, ty = mouseY - ttH - 4;
        if (tx + ttW > canvasW) tx = mouseX - ttW - 4;
        if (ty < 0) ty = mouseY + 14;
        ctx.fillStyle = "rgba(5,5,20,0.95)"; ctx.strokeStyle = "#6060a0"; ctx.lineWidth = 1;
        roundRect(ctx, tx, ty, ttW, ttH, 5); ctx.fill(); ctx.stroke();
        let ly = ty + 16;
        ctx.fillStyle = "#f0d050"; ctx.font = "bold 12px monospace";
        ctx.fillText(def.name, tx + 8, ly);
        ly += 18;
        if (def.rarity) {
          ctx.fillStyle = getItemRarityColor(this.tooltipSlot.id);
          ctx.font = "10px monospace";
          ctx.fillText(def.rarity.toUpperCase(), tx + 8, ly);
          ly += 14;
        }
        if (st) {
          const parts = [];
          if (st.str) parts.push("G\u00fc\u00e7 +" + st.str);
          if (st.agi) parts.push("\u00c7ev +" + st.agi);
          if (st.wis) parts.push("Bil +" + st.wis);
          if (st.maxHp) parts.push("Max HP +" + st.maxHp);
          if (st.maxMana) parts.push("Max MP +" + st.maxMana);
          if (st.meleeDmg) parts.push("Yak\u0131n +" + st.meleeDmg);
          if (st.rangedDmg) parts.push("Uzak +" + st.rangedDmg);
          ctx.fillStyle = "#90c090"; ctx.font = "10px monospace";
          ctx.fillText(parts.join("  "), tx + 8, ly);
          ly += 16;
        }
        ctx.fillStyle = "#a0a0c0"; ctx.font = "11px monospace";
        const descLines = def.desc.length > 42 ? [def.desc.slice(0, 42), def.desc.slice(42)] : [def.desc];
        for (let li = 0; li < descLines.length; li++) {
          ctx.fillText(descLines[li], tx + 8, ly + li * 14);
        }
      }
    }

    if (this.heldItem) {
      const ix = mouseX - SLOT_SIZE / 2, iy = mouseY - SLOT_SIZE / 2;
      ctx.globalAlpha = 0.85;
      drawItemIcon(ctx, this.heldItem.id, ix + 6, iy + 6, SLOT_SIZE - 12);
      ctx.globalAlpha = 1;
      if (this.heldItem.count > 1) {
        ctx.fillStyle = "#fff"; ctx.font = "bold 11px monospace";
        ctx.fillText(String(this.heldItem.count), ix + SLOT_SIZE - 16, iy + SLOT_SIZE - 4);
      }
    }
  }

  _renderSlotContent(ctx, slot, sx, sy) {
    drawItemIcon(ctx, slot.id, sx + 6, sy + 6, SLOT_SIZE - 12);
    const idf = ITEMS[slot.id];
    if (idf && idf.rarity && idf.rarity !== "common") {
      ctx.strokeStyle = getItemRarityColor(slot.id); ctx.lineWidth = 2;
      roundRect(ctx, sx + 1, sy + 1, SLOT_SIZE - 2, SLOT_SIZE - 2, 3);
      ctx.stroke();
    }
    if (slot.count > 1) {
      ctx.fillStyle = "#000"; ctx.font = "bold 11px monospace";
      ctx.fillText(String(slot.count), sx + SLOT_SIZE - 15, sy + SLOT_SIZE - 5);
      ctx.fillStyle = "#fff";
      ctx.fillText(String(slot.count), sx + SLOT_SIZE - 16, sy + SLOT_SIZE - 6);
    }
  }
}

/* ── WorldItem (toplanabilir e\u015fyalar) ────────────────────── */

class WorldItem {
  constructor(col, row, itemId, count = 1, respawnable = true) {
    this.col = col;
    this.row = row;
    this.x = col * TILE_SIZE + TILE_SIZE / 2;
    this.y = row * TILE_SIZE + TILE_SIZE / 2;
    this.itemId = itemId;
    this.count = count;
    this.maxCount = count;
    this.alive = true;
    this.respawnable = respawnable;
    this.bobTimer = Math.random() * Math.PI * 2;
    this.respawnTime = 15 + Math.random() * 15;
    this.respawnTimer = 0;
  }

  update(dt) {
    if (this.alive) {
      this.bobTimer += dt * 3;
    } else if (this.respawnable) {
      this.respawnTimer += dt;
      if (this.respawnTimer >= this.respawnTime) {
        this.alive = true;
        this.count = this.maxCount;
        this.respawnTimer = 0;
        this.respawnTime = 15 + Math.random() * 15;
      }
    }
  }

  isNear(player, range = TILE_SIZE * 1.2) {
    const dx = this.x - player.centerX, dy = this.y - player.centerY;
    return Math.sqrt(dx * dx + dy * dy) < range;
  }

  tryPickup(inventory) {
    const left = inventory.addItem(this.itemId, this.count);
    if (left < this.count) { this.count = left; if (this.count <= 0) this.alive = false; return true; }
    return false;
  }

  render(ctx) {
    if (!this.alive) return;
    const bob = Math.sin(this.bobTimer) * 3;
    const sz = 18;
    const dx = this.x - sz / 2, dy = this.y - sz / 2 + bob - 4;

    ctx.fillStyle = "rgba(255,255,200,0.15)";
    ctx.beginPath(); ctx.arc(this.x, this.y + bob - 2, 12, 0, Math.PI * 2); ctx.fill();

    drawItemIcon(ctx, this.itemId, dx, dy, sz);
  }
}

/* ── TileMap ─────────────────────────────────────────────── */

class TileMap {
  constructor(cols, rows, layers) {
    this.cols = cols;
    this.rows = rows;
    this.ground = layers.ground;
    this.detail = layers.detail || null;
    this.widthPx = cols * TILE_SIZE;
    this.heightPx = rows * TILE_SIZE;
  }

  getTile(col, row) {
    if (col < 0 || col >= this.cols || row < 0 || row >= this.rows) return TileType.WALL;
    return this.ground[row * this.cols + col];
  }

  getDetail(col, row) {
    if (!this.detail || col < 0 || col >= this.cols || row < 0 || row >= this.rows) return -1;
    return this.detail[row * this.cols + col];
  }

  setDetail(col, row, value) {
    if (!this.detail || col < 0 || col >= this.cols || row < 0 || row >= this.rows) return;
    this.detail[row * this.cols + col] = value;
  }

  setTile(col, row, value) {
    if (col < 0 || col >= this.cols || row < 0 || row >= this.rows) return;
    this.ground[row * this.cols + col] = value;
  }

  isSolid(col, row, boatMode) {
    const tile = this.getTile(col, row);
    if (boatMode) {
      if (tile === TileType.WATER || tile === TileType.SAND || tile === TileType.BRIDGE) return false;
      return true;
    }
    if (SOLID_TILES.has(tile)) return true;
    const detail = this.getDetail(col, row);
    if (detail >= 0 && SOLID_TILES.has(detail)) return true;
    return false;
  }

  isSolidPx(px, py, boatMode) {
    return this.isSolid(Math.floor(px / TILE_SIZE), Math.floor(py / TILE_SIZE), boatMode);
  }

  isWaterPx(px, py) {
    const col = Math.floor(px / TILE_SIZE), row = Math.floor(py / TILE_SIZE);
    return this.getTile(col, row) === TileType.WATER;
  }

  isNearWater(px, py, radius) {
    const col = Math.floor(px / TILE_SIZE), row = Math.floor(py / TILE_SIZE);
    for (let dr = -radius; dr <= radius; dr++) {
      for (let dc = -radius; dc <= radius; dc++) {
        if (this.getTile(col + dc, row + dr) === TileType.WATER) return true;
      }
    }
    return false;
  }

  render(ctx, camX, camY, camW, camH) {
    const startCol = Math.max(0, Math.floor(camX / TILE_SIZE));
    const startRow = Math.max(0, Math.floor(camY / TILE_SIZE));
    const endCol   = Math.min(this.cols, Math.ceil((camX + camW) / TILE_SIZE));
    const endRow   = Math.min(this.rows, Math.ceil((camY + camH) / TILE_SIZE));

    for (let row = startRow; row < endRow; row++) {
      for (let col = startCol; col < endCol; col++) {
        const tile = this.getTile(col, row);
        const x = col * TILE_SIZE;
        const y = row * TILE_SIZE;

        ctx.fillStyle = TILE_COLORS[tile] || "#ff00ff";
        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
        this._drawTileDecoration(ctx, tile, x, y);

        const detail = this.getDetail(col, row);
        if (detail >= 0) this._drawDetailTile(ctx, detail, x, y);
      }
    }
  }

  _drawTileDecoration(ctx, tile, x, y) {
    switch (tile) {
      case TileType.GRASS:
        ctx.fillStyle = "#57994a";
        ctx.fillRect(x + 6, y + 8, 2, 6);
        ctx.fillRect(x + 20, y + 4, 2, 5);
        ctx.fillRect(x + 14, y + 20, 2, 5);
        break;
      case TileType.WATER:
        ctx.fillStyle = "#4a8ed4";
        ctx.fillRect(x + 4, y + 10, 8, 2);
        ctx.fillRect(x + 18, y + 18, 8, 2);
        break;
      case TileType.SAND:
        ctx.fillStyle = "#c4ac5a";
        ctx.fillRect(x + 10, y + 14, 3, 2);
        ctx.fillRect(x + 22, y + 6, 2, 2);
        break;
      case TileType.WALL:
        ctx.fillStyle = "#4a4a4a";
        ctx.strokeStyle = "#6a6a6a";
        ctx.lineWidth = 1;
        ctx.strokeRect(x + 0.5, y + 0.5, TILE_SIZE - 1, TILE_SIZE - 1);
        ctx.fillRect(x + 2, y + 2, 12, 12);
        ctx.fillRect(x + 18, y + 18, 12, 12);
        break;
      case TileType.TALL_GRASS:
        ctx.fillStyle = "#308526";
        for (let i = 0; i < 5; i++) {
          const gx = x + 3 + i * 6;
          ctx.fillRect(gx, y + 4, 2, 10);
          ctx.fillRect(gx - 1, y + 3, 4, 2);
        }
        break;
      case TileType.BRIDGE:
        ctx.fillStyle = "#6a4c28";
        ctx.fillRect(x, y + 7, TILE_SIZE, 2);
        ctx.fillRect(x, y + 22, TILE_SIZE, 2);
        ctx.fillStyle = "#8a6c3a";
        ctx.fillRect(x, y, 2, TILE_SIZE);
        ctx.fillRect(x + TILE_SIZE - 2, y, 2, TILE_SIZE);
        break;
    }
  }

  _drawDetailTile(ctx, detail, x, y) {
    switch (detail) {
      case TileType.TREE:
        ctx.fillStyle = "#5a3a1a";
        ctx.fillRect(x + 13, y + 18, 6, 14);
        ctx.fillStyle = "#1f5e10";
        ctx.beginPath();
        ctx.arc(x + 16, y + 14, 11, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#2a7a18";
        ctx.beginPath();
        ctx.arc(x + 14, y + 12, 6, 0, Math.PI * 2);
        ctx.fill();
        break;
      case TileType.FLOWER:
        ctx.fillStyle = "#2d6e1e";
        ctx.fillRect(x + 15, y + 18, 2, 8);
        ctx.fillStyle = "#e84040";
        ctx.beginPath();
        ctx.arc(x + 16, y + 16, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#f0d040";
        ctx.beginPath();
        ctx.arc(x + 16, y + 16, 2, 0, Math.PI * 2);
        ctx.fill();
        break;
      case TileType.BRIDGE:
        ctx.fillStyle = "#7a5c30";
        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
        ctx.fillStyle = "#6a4c20";
        ctx.fillRect(x, y, TILE_SIZE, 3);
        ctx.fillRect(x, y + TILE_SIZE - 3, TILE_SIZE, 3);
        ctx.fillRect(x + 14, y, 4, TILE_SIZE);
        break;
    }
  }
}

/* ── Camera ──────────────────────────────────────────────── */

class Camera {
  constructor(viewW, viewH) {
    this.x = 0; this.y = 0;
    this.viewW = viewW; this.viewH = viewH;
    this.smoothing = 0.08;
  }

  follow(target, worldW, worldH) {
    const targetX = target.x + target.w / 2 - this.viewW / 2;
    const targetY = target.y + target.h / 2 - this.viewH / 2;
    this.x += (targetX - this.x) * this.smoothing;
    this.y += (targetY - this.y) * this.smoothing;
    this.x = Math.max(0, Math.min(this.x, worldW - this.viewW));
    this.y = Math.max(0, Math.min(this.y, worldH - this.viewH));
  }

  resize(viewW, viewH) { this.viewW = viewW; this.viewH = viewH; }

  applyTransform(ctx) {
    ctx.setTransform(1, 0, 0, 1, -Math.round(this.x), -Math.round(this.y));
  }

  resetTransform(ctx) { ctx.setTransform(1, 0, 0, 1, 0, 0); }
}

/* ── Player ──────────────────────────────────────────────── */

const DIR = { DOWN: 0, LEFT: 1, RIGHT: 2, UP: 3 };

class Player {
  constructor(col, row) {
    this.x = col * TILE_SIZE;
    this.y = row * TILE_SIZE;
    this.w = 20; this.h = 20;
    this.speed = 130;
    this.angle = Math.PI / 2;
    this.direction = DIR.DOWN;
    this.animTimer = 0; this.animFrame = 0; this.moving = false;
    this.shootCooldown = 0;
    this.shootAnim = 0;
    this.meleeCooldown = 0;
    this.swingAnim = 0;
    this.inBoat = false;
    this.hasBoat = false;
    this.boatWaveTimer = 0;

    this.level = 1;
    this.xp = 0;
    this.xpToNext = 30;

    this.baseMaxHp = 100;
    this.baseMaxMana = 60;
    this.maxHp = 100;
    this.hp = 100;
    this.hpRegen = 0.5;

    this.maxMana = 60;
    this.mana = 60;
    this.manaRegen = 2.5;

    this.str = 5;
    this.agi = 5;
    this.wis = 3;
    this._eqStr = 0;
    this._eqAgi = 0;
    this._eqWis = 0;
    this._eqMeleeDmg = 0;
    this._eqRangedDmg = 0;
    this._pendingFullHeal = false;

    this.manaCostShoot = 3;
    this.manaCostPower = 12;

    this.dmgFlashTimer = 0;
    this.levelUpTimer = 0;
    this.powerCharging = false;
    this.powerCharge = 0;
  }

  gainXP(amount) {
    this.xp += amount;
    while (this.xp >= this.xpToNext) {
      this.xp -= this.xpToNext;
      this.level++;
      this.xpToNext = Math.floor(30 * Math.pow(1.4, this.level - 1));
      this.baseMaxHp += 12;
      this.baseMaxMana += 8;
      this.str += 2;
      this.agi += 1;
      this.wis += 1;
      this.manaRegen += 0.3;
      this.hpRegen += 0.15;
      this.levelUpTimer = 2.5;
      this._pendingFullHeal = true;
    }
  }

  applyEquipmentBonus(inv) {
    let eqStr = 0, eqAgi = 0, eqWis = 0, eqHp = 0, eqMana = 0, eqMeleeDmg = 0, eqRangedDmg = 0;
    if (inv && inv.equipped) {
      for (let i = 0; i < EQ_SLOTS.length; i++) {
        const es = inv.equipped[EQ_SLOTS[i]];
        if (!es) continue;
        const d = ITEMS[es.id];
        if (d && d.stats) {
          eqStr += d.stats.str || 0;
          eqAgi += d.stats.agi || 0;
          eqWis += d.stats.wis || 0;
          eqHp += d.stats.maxHp || 0;
          eqMana += d.stats.maxMana || 0;
          eqMeleeDmg += d.stats.meleeDmg || 0;
          eqRangedDmg += d.stats.rangedDmg || 0;
        }
      }
    }
    this._eqStr = eqStr;
    this._eqAgi = eqAgi;
    this._eqWis = eqWis;
    this._eqMeleeDmg = eqMeleeDmg;
    this._eqRangedDmg = eqRangedDmg;
    this.maxHp = this.baseMaxHp + eqHp;
    this.maxMana = this.baseMaxMana + eqMana;
    if (this._pendingFullHeal) {
      this.hp = this.maxHp;
      this.mana = this.maxMana;
      this._pendingFullHeal = false;
    } else {
      this.hp = Math.min(this.maxHp, this.hp);
      this.mana = Math.min(this.maxMana, this.mana);
    }
  }

  takeDamage(amount) {
    this.hp = Math.max(0, this.hp - amount);
    this.dmgFlashTimer = 0.3;
  }

  heal(amount) {
    this.hp = Math.min(this.maxHp, this.hp + amount);
  }

  useMana(amount) {
    if (this.mana < amount) return false;
    this.mana -= amount;
    return true;
  }

  getDamage() {
    return 8 + (this.str + this._eqStr) * 1.5 + Math.floor(this.level * 0.8);
  }

  getRangedDamage() {
    return this.getDamage() + this._eqRangedDmg;
  }

  getPowerDamage() {
    const charge = Math.min(this.powerCharge, 1);
    return this.getRangedDamage() * (2 + charge * 2);
  }

  getMeleeDamage() {
    return Math.floor(this.getDamage() * 1.2) + this._eqMeleeDmg;
  }

  aimAt(worldX, worldY) {
    this.angle = Math.atan2(worldY - this.centerY, worldX - this.centerX);
  }

  update(dt, map) {
    const { dx, dy } = getMovementVector();
    this.moving = dx !== 0 || dy !== 0;
    if (this.shootCooldown > 0) this.shootCooldown -= dt;
    if (this.shootAnim > 0) this.shootAnim -= dt;
    if (this.meleeCooldown > 0) this.meleeCooldown -= dt;
    if (this.swingAnim > 0) this.swingAnim -= dt;
    if (this.dmgFlashTimer > 0) this.dmgFlashTimer -= dt;
    if (this.levelUpTimer > 0) this.levelUpTimer -= dt;
    if (this.inBoat) this.boatWaveTimer += dt;

    this.hp = Math.min(this.maxHp, this.hp + this.hpRegen * dt);
    this.mana = Math.min(this.maxMana, this.mana + this.manaRegen * dt);

    if (this.powerCharging) {
      this.powerCharge = Math.min(1, this.powerCharge + dt * 0.8);
    }

    const agiBonus = 1 + (this.agi + this._eqAgi) * 0.008;
    const spd = (this.inBoat ? 160 : this.speed) * agiBonus;

    if (this.moving) {
      if (dy > 0) this.direction = DIR.DOWN;
      else if (dy < 0) this.direction = DIR.UP;
      if (dx < 0) this.direction = DIR.LEFT;
      else if (dx > 0) this.direction = DIR.RIGHT;

      this.animTimer += dt;
      if (this.animTimer >= 0.15) { this.animTimer = 0; this.animFrame = (this.animFrame + 1) % 4; }

      const newX = this.x + dx * spd * dt;
      const newY = this.y + dy * spd * dt;
      const margin = 3;
      if (!this._collides(newX, this.y, map, margin)) this.x = newX;
      if (!this._collides(this.x, newY, map, margin)) this.y = newY;
    } else {
      this.animFrame = 0; this.animTimer = 0;
    }
  }

  _collides(px, py, map, m) {
    return map.isSolidPx(px + m, py + m, this.inBoat) ||
           map.isSolidPx(px + this.w - m, py + m, this.inBoat) ||
           map.isSolidPx(px + m, py + this.h - m, this.inBoat) ||
           map.isSolidPx(px + this.w - m, py + this.h - m, this.inBoat);
  }

  getFacingTile() {
    const cx = this.x + this.w / 2, cy = this.y + this.h / 2;
    const tx = cx + Math.cos(this.angle) * TILE_SIZE;
    const ty = cy + Math.sin(this.angle) * TILE_SIZE;
    return { col: Math.floor(tx / TILE_SIZE), row: Math.floor(ty / TILE_SIZE) };
  }

  render(ctx, inventory) {
    const inv = inventory || null;
    const bladeId = inv && inv.equipped && inv.equipped.blade ? inv.equipped.blade.id : null;
    const bowId = inv && inv.equipped && inv.equipped.bow ? inv.equipped.bow.id : null;
    const showBow = !!(bowId && ITEMS[bowId] && ITEMS[bowId].equipSlot === "bow" && this.swingAnim <= 0);

    const cx = Math.round(this.x + this.w / 2);
    const cy = Math.round(this.y + this.h / 2);
    const bounce = this.moving ? Math.sin(this.animFrame * Math.PI / 2) * 2 : 0;
    const legOff = this.moving ? Math.sin(this.animFrame * Math.PI) * 2 : 0;
    const pull = this.shootAnim > 0 ? Math.sin(this.shootAnim * Math.PI / 0.25) * 3 : 0;
    const d = this.direction;
    const a = this.angle;
    const cosA = Math.cos(a), sinA = Math.sin(a);

    const bowInFront = this._isBowInFront(d, a);

    if (showBow && !bowInFront) this._drawBowAndArms(ctx, cx, cy, bounce, pull);

    ctx.save();
    ctx.translate(cx, cy);

    ctx.fillStyle = "#3a3a2a";
    if (this.moving) {
      if (d === DIR.LEFT || d === DIR.RIGHT) {
        ctx.fillRect(-3 + legOff, 4 - bounce, 3, 6);
        ctx.fillRect(0 - legOff, 4 - bounce, 3, 6);
      } else {
        ctx.fillRect(-6 + legOff, 4 - bounce, 4, 6);
        ctx.fillRect(2 - legOff, 4 - bounce, 4, 6);
      }
    } else {
      if (d === DIR.LEFT || d === DIR.RIGHT) {
        ctx.fillRect(-2, 5, 3, 5);
        ctx.fillRect(0, 5, 3, 5);
      } else {
        ctx.fillRect(-5, 5, 4, 5);
        ctx.fillRect(1, 5, 4, 5);
      }
    }

    if (d === DIR.LEFT || d === DIR.RIGHT) {
      ctx.fillStyle = "#2a6030";
      ctx.fillRect(-6, -7 - bounce, 12, 11);
      ctx.fillStyle = "#1e4d26";
      ctx.fillRect(-6, -7 - bounce, 12, 3);
      ctx.fillStyle = "#4a3a2a";
      ctx.fillRect(-5, 2 - bounce, 10, 5);

      const qSide = d === DIR.LEFT ? 1 : -1;
      ctx.fillStyle = "#6b4226";
      ctx.fillRect(qSide * 2, -5 - bounce, 3, 7);
      ctx.fillStyle = "#c0a060";
      ctx.fillRect(qSide * 2 + 1, -7 - bounce, 2, 3);
      ctx.fillRect(qSide * 2 + 1, 2 - bounce, 2, 2);
    } else {
      ctx.fillStyle = "#4a3a2a";
      ctx.fillRect(-7, 2 - bounce, 6, 5);
      ctx.fillRect(1, 2 - bounce, 6, 5);
      ctx.fillStyle = "#2a6030";
      ctx.fillRect(-8, -7 - bounce, 16, 11);
      ctx.fillStyle = "#1e4d26";
      ctx.fillRect(-8, -7 - bounce, 16, 3);

      if (d === DIR.DOWN) {
        ctx.fillStyle = "#6b4226";
        ctx.fillRect(-8, -6 - bounce, 3, 8);
        ctx.fillStyle = "#c0a060";
        ctx.fillRect(-8, -8 - bounce, 2, 3);
        ctx.fillRect(-8, 2 - bounce, 2, 3);
      }
    }

    ctx.fillStyle = "#e0c060";
    ctx.beginPath(); ctx.arc(0, -8 - bounce, 6, 0, Math.PI * 2); ctx.fill();

    if (d === DIR.DOWN) {
      ctx.fillStyle = "#222";
      ctx.fillRect(-2, -9 - bounce, 2, 2);
      ctx.fillRect(1, -9 - bounce, 2, 2);
    } else if (d === DIR.LEFT) {
      ctx.fillStyle = "#222";
      ctx.fillRect(-3, -9 - bounce, 2, 2);
    } else if (d === DIR.RIGHT) {
      ctx.fillStyle = "#222";
      ctx.fillRect(1, -9 - bounce, 2, 2);
    }

    ctx.fillStyle = "#2a6030";
    ctx.beginPath();
    ctx.moveTo(-5, -11 - bounce);
    ctx.lineTo(0, -16 - bounce);
    ctx.lineTo(5, -11 - bounce);
    ctx.lineTo(5, -8 - bounce);
    ctx.lineTo(-5, -8 - bounce);
    ctx.fill();
    ctx.fillStyle = "#1e4d26";
    ctx.fillRect(-4, -14 - bounce, 8, 2);

    ctx.restore();

    if (showBow && bowInFront) this._drawBowAndArms(ctx, cx, cy, bounce, pull);
    if (bladeId && ITEMS[bladeId] && ITEMS[bladeId].equipSlot === "blade" && this.swingAnim <= 0) {
      this._drawEquippedBlade(ctx, cx, cy, bounce, a, bladeId);
    }
    if (this.swingAnim > 0) this._drawMeleeSwing(ctx, cx, cy, bounce);
  }

  _drawEquippedBlade(ctx, cx, cy, bounce, aimAngle, bladeId) {
    ctx.save();
    ctx.translate(cx, cy + bounce * 0.35);
    ctx.rotate(aimAngle + Math.PI * 0.12);
    const tint = bladeId.includes("elven") ? "#b0e8ff" : bladeId.includes("steel") ? "#d0dce8" : bladeId.includes("rusty") ? "#8a7a6a" : "#c8c8d8";
    ctx.fillStyle = tint;
    ctx.fillRect(-2, -20, 4, 24);
    ctx.fillStyle = "#e8e8f0";
    ctx.fillRect(-2.5, -21, 5, 5);
    ctx.fillStyle = "#6B4226";
    ctx.fillRect(-4, 6, 8, 3);
    ctx.fillRect(-1.5, 4, 3, 5);
    ctx.restore();
  }

  _isBowInFront(d, a) {
    if (d === DIR.DOWN) return true;
    if (d === DIR.UP) return false;
    if (d === DIR.RIGHT) return a > -Math.PI * 0.5 && a < Math.PI * 0.5;
    return a > Math.PI * 0.5 || a < -Math.PI * 0.5;
  }

  _drawBowAndArms(ctx, cx, cy, bounce, pull) {
    const a = this.angle;
    const cosA = Math.cos(a), sinA = Math.sin(a);
    const shoulderX = cx, shoulderY = cy - 2 - bounce;

    ctx.save();
    ctx.translate(shoulderX, shoulderY);
    ctx.rotate(a);

    ctx.fillStyle = "#e0c060";
    ctx.fillRect(2, -1.5, 9, 3);
    ctx.fillStyle = "#d4b050";
    ctx.beginPath(); ctx.arc(11, 0, 2, 0, Math.PI * 2); ctx.fill();

    ctx.strokeStyle = "#7a5030"; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(13, 0, 8, -Math.PI * 0.6, Math.PI * 0.6); ctx.stroke();

    ctx.strokeStyle = "#c8c8c8"; ctx.lineWidth = 1;
    const topX = 13 + Math.cos(-Math.PI * 0.6) * 8;
    const topY = Math.sin(-Math.PI * 0.6) * 8;
    const botX = 13 + Math.cos(Math.PI * 0.6) * 8;
    const botY = Math.sin(Math.PI * 0.6) * 8;
    ctx.beginPath();
    ctx.moveTo(topX, topY);
    ctx.lineTo(13 - pull, 0);
    ctx.lineTo(botX, botY);
    ctx.stroke();

    ctx.fillStyle = "#e0c060";
    ctx.fillRect(1, -1.5 + 3, 6 - pull * 0.6, 3);
    ctx.fillStyle = "#d4b050";
    ctx.beginPath(); ctx.arc(7 - pull * 0.6, 1.5, 2, 0, Math.PI * 2); ctx.fill();

    if (pull > 0) {
      ctx.fillStyle = "#8B6B3D";
      ctx.fillRect(9 - pull, -1, 14, 2);
      ctx.fillStyle = "#c0c0c0";
      ctx.beginPath();
      ctx.moveTo(23 - pull, 0);
      ctx.lineTo(20 - pull, -3);
      ctx.lineTo(20 - pull, 3);
      ctx.fill();
      ctx.fillStyle = "#d04040";
      ctx.fillRect(8 - pull, -2.5, 2, 5);
    }

    ctx.restore();
  }

  _drawMeleeSwing(ctx, cx, cy, bounce) {
    if (this.swingAnim <= 0) return;
    const dur = 0.28;
    const t = 1 - this.swingAnim / dur;
    const arcSpan = Math.PI * 0.55 * (0.35 + t * 0.65);
    ctx.save();
    ctx.translate(cx, cy + bounce * 0.5);
    ctx.rotate(this.angle);
    ctx.strokeStyle = "rgba(240, 245, 255, 0.9)";
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(8, 0, 26, -arcSpan * 0.5, arcSpan * 0.5);
    ctx.stroke();
    ctx.strokeStyle = "rgba(180, 200, 255, 0.45)";
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.arc(8, 0, 24, -arcSpan * 0.45, arcSpan * 0.45);
    ctx.stroke();
    ctx.restore();
  }

  renderBoat(ctx) {
    const cx = Math.round(this.x + this.w / 2);
    const cy = Math.round(this.y + this.h / 2);
    const wave = Math.sin(this.boatWaveTimer * 2.5) * 2;
    const rock = Math.sin(this.boatWaveTimer * 1.8) * 0.04;

    ctx.save();
    ctx.translate(cx, cy + wave);
    ctx.rotate(this.angle + Math.PI / 2 + rock);

    ctx.fillStyle = "#6B4226";
    ctx.beginPath();
    ctx.moveTo(-12, 8);
    ctx.lineTo(-10, -12);
    ctx.lineTo(0, -18);
    ctx.lineTo(10, -12);
    ctx.lineTo(12, 8);
    ctx.quadraticCurveTo(0, 14, -12, 8);
    ctx.fill();
    ctx.strokeStyle = "#4a2e16"; ctx.lineWidth = 1; ctx.stroke();

    ctx.fillStyle = "#8B5E3C";
    ctx.fillRect(-9, -4, 18, 3);
    ctx.fillRect(-7, 2, 14, 3);

    ctx.fillStyle = "#5a3a1a";
    ctx.fillRect(-1, -16, 2, 22);

    ctx.fillStyle = "#e0d0b0";
    ctx.beginPath();
    ctx.moveTo(1, -16);
    ctx.lineTo(10, -10);
    ctx.lineTo(1, -6);
    ctx.fill();
    ctx.strokeStyle = "#c0b090"; ctx.lineWidth = 0.5; ctx.stroke();

    ctx.restore();

    ctx.save();
    ctx.translate(cx, cy + wave);
    ctx.rotate(this.angle + Math.PI / 2 + rock);
    const bounce = this.moving ? Math.sin(this.animFrame * Math.PI / 2) * 1 : 0;

    ctx.fillStyle = "#e0c060";
    ctx.beginPath(); ctx.arc(0, -2 - bounce, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#2a6030";
    ctx.beginPath();
    ctx.moveTo(-3, -4 - bounce);
    ctx.lineTo(0, -9 - bounce);
    ctx.lineTo(3, -4 - bounce);
    ctx.fill();
    ctx.fillStyle = "#222";
    ctx.fillRect(-1.5, -3 - bounce, 1.5, 1.5);
    ctx.fillRect(0.5, -3 - bounce, 1.5, 1.5);

    ctx.restore();

    ctx.save();
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = "#80c0ff";
    const wt = this.boatWaveTimer;
    for (let i = 0; i < 3; i++) {
      const wx = cx - 14 + Math.sin(wt * 2 + i * 2.5) * 6;
      const wy = cy + 10 + i * 4 + Math.cos(wt * 1.5 + i) * 2;
      ctx.beginPath();
      ctx.arc(wx, wy, 5, 0, Math.PI);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(wx + 14, wy + 2, 4, 0, Math.PI);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  get centerX() { return this.x + this.w / 2; }
  get centerY() { return this.y + this.h / 2; }
}

class Arrow {
  constructor(x, y, angle) {
    this.x = x; this.y = y;
    this.angle = angle;
    this.speed = 300;
    this.alive = true;
    this.life = 2.5;
    this.w = 4; this.h = 4;
    this.dx = Math.cos(angle);
    this.dy = Math.sin(angle);
    this.damage = 10;
    this.power = false;
    this.trail = [];
  }

  update(dt, map) {
    if (!this.alive) return;
    this.life -= dt;
    if (this.life <= 0) { this.alive = false; return; }
    if (this.power) {
      this.trail.push({ x: this.x, y: this.y, t: 0.2 });
      for (let i = this.trail.length - 1; i >= 0; i--) {
        this.trail[i].t -= dt;
        if (this.trail[i].t <= 0) this.trail.splice(i, 1);
      }
    }
    this.x += this.dx * this.speed * dt;
    this.y += this.dy * this.speed * dt;
    if (map.isSolidPx(this.x, this.y)) {
      this.alive = false;
    }
  }

  render(ctx) {
    if (!this.alive) return;

    if (this.power) {
      for (const p of this.trail) {
        ctx.globalAlpha = p.t / 0.2 * 0.4;
        ctx.fillStyle = "#d080ff";
        ctx.beginPath();
        ctx.arc(Math.round(p.x), Math.round(p.y), 3, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    ctx.save();
    ctx.translate(Math.round(this.x), Math.round(this.y));
    ctx.rotate(this.angle);

    if (this.power) {
      ctx.shadowColor = "#d080ff";
      ctx.shadowBlur = 8;
    }

    ctx.fillStyle = this.power ? "#b060e0" : "#8B6B3D";
    ctx.fillRect(-8, -1, 16, 2);
    ctx.fillStyle = this.power ? "#f0c0ff" : "#c0c0c0";
    ctx.beginPath(); ctx.moveTo(8, 0); ctx.lineTo(5, -3); ctx.lineTo(5, 3); ctx.fill();
    ctx.fillStyle = this.power ? "#a040d0" : "#d04040";
    ctx.fillRect(-8, -2, 1.5, 4);
    ctx.fillRect(-6.5, -1.5, 1, 3);

    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

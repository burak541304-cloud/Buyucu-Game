<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>CHOP & GROW - Bicki Bahcesi</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0b1010;color:#fff;font-family:Segoe UI,sans-serif;touch-action:none}
body{position:fixed;inset:0;user-select:none;-webkit-user-select:none}
canvas{display:block}
#game{position:fixed;inset:0;width:100vw;height:100vh}
#ui{position:fixed;inset:0;pointer-events:none;z-index:20}
#ui>*{pointer-events:auto}
.hud{position:absolute;top:8px;left:8px;display:flex;flex-direction:column;gap:4px}
.hud-card{background:rgba(0,0,0,.58);border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(6px);border-radius:10px;padding:6px 10px;font-size:12px;min-width:220px}
.bar{margin-top:4px;height:10px;background:#1f2426;border-radius:999px;overflow:hidden}
.fill{height:100%;border-radius:999px;transition:width .15s linear}
.xp{background:linear-gradient(90deg,#3498db,#6dd5fa)}
.hp{background:linear-gradient(90deg,#c0392b,#ff6b6b)}
.mana{background:linear-gradient(90deg,#8e44ad,#c471ed)}
#biome{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.58);border:1px solid rgba(255,255,255,.14);border-radius:10px;padding:8px 12px;font-weight:700}
#quest{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.58);border:1px solid rgba(255,255,255,.14);border-radius:10px;padding:8px 12px;font-size:12px}
#actions{position:absolute;right:12px;bottom:12px;display:flex;gap:8px}
button{border:none;border-radius:12px;padding:10px 14px;background:rgba(17,17,17,.88);color:#fff;border:1px solid rgba(255,255,255,.18);cursor:pointer}
button:hover{border-color:#f1c40f}
#minimapWrap{position:absolute;right:8px;bottom:86px;width:140px;height:140px;border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.45)}
#minimap{width:100%;height:100%}
#skills{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);display:flex;gap:8px}
.skill{width:56px;height:56px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#243b55,#141e30);border:2px solid rgba(255,255,255,.18);font-size:22px;position:relative}
.skill small{font-size:9px;color:#cfd9df}
.skill.ready{box-shadow:0 0 18px rgba(46,204,113,.35);border-color:#2ecc71}
.skill.locked{opacity:.32;filter:grayscale(1)}
.skill .cd{position:absolute;inset:0;background:rgba(0,0,0,.48);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.skill .cost{position:absolute;top:-2px;right:-2px;width:18px;height:18px;border-radius:50%;background:#3498db;font-size:9px;display:flex;align-items:center;justify-content:center}
#panel{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);width:min(920px,92vw);max-height:82vh;overflow:auto;display:none;z-index:30;background:rgba(14,17,20,.96);border:1px solid rgba(255,255,255,.16);border-radius:16px;padding:18px;box-shadow:0 22px 90px rgba(0,0,0,.45)}
#panel h2{margin-bottom:12px;color:#f1c40f}
.close{position:absolute;top:10px;right:12px;font-size:24px;cursor:pointer}
.tabs{display:flex;gap:8px;margin-bottom:12px}
.tab{padding:8px 12px;border-radius:10px;background:#20262b}
.grid{display:grid;gap:10px}
.inv{grid-template-columns:repeat(auto-fill,minmax(82px,1fr))}
.slot,.craft,.tree{background:#182025;border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px;min-height:82px}
.slot{display:flex;align-items:center;justify-content:center;text-align:center;cursor:pointer;position:relative}
.slot:hover,.craft:hover,.tree:hover{border-color:#f1c40f}
.rarity{position:absolute;inset:0;border-radius:12px;border:2px solid transparent;pointer-events:none}
.common{border-color:#9aa2a9}.uncommon{border-color:#2ecc71}.rare{border-color:#3498db}.epic{border-color:#9b59b6}.legendary{border-color:#e67e22}
.craft-list,.tree-list{display:grid;gap:10px}
.craft{display:flex;justify-content:space-between;align-items:center;gap:14px}
.craft strong,.tree strong{display:block}
.tree{cursor:pointer}
#toast{position:fixed;top:62px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.78);color:#f1c40f;border:1px solid rgba(241,196,15,.45);padding:10px 16px;border-radius:999px;display:none;z-index:40}
#start{position:fixed;inset:0;z-index:50;background:radial-gradient(circle at 50% 35%,#244b3a 0%,#101717 55%,#050708 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
#start h1{font-size:clamp(32px,6vw,64px);letter-spacing:1px;color:#7dff9f;text-shadow:0 0 22px rgba(125,255,159,.35)}
#start p{max-width:720px;margin:18px auto;color:#d6e6dd;line-height:1.6}
#start .cta{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
#joystickZone{position:fixed;left:0;bottom:0;width:46vw;height:40vh;display:none;z-index:25}
#joyBase,#joyStick{position:absolute;border-radius:50%;pointer-events:none;display:none}
#joyBase{width:100px;height:100px;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.12)}
#joyStick{width:44px;height:44px;background:rgba(46,204,113,.35);border:2px solid rgba(46,204,113,.75)}
@media (max-width:700px){
  .hud-card{min-width:170px;font-size:10px}
  #biome,#quest{font-size:10px}
  #actions{right:8px;bottom:78px;flex-direction:column}
  #minimapWrap{width:110px;height:110px;bottom:8px}
  .skill{width:48px;height:48px;font-size:18px}
}

/* ─── Inventory Redesign ─── */
.inv-layout{display:grid;grid-template-columns:190px 1fr;gap:16px;min-height:400px}
.inv-col-left{display:flex;flex-direction:column;gap:8px}
.inv-col-left h3,.inv-col-right h3{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:#607d8b;margin-bottom:6px}
.eq-slot{background:#0b1318;border:1px solid rgba(255,255,255,.09);border-radius:11px;padding:9px 10px;display:flex;align-items:center;gap:9px;cursor:pointer;transition:border-color .14s,background .14s;min-height:56px}
.eq-slot:hover{background:#111c24;border-color:rgba(241,196,15,.5)}
.eq-slot .eq-thumb{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;background:#182028;flex-shrink:0;position:relative}
.eq-slot .eq-thumb::after{content:attr(data-badge);position:absolute;inset:0;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.eq-slot .eq-label{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:#546e7a;line-height:1}
.eq-slot .eq-name{font-size:12px;font-weight:600;color:#e8f0f5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:108px;margin-top:2px}
.eq-slot .eq-stat{font-size:10px;color:#7dff9f;margin-top:1px}
.eq-slot.empty .eq-thumb{opacity:.28}
.eq-slot.empty .eq-name{color:#607d8b;font-weight:400}
.eq-slot.r1{border-color:rgba(46,204,113,.35)}
.eq-slot.r2{border-color:rgba(52,152,219,.38)}
.eq-slot.r3{border-color:rgba(155,89,182,.42);box-shadow:0 0 8px rgba(155,89,182,.1)}
.eq-slot.r4{border-color:rgba(230,126,34,.48);box-shadow:0 0 10px rgba(230,126,34,.14)}
.inv-col-right{display:flex;flex-direction:column;gap:8px}
.inv-filter{display:flex;gap:5px;flex-wrap:wrap}
.inv-filter button{padding:5px 11px;font-size:11px;border-radius:8px;background:#0e151c;border:1px solid rgba(255,255,255,.1);color:#8fa8b5;cursor:pointer;transition:all .12s}
.inv-filter button:hover{border-color:#f1c40f;color:#fff}
.inv-filter button.active{background:#162130;border-color:#3498db;color:#fff}
.inv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(74px,1fr));gap:7px;max-height:330px;overflow-y:auto;padding-right:2px}
.inv-grid::-webkit-scrollbar{width:4px}
.inv-grid::-webkit-scrollbar-thumb{background:#253340;border-radius:4px}
.inv-item{background:#0b1318;border:1px solid rgba(255,255,255,.08);border-radius:11px;padding:9px 6px 7px;display:flex;flex-direction:column;align-items:center;cursor:pointer;position:relative;transition:all .12s;user-select:none}
.inv-item:hover{background:#111d26;transform:translateY(-2px);box-shadow:0 4px 18px rgba(0,0,0,.35)}
.inv-item:active{transform:translateY(0)}
.inv-item .i-icon{font-size:26px;line-height:1.1;margin-bottom:4px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.5))}
.inv-item .i-name{font-size:9px;text-align:center;color:#90a8b5;line-height:1.25;max-width:64px}
.inv-item .i-count{position:absolute;top:4px;right:5px;font-size:9px;font-weight:700;color:#f1c40f;text-shadow:0 1px 3px rgba(0,0,0,.7)}
.inv-item .i-rarity-glow{position:absolute;inset:0;border-radius:11px;border:2px solid transparent;pointer-events:none}
.inv-item.r0 .i-rarity-glow{border-color:rgba(154,162,169,.25)}
.inv-item.r1 .i-rarity-glow{border-color:rgba(46,204,113,.38)}
.inv-item.r2 .i-rarity-glow{border-color:rgba(52,152,219,.42)}
.inv-item.r3 .i-rarity-glow{border-color:rgba(155,89,182,.48);box-shadow:inset 0 0 12px rgba(155,89,182,.08)}
.inv-item.r4 .i-rarity-glow{border-color:rgba(230,126,34,.55);box-shadow:inset 0 0 14px rgba(230,126,34,.12),0 0 10px rgba(230,126,34,.12)}
.inv-item.is-equipped::before{content:'✓';position:absolute;top:3px;left:6px;font-size:10px;color:#2ecc71;font-weight:700}
.inv-item.is-equipped{background:#0d1e14;border-color:rgba(46,204,113,.3)}
.inv-empty{color:#4a5e6a;font-size:13px;text-align:center;padding:32px 0}
/* Tooltip */
#inv-tt{position:fixed;z-index:500;background:rgba(6,10,16,.97);border:1px solid rgba(255,255,255,.14);border-radius:13px;padding:13px 15px;min-width:165px;max-width:228px;pointer-events:none;display:none;box-shadow:0 10px 40px rgba(0,0,0,.65);backdrop-filter:blur(8px)}
#inv-tt .tt-name{font-size:14px;font-weight:700;margin-bottom:1px}
#inv-tt .tt-rarity{font-size:10px;text-transform:uppercase;letter-spacing:.9px;margin-bottom:9px;opacity:.8}
#inv-tt .tt-row{font-size:11px;color:#90a8b5;display:flex;justify-content:space-between;gap:12px;margin:3px 0}
#inv-tt .tt-row span{font-weight:600}
#inv-tt .tt-up{color:#7dff9f}
#inv-tt .tt-down{color:#ff7675}
#inv-tt .tt-hr{border:none;border-top:1px solid rgba(255,255,255,.08);margin:8px 0}
#inv-tt .tt-cmp-label{font-size:9px;color:#546e7a;text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px}
#inv-tt .tt-action{font-size:10px;color:#546e7a;margin-top:8px;text-align:center}
.rarity-label-common{color:#9aa2a9}.rarity-label-uncommon{color:#2ecc71}.rarity-label-rare{color:#3498db}.rarity-label-epic{color:#9b59b6}.rarity-label-legendary{color:#e67e22}
@media(max-width:700px){
  .inv-layout{grid-template-columns:1fr}
  .inv-col-left{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .inv-col-left h3{grid-column:1/-1}
  .inv-grid{max-height:240px}
}
</style>
</head>
<body>
<div id="start">
  <h1>CHOP & GROW</h1>
  <p>Bitkileri kes, yaratiklari alt et, esya topla, zanaat yap ve biyomlar arasinda ilerle. Bu surum tek dosyali bir <code>index.html</code> olarak hazirlandi.</p>
  <div class="cta">
    <button id="startBtn">Basla</button>
    <button id="fsBtn">Tam Ekran</button>
  </div>
</div>

<canvas id="game"></canvas>
<div id="joystickZone"><div id="joyBase"></div><div id="joyStick"></div></div>

<div id="ui">
  <div class="hud">
    <div class="hud-card">
      Seviye <span id="level">1</span> | Altin <span id="gold">0</span> | Kesilen <span id="kills">0</span>
      <div class="bar"><div class="fill xp" id="xpBar" style="width:0%"></div></div>
      <div id="xpText">0 / 40 XP</div>
    </div>
    <div class="hud-card">
      HP <span id="hpText">100 / 100</span>
      <div class="bar"><div class="fill hp" id="hpBar" style="width:100%"></div></div>
    </div>
    <div class="hud-card">
      Mana <span id="manaText">100 / 100</span>
      <div class="bar"><div class="fill mana" id="manaBar" style="width:100%"></div></div>
    </div>
    <div class="hud-card">
      Guc <span id="power">10</span> | Sans <span id="luck">0</span>% | Hiz <span id="speed">1.00</span> | SP <span id="sp">0</span>
    </div>
  </div>
  <div id="biome">Yesil Cayir</div>
  <div id="quest">Gunluk: 0/12 hedef</div>
  <div id="minimapWrap"><canvas id="minimap" width="140" height="140"></canvas></div>
  <div id="skills"></div>
  <div id="actions">
    <button data-open="inventory">Canta</button>
    <button data-open="skills">Yetenek</button>
    <button data-open="craft">Zanaat</button>
  </div>
</div>

<div id="panel">
  <div class="close" id="closePanel">x</div>
  <h2 id="panelTitle">Panel</h2>
  <div class="tabs">
    <button class="tab" data-tab="inventory">Canta</button>
    <button class="tab" data-tab="skills">Yetenek</button>
    <button class="tab" data-tab="craft">Zanaat</button>
  </div>
  <div id="panelContent"></div>
</div>
<div id="toast"></div>
<div id="inv-tt">
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-rarity" id="tt-rarity"></div>
  <div id="tt-stats"></div>
  <div id="tt-cmp"></div>
  <div class="tt-action" id="tt-action"></div>
</div>

const rand=(n)=>Math.random()*n;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const dist=(ax,ay,bx,by)=>Math.hypot(bx-ax,by-ay);
const biomeAt=(tx,ty)=>{
  const cx=C.WORLD_W/2, cy=C.WORLD_H/2;
  const d=Math.hypot(tx-cx,ty-cy);
  const n=d/Math.hypot(cx,cy);
  const i=clamp(Math.floor(n*BIOMES.length),0,BIOMES.length-1);
  return BIOMES[i];
};
const simpleHash=(a,b=0,c=0)=>{
  let n=((a|0)*374761393 + (b|0)*668265263 + (c|0)*2147483647) >>> 0;
  n=(n^(n>>13))*1274126177>>>0;
  return n^(n>>16);
};
const hexToRgb=(hex)=>{
  const h=hex.replace('#','');
  const v=parseInt(h,16);
  return {r:(v>>16)&255,g:(v>>8)&255,b:v&255};
};
const rgbToHex=({r,g,b})=>'#'+[r,g,b].map(v=>clamp(Math.round(v),0,255).toString(16).padStart(2,'0')).join('');
const mix=(a,b,t)=>{
  const ar=hexToRgb(a), br=hexToRgb(b);
  return rgbToHex({r:ar.r+(br.r-ar.r)*t,g:ar.g+(br.g-ar.g)*t,b:ar.b+(br.b-ar.b)*t});
};
const mulColor=(hex,f)=>{
  const c=hexToRgb(hex);
  return rgbToHex({r:c.r*f,g:c.g*f,b:c.b*f});
};

function toast(text){
  const el=document.getElementById('toast');
  el.textContent=text;
  el.style.display='block';
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.style.display='none',2200);
}

function invCount(id){
  return state.player.inv.find(x=>x.id===id)?.count || 0;
}
function addItem(id,count=1){
  const row=state.player.inv.find(x=>x.id===id);
  if(row) row.count+=count; else state.player.inv.push({id,count});
}
function removeItem(id,count=1){
  const row=state.player.inv.find(x=>x.id===id);
  if(!row || row.count<count) return false;
  row.count-=count;
  if(row.count<=0) state.player.inv=state.player.inv.filter(x=>x!==row);
  return true;
}

function recalc(){
  const p=state.player;
  // Reset to base values
  p.powerBonus=0; p.luckBonus=0; p.hpBonus=0; p.manaBonus=0; p.attackSpeedBonus=0;
  // Apply passives first so bonus fields are set
  for(const passive of PASSIVES){
    const lvl=p.skillTree[passive.id] || 0;
    passive.apply(lvl);
  }
  p.power = C.BASE_POWER + (p.level-1)*2 + p.powerBonus;
  p.luck  = p.luckBonus;
  p.speed = 1;
  p.maxHp   = C.BASE_HP   + p.hpBonus;
  p.maxMana = C.BASE_MANA + p.manaBonus;
  // Apply equipped gear
  for(const id of Object.values(p.equipped)){
    if(!id) continue;
    const item=ITEMS[id];
    if(!item?.stats) continue;
    p.power   += item.stats.power  || 0;
    p.luck    += item.stats.luck   || 0;
    p.speed   += item.stats.speed  || 0;
    p.maxHp   += item.stats.maxHp  || 0;
    p.maxMana += item.stats.mana   || 0;
  }
  p.hp   = clamp(p.hp,   0, p.maxHp);
  p.mana = clamp(p.mana, 0, p.maxMana);
}

function spawnWorld(){
  state.plants=[];
  state.creatures=[];
  for(let ty=0;ty<C.WORLD_H;ty++){
    for(let tx=0;tx<C.WORLD_W;tx++){
      const biome=biomeAt(tx,ty);
      if(state.player.level<biome.req) continue;
      const h=simpleHash(tx,ty,1)%100;
      if(h<11){
        const id=biome.plants[simpleHash(tx,ty,2)%biome.plants.length];
        const def=PLANTS[id];
        state.plants.push({x:tx*C.TILE+rand(18)-9,y:ty*C.TILE+rand(18)-9,id,hp:def.hp,maxHp:def.hp});
      }
      if(h>93 && tx%2===0 && ty%2===0){
        const id=biome.creatures[simpleHash(tx,ty,4)%biome.creatures.length];
        const def=CREATURES[id];
        state.creatures.push({x:tx*C.TILE+rand(20)-10,y:ty*C.TILE+rand(20)-10,id,hp:def.hp,maxHp:def.hp,aggro:false,attackCd:0,castCd:0});
      }
    }
  }
}

function spawnLoot(x,y,id,count=1){
  state.loots.push({x,y,id,count,life:15,vy:-60-rand(40)});
}

function gainXP(n){
  const p=state.player;
  p.xp += n;
  while(p.xp >= p.xpNext){
    p.xp -= p.xpNext;
    p.level++;
    p.skillPoints++;
    p.xpNext = Math.floor(C.XP_BASE*Math.pow(C.XP_MULT,p.level-1));
    toast('Seviye '+p.level+'! 1 SP kazandin.');
  }
  recalc();
}

function killPlant(plant){
  const def=PLANTS[plant.id];
  gainXP(def.xp);
  state.player.kills++;
  state.questCount++;
  state.player.gold += 1 + (simpleHash(plant.x,plant.y)%4);
  const biome=biomeAt(Math.floor(plant.x/C.TILE),Math.floor(plant.y/C.TILE));
  const baseDrop=biome.drops[simpleHash(plant.x,plant.y,77)%biome.drops.length];
  spawnLoot(plant.x,plant.y,baseDrop,1 + (simpleHash(plant.x,plant.y,99)%2));
  if(Math.random() < 0.12 + state.player.luck/200) spawnLoot(plant.x+rand(16)-8,plant.y+rand(16)-8,'oil',1);
  for(let i=0;i<10;i++) state.particles.push({x:plant.x,y:plant.y,vx:rand(90)-45,vy:-rand(60),life:.5,color:def.color,size:2+rand(3)});
}

function killCreature(c){
  const def=CREATURES[c.id];
  gainXP(def.xp);
  state.player.gold += 3 + (simpleHash(c.x,c.y)%5);
  spawnLoot(c.x,c.y,'essence',1);
  if(Math.random() < 0.25) spawnLoot(c.x+rand(14)-7,c.y+rand(14)-7,'crystal',1);
  for(let i=0;i<12;i++) state.particles.push({x:c.x,y:c.y,vx:rand(120)-60,vy:-rand(80),life:.6,color:def.color,size:2+rand(3)});
}

function attackTarget(target,isCreature){
  const p=state.player;
  if(p.attackCd>0) return;
  const haste=1+(p.attackSpeedBonus||0);
  p.attackCd = C.ATTACK_CD / haste;
  let dmg = p.power;
  if(Math.random()*100 < p.crit) dmg = Math.floor(dmg*1.45);
  target.hp -= dmg;
  state.dmg.push({x:target.x,y:target.y-10,text:String(dmg),color:isCreature?'#ff7675':'#fff',life:1});
  if(target.hp<=0){
    if(isCreature) killCreature(target); else killPlant(target);
  }
}

function castSkill(id){
  const spec=ACTIVE_SKILLS.find(s=>s.id===id);
  const slot=state.skills[id];
  if(!spec || !slot) return;
  if(state.player.level < spec.unlock){ toast('Bu yetenek henuz kilitli'); return; }
  if(slot.cooldown>0){ toast(spec.name+' beklemede'); return; }
  if(state.player.mana < spec.mana){ toast('Yetersiz mana'); return; }
  state.player.mana -= spec.mana;
  slot.cooldown = spec.cd;
  const p=state.player;
  if(id==='dash'){
    for(let i=0;i<10;i++){
      const nx=p.x + Math.cos(p.angle)*16;
      const ny=p.y + Math.sin(p.angle)*16;
      p.x=clamp(nx,18,C.WORLD_W*C.TILE-18);
      p.y=clamp(ny,18,C.WORLD_H*C.TILE-18);
      for(const c of state.creatures) if(c.hp>0 && dist(p.x,p.y,c.x,c.y)<42){ c.hp-=p.power*1.4; if(c.hp<=0) killCreature(c); }
      for(const pl of state.plants) if(pl.hp>0 && dist(p.x,p.y,pl.x,pl.y)<40){ pl.hp-=p.power*1.2; if(pl.hp<=0) killPlant(pl); }
      state.particles.push({x:p.x,y:p.y,vx:rand(60)-30,vy:rand(60)-30,life:.35,color:'#f1c40f',size:4});
    }
  } else if(id==='burst'){
    for(let i=0;i<18;i++){
      const a=(Math.PI*2/18)*i;
      state.particles.push({x:p.x+Math.cos(a)*42,y:p.y+Math.sin(a)*42,vx:Math.cos(a)*90,vy:Math.sin(a)*90,life:.45,color:'#ffb142',size:4});
    }
    for(const c of state.creatures){ if(c.hp>0 && dist(p.x,p.y,c.x,c.y)<96){ c.hp-=p.power*1.7; if(c.hp<=0) killCreature(c); } }
    for(const pl of state.plants){ if(pl.hp>0 && dist(p.x,p.y,pl.x,pl.y)<88){ pl.hp-=p.power*1.35; if(pl.hp<=0) killPlant(pl); } }
  } else if(id==='overdrive'){
    slot.active = 5.5;
    toast('Asiri guc aktif!');
  } else if(id==='magnet'){
    for(const l of state.loots){
      if(dist(p.x,p.y,l.x,l.y)<280){ l.x=p.x+rand(28)-14; l.y=p.y+rand(28)-14; }
    }
    for(let i=0;i<24;i++){
      const a=(Math.PI*2/24)*i;
      state.particles.push({x:p.x,y:p.y,vx:Math.cos(a)*180,vy:Math.sin(a)*180,life:.45,color:'#6ab0ff',size:3});
    }
  }
}

function drawPlant(ctx, plant, x, y){
  const def=PLANTS[plant.id];
  const s=def.size;
  ctx.save();
  ctx.translate(x,y);
  switch(def.shape){
    case 'grass':
      ctx.fillStyle=def.color;
      for(let i=-2;i<=2;i++){ctx.beginPath();ctx.moveTo(i*3,0);ctx.lineTo(i*3-2,-s);ctx.lineTo(i*3+2,-s*.85);ctx.fill();}
      break;
    case 'clover':
      ctx.fillStyle=def.color;
      for(let i=0;i<3;i++){const a=(Math.PI*2/3)*i-Math.PI/2;ctx.beginPath();ctx.arc(Math.cos(a)*s*.35,Math.sin(a)*s*.35-s*.25,s*.34,0,Math.PI*2);ctx.fill();}
      break;
    case 'flower':
      for(let i=0;i<5;i++){const a=(Math.PI*2/5)*i;ctx.fillStyle=def.color;ctx.beginPath();ctx.arc(Math.cos(a)*s*.34,Math.sin(a)*s*.34-s*.28,s*.28,0,Math.PI*2);ctx.fill();}
      ctx.fillStyle='#f7d86f';ctx.beginPath();ctx.arc(0,-s*.28,s*.16,0,Math.PI*2);ctx.fill();
      break;
    case 'mushroom':
      ctx.fillStyle='#dfd3bf';ctx.fillRect(-3,-s*.35,6,s*.38);
      ctx.beginPath();ctx.arc(0,-s*.36,s*.62,Math.PI,0);ctx.fillStyle=def.color;ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.8)';ctx.beginPath();ctx.arc(-s*.2,-s*.44,2,0,Math.PI*2);ctx.fill();
      break;
    case 'bush':
      ctx.fillStyle=def.color;
      [[0,-s*.25,s*.48],[-s*.28,-s*.05,s*.34],[s*.28,-s*.05,s*.34]].forEach(([bx,by,br])=>{ctx.beginPath();ctx.arc(bx,by,br,0,Math.PI*2);ctx.fill();});
      break;
    case 'reed':
      for(let i=-1;i<=1;i++){ctx.fillStyle=def.color;ctx.fillRect(i*5-1,-s,2,s);ctx.fillStyle='#b99757';ctx.beginPath();ctx.ellipse(i*5,-s,3,6,0,0,Math.PI*2);ctx.fill();}
      break;
    case 'lily':
      ctx.beginPath();ctx.arc(0,0,s*.5,.15,Math.PI*2-.15);ctx.lineTo(0,0);ctx.fillStyle='#46b96b';ctx.fill();
      ctx.beginPath();ctx.arc(0,-2,s*.18,0,Math.PI*2);ctx.fillStyle=def.color;ctx.fill();
      break;
    case 'vine':
      ctx.strokeStyle=def.color;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(0,0);for(let i=1;i<=5;i++)ctx.lineTo(Math.sin(i*1.3)*s*.3,-i*s*.18);ctx.stroke();
      break;
    case 'moss':
      ctx.fillStyle=def.color;ctx.globalAlpha=.7;ctx.beginPath();ctx.arc(0,0,s*.55,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
      break;
  }
  ctx.restore();
}

function drawTerrainTile(tx,ty,sx,sy,biome){
  const h=simpleHash(tx,ty,31);
  const shift=((h&15)/15)*.14;
  const c1=mix(biome.bg, biome.color, .28+shift);
  const c2=mix(biome.color, biome.detail, .14+shift*.35);
  const grad=ctx.createLinearGradient(sx,sy,sx+C.TILE,sy+C.TILE);
  grad.addColorStop(0,mulColor(c1,0.96));
  grad.addColorStop(0.55,c1);
  grad.addColorStop(1,mulColor(c2,1.05));
  ctx.fillStyle=grad;
  ctx.fillRect(sx,sy,C.TILE,C.TILE);

  const shade=((h>>4)&7)/7;
  ctx.fillStyle=`rgba(255,255,255,${0.025 + shade*0.018})`;
  ctx.beginPath();
  ctx.moveTo(sx,sy);
  ctx.lineTo(sx+C.TILE,sy);
  ctx.lineTo(sx+C.TILE,sy+10+shade*10);
  ctx.lineTo(sx,sy+6+shade*6);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle='rgba(0,0,0,0.05)';
  ctx.fillRect(sx,sy+C.TILE-8,C.TILE,8);
  ctx.strokeStyle='rgba(255,255,255,0.05)';
  ctx.strokeRect(sx+.5,sy+.5,C.TILE-1,C.TILE-1);

  const specks=2+(h%3);
  for(let i=0;i<specks;i++){
    const sHash=simpleHash(tx,ty,i+89);
    const px=sx + (sHash % (C.TILE-6)) + 3;
    const py=sy + ((sHash>>4) % (C.TILE-6)) + 3;
    if((sHash&3)===0){
      ctx.fillStyle='rgba(255,255,255,0.06)';
      ctx.fillRect(px,py,1,1);
    }else{
      ctx.fillStyle=mulColor(biome.detail,0.86+((sHash>>3)&3)*0.04);
      ctx.globalAlpha=.16;
      ctx.fillRect(px,py,2,1);
      ctx.globalAlpha=1;
    }
  }

  if((h%19)===0){
    ctx.globalAlpha=.11;
    ctx.fillStyle=biome.detail;
    ctx.beginPath();
    ctx.arc(sx+10+(h%20), sy+14+((h>>5)%18), 2+(h%2), 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha=1;
  }
  if((h%23)===0){
    ctx.globalAlpha=.08;
    ctx.fillStyle=biome.water;
    ctx.beginPath();
    ctx.ellipse(sx+18+((h>>6)%16), sy+26+((h>>9)%12), 8+((h>>2)%8), 4+((h>>7)%3), 0, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha=1;
  }
}

function update(dt){
  const p=state.player;
  p.mana = clamp(p.mana + p.manaRegen*dt,0,p.maxMana);
  for(const spec of ACTIVE_SKILLS){
    const s=state.skills[spec.id];
    if(s.cooldown>0) s.cooldown-=dt;
    if(s.active>0) s.active-=dt;
  }

  let dx=0, dy=0;
  if(state.keys['KeyW']||state.keys['ArrowUp']) dy-=1;
  if(state.keys['KeyS']||state.keys['ArrowDown']) dy+=1;
  if(state.keys['KeyA']||state.keys['ArrowLeft']) dx-=1;
  if(state.keys['KeyD']||state.keys['ArrowRight']) dx+=1;
  dx += state.joy.dx;
  dy += state.joy.dy;

  const screenX=p.x-state.camera.x, screenY=p.y-state.camera.y;
  p.angle=Math.atan2(state.mouse.y-screenY,state.mouse.x-screenX);

  let moveSpeed=C.SPEED * p.speed;
  if(state.skills.overdrive.active>0) moveSpeed*=1.45;
  if(dx||dy){
    const l=Math.hypot(dx,dy)||1;
    p.x=clamp(p.x + (dx/l)*moveSpeed*dt,18,C.WORLD_W*C.TILE-18);
    p.y=clamp(p.y + (dy/l)*moveSpeed*dt,18,C.WORLD_H*C.TILE-18);
  }

  if(p.attackCd>0) p.attackCd-=dt;

  let attacked=false;
  let nearestCreature=null, nearestPlant=null, dc=1e9, dp=1e9;
  for(const c of state.creatures){
    if(c.hp<=0) continue;
    const d=dist(p.x,p.y,c.x,c.y);
    if(d<dc){dc=d; nearestCreature=c;}
  }
  for(const pl of state.plants){
    if(pl.hp<=0) continue;
    const d=dist(p.x,p.y,pl.x,pl.y);
    if(d<dp){dp=d; nearestPlant=pl;}
  }
  if(nearestCreature && dc < p.range+26){ p.angle=Math.atan2(nearestCreature.y-p.y, nearestCreature.x-p.x); attackTarget(nearestCreature,true); attacked=true; }
  else if(nearestPlant && dp < p.range+18){ p.angle=Math.atan2(nearestPlant.y-p.y, nearestPlant.x-p.x); attackTarget(nearestPlant,false); attacked=true; }

  for(const c of state.creatures){
    if(c.hp<=0) continue;
    const def=CREATURES[c.id];
    const d=dist(c.x,c.y,p.x,p.y);
    c.aggro = c.aggro || d<160;
    c.attackCd -= dt;
    c.castCd -= dt;
    if(!c.aggro) continue;
    const a=Math.atan2(p.y-c.y,p.x-c.x);
    if(def.ranged && d>90){
      c.x += Math.cos(a)*def.speed*dt*.6;
      c.y += Math.sin(a)*def.speed*dt*.6;
    }else if(def.ranged && d<68){
      c.x -= Math.cos(a)*def.speed*dt*.5;
      c.y -= Math.sin(a)*def.speed*dt*.5;
    }else{
      c.x += Math.cos(a)*def.speed*dt;
      c.y += Math.sin(a)*def.speed*dt;
    }
    if(def.ranged && c.castCd<=0 && d<170){
      c.castCd = 1.9;
      state.projectiles.push({x:c.x,y:c.y,vx:Math.cos(a)*180,vy:Math.sin(a)*180,life:3,color:def.proj,dmg:def.dmg});
    }
    if(d<28 && c.attackCd<=0){
      c.attackCd = 0.9;
      p.hp -= def.dmg;
      state.dmg.push({x:p.x,y:p.y-14,text:'-'+def.dmg,color:'#ff7f7f',life:1});
      if(p.hp<=0){
        p.hp=p.maxHp; p.mana=p.maxMana; p.x=C.WORLD_W*C.TILE/2; p.y=C.WORLD_H*C.TILE/2;
        toast('Yeniden dogdun');
      }
    }
  }

  for(const pr of state.projectiles){
    pr.x += pr.vx*dt; pr.y += pr.vy*dt; pr.life-=dt;
    if(dist(pr.x,pr.y,p.x,p.y)<18){ p.hp-=pr.dmg; pr.life=0; state.dmg.push({x:p.x,y:p.y-18,text:'-'+pr.dmg,color:'#ffa8a8',life:1}); }
  }
  state.projectiles = state.projectiles.filter(x=>x.life>0);

  for(const l of state.loots){
    l.life-=dt;
    l.vy += 170*dt;
    l.y += l.vy*dt;
    const d=dist(p.x,p.y,l.x,l.y);
    if(d < p.magnet){
      const a=Math.atan2(p.y-l.y,p.x-l.x);
      l.x += Math.cos(a)*220*dt;
      l.y += Math.sin(a)*220*dt;
    }
    if(d<22){ addItem(l.id,l.count); l.life=0; }
  }
  state.loots=state.loots.filter(x=>x.life>0);

  for(const pt of state.particles){ pt.x += pt.vx*dt; pt.y += pt.vy*dt; pt.life -= dt; }
  state.particles = state.particles.filter(x=>x.life>0);
  for(const d of state.dmg){ d.y -= 26*dt; d.life -= dt; }
  state.dmg=state.dmg.filter(x=>x.life>0);

  state.plants = state.plants.filter(x=>x.hp>0);
  state.creatures = state.creatures.filter(x=>x.hp>0);

  if(state.plants.filter(pl=>dist(pl.x,pl.y,p.x,p.y)<620).length < 22){
    for(let i=0;i<6;i++){
      const a=Math.random()*Math.PI*2, r=260+rand(360), tx=Math.floor((p.x+Math.cos(a)*r)/C.TILE), ty=Math.floor((p.y+Math.sin(a)*r)/C.TILE);
      if(tx<1||ty<1||tx>=C.WORLD_W-1||ty>=C.WORLD_H-1) continue;
      const b=biomeAt(tx,ty); if(p.level<b.req) continue;
      const id=b.plants[simpleHash(tx,ty,5)%b.plants.length]; const def=PLANTS[id];
      state.plants.push({x:tx*C.TILE+rand(16)-8,y:ty*C.TILE+rand(16)-8,id,hp:def.hp,maxHp:def.hp});
    }
  }
  if(state.creatures.filter(c=>dist(c.x,c.y,p.x,p.y)<620).length < 9){
    for(let i=0;i<3;i++){
      const a=Math.random()*Math.PI*2, r=240+rand(320), tx=Math.floor((p.x+Math.cos(a)*r)/C.TILE), ty=Math.floor((p.y+Math.sin(a)*r)/C.TILE);
      if(tx<1||ty<1||tx>=C.WORLD_W-1||ty>=C.WORLD_H-1) continue;
      const b=biomeAt(tx,ty); if(p.level<b.req) continue;
      const id=b.creatures[simpleHash(tx,ty,6)%b.creatures.length]; const def=CREATURES[id];
      state.creatures.push({x:tx*C.TILE+rand(18)-9,y:ty*C.TILE+rand(18)-9,id,hp:def.hp,maxHp:def.hp,aggro:false,attackCd:0,castCd:0});
    }
  }

  state.camera.x = clamp(p.x-C.W/2,0,C.WORLD_W*C.TILE-C.W);
  state.camera.y = clamp(p.y-C.H/2,0,C.WORLD_H*C.TILE-C.H);
  renderHUD();
}

function render(){
  ctx.clearRect(0,0,C.W,C.H);
  const sx0=Math.floor(state.camera.x/C.TILE), sy0=Math.floor(state.camera.y/C.TILE);
  const sx1=Math.min(C.WORLD_W,sx0+Math.ceil(C.W/C.TILE)+2), sy1=Math.min(C.WORLD_H,sy0+Math.ceil(C.H/C.TILE)+2);

  for(let ty=sy0;ty<sy1;ty++){
    for(let tx=sx0;tx<sx1;tx++){
      const biome=biomeAt(tx,ty);
      drawTerrainTile(tx,ty,tx*C.TILE-state.camera.x,ty*C.TILE-state.camera.y,biome);
    }
  }

  for(let ty=sy0;ty<sy1;ty++){
    for(let tx=sx0;tx<sx1;tx++){
      const b=biomeAt(tx,ty), r=tx<C.WORLD_W-1?biomeAt(tx+1,ty):b, d=ty<C.WORLD_H-1?biomeAt(tx,ty+1):b;
      const x=tx*C.TILE-state.camera.x, y=ty*C.TILE-state.camera.y;
      if(r.id!==b.id){
        const g=ctx.createLinearGradient(x+C.TILE-5,y,x+C.TILE+3,y);
        g.addColorStop(0,'rgba(255,255,255,0)');
        g.addColorStop(.5,'rgba(255,255,255,.12)');
        g.addColorStop(1,'rgba(255,255,255,0)');
        ctx.fillStyle=g; ctx.fillRect(x+C.TILE-5,y,8,C.TILE);
      }
      if(d.id!==b.id){
        const g=ctx.createLinearGradient(x,y+C.TILE-5,x,y+C.TILE+3);
        g.addColorStop(0,'rgba(255,255,255,0)');
        g.addColorStop(.5,'rgba(255,255,255,.12)');
        g.addColorStop(1,'rgba(255,255,255,0)');
        ctx.fillStyle=g; ctx.fillRect(x,y+C.TILE-5,C.TILE,8);
      }
    }
  }

  for(const l of state.loots){
    const x=l.x-state.camera.x,y=l.y-state.camera.y, item=ITEMS[l.id];
    if(!item) continue;
    ctx.beginPath(); ctx.arc(x,y,10,0,Math.PI*2); ctx.fillStyle='rgba(255,255,255,.08)'; ctx.fill();
    ctx.font='15px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(item.icon,x,y+1);
    ctx.beginPath(); ctx.arc(x,y,9,0,Math.PI*2); ctx.strokeStyle='rgba(255,255,255,.28)'; ctx.stroke();
  }

  for(const pl of state.plants){
    const x=pl.x-state.camera.x, y=pl.y-state.camera.y;
    if(x<-60||y<-60||x>C.W+60||y>C.H+60) continue;
    drawPlant(ctx,pl,x,y);
    if(pl.hp<pl.maxHp){
      ctx.fillStyle='rgba(0,0,0,.45)'; ctx.fillRect(x-18,y-28,36,4);
      ctx.fillStyle='#59d98e'; ctx.fillRect(x-18,y-28,36*(pl.hp/pl.maxHp),4);
    }
  }

  for(const c of state.creatures){
    const x=c.x-state.camera.x, y=c.y-state.camera.y;
    if(x<-60||y<-60||x>C.W+60||y>C.H+60) continue;
    const def=CREATURES[c.id];
    ctx.font='20px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(def.icon,x,y);
    ctx.fillStyle='rgba(0,0,0,.45)'; ctx.fillRect(x-18,y-22,36,4);
    ctx.fillStyle='#ff6b6b'; ctx.fillRect(x-18,y-22,36*(c.hp/c.maxHp),4);
  }

  for(const pr of state.projectiles){
    const x=pr.x-state.camera.x,y=pr.y-state.camera.y;
    ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2); ctx.fillStyle=pr.color; ctx.fill();
  }

  const p=state.player, px=p.x-state.camera.x, py=p.y-state.camera.y;
  ctx.save();
  ctx.translate(px,py+2);
  ctx.scale(1,.4);
  ctx.beginPath(); ctx.arc(0,0,p.r+8,0,Math.PI*2); ctx.fillStyle='rgba(0,0,0,.28)'; ctx.fill();
  ctx.restore();

  const hover=Math.sin(performance.now()/340)*2;
  ctx.save();
  ctx.translate(px,py-12+hover);
  ctx.beginPath(); ctx.arc(0,0,p.r+7,0,Math.PI*2);
  const glow=ctx.createRadialGradient(0,0,0,0,0,p.r+7);
  glow.addColorStop(0,'rgba(114,255,164,.24)'); glow.addColorStop(1,'rgba(114,255,164,0)');
  ctx.fillStyle=glow; ctx.fill();

  ctx.save();
  ctx.scale(1,.86);
  const disc=ctx.createRadialGradient(-4,-4,0,0,0,p.r+1);
  disc.addColorStop(0,'#7d848c'); disc.addColorStop(.75,'#4f5961'); disc.addColorStop(1,'#394046');
  ctx.beginPath(); ctx.arc(0,0,p.r,0,Math.PI*2); ctx.fillStyle=disc; ctx.fill(); ctx.strokeStyle='#a9b3bc'; ctx.lineWidth=2; ctx.stroke();
  ctx.save(); ctx.rotate(performance.now()/120);
  for(let i=0;i<12;i++){
    const a=(Math.PI*2/12)*i;
    const ox=Math.cos(a)*p.r, oy=Math.sin(a)*p.r, tx=Math.cos(a)*(p.r+7), ty=Math.sin(a)*(p.r+7);
    ctx.beginPath(); ctx.moveTo(ox,oy); ctx.lineTo(tx-3,ty-1); ctx.lineTo(tx+3,ty+1); ctx.closePath();
    ctx.fillStyle='#d4dbe1'; ctx.fill();
  }
  ctx.restore();
  ctx.beginPath(); ctx.arc(0,0,6,0,Math.PI*2); ctx.fillStyle='#87919b'; ctx.fill();
  ctx.beginPath(); ctx.arc(0,-1,4,0,Math.PI*2); ctx.fillStyle='#ff6b6b'; ctx.fill();
  ctx.beginPath(); ctx.arc(1,-1,1.5,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
  ctx.restore();
  ctx.beginPath();
  ctx.moveTo(Math.cos(p.angle)*(p.r+8),Math.sin(p.angle)*(p.r+8));
  ctx.lineTo(Math.cos(p.angle+.32)*p.r,Math.sin(p.angle+.32)*p.r);
  ctx.lineTo(Math.cos(p.angle-.32)*p.r,Math.sin(p.angle-.32)*p.r);
  ctx.fillStyle='#f1c40f'; ctx.fill();
  ctx.restore();

  ctx.beginPath();
  ctx.arc(px,py,p.range+18,0,Math.PI*2);
  ctx.strokeStyle='rgba(241,196,15,.12)';
  ctx.stroke();

  for(const pt of state.particles){
    ctx.globalAlpha=Math.max(0,pt.life*1.4);
    ctx.fillStyle=pt.color;
    ctx.fillRect(pt.x-state.camera.x,pt.y-state.camera.y,pt.size,pt.size);
  }
  ctx.globalAlpha=1;

  for(const d of state.dmg){
    ctx.globalAlpha=d.life;
    ctx.font='bold 16px sans-serif'; ctx.textAlign='center';
    ctx.lineWidth=3; ctx.strokeStyle='#000'; ctx.strokeText(d.text,d.x-state.camera.x,d.y-state.camera.y);
    ctx.fillStyle=d.color; ctx.fillText(d.text,d.x-state.camera.x,d.y-state.camera.y);
  }
  ctx.globalAlpha=1;

  const vignette=ctx.createRadialGradient(C.W*.52,C.H*.46,120,C.W*.5,C.H*.5,Math.max(C.W,C.H)*.72);
  vignette.addColorStop(0,'rgba(0,0,0,0)');
  vignette.addColorStop(1,'rgba(0,0,0,0.26)');
  ctx.fillStyle=vignette; ctx.fillRect(0,0,C.W,C.H);

  renderMinimap();
}

function renderMinimap(){
  mctx.clearRect(0,0,140,140);
  mctx.fillStyle='rgba(7,10,14,.96)';
  mctx.fillRect(0,0,140,140);
  const scale=140/(C.WORLD_W*C.TILE);
  for(let ty=0;ty<C.WORLD_H;ty+=6){
    for(let tx=0;tx<C.WORLD_W;tx+=6){
      const b=biomeAt(tx,ty);
      mctx.globalAlpha=.72;
      mctx.fillStyle=mix(b.bg,b.color,.55);
      mctx.fillRect(tx*C.TILE*scale,ty*C.TILE*scale,6*C.TILE*scale,6*C.TILE*scale);
    }
  }
  mctx.globalAlpha=1;
  for(const pl of state.plants){
    if(dist(pl.x,pl.y,state.player.x,state.player.y)>900) continue;
    mctx.fillStyle='rgba(255,255,255,.26)';
    mctx.fillRect(pl.x*scale,pl.y*scale,1.6,1.6);
  }
  for(const c of state.creatures){
    if(dist(c.x,c.y,state.player.x,state.player.y)>900) continue;
    mctx.fillStyle='rgba(255,107,107,.8)';
    mctx.beginPath(); mctx.arc(c.x*scale,c.y*scale,1.8,0,Math.PI*2); mctx.fill();
  }
  const px=state.player.x*scale, py=state.player.y*scale;
  const g=mctx.createRadialGradient(px,py,1,px,py,7);
  g.addColorStop(0,'rgba(255,244,163,1)'); g.addColorStop(1,'rgba(255,244,163,0)');
  mctx.fillStyle=g; mctx.beginPath(); mctx.arc(px,py,7,0,Math.PI*2); mctx.fill();
  mctx.fillStyle='#ffe66d'; mctx.beginPath(); mctx.arc(px,py,2.8,0,Math.PI*2); mctx.fill();
  mctx.strokeStyle='rgba(255,255,255,.24)';
  mctx.strokeRect(state.camera.x*scale,state.camera.y*scale,C.W*scale,C.H*scale);
}

function renderHUD(){
  const p=state.player;
  document.getElementById('level').textContent=p.level;
  document.getElementById('gold').textContent=p.gold;
  document.getElementById('kills').textContent=p.kills;
  document.getElementById('xpText').textContent=`${Math.floor(p.xp)} / ${p.xpNext} XP`;
  document.getElementById('xpBar').style.width=(p.xp/p.xpNext*100)+'%';
  document.getElementById('hpText').textContent=`${Math.floor(p.hp)} / ${p.maxHp}`;
  document.getElementById('hpBar').style.width=(p.hp/p.maxHp*100)+'%';
  document.getElementById('manaText').textContent=`${Math.floor(p.mana)} / ${p.maxMana}`;
  document.getElementById('manaBar').style.width=(p.mana/p.maxMana*100)+'%';
  document.getElementById('power').textContent=Math.floor(p.power*(state.skills.overdrive.active>0?1.45:1));
  document.getElementById('luck').textContent=p.luck;
  document.getElementById('speed').textContent=p.speed.toFixed(2);
  document.getElementById('sp').textContent=p.skillPoints;
  const biome=biomeAt(Math.floor(p.x/C.TILE),Math.floor(p.y/C.TILE));
  document.getElementById('biome').textContent=`${biome.emoji} ${biome.name}`;
  document.getElementById('quest').textContent=`Gunluk: ${state.questCount}/12 hedef`;

  const wrap=document.getElementById('skills');
  if(!wrap.childElementCount){
    for(const s of ACTIVE_SKILLS){
      const btn=document.createElement('button');
      btn.className='skill';
      btn.id='skill-'+s.id;
      btn.innerHTML=`<span>${s.icon}</span><small>${s.key}</small><span class="cost">${s.mana}</span>`;
      btn.onclick=()=>castSkill(s.id);
      wrap.appendChild(btn);
    }
  }
  for(const s of ACTIVE_SKILLS){
    const el=document.getElementById('skill-'+s.id);
    const st=state.skills[s.id];
    el.classList.toggle('locked', state.player.level < s.unlock);
    el.classList.toggle('ready', state.player.level >= s.unlock && st.cooldown<=0 && state.player.mana>=s.mana);
    const old=el.querySelector('.cd'); if(old) old.remove();
    if(st.cooldown>0){
      const cd=document.createElement('span'); cd.className='cd'; cd.textContent=st.cooldown.toFixed(1); el.appendChild(cd);
    }
  }
}

// ── Tooltip helpers ─────────────────────────────────────────
let _ttTarget = null;
function showTooltip(e, itemId, action){
  const item = ITEMS[itemId];
  if(!item) return;
  const tt = document.getElementById('inv-tt');
  const rc = RARITY_COLOR[item.rarity] || '#9aa2a9';
  const rl = RARITY_LABEL[item.rarity] || 'Siradan';
  document.getElementById('tt-name').textContent = item.icon+' '+item.name;
  document.getElementById('tt-name').style.color = rc;
  document.getElementById('tt-rarity').textContent = rl;
  document.getElementById('tt-rarity').style.color = rc;
  // Stats
  const statsEl = document.getElementById('tt-stats');
  statsEl.innerHTML = '';
  if(item.stats){
    for(const [k,v] of Object.entries(item.stats)){
      const row = document.createElement('div');
      row.className = 'tt-row';
      const sign = v>0?'+':'';
      row.innerHTML = `<span style="color:#8fa8b5">${STAT_LABEL[k]||k}</span><span>${sign}${typeof v==='number'&&v%1!==0?(v*100).toFixed(0)+'%':v}</span>`;
      statsEl.appendChild(row);
    }
  }
  if(item.desc){
    const d = document.createElement('div');
    d.style.cssText='font-size:10px;color:#546e7a;margin-top:6px';
    d.textContent = item.desc;
    statsEl.appendChild(d);
  }
  // Comparison for equip
  const cmpEl = document.getElementById('tt-cmp');
  cmpEl.innerHTML = '';
  if(item.type==='equip' && item.slot && item.stats){
    const curId = state.player.equipped[item.slot];
    if(curId && curId !== itemId){
      const cur = ITEMS[curId];
      const hr = document.createElement('hr'); hr.className='tt-hr'; cmpEl.appendChild(hr);
      const lbl = document.createElement('div'); lbl.className='tt-cmp-label'; lbl.textContent='Mevcut: '+cur.name; cmpEl.appendChild(lbl);
      for(const [k,v] of Object.entries(item.stats)){
        const oldV = cur.stats?.[k] || 0;
        const diff = v - oldV;
        if(diff===0) continue;
        const row = document.createElement('div');
        row.className = 'tt-row';
        const cls = diff>0?'tt-up':'tt-down';
        const arrow = diff>0?'▲':'▼';
        const display = typeof diff==='number'&&Math.abs(diff)%1!==0?(Math.abs(diff)*100).toFixed(0)+'%':Math.abs(diff);
        row.innerHTML = `<span style="color:#8fa8b5">${STAT_LABEL[k]||k}</span><span class="${cls}">${arrow} ${display}</span>`;
        cmpEl.appendChild(row);
      }
    }
  }
  document.getElementById('tt-action').textContent = action || '';
  // Position
  tt.style.display = 'block';
  positionTooltip(e);
}
function positionTooltip(e){
  const tt = document.getElementById('inv-tt');
  const vw=window.innerWidth, vh=window.innerHeight;
  const tw=tt.offsetWidth+18, th=tt.offsetHeight+18;
  let lx=e.clientX+14, ly=e.clientY+14;
  if(lx+tw>vw) lx=e.clientX-tw;
  if(ly+th>vh) ly=e.clientY-th;
  tt.style.left=lx+'px'; tt.style.top=ly+'px';
}
function hideTooltip(){ document.getElementById('inv-tt').style.display='none'; _ttTarget=null; }

// ── Equip / unequip ─────────────────────────────────────────
function equipItem(itemId){
  const item = ITEMS[itemId];
  if(!item || item.type!=='equip' || !item.slot) return;
  const p = state.player;
  const prev = p.equipped[item.slot];
  if(prev) addItem(prev, 1);         // return old item to bag
  p.equipped[item.slot] = itemId;
  removeItem(itemId, 1);
  recalc();
  toast(item.icon+' '+item.name+' takildi');
}
function unequipSlot(slot){
  const p = state.player;
  const id = p.equipped[slot];
  if(!id) return;
  addItem(id, 1);
  p.equipped[slot] = null;
  recalc();
  toast(ITEMS[id].name+' cikartildi');
}

  // highlight active tab
  document.querySelectorAll('.tab').forEach(b=>b.style.fontWeight=b.dataset.tab===name?'700':'400');
  const root=document.getElementById('panelContent');

  // ── INVENTORY ──
  if(name==='inventory'){
    invFilter='all';
    root.innerHTML=`
      <div class="inv-layout">
        <div class="inv-col-left">
          <h3>Ekipman Slotlari</h3>
          <div id="eq-slots"></div>
        </div>
        <div class="inv-col-right">
          <h3>Cantadaki Esyalar</h3>
          <div class="inv-filter" id="inv-filter">
            <button class="active" data-f="all">Hepsi</button>
            <button data-f="mat">Malzeme</button>
            <button data-f="consumable">Tuketici</button>
            <button data-f="equip">Ekipman</button>
          </div>
          <div class="inv-grid" id="inv-grid"></div>
        </div>
      </div>`;
    renderEquipSlots();
    renderInvGrid();

    // Filter buttons
    document.querySelectorAll('#inv-filter button').forEach(b=>{
      b.onmouseenter=hideTooltip;
      b.onclick=()=>{
        invFilter=b.dataset.f;
        document.querySelectorAll('#inv-filter button').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');
        renderInvGrid();
      };
    });

  // ── SKILLS ──
  } else if(name==='skills'){
    root.innerHTML='<div class="tree-list" id="treeList"></div>';
    const list=document.getElementById('treeList');
    const active=document.createElement('div');
    active.className='tree';
    active.innerHTML='<strong>🎮 Aktif Yetenekler</strong><div style="margin-top:4px;color:#8fa8b5;font-size:12px">Q / W / E / R tuslariyla veya alttaki ikonlardan kullan.</div>';
    list.appendChild(active);
    for(const node of PASSIVES){
      const lvl=state.player.skillTree[node.id] || 0;
      const canUp=state.player.skillPoints>0 && lvl<node.max;
      const div=document.createElement('div');
      div.className='tree';
      div.style.opacity=canUp?'1':'0.7';
      div.innerHTML=`
        <div style="display:flex;justify-content:space-between;align-items:center">
          <strong>${node.icon} ${node.name}</strong>
          <span style="font-size:12px;color:${lvl?'#7dff9f':'#607d8b'}">${lvl}/${node.max}</span>
        </div>
        <div style="font-size:11px;color:#8fa8b5;margin-top:4px">${node.desc}</div>
        <div style="margin-top:8px;height:4px;background:#0e151c;border-radius:4px;overflow:hidden">
          <div style="height:100%;width:${(lvl/node.max*100)}%;background:linear-gradient(90deg,#27ae60,#7dff9f);border-radius:4px"></div>
        </div>
        ${canUp?'<div style="margin-top:6px;font-size:10px;color:#f1c40f">▶ Yukselt (1 SP)</div>':''}`;
      div.onclick=()=>{
        if(!canUp) return;
        state.player.skillTree[node.id]=(state.player.skillTree[node.id]||0)+1;
        state.player.skillPoints--;
        recalc();
        openPanel('skills');
      };
      list.appendChild(div);
    }

  // ── CRAFT ──
  } else {
    root.innerHTML='<div class="craft-list" id="craftList"></div>';
    const list=document.getElementById('craftList');
    for(const recipe of RECIPES){
      const item=ITEMS[recipe.result];
      const ok=Object.entries(recipe.mats).every(([id,n])=>invCount(id)>=n);
      const rc=RARITY_COLOR[item.rarity]||'#9aa2a9';
      const div=document.createElement('div');
      div.className='craft';
      div.innerHTML=`
        <div style="flex:1;min-width:0">
          <strong style="color:${rc}">${item.icon} ${item.name}</strong>
          <div style="font-size:10px;color:#607d8b;margin-top:4px">
            ${Object.entries(recipe.mats).map(([id,n])=>{
              const has=invCount(id), enough=has>=n;
              return `<span style="color:${enough?'#7dff9f':'#ff7675'}">${ITEMS[id].icon} ${ITEMS[id].name} ${has}/${n}</span>`;
            }).join('&nbsp; ')}
          </div>
          ${item.stats?`<div style="font-size:10px;color:#8fa8b5;margin-top:4px">${Object.entries(item.stats).map(([k,v])=>`+${typeof v==='number'&&v%1!==0?(v*100).toFixed(0)+'%':v} ${STAT_LABEL[k]||k}`).join(', ')}</div>`:''}
        </div>
        <button ${ok?'':'disabled'} style="min-width:64px">Uret</button>`;
      div.querySelector('button').onclick=()=>{
        for(const [id,n] of Object.entries(recipe.mats)) removeItem(id,n);
        addItem(recipe.result,recipe.count);
        toast(item.icon+' '+item.name+' uretildi');
        openPanel('craft');
      };
      list.appendChild(div);
    }
  }
}

function renderEquipSlots(){
  const wrap=document.getElementById('eq-slots');
  if(!wrap) return;
  wrap.innerHTML='';
  for(const slot of EQUIP_SLOTS){
    const id=state.player.equipped[slot.id];
    const item=id?ITEMS[id]:null;
    const div=document.createElement('div');
    div.className='eq-slot'+(item?` r${item.rarity}`:' empty');
    const statStr=item&&item.stats?Object.entries(item.stats).map(([k,v])=>`+${typeof v==='number'&&v%1!==0?(v*100).toFixed(0)+'%':v} ${STAT_LABEL[k]||k}`).join(', '):'';
    div.innerHTML=`
      <div class="eq-thumb">${item?item.icon:slot.icon}</div>
      <div class="eq-info">
        <div class="eq-label">${slot.label}</div>
        <div class="eq-name">${item?item.name:'— Bos —'}</div>
        ${statStr?`<div class="eq-stat">${statStr}</div>`:''}
      </div>`;
    if(item){
      div.title='Cikar';
      div.onmouseenter=e=>showTooltip(e,id,'Tikla: Cikart');
      div.onmousemove=positionTooltip;
      div.onmouseleave=hideTooltip;
      div.onclick=()=>{ hideTooltip(); unequipSlot(slot.id); openPanel('inventory'); };
    }
    wrap.appendChild(div);
  }
}

function renderInvGrid(){
  const grid=document.getElementById('inv-grid');
  if(!grid) return;
  grid.innerHTML='';
  const rows=state.player.inv.filter(r=>{
    if(invFilter==='all') return true;
    return ITEMS[r.id]?.type===invFilter;
  });
  if(!rows.length){
    grid.innerHTML='<div class="inv-empty">Bu kategoride esya yok.</div>';
    return;
  }
  for(const row of rows){
    const item=ITEMS[row.id];
    if(!item) continue;
    const isEq=item.type==='equip' && item.slot && state.player.equipped[item.slot]===row.id;
    const div=document.createElement('div');
    div.className=`inv-item r${item.rarity}${isEq?' is-equipped':''}`;
    div.innerHTML=`
      <div class="i-rarity-glow"></div>
      <div class="i-icon">${item.icon}</div>
      <div class="i-name">${item.name}</div>
      ${row.count>1?`<div class="i-count">x${row.count}</div>`:''}`;
    const actionLabel=item.type==='consumable'?'Tikla: Kullan':item.type==='equip'?(isEq?'Tikla: Cikart':'Tikla: Giy'):'Malzeme';
    div.onmouseenter=e=>showTooltip(e,row.id,actionLabel);
    div.onmousemove=positionTooltip;
    div.onmouseleave=hideTooltip;
    div.onclick=()=>{
      hideTooltip();
      if(item.type==='consumable'){
        if(item.effect?.heal) state.player.hp=clamp(state.player.hp+item.effect.heal,0,state.player.maxHp);
        if(item.effect?.mana) state.player.mana=clamp(state.player.mana+item.effect.mana,0,state.player.maxMana);
        removeItem(row.id,1);
        recalc();
        toast(item.icon+' '+item.name+' kullanildi');
      } else if(item.type==='equip'){
        if(isEq){ unequipSlot(item.slot); }
        else { equipItem(row.id); }
      }
      renderEquipSlots();
      renderInvGrid();
    };
    grid.appendChild(div);
  }
}

function loop(ts){
  if(!state.running) return;
  const dt=Math.min((ts-state.last)/1000,.05);
  state.last=ts;
  if(document.getElementById('panel').style.display!=='block') update(dt);
  render();
  requestAnimationFrame(loop);
}

function setupInput(){
  window.addEventListener('keydown',e=>{
    state.keys[e.code]=true;
    if(e.repeat) return;
    const map={KeyQ:'dash',KeyW:'burst',KeyE:'overdrive',KeyR:'magnet'};
    if(map[e.code]) castSkill(map[e.code]);
    if(e.code==='Escape') document.getElementById('panel').style.display='none';
  });
  window.addEventListener('keyup',e=>state.keys[e.code]=false);

  canvas.addEventListener('mousemove',e=>{
    const r=canvas.getBoundingClientRect();
    state.mouse.x=(e.clientX-r.left)*(C.W/r.width);
    state.mouse.y=(e.clientY-r.top)*(C.H/r.height);
  });

  const mobile='ontouchstart' in window || navigator.maxTouchPoints>0;
  state.mobile=mobile;
  const zone=document.getElementById('joystickZone'), base=document.getElementById('joyBase'), stick=document.getElementById('joyStick');
  if(mobile) zone.style.display='block';

  zone.addEventListener('touchstart',e=>{
    const t=e.changedTouches[0];
    state.joy.active=true; state.joy.id=t.identifier; state.joy.bx=t.clientX; state.joy.by=t.clientY; state.joy.dx=0; state.joy.dy=0;
    base.style.display='block'; stick.style.display='block';
    base.style.left=(t.clientX-50)+'px'; base.style.top=(t.clientY-50)+'px';
    stick.style.left=(t.clientX-22)+'px'; stick.style.top=(t.clientY-22)+'px';
  },{passive:true});
  zone.addEventListener('touchmove',e=>{
    for(const t of e.changedTouches){
      if(t.identifier!==state.joy.id) continue;
      let dx=t.clientX-state.joy.bx, dy=t.clientY-state.joy.by;
      const len=Math.hypot(dx,dy), max=50;
      if(len>max){ dx=dx/len*max; dy=dy/len*max; }
      state.joy.dx=dx/max; state.joy.dy=dy/max;
      stick.style.left=(state.joy.bx+dx-22)+'px'; stick.style.top=(state.joy.by+dy-22)+'px';
    }
  },{passive:true});
  const endJoy=e=>{
    for(const t of e.changedTouches){
      if(t.identifier!==state.joy.id) continue;
      state.joy.active=false; state.joy.id=null; state.joy.dx=0; state.joy.dy=0;
      base.style.display='none'; stick.style.display='none';
    }
  };
  zone.addEventListener('touchend',endJoy,{passive:true});
  zone.addEventListener('touchcancel',endJoy,{passive:true});

  canvas.addEventListener('touchstart',e=>{
    for(const t of e.changedTouches){
      if(t.clientX > innerWidth*0.45){
        const r=canvas.getBoundingClientRect();
        state.mouse.x=(t.clientX-r.left)*(C.W/r.width);
        state.mouse.y=(t.clientY-r.top)*(C.H/r.height);
      }
    }
  },{passive:true});

  document.querySelectorAll('[data-open]').forEach(b=>b.onclick=()=>openPanel(b.dataset.open));
  document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>openPanel(b.dataset.tab));
  document.getElementById('closePanel').onclick=()=>{ document.getElementById('panel').style.display='none'; hideTooltip(); };
  // Hide tooltip when clicking outside inv items
  document.getElementById('panel').addEventListener('mouseleave', hideTooltip);
}

function resize(){
  canvas.style.width='100vw';
  canvas.style.height='100vh';
}

function start(){
  document.getElementById('start').style.display='none';
  canvas=document.getElementById('game');
  ctx=canvas.getContext('2d');
  canvas.width=C.W; canvas.height=C.H;
  minimap=document.getElementById('minimap');
  mctx=minimap.getContext('2d');
  resize();
  window.addEventListener('resize',resize);
  setupInput();
  grantStarter();
  recalc();
  spawnWorld();
  state.running=true;
  state.last=performance.now();
  requestAnimationFrame(loop);
}

document.getElementById('startBtn').onclick=start;
document.getElementById('fsBtn').onclick=()=>{
  const el=document.documentElement;
  if(el.requestFullscreen) el.requestFullscreen();
};
</script>

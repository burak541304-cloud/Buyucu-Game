<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Knight Online Style - Mobile 3D RPG</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        /* Mobil UI Butonları */
        .ui-panel {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: none;
            z-index: 10;
        }
        
        .joystick-area {
            width: 140px;
            height: 140px;
            background: rgba(0,0,0,0.4);
            border-radius: 70px;
            pointer-events: auto;
            touch-action: none;
            position: relative;
        }
        
        .joystick-base {
            width: 100%;
            height: 100%;
            border-radius: 70px;
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.5);
            position: relative;
        }
        
        .joystick-thumb {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.8);
            border-radius: 30px;
            position: absolute;
            top: 40px;
            left: 40px;
            cursor: pointer;
        }
        
        .action-buttons {
            display: flex;
            gap: 20px;
            pointer-events: auto;
        }
        
        .action-btn {
            width: 70px;
            height: 70px;
            background: rgba(0,0,0,0.6);
            border-radius: 35px;
            border: 2px solid #ffaa00;
            color: #ffaa00;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            line-height: 70px;
            cursor: pointer;
            user-select: none;
            backdrop-filter: blur(5px);
        }
        
        .action-btn:active {
            transform: scale(0.95);
            background: rgba(255,170,0,0.5);
        }
        
        .stats-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            backdrop-filter: blur(5px);
            z-index: 10;
            font-family: monospace;
            pointer-events: none;
        }
        
        .health-bar {
            width: 200px;
            height: 20px;
            background: #330000;
            border-radius: 10px;
            overflow: hidden;
            margin: 5px 0;
        }
        
        .health-fill {
            width: 100%;
            height: 100%;
            background: #ff3333;
            transition: width 0.3s;
        }
        
        .xp-bar {
            width: 200px;
            height: 10px;
            background: #333300;
            border-radius: 5px;
            overflow: hidden;
            margin: 5px 0;
        }
        
        .xp-fill {
            width: 0%;
            height: 100%;
            background: #33ff33;
            transition: width 0.3s;
        }
        
        .damage-number {
            position: absolute;
            color: red;
            font-weight: bold;
            font-size: 20px;
            text-shadow: 1px 1px 0 black;
            pointer-events: none;
            z-index: 20;
            animation: floatUp 1s ease-out forwards;
        }
        
        @keyframes floatUp {
            0% { transform: translateY(0px); opacity: 1; }
            100% { transform: translateY(-50px); opacity: 0; }
        }
        
        @media (max-width: 768px) {
            .action-btn { width: 60px; height: 60px; line-height: 60px; font-size: 20px; }
            .joystick-area { width: 120px; height: 120px; }
            .joystick-thumb { width: 50px; height: 50px; top: 35px; left: 35px; }
            .stats-panel { font-size: 12px; }
            .health-bar { width: 150px; }
        }
        
        .target-indicator {
            position: absolute;
            border: 2px solid red;
            border-radius: 50%;
            pointer-events: none;
            z-index: 15;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px red;
        }
    </style>
</head>
<body>
    <div class="stats-panel">
        <div>❤️ Can: <span id="hpValue">100</span>/100</div>
        <div class="health-bar"><div class="health-fill" id="healthFill" style="width:100%"></div></div>
        <div>✨ Seviye: <span id="levelValue">1</span></div>
        <div>⭐ XP: <span id="xpValue">0</span>/100</div>
        <div class="xp-bar"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
        <div>💰 Altın: <span id="goldValue">0</span></div>
        <div>⚔️ Hasar: 25-35</div>
    </div>
    
    <div class="ui-panel">
        <div class="joystick-area" id="joystickArea">
            <div class="joystick-base"></div>
            <div class="joystick-thumb" id="joystickThumb"></div>
        </div>
        <div class="action-buttons">
            <div class="action-btn" id="attackBtn">⚔️</div>
            <div class="action-btn" id="skillBtn">✨</div>
        </div>
    </div>

    <!-- Three.js kütüphanesi -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';
        
        // --- Oyun Durumu ---
        const gameState = {
            health: 100,
            maxHealth: 100,
            level: 1,
            xp: 0,
            xpNeeded: 100,
            gold: 0,
            damage: 30,
            attackSpeed: 1.0,
            lastAttack: 0,
            isAttacking: false
        };
        
        // --- Three.js Kurulumu (Mobil için optimize) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x071a3b);
        scene.fog = new THREE.FogExp2(0x071a3b, 0.008);
        
        // Kamera (Third Person)
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 10);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // Gölgeler için
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Mobil performans
        document.body.appendChild(renderer.domElement);
        
        // Işıklandırma (Yüksek grafik hissi)
        // Ambient
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        // Ana ışık (güneş)
        const dirLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
        dirLight.position.set(10, 20, 5);
        dirLight.castShadow = true;
        dirLight.receiveShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 30;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        scene.add(dirLight);
        // Arka ışık
        const backLight = new THREE.PointLight(0x4466cc, 0.5);
        backLight.position.set(-5, 5, -5);
        scene.add(backLight);
        // Yansıma
        const fillLight = new THREE.PointLight(0xffaa66, 0.4);
        fillLight.position.set(2, 3, 4);
        scene.add(fillLight);
        
        // Zemin (taş doku benzeri)
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x4a3f35, roughness: 0.8, metalness: 0.1 });
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.5;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // Izgara yardımcı (görsel)
        const gridHelper = new THREE.GridHelper(30, 20, 0xaa9977, 0x665544);
        gridHelper.position.y = -0.4;
        scene.add(gridHelper);
        
        // Çevre dekorasyonu (ağaçlar, taşlar)
        const rockMat = new THREE.MeshStandardMaterial({ color: 0x7a6a5a, roughness: 0.9 });
        for (let i = 0; i < 50; i++) {
            const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(0.2 + Math.random() * 0.3), rockMat);
            const angle = Math.random() * Math.PI * 2;
            const rad = 8 + Math.random() * 12;
            rock.position.x = Math.cos(angle) * rad;
            rock.position.z = Math.sin(angle) * rad;
            rock.position.y = -0.5 + Math.random() * 0.3;
            rock.castShadow = true;
            rock.receiveShadow = true;
            scene.add(rock);
        }
        
        // --- Oyuncu Karakteri (Şövalye görünümlü) ---
        const playerGroup = new THREE.Group();
        // Gövde
        const bodyGeo = new THREE.CylinderGeometry(0.5, 0.6, 1.2, 8);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x3a6ea5, metalness: 0.7, roughness: 0.3 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.castShadow = true;
        body.receiveShadow = true;
        body.position.y = 0;
        playerGroup.add(body);
        // Baş
        const headGeo = new THREE.SphereGeometry(0.45, 24, 24);
        const headMat = new THREE.MeshStandardMaterial({ color: 0xfdd7a8 });
        const head = new THREE.Mesh(headGeo, headMat);
        head.position.y = 0.8;
        head.castShadow = true;
        playerGroup.add(head);
        // Kask
        const helmetGeo = new THREE.CylinderGeometry(0.5, 0.55, 0.4, 8);
        const helmetMat = new THREE.MeshStandardMaterial({ color: 0xccaa77, metalness: 0.9 });
        const helmet = new THREE.Mesh(helmetGeo, helmetMat);
        helmet.position.y = 1.0;
        helmet.castShadow = true;
        playerGroup.add(helmet);
        // Kılıç
        const swordGeo = new THREE.BoxGeometry(0.1, 0.1, 1.2);
        const swordMat = new THREE.MeshStandardMaterial({ color: 0xddccaa, metalness: 0.9 });
        const sword = new THREE.Mesh(swordGeo, swordMat);
        sword.position.set(0.6, 0.2, 0.3);
        sword.rotation.z = -0.4;
        sword.castShadow = true;
        playerGroup.add(sword);
        
        playerGroup.position.set(0, 0, 0);
        playerGroup.castShadow = true;
        playerGroup.receiveShadow = true;
        scene.add(playerGroup);
        
        // --- Düşmanlar (Orklar) ---
        class Enemy {
            constructor(x, z) {
                this.group = new THREE.Group();
                // Gövde
                const eBody = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.65, 1.1, 8), new THREE.MeshStandardMaterial({ color: 0x6a4a3a, roughness: 0.6 }));
                eBody.castShadow = true;
                this.group.add(eBody);
                // Baş
                const eHead = new THREE.Mesh(new THREE.SphereGeometry(0.5, 24, 24), new THREE.MeshStandardMaterial({ color: 0x8a6a4a }));
                eHead.position.y = 0.75;
                eHead.castShadow = true;
                this.group.add(eHead);
                // Dişler
                const toothMat = new THREE.MeshStandardMaterial({ color: 0xeeddcc });
                const tooth = new THREE.Mesh(new THREE.ConeGeometry(0.1, 0.2, 4), toothMat);
                tooth.position.set(0.2, 0.55, 0.45);
                this.group.add(tooth);
                const tooth2 = tooth.clone();
                tooth2.position.set(-0.2, 0.55, 0.45);
                this.group.add(tooth2);
                
                this.group.position.set(x, 0, z);
                this.health = 50;
                this.maxHealth = 50;
                this.level = 1;
                this.damage = 15;
                scene.add(this.group);
                this.isAlive = true;
                
                // Sağlık barı (CSS2D ile yapmak daha kolay, ancak basit text label ekleyelim)
                this.createHealthLabel();
            }
            
            createHealthLabel() {
                const canvas = document.createElement('canvas');
                canvas.width = 64;
                canvas.height = 32;
                const ctx = canvas.getContext('2d');
                this.canvas = canvas;
                const texture = new THREE.CanvasTexture(canvas);
                const material = new THREE.SpriteMaterial({ map: texture });
                this.sprite = new THREE.Sprite(material);
                this.sprite.scale.set(1, 0.5, 1);
                this.sprite.position.y = 1.2;
                this.group.add(this.sprite);
                this.updateHealthBar();
            }
            
            updateHealthBar() {
                if (!this.canvas) return;
                const ctx = this.canvas.getContext('2d');
                ctx.clearRect(0, 0, 64, 32);
                ctx.fillStyle = '#330000';
                ctx.fillRect(0, 0, 64, 10);
                ctx.fillStyle = '#ff3333';
                const percent = this.health / this.maxHealth;
                ctx.fillRect(0, 0, 64 * percent, 10);
                ctx.fillStyle = 'white';
                ctx.font = 'bold 12px monospace';
                ctx.fillText(`${this.health}`, 5, 25);
                this.canvas.texture.needsUpdate = true;
            }
            
            takeDamage(amount, sourcePos) {
                if (!this.isAlive) return false;
                this.health -= amount;
                this.updateHealthBar();
                // Hasar efekti (vücut kızarma)
                this.group.children[0].material.emissive = new THREE.Color(0xff0000);
                setTimeout(() => {
                    if(this.group.children[0]) this.group.children[0].material.emissive = new THREE.Color(0x000000);
                }, 100);
                // Hasar numarası gösterme
                showDamageNumber(amount, this.group.position);
                
                if (this.health <= 0) {
                    this.isAlive = false;
                    this.die();
                    return true;
                }
                return false;
            }
            
            die() {
                // Ölüm animasyonu
                this.group.visible = false;
                // Altın ve XP kazan
                gameState.gold += 20 + Math.floor(Math.random() * 30);
                gameState.xp += 50;
                document.getElementById('goldValue').innerText = gameState.gold;
                updateXP();
                // 3 saniye sonra yeniden doğur
                setTimeout(() => {
                    this.respawn();
                }, 5000);
            }
            
            respawn() {
                this.health = this.maxHealth;
                this.isAlive = true;
                this.group.visible = true;
                // Rastgele pozisyon
                const angle = Math.random() * Math.PI * 2;
                const rad = 6 + Math.random() * 8;
                this.group.position.x = Math.cos(angle) * rad;
                this.group.position.z = Math.sin(angle) * rad;
                this.updateHealthBar();
            }
        }
        
        // --- Düşmanları oluştur ---
        const enemies = [];
        for (let i = 0; i < 8; i++) {
            const angle = Math.random() * Math.PI * 2;
            const rad = 5 + Math.random() * 7;
            const x = Math.cos(angle) * rad;
            const z = Math.sin(angle) * rad;
            enemies.push(new Enemy(x, z));
        }
        
        // --- Hasar Numarası Sistemi ---
        function showDamageNumber(damage, worldPos) {
            const div = document.createElement('div');
            div.className = 'damage-number';
            div.innerText = Math.floor(damage);
            div.style.left = '50%';
            div.style.top = '50%';
            document.body.appendChild(div);
            // 3D'den ekrana projeksiyon
            const vector = worldPos.clone().project(camera);
            const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
            const y = (-vector.y * 0.5 + 0.5) * window.innerHeight;
            div.style.position = 'absolute';
            div.style.left = x + 'px';
            div.style.top = y + 'px';
            setTimeout(() => div.remove(), 1000);
        }
        
        // --- Seviye atlama ---
        function updateXP() {
            let needed = gameState.xpNeeded;
            while (gameState.xp >= needed) {
                gameState.xp -= needed;
                gameState.level++;
                gameState.maxHealth += 20;
                gameState.health = gameState.maxHealth;
                gameState.damage += 5;
                needed = Math.floor(100 + gameState.level * 20);
                gameState.xpNeeded = needed;
                document.getElementById('levelValue').innerText = gameState.level;
                // Seviye atlama efekti
                const msg = document.createElement('div');
                msg.innerText = 'LEVEL UP!';
                msg.style.position = 'absolute';
                msg.style.top = '40%';
                msg.style.left = '50%';
                msg.style.transform = 'translate(-50%, -50%)';
                msg.style.color = 'gold';
                msg.style.fontSize = '40px';
                msg.style.fontWeight = 'bold';
                msg.style.textShadow = '2px 2px 0 black';
                msg.style.zIndex = '100';
                document.body.appendChild(msg);
                setTimeout(() => msg.remove(), 1500);
            }
            document.getElementById('xpValue').innerText = `${gameState.xp}/${gameState.xpNeeded}`;
            const percent = (gameState.xp / gameState.xpNeeded) * 100;
            document.getElementById('xpFill').style.width = percent + '%';
            document.getElementById('hpValue').innerText = `${gameState.health}/${gameState.maxHealth}`;
            document.getElementById('healthFill').style.width = (gameState.health/gameState.maxHealth)*100 + '%';
        }
        
        // --- Oyuncu saldırısı ---
        function playerAttack() {
            const now = Date.now() / 1000;
            if (now - gameState.lastAttack < 1.0 / gameState.attackSpeed) return false;
            gameState.lastAttack = now;
            gameState.isAttacking = true;
            // Animasyon: kılıç salla
            sword.rotation.x = -Math.PI / 3;
            setTimeout(() => { sword.rotation.x = 0; gameState.isAttacking = false; }, 200);
            
            let hitEnemy = false;
            for (let i = 0; i < enemies.length; i++) {
                const e = enemies[i];
                if (!e.isAlive) continue;
                const dist = playerGroup.position.distanceTo(e.group.position);
                if (dist < 2.2) {
                    const dmg = gameState.damage + Math.floor(Math.random() * 15);
                    e.takeDamage(dmg, e.group.position);
                    hitEnemy = true;
                    break;
                }
            }
            if (hitEnemy) {
                // Vuruş efekti
                const ringGeo = new THREE.SphereGeometry(0.5, 8, 8);
                const ringMat = new THREE.MeshBasicMaterial({ color: 0xffaa44, transparent: true, opacity: 0.7 });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.position.copy(playerGroup.position);
                ring.scale.set(0.5,0.5,0.5);
                scene.add(ring);
                setTimeout(() => scene.remove(ring), 200);
            }
            return hitEnemy;
        }
        
        // --- Düşman saldırısı (AI) ---
        function updateEnemies() {
            for (let e of enemies) {
                if (!e.isAlive) continue;
                const dist = playerGroup.position.distanceTo(e.group.position);
                if (dist < 2.0) {
                    const now = Date.now() / 1000;
                    if (!e.lastAttackTime) e.lastAttackTime = 0;
                    if (now - e.lastAttackTime > 1.2) {
                        e.lastAttackTime = now;
                        gameState.health -= e.damage;
                        if (gameState.health <= 0) {
                            gameState.health = 0;
                            document.getElementById('hpValue').innerText = '0';
                            document.getElementById('healthFill').style.width = '0%';
                            alert('Öldünüz! Yeniden başlatılıyor...');
                            resetGame();
                        } else {
                            document.getElementById('hpValue').innerText = `${gameState.health}/${gameState.maxHealth}`;
                            document.getElementById('healthFill').style.width = (gameState.health/gameState.maxHealth)*100 + '%';
                            showDamageNumber(e.damage, playerGroup.position);
                        }
                    }
                } else if (dist < 6) {
                    // Düşman oyuncuya doğru yürüsün
                    const dir = new THREE.Vector3().subVectors(playerGroup.position, e.group.position).normalize();
                    e.group.position.x += dir.x * 0.03;
                    e.group.position.z += dir.z * 0.03;
                    e.group.lookAt(playerGroup.position);
                }
            }
        }
        
        function resetGame() {
            gameState.health = gameState.maxHealth;
            gameState.xp = 0;
            gameState.level = 1;
            gameState.gold = 0;
            gameState.damage = 30;
            gameState.maxHealth = 100;
            gameState.xpNeeded = 100;
            document.getElementById('hpValue').innerText = `${gameState.health}/${gameState.maxHealth}`;
            document.getElementById('healthFill').style.width = '100%';
            document.getElementById('levelValue').innerText = '1';
            document.getElementById('goldValue').innerText = '0';
            updateXP();
            playerGroup.position.set(0,0,0);
            // düşmanları respawnla
            for(let e of enemies) e.respawn();
        }
        
        // --- Joystick Kontrolü (Mobil) ---
        let moveVector = { x: 0, z: 0 };
        const joystickArea = document.getElementById('joystickArea');
        const thumb = document.getElementById('joystickThumb');
        let activeTouch = null;
        let centerX = 0, centerY = 0;
        
        function getJoystickPos(touchX, touchY) {
            const rect = joystickArea.getBoundingClientRect();
            const relativeX = touchX - rect.left - 70;
            const relativeY = touchY - rect.top - 70;
            const distance = Math.min(40, Math.hypot(relativeX, relativeY));
            const angle = Math.atan2(relativeY, relativeX);
            const thumbX = Math.cos(angle) * distance;
            const thumbY = Math.sin(angle) * distance;
            thumb.style.transform = `translate(${thumbX}px, ${thumbY}px)`;
            const normX = thumbX / 40;
            const normY = thumbY / 40;
            moveVector.x = normX;
            moveVector.z = normY;
        }
        
        joystickArea.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = joystickArea.getBoundingClientRect();
            centerX = rect.left + 70;
            centerY = rect.top + 70;
            const touch = e.touches[0];
            activeTouch = touch.identifier;
            getJoystickPos(touch.clientX, touch.clientY);
        });
        
        joystickArea.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for(let i=0; i<e.touches.length; i++) {
                if(e.touches[i].identifier === activeTouch) {
                    getJoystickPos(e.touches[i].clientX, e.touches[i].clientY);
                    break;
                }
            }
        });
        
        joystickArea.addEventListener('touchend', (e) => {
            thumb.style.transform = `translate(0px, 0px)`;
            moveVector.x = 0;
            moveVector.z = 0;
            activeTouch = null;
        });
        
        // --- Hareket ve Kamera takibi ---
        let playerVelocity = { x: 0, z: 0 };
        function updateMovement() {
            const speed = 5.0;
            playerVelocity.x = moveVector.x * speed * 0.016;
            playerVelocity.z = moveVector.z * speed * 0.016;
            let newX = playerGroup.position.x + playerVelocity.x;
            let newZ = playerGroup.position.z + playerVelocity.z;
            newX = Math.min(14, Math.max(-14, newX));
            newZ = Math.min(14, Math.max(-14, newZ));
            playerGroup.position.x = newX;
            playerGroup.position.z = newZ;
            
            // Kamera takibi (Third person)
            const targetCamPos = new THREE.Vector3(playerGroup.position.x, 5, playerGroup.position.z + 8);
            camera.position.lerp(targetCamPos, 0.1);
            camera.lookAt(playerGroup.position);
            
            // Oyuncu yönü (hareket yönüne dön)
            if (Math.abs(moveVector.x) > 0.1 || Math.abs(moveVector.z) > 0.1) {
                const angle = Math.atan2(moveVector.x, moveVector.z);
                playerGroup.rotation.y = angle;
            }
        }
        
        // --- Saldırı ve Skill butonları ---
        document.getElementById('attackBtn').addEventListener('click', () => {
            playerAttack();
        });
        document.getElementById('skillBtn').addEventListener('click', () => {
            // Yetenek: Alan hasarı
            for(let e of enemies) {
                if(e.isAlive && playerGroup.position.distanceTo(e.group.position) < 4) {
                    e.takeDamage(45, e.group.position);
                }
            }
            // Efekt
            const ring = new THREE.Mesh(new THREE.RingGeometry(0.5, 2, 16), new THREE.MeshBasicMaterial({ color: 0x44aaff, transparent: true, side: THREE.DoubleSide }));
            ring.position.copy(playerGroup.position);
            ring.rotation.x = -Math.PI/2;
            scene.add(ring);
            setTimeout(() => scene.remove(ring), 300);
        });
        
        // --- Animasyon döngüsü ---
        let lastTime = performance.now();
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            updateMovement();
            updateEnemies();
            
            // Hava efekti (parçacık)
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        // Rastgele efektler (yaprak, toz)
        const particleGeo = new THREE.BufferGeometry();
        const particleCount = 200;
        const particlePositions = new Float32Array(particleCount * 3);
        for(let i=0; i<particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 30;
            particlePositions[i*3+1] = Math.random() * 5;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 30;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0xaaffaa, size: 0.08 });
        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);
        
        // Başlangıç mesajı
        console.log('Oyun hazır! Knight Online tarzı mobil RPG');
        animate();
        
        // Mobil performans için fps düşürme yok, gayet akıcı
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

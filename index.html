// === UTILITY FUNCTIONS ===
function rnd(a,b){ return a + Math.random()*(b-a); }
function rndInt(a,b){ return Math.floor(rnd(a,b+1)); }
function clamp(v,mn,mx){ return Math.max(mn,Math.min(mx,v)); }
function dist(a,b){ return Math.hypot(a.x-b.x,a.y-b.y); }
function angle(a,b){ return Math.atan2(b.y-a.y,b.x-a.x); }
function lerpColor(c1,c2,t){
  const p=(s)=>parseInt(s,16);
  const r1=p(c1.slice(1,3)),g1=p(c1.slice(3,5)),b1=p(c1.slice(5,7));
  const r2=p(c2.slice(1,3)),g2=p(c2.slice(3,5)),b2=p(c2.slice(5,7));
  return '#'+[r1+(r2-r1)*t,g1+(g2-g1)*t,b1+(b2-b1)*t].map(v=>Math.round(v).toString(16).padStart(2,'0')).join('');
}
function drawRoundRect(ctx,x,y,w,h,r,fill,stroke){
  ctx.beginPath();
  ctx.roundRect(x,y,w,h,r);
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.stroke();}
}
function worldToScreen(wx,wy,cam){
  return { x: wx - cam.x + W/2, y: wy - cam.y + H/2 };
}

// === CAMERA ===
class Camera {
  constructor(){ this.x=500; this.y=500; }
  follow(target, dt){
    const spd = 8;
    this.x += (target.x - this.x) * spd * dt;
    this.y += (target.y - this.y) * spd * dt;
    this.x = clamp(this.x, W/2, WORLD_W - W/2);
    this.y = clamp(this.y, H/2, WORLD_H - H/2);
  }
}

// === ITEM ===
class Item {
  constructor(id, enhance=0){
    this.id = id;
    this.enhance = enhance;
    const def = ITEM_DEFS[id];
    if(!def) { this.valid=false; return; }
    this.valid = true;
    Object.assign(this, def);
    this.name = def.name;
  }
  getDisplayName(){
    if(this.enhance>0) return this.name + ' +'+this.enhance;
    return this.name;
  }
  getEnhancedAtk(){ return (this.atk||0) + this.enhance*3; }
  getEnhancedDef(){ return (this.def||0) + this.enhance*2; }
  getEnhancedHp(){ return (this.hp||0) + this.enhance*5; }
  getGlowColor(){
    if(this.enhance>=10) return null; // rainbow handled specially
    if(this.enhance>=9) return '#f80';
    if(this.enhance>=8) return '#a0f';
    if(this.enhance>=7) return '#44f';
    return null;
  }
  serialize(){ return { id:this.id, enhance:this.enhance }; }
  static deserialize(d){ return d ? new Item(d.id, d.enhance||0) : null; }
}

// === INVENTORY ===
class Inventory {
  constructor(){
    this.slots = new Array(24).fill(null);
    this.equipment = { weapon:null, head:null, chest:null, legs:null, boots:null };
    this.noah = 0;
  }
  addItem(item){
    for(let i=0;i<24;i++){
      if(!this.slots[i]){ this.slots[i]=item; return true; }
    }
    return false;
  }
  removeItem(idx){ this.slots[idx]=null; }
  equip(idx, player){
    const item = this.slots[idx];
    if(!item) return;
    const equipTypes = ['weapon','head','chest','legs','boots'];
    if(!equipTypes.includes(item.type)) return;
    const slot = item.type;
    const old = this.equipment[slot];
    this.equipment[slot] = item;
    this.slots[idx] = old;
    player.recalcStats();
  }
  unequip(slot, player){
    const item = this.equipment[slot];
    if(!item) return;
    if(this.addItem(item)){ this.equipment[slot]=null; player.recalcStats(); }
  }
  usePotion(idx, player){
    const item = this.slots[idx];
    if(!item) return false;
    if(item.type === 'potion'){
      if(item.heal){ player.hp = Math.min(player.maxHp, player.hp + item.heal); G.particles.spawn('heal',player.x,player.y,'+'+item.heal); }
      if(item.mp){ player.mp = Math.min(player.maxMp, player.mp + item.mp); G.particles.spawn('heal',player.x,player.y,'+'+item.mp+' MP'); }
      if(item.atk_buff){ player.atkBuff = item.atk_buff; player.atkBuffTimer = 30; }
      this.slots[idx] = null;
      return true;
    }
    if(item.type === 'currency'){
      this.noah += item.value||0;
      this.slots[idx] = null;
      return true;
    }
    return false;
  }
  getEquipBonus(){
    let atk=0,def=0,hp=0;
    for(const slot in this.equipment){
      const it = this.equipment[slot];
      if(it){ atk+=it.getEnhancedAtk(); def+=it.getEnhancedDef(); hp+=it.getEnhancedHp(); }
    }
    return {atk,def,hp};
  }
  serialize(){
    return {
      slots: this.slots.map(s=>s?s.serialize():null),
      equipment: Object.fromEntries(Object.entries(this.equipment).map(([k,v])=>[k,v?v.serialize():null])),
      noah: this.noah
    };
  }
  static deserialize(d){
    const inv = new Inventory();
    if(!d) return inv;
    if(d.slots) inv.slots = d.slots.map(s=>s?Item.deserialize(s):null);
    if(d.equipment) for(const k in d.equipment) inv.equipment[k] = d.equipment[k]?Item.deserialize(d.equipment[k]):null;
    inv.noah = d.noah||0;
    return inv;
  }
}

// === PLAYER ===
class Player {
  constructor(){
    this.x = 500; this.y = 500;
    this.level = 1; this.exp = 0; this.expNext = 100;
    this.str = 10; this.dex = 10; this.int = 5;
    this.statPoints = 0; this.skillPoints = 0;
    this.atkBuff = 0; this.atkBuffTimer = 0;
    this.inventory = new Inventory();
    this.inventory.addItem(new Item('rusty_sword'));
    this.inventory.addItem(new Item('hp_potion_s'));
    this.inventory.addItem(new Item('hp_potion_s'));
    this.recalcStats();
    this.hp = this.maxHp; this.mp = this.maxMp;
    this.moveTarget = null;
    this.dx = 0; this.dy = 0;
    this.attackTimer = 0;
    this.attackSpeed = 1.5;
    this.facingAngle = 0;
    this.stunTimer = 0;
    this.chargeTimer = 0;
    this.chargeVx = 0; this.chargeVy = 0;
    this.warCryTimer = 0; this.warCryAtk = 0; this.warCryDef = 0;
    this.animFrame = 0;
    this.swingAnim = 0;
  }
  recalcStats(){
    const bonus = this.inventory.getEquipBonus();
    this.maxHp = 200 + this.str*10 + bonus.hp;
    this.maxMp = 100 + this.int*8;
    this.baseAtk = 10 + this.str*2 + bonus.atk;
    this.baseDef = 5 + this.str*0.5 + bonus.def;
    this.critChance = 0.05 + this.dex*0.002;
    this.speed = 180;
    if(this.hp !== undefined) this.hp = Math.min(this.hp, this.maxHp);
    if(this.mp !== undefined) this.mp = Math.min(this.mp, this.maxMp);
  }
  getAtk(){
    let a = this.baseAtk;
    if(this.atkBuff>0) a *= (1+this.atkBuff);
    return a;
  }
  getDef(){ return this.baseDef + (this.warCryDef||0); }
  expNeeded(lv){ return Math.floor(100 * Math.pow(1.4, lv-1)); }
  gainExp(amount){
    this.exp += amount;
    G.particles.spawn('exp', this.x, this.y-30, '+'+amount+' EXP');
    while(this.exp >= this.expNext){
      this.exp -= this.expNext;
      this.level++;
      this.expNext = this.expNeeded(this.level);
      this.statPoints += 5;
      this.skillPoints += 1;
      this.recalcStats();
      this.hp = Math.min(this.hp + 50, this.maxHp);
      this.mp = Math.min(this.mp + 30, this.maxMp);
      G.particles.spawn('levelup', this.x, this.y, 'LEVEL UP!');
      if(G.state==='playing') G.pendingStatScreen = true;
    }
  }
  update(dt, keys, mobs){
    this.animFrame += dt;
    if(this.stunTimer>0){ this.stunTimer-=dt; return; }
    if(this.atkBuffTimer>0){ this.atkBuffTimer-=dt; if(this.atkBuffTimer<=0){this.atkBuff=0;} }
    if(this.warCryTimer>0){ this.warCryTimer-=dt; if(this.warCryTimer<=0){this.warCryAtk=0;this.warCryDef=0;} }

    // Charge movement
    if(this.chargeTimer>0){
      this.chargeTimer -= dt;
      this.x = clamp(this.x + this.chargeVx*dt, 0, WORLD_W);
      this.y = clamp(this.y + this.chargeVy*dt, 0, WORLD_H);
      return;
    }

    let vx=0,vy=0;
    // Joystick
    if(G.joystick && G.joystick.active){
      vx = G.joystick.nx; vy = G.joystick.ny;
    }
    // WASD
    if(keys['KeyW']||keys['ArrowUp']) vy=-1;
    if(keys['KeyS']||keys['ArrowDown']) vy=1;
    if(keys['KeyA']||keys['ArrowLeft']) vx=-1;
    if(keys['KeyD']||keys['ArrowRight']) vx=1;

    if(vx!==0||vy!==0){
      const len=Math.hypot(vx,vy)||1;
      vx/=len; vy/=len;
      this.moveTarget=null;
    }

    // Click to move
    if(this.moveTarget){
      const d=dist(this,this.moveTarget);
      if(d<8){ this.moveTarget=null; }
      else {
        const ang=angle(this,this.moveTarget);
        vx=Math.cos(ang); vy=Math.sin(ang);
      }
    }

    if(vx!==0||vy!==0){
      this.facingAngle = Math.atan2(vy,vx);
      this.x = clamp(this.x + vx*this.speed*dt, 0, WORLD_W);
      this.y = clamp(this.y + vy*this.speed*dt, 0, WORLD_H);
    }

    // Auto-attack
    this.attackTimer -= dt;
    if(this.attackTimer<=0){
      let nearest=null, nearestDist=Infinity;
      for(const mob of mobs){
        if(mob.dead) continue;
        const d=dist(this,mob);
        if(d<200 && d<nearestDist){ nearestDist=d; nearest=mob; }
      }
      if(nearest){
        this.attackTimer = this.attackSpeed;
        this.swingAnim = 0.3;
        this.facingAngle = angle(this, nearest);
        const dmg = this.calcDamage(nearest);
        nearest.takeDamage(dmg.dmg, dmg.crit);
      }
    }
    if(this.swingAnim>0) this.swingAnim -= dt*3;
  }
  calcDamage(target){
    let atk = this.getAtk();
    const crit = Math.random()<this.critChance;
    if(crit) atk *= 2;
    const dmg = Math.max(1, Math.floor(atk - (target.def||0)*0.4 + rnd(-3,3)));
    return {dmg, crit};
  }
  takeDamage(amount){
    const def = this.getDef();
    const reduced = Math.max(1, Math.floor(amount - def*0.5));
    this.hp -= reduced;
    G.particles.spawn('damage', this.x, this.y-20, '-'+reduced);
    G.particles.spawn('hit', this.x, this.y, '');
    if(this.hp<=0){ this.hp=0; G.changeState('dead'); }
    return reduced;
  }
  draw(cam){
    const s = worldToScreen(this.x, this.y, cam);
    const sx=s.x, sy=s.y;
    if(sx<-50||sx>W+50||sy<-50||sy>H+50) return;
    ctx.save();
    ctx.translate(sx,sy);
    const facing = this.facingAngle;
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(0,16,12,5,0,0,Math.PI*2);
    ctx.fill();
    // Legs
    const legAnim = Math.sin(this.animFrame*8)*4;
    ctx.fillStyle='#335';
    ctx.fillRect(-6,8,5,14+legAnim);
    ctx.fillRect(1,8,5,14-legAnim);
    // Body
    ctx.fillStyle='#357';
    ctx.fillRect(-8,-10,16,22);
    // Knight chest detail
    ctx.fillStyle='rgba(100,150,255,0.3)';
    ctx.fillRect(-6,-8,12,10);
    // Sword on right side
    const swingOff = this.swingAnim * 60;
    ctx.save();
    ctx.rotate(facing + swingOff);
    ctx.fillStyle='#ccc';
    ctx.fillRect(8,-2,22,4);
    ctx.fillStyle='#a84';
    ctx.fillRect(8,-5,4,10);
    ctx.restore();
    // Head (gold circle)
    ctx.fillStyle='#d4a';
    ctx.beginPath();
    ctx.arc(0,-18,10,0,Math.PI*2);
    ctx.fill();
    // Helmet
    ctx.fillStyle='#46a';
    ctx.beginPath();
    ctx.arc(0,-20,11,Math.PI,0);
    ctx.fill();
    ctx.fillRect(-11,-20,22,5);
    // Eyes
    ctx.fillStyle='#0ff';
    ctx.fillRect(-4,-19,3,2);
    ctx.fillRect(1,-19,3,2);
    ctx.restore();
  }
}


// === MOB CLASS ===
class Mob {
  constructor(type, x, y){
    this.type = type;
    const def = MOB_DEFS[type];
    Object.assign(this, def);
    this.x = x; this.y = y;
    this.spawnX = x; this.spawnY = y;
    this.hp = def.hp; this.maxHp = def.hp;
    this.state = 'idle';
    this.wanderTimer = rnd(1,4);
    this.wanderX = x; this.wanderY = y;
    this.attackTimer = 0;
    this.dead = false;
    this.deadTimer = 0;
    this.respawnTimer = 0;
    this.damaged = false;
    this.stunTimer = 0;
    this.knockbackVx = 0; this.knockbackVy = 0; this.knockbackTimer = 0;
    this.animTimer = 0;
    this.lootDropped = false;
  }
  update(dt, player){
    this.animTimer += dt;
    if(this.knockbackTimer>0){
      this.knockbackTimer-=dt;
      this.x = clamp(this.x+this.knockbackVx*dt,0,WORLD_W);
      this.y = clamp(this.y+this.knockbackVy*dt,0,WORLD_H);
    }
    if(this.stunTimer>0){ this.stunTimer-=dt; return; }
    if(this.dead) return;
    const dp = dist(this, player);
    const dSpawn = dist(this, {x:this.spawnX,y:this.spawnY});

    if(this.state==='idle'){
      this.wanderTimer -= dt;
      if(this.wanderTimer<=0){
        this.wanderTimer = rnd(2,5);
        this.wanderX = this.spawnX + rnd(-150,150);
        this.wanderY = this.spawnY + rnd(-150,150);
      }
      const dw=dist(this,{x:this.wanderX,y:this.wanderY});
      if(dw>10){
        const ang=Math.atan2(this.wanderY-this.y,this.wanderX-this.x);
        this.x=clamp(this.x+Math.cos(ang)*this.speed*0.4*dt,0,WORLD_W);
        this.y=clamp(this.y+Math.sin(ang)*this.speed*0.4*dt,0,WORLD_H);
      }
      if(dp<this.aggroRange) this.state='aggro';
    } else if(this.state==='aggro'){
      if(dp<this.attackRange){ this.state='attack'; }
      else if(dSpawn>600){ this.state='return'; }
      else {
        const ang=Math.atan2(player.y-this.y,player.x-this.x);
        this.x=clamp(this.x+Math.cos(ang)*this.speed*dt,0,WORLD_W);
        this.y=clamp(this.y+Math.sin(ang)*this.speed*dt,0,WORLD_H);
      }
    } else if(this.state==='attack'){
      if(dp>this.attackRange*1.3){ this.state='aggro'; }
      else {
        this.attackTimer -= dt;
        if(this.attackTimer<=0){
          this.attackTimer = this.attackSpeed;
          const dmg = Math.max(1, Math.floor(this.atk + rnd(-3,3)));
          player.takeDamage(dmg);
        }
      }
      if(dSpawn>600) this.state='return';
    } else if(this.state==='return'){
      const ang=Math.atan2(this.spawnY-this.y,this.spawnX-this.x);
      this.x=clamp(this.x+Math.cos(ang)*this.speed*1.2*dt,0,WORLD_W);
      this.y=clamp(this.y+Math.sin(ang)*this.speed*1.2*dt,0,WORLD_H);
      if(dSpawn<20){
        this.state='idle';
        this.hp = this.maxHp; // heal on return
      }
      if(dp<this.aggroRange) this.state='aggro';
    }
  }
  takeDamage(amount, crit){
    if(this.dead) return;
    const reduced = Math.max(1, Math.floor(amount - this.def*0.4));
    this.hp -= reduced;
    this.damaged = true;
    this.state = 'aggro';
    if(crit) G.particles.spawn('crit', this.x, this.y-30, 'CRIT! '+reduced);
    else G.particles.spawn('damage', this.x, this.y-30, '-'+reduced);
    G.particles.spawn('blood', this.x, this.y, '');
    if(this.hp<=0){ this.hp=0; this.die(); }
  }
  die(){
    this.dead = true;
    this.deadTimer = 1.5;
    if(!this.lootDropped){
      this.lootDropped = true;
      // Drop loot
      for(const l of this.loot){
        if(Math.random()<l.chance){
          G.groundItems.push({x:this.x+rnd(-20,20),y:this.y+rnd(-20,20),item:new Item(l.id),glowTimer:0});
        }
      }
      // Noah drop
      const noahAmt = rndInt(Math.floor(this.noah*0.7), Math.floor(this.noah*1.3));
      G.particles.spawn('noah', this.x, this.y-40, '+'+noahAmt+' Noah');
      G.player.inventory.noah += noahAmt;
      // EXP
      G.player.gainExp(this.exp);
      // Quest progress
      G.quests.onKill(this.type);
      G.particles.spawn('blood',this.x,this.y,'');
    }
    this.respawnTimer = 30;
  }
  respawn(){
    this.x = this.spawnX; this.y = this.spawnY;
    this.hp = this.maxHp;
    this.dead = false;
    this.deadTimer = 0;
    this.lootDropped = false;
    this.state = 'idle';
    this.wanderTimer = rnd(1,3);
    this.damaged = false;
    this.stunTimer = 0;
    this.knockbackTimer = 0;
  }
  drawWorm(sx,sy){
    const t = this.animTimer;
    const colors = ['#3a3','#4b4','#3a3'];
    const sizes = [8,10,8];
    for(let i=0;i<3;i++){
      const ox = i*14 - 14;
      const oy = Math.sin(t*3 + i*1.2)*6;
      ctx.fillStyle = colors[i];
      ctx.beginPath();
      ctx.arc(sx+ox, sy+oy, sizes[i], 0, Math.PI*2);
      ctx.fill();
      ctx.strokeStyle='#2a2';
      ctx.lineWidth=1;
      ctx.stroke();
    }
    // Eyes on head
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.arc(sx+14-2,sy-4,2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(sx+14+2,sy-4,2,0,Math.PI*2); ctx.fill();
  }
  drawWolf(sx,sy){
    const t = this.animTimer;
    const legAnim = Math.sin(t*8)*5;
    ctx.fillStyle='#766';
    // Legs
    ctx.fillRect(sx-15,sy+5,5,12+legAnim);
    ctx.fillRect(sx-5,sy+5,5,12-legAnim);
    ctx.fillRect(sx+5,sy+5,5,12+legAnim);
    ctx.fillRect(sx+10,sy+5,5,12-legAnim);
    // Body
    ctx.fillStyle='#876';
    ctx.beginPath();
    ctx.ellipse(sx,sy,20,12,0,0,Math.PI*2);
    ctx.fill();
    // Head
    ctx.fillStyle='#987';
    ctx.beginPath();
    ctx.ellipse(sx+18,sy-4,10,8,0,0,Math.PI*2);
    ctx.fill();
    // Ears
    ctx.fillStyle='#765';
    ctx.beginPath();
    ctx.moveTo(sx+14,sy-10); ctx.lineTo(sx+10,sy-22); ctx.lineTo(sx+18,sy-12); ctx.closePath(); ctx.fill();
    ctx.moveTo(sx+20,sy-10); ctx.lineTo(sx+18,sy-22); ctx.lineTo(sx+26,sy-12); ctx.closePath(); ctx.fill();
    // Snout
    ctx.fillStyle='#a98';
    ctx.beginPath(); ctx.ellipse(sx+26,sy-2,5,4,0,0,Math.PI*2); ctx.fill();
    // Eye
    ctx.fillStyle='#f80';
    ctx.beginPath(); ctx.arc(sx+21,sy-6,2,0,Math.PI*2); ctx.fill();
    // Tail
    ctx.strokeStyle='#876'; ctx.lineWidth=4;
    ctx.beginPath();
    ctx.moveTo(sx-18,sy-5);
    ctx.quadraticCurveTo(sx-28,sy-18,sx-22,sy-25);
    ctx.stroke();
  }
  drawSkeleton(sx,sy){
    // Body
    ctx.fillStyle='#ddd';
    ctx.fillRect(sx-6,sy-15,12,22);
    // Skull
    ctx.fillStyle='#eee';
    ctx.beginPath();
    ctx.arc(sx,sy-22,12,0,Math.PI*2);
    ctx.fill();
    ctx.strokeStyle='#bbb'; ctx.lineWidth=1; ctx.stroke();
    // Eyes
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.arc(sx-4,sy-24,3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(sx+4,sy-24,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#f00';
    ctx.beginPath(); ctx.arc(sx-4,sy-24,1.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(sx+4,sy-24,1.5,0,Math.PI*2); ctx.fill();
    // Jaw line
    ctx.strokeStyle='#bbb'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(sx-6,sy-14); ctx.lineTo(sx+6,sy-14); ctx.stroke();
    // Arms
    const t = this.animTimer;
    const armSwing = Math.sin(t*3)*15;
    ctx.strokeStyle='#ddd'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(sx-6,sy-12); ctx.lineTo(sx-18,sy-2+armSwing); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sx+6,sy-12); ctx.lineTo(sx+18,sy-2-armSwing); ctx.stroke();
    // Legs
    ctx.beginPath(); ctx.moveTo(sx-3,sy+7); ctx.lineTo(sx-8,sy+20); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sx+3,sy+7); ctx.lineTo(sx+8,sy+20); ctx.stroke();
  }
  drawGolem(sx,sy){
    // Rocky patches texture
    ctx.fillStyle='#6a4';
    ctx.fillRect(sx-20,sy-25,40,50);
    ctx.fillStyle='#8a6';
    ctx.fillRect(sx-18,sy-23,36,46);
    // Dark patches
    ctx.fillStyle='#5a3';
    ctx.fillRect(sx-10,sy-15,8,8);
    ctx.fillRect(sx+4,sy-5,7,7);
    ctx.fillRect(sx-14,sy+5,6,6);
    ctx.fillRect(sx+8,sy+8,8,5);
    // Head
    ctx.fillStyle='#7a5';
    ctx.beginPath();
    ctx.arc(sx,sy-33,18,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle='#5a3';
    ctx.beginPath(); ctx.arc(sx-6,sy-36,4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(sx+6,sy-36,4,0,Math.PI*2); ctx.fill();
    // Orange eyes
    ctx.fillStyle='#f80';
    ctx.shadowColor='#f80'; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.arc(sx-6,sy-36,2.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(sx+6,sy-36,2.5,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    // Arms
    ctx.fillStyle='#7a5';
    ctx.fillRect(sx-34,sy-20,14,30);
    ctx.fillRect(sx+20,sy-20,14,30);
    // Fists
    ctx.beginPath(); ctx.arc(sx-27,sy+14,8,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(sx+27,sy+14,8,0,Math.PI*2); ctx.fill();
  }
  drawHarpy(sx,sy){
    const t = this.animTimer;
    const wingFlap = Math.sin(t*6)*20;
    // Wings
    ctx.fillStyle='rgba(80,100,160,0.8)';
    ctx.beginPath();
    ctx.moveTo(sx,sy-5);
    ctx.lineTo(sx-50,sy-15+wingFlap);
    ctx.lineTo(sx-30,sy+10);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(sx,sy-5);
    ctx.lineTo(sx+50,sy-15+wingFlap);
    ctx.lineTo(sx+30,sy+10);
    ctx.closePath(); ctx.fill();
    // Wing detail lines
    ctx.strokeStyle='rgba(60,80,140,0.9)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(sx,sy-5); ctx.lineTo(sx-40,sy-10+wingFlap); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sx,sy-5); ctx.lineTo(sx+40,sy-10+wingFlap); ctx.stroke();
    // Body
    ctx.fillStyle='#6a9';
    ctx.beginPath();
    ctx.ellipse(sx,sy,12,18,0,0,Math.PI*2);
    ctx.fill();
    // Head
    ctx.fillStyle='#7ba';
    ctx.beginPath();
    ctx.arc(sx,sy-22,10,0,Math.PI*2);
    ctx.fill();
    // Eyes
    ctx.fillStyle='#f0f';
    ctx.beginPath(); ctx.arc(sx-3,sy-23,2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(sx+3,sy-23,2,0,Math.PI*2); ctx.fill();
    // Claw feet
    ctx.strokeStyle='#555'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(sx-5,sy+16); ctx.lineTo(sx-8,sy+26); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sx-8,sy+26); ctx.lineTo(sx-14,sy+30); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sx-8,sy+26); ctx.lineTo(sx-4,sy+32); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sx+5,sy+16); ctx.lineTo(sx+8,sy+26); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sx+8,sy+26); ctx.lineTo(sx+14,sy+30); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sx+8,sy+26); ctx.lineTo(sx+4,sy+32); ctx.stroke();
  }
  drawTroll(sx,sy){
    const t = this.animTimer;
    const armSwing = Math.sin(t*3)*10;
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.ellipse(sx,sy+34,30,10,0,0,Math.PI*2); ctx.fill();
    // Body (large green oval)
    ctx.fillStyle='#3a2';
    ctx.beginPath();
    ctx.ellipse(sx,sy,27,35,0,0,Math.PI*2);
    ctx.fill();
    // Belly
    ctx.fillStyle='#4b3';
    ctx.beginPath();
    ctx.ellipse(sx,sy+5,18,22,0,0,Math.PI*2);
    ctx.fill();
    // Head
    ctx.fillStyle='#3a2';
    ctx.beginPath();
    ctx.arc(sx,sy-42,22,0,Math.PI*2);
    ctx.fill();
    // Eyes
    ctx.fillStyle='#f40';
    ctx.shadowColor='#f40'; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(sx-7,sy-44,4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(sx+7,sy-44,4,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.arc(sx-7,sy-44,2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(sx+7,sy-44,2,0,Math.PI*2); ctx.fill();
    // Mouth/tusks
    ctx.fillStyle='#eee';
    ctx.fillRect(sx-8,sy-36,4,6);
    ctx.fillRect(sx+4,sy-36,4,6);
    // Arms (massive)
    ctx.fillStyle='#3a2';
    ctx.fillRect(sx-42,sy-28+armSwing,14,40);
    ctx.fillRect(sx+28,sy-28-armSwing,14,40);
    // Club in right hand
    ctx.fillStyle='#864';
    ctx.fillRect(sx+40,sy-32-armSwing,8,40);
    ctx.fillRect(sx+36,sy-40-armSwing,16,12);
    // Legs
    ctx.fillStyle='#2a1';
    ctx.fillRect(sx-18,sy+28,14,20);
    ctx.fillRect(sx+4,sy+28,14,20);
  }
  draw(cam){
    const s = worldToScreen(this.x, this.y, cam);
    const sx=s.x, sy=s.y;
    if(sx<-80||sx>W+80||sy<-80||sy>H+80) return;
    if(this.dead && this.deadTimer<=0) return;
    ctx.save();
    if(this.dead){ ctx.globalAlpha = Math.max(0, this.deadTimer/1.5); }
    switch(this.type){
      case 'worm':     this.drawWorm(sx,sy); break;
      case 'wolf':     this.drawWolf(sx,sy); break;
      case 'skeleton': this.drawSkeleton(sx,sy); break;
      case 'golem':    this.drawGolem(sx,sy); break;
      case 'harpy':    this.drawHarpy(sx,sy); break;
      case 'troll':    this.drawTroll(sx,sy); break;
    }
    // HP bar (show when damaged and alive)
    if(!this.dead && this.damaged){
      const bw=50, bh=6, bx=sx-bw/2, by=sy-55;
      ctx.fillStyle='#300';
      ctx.fillRect(bx,by,bw,bh);
      ctx.fillStyle='#f22';
      ctx.fillRect(bx,by,bw*(this.hp/this.maxHp),bh);
      ctx.strokeStyle='#600'; ctx.lineWidth=1;
      ctx.strokeRect(bx,by,bw,bh);
      // Name
      ctx.fillStyle='#fff'; ctx.font='10px Arial'; ctx.textAlign='center';
      ctx.fillText(this.name+' Lv'+this.level,sx,by-2);
    }
    ctx.restore();
    if(this.dead){ this.deadTimer -= 1/60; }
  }
}


// === PARTICLE SYSTEM ===
class ParticleSystem {
  constructor(){ this.particles = []; }
  spawn(type, x, y, text){
    switch(type){
      case 'hit':
        for(let i=0;i<5;i++){
          const ang=rnd(0,Math.PI*2), spd=rnd(60,140);
          this.particles.push({type:'hit',x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:0.4,maxLife:0.4,color:'#f80'});
        }
        break;
      case 'crit':
        this.particles.push({type:'text',x,y,vy:-60,life:1.2,maxLife:1.2,text:text||'CRIT!',color:'#ff0',size:20});
        break;
      case 'damage':
        this.particles.push({type:'text',x,y,vy:-50,life:1.0,maxLife:1.0,text:text,color:'#f44',size:16});
        break;
      case 'heal':
        this.particles.push({type:'text',x,y,vy:-50,life:1.0,maxLife:1.0,text:text,color:'#4f4',size:16});
        break;
      case 'exp':
        this.particles.push({type:'text',x,y,vy:-60,life:1.4,maxLife:1.4,text:text,color:'#fd0',size:14});
        break;
      case 'noah':
        this.particles.push({type:'text',x,y,vy:-55,life:1.2,maxLife:1.2,text:text,color:'#ffa500',size:14});
        break;
      case 'levelup':
        for(let i=0;i<40;i++){
          const ang=rnd(0,Math.PI*2), spd=rnd(80,200);
          const hue=rnd(0,360);
          this.particles.push({type:'firework',x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-50,life:1.2,maxLife:1.2,color:`hsl(${hue},100%,60%)`});
        }
        this.particles.push({type:'text',x,y:y-40,vy:-40,life:2.5,maxLife:2.5,text:'LEVEL UP!',color:'#fd0',size:28});
        break;
      case 'blood':
        for(let i=0;i<8;i++){
          const ang=rnd(0,Math.PI*2), spd=rnd(40,100);
          this.particles.push({type:'blood',x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-30,life:0.6,maxLife:0.6,color:'#a00',r:rnd(2,5)});
        }
        break;
      case 'spark':
        for(let i=0;i<12;i++){
          const ang=rnd(0,Math.PI*2), spd=rnd(80,180);
          const c=Math.random()<0.5?'#ff0':'#f80';
          this.particles.push({type:'spark',x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-60,life:0.8,maxLife:0.8,color:c});
        }
        break;
      case 'burn':
        for(let i=0;i<15;i++){
          const ang=rnd(-Math.PI*0.8,-Math.PI*0.2), spd=rnd(40,120);
          const c=Math.random()<0.5?'#f20':'#222';
          this.particles.push({type:'burn',x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:1.2,maxLife:1.2,color:c,r:rnd(4,10)});
        }
        break;
    }
  }
  update(dt){
    for(let i=this.particles.length-1;i>=0;i--){
      const p=this.particles[i];
      p.life -= dt;
      if(p.life<=0){ this.particles.splice(i,1); continue; }
      if(p.vx!==undefined){ p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=200*dt; }
      if(p.type==='firework') p.vy+=120*dt;
    }
  }
  draw(cam){
    for(const p of this.particles){
      const s = worldToScreen(p.x,p.y,cam);
      const alpha = Math.min(1, p.life/p.maxLife * 1.5);
      ctx.globalAlpha = alpha;
      if(p.type==='text'||p.type==='crit'){
        ctx.fillStyle = p.color;
        ctx.font = `bold ${p.size||14}px Arial`;
        ctx.textAlign='center';
        ctx.fillText(p.text, s.x, s.y);
      } else if(p.type==='hit'||p.type==='spark'){
        ctx.fillStyle=p.color;
        ctx.beginPath(); ctx.arc(s.x,s.y,3,0,Math.PI*2); ctx.fill();
      } else if(p.type==='blood'||p.type==='burn'){
        ctx.fillStyle=p.color;
        ctx.beginPath(); ctx.arc(s.x,s.y,p.r||4,0,Math.PI*2); ctx.fill();
      } else if(p.type==='firework'){
        ctx.fillStyle=p.color;
        ctx.beginPath(); ctx.arc(s.x,s.y,3,0,Math.PI*2); ctx.fill();
      }
    }
    ctx.globalAlpha=1;
  }
}

// === SKILL TREE ===
class SkillTree {
  constructor(){
    this.skills = {};
    this.cooldowns = {};
    for(const id of SKILL_ORDER){
      this.skills[id] = 0;
      this.cooldowns[id] = 0;
    }
  }
  upgrade(id, player){
    const def = SKILL_DEFS[id];
    if(!def) return;
    if(player.level < def.unlockLv) return;
    if(this.skills[id] >= def.maxLv) return;
    if(player.skillPoints <= 0) return;
    player.skillPoints--;
    this.skills[id]++;
  }
  canUse(id, player){
    const def = SKILL_DEFS[id];
    if(!def) return false;
    if(this.skills[id]<=0) return false;
    if(player.level < def.unlockLv) return false;
    if(this.cooldowns[id]>0) return false;
    if(player.mp < def.mp) return false;
    return true;
  }
  use(id, player, mobs){
    if(!this.canUse(id,player)) return false;
    const def = SKILL_DEFS[id];
    const lv = this.skills[id];
    player.mp -= def.mp;
    this.cooldowns[id] = def.cd;
    switch(id){
      case 'slash': this.doSlash(player,mobs,lv); break;
      case 'shield_bash': this.doShieldBash(player,mobs,lv); break;
      case 'charge': this.doCharge(player,mobs,lv); break;
      case 'whirlwind': this.doWhirlwind(player,mobs,lv); break;
      case 'war_cry': this.doWarCry(player,lv); break;
      case 'earthquake': this.doEarthquake(player,mobs,lv); break;
      case 'blade_storm': this.doBladeStorm(player,mobs,lv); break;
    }
    return true;
  }
  doSlash(player,mobs,lv){
    const mult = 1.5 + (lv-1)*0.375; // 150% to 300%
    const range = 80;
    const coneAngle = Math.PI/2;
    for(const mob of mobs){
      if(mob.dead) continue;
      const d=dist(player,mob);
      if(d>range) continue;
      const ang=Math.atan2(mob.y-player.y,mob.x-player.x);
      let diff = ang - player.facingAngle;
      while(diff>Math.PI) diff-=Math.PI*2;
      while(diff<-Math.PI) diff+=Math.PI*2;
      if(Math.abs(diff)<coneAngle/2){
        const dmg = Math.floor(player.getAtk()*mult);
        mob.takeDamage(dmg, false);
      }
    }
    G.particles.spawn('spark',player.x,player.y,'');
  }
  doShieldBash(player,mobs,lv){
    const stunDur = 1 + (lv-1)*0.25; // 1-2s
    const range = 60;
    const dmg = Math.floor(player.getAtk()*0.8);
    for(const mob of mobs){
      if(mob.dead) continue;
      if(dist(player,mob)<range){
        mob.takeDamage(dmg,false);
        mob.stunTimer = stunDur;
      }
    }
    G.particles.spawn('spark',player.x,player.y,'');
  }
  doCharge(player,mobs,lv){
    const dist2 = 250 + lv*10;
    const spd = 800;
    player.chargeVx = Math.cos(player.facingAngle)*spd;
    player.chargeVy = Math.sin(player.facingAngle)*spd;
    player.chargeTimer = dist2/spd;
    // Hit mobs in path (check periodically via timeout)
    const dmg = Math.floor(player.getAtk()*1.2);
    for(const mob of mobs){
      if(mob.dead) continue;
      const ang = Math.atan2(mob.y-player.y,mob.x-player.x);
      let diff=ang-player.facingAngle;
      while(diff>Math.PI)diff-=Math.PI*2;
      while(diff<-Math.PI)diff+=Math.PI*2;
      if(Math.abs(diff)<0.4 && dist(player,mob)<dist2){
        mob.takeDamage(dmg,false);
      }
    }
  }
  doWhirlwind(player,mobs,lv){
    const range = 100 + lv*5;
    const dmg = Math.floor(player.getAtk()*(1+lv*0.3));
    for(const mob of mobs){
      if(mob.dead) continue;
      if(dist(player,mob)<range) mob.takeDamage(dmg,false);
    }
    for(let i=0;i<20;i++){
      const ang=rnd(0,Math.PI*2);
      G.particles.spawn('spark',player.x+Math.cos(ang)*50,player.y+Math.sin(ang)*50,'');
    }
  }
  doWarCry(player,lv){
    const pct = 0.15 + (lv-1)*0.0625; // 15%-40%
    const dur = 8 + (lv-1)*3; // 8-20s
    player.warCryAtk = player.getAtk()*pct;
    player.warCryDef = player.getDef()*pct;
    player.warCryTimer = dur;
    player.atkBuff = pct;
    player.atkBuffTimer = dur;
    G.particles.spawn('levelup',player.x,player.y,'WAR CRY!');
  }
  doEarthquake(player,mobs,lv){
    const range = 150 + lv*10;
    const dmg = Math.floor(player.getAtk()*(2+lv*0.5));
    const kbForce = 200 + lv*30;
    for(const mob of mobs){
      if(mob.dead) continue;
      const d=dist(player,mob);
      if(d<range){
        mob.takeDamage(dmg,false);
        const ang=Math.atan2(mob.y-player.y,mob.x-player.x);
        mob.knockbackVx=Math.cos(ang)*kbForce;
        mob.knockbackVy=Math.sin(ang)*kbForce;
        mob.knockbackTimer=0.4;
      }
    }
    G.screenShake = 0.5;
    for(let i=0;i<30;i++){
      const ang=rnd(0,Math.PI*2), r=rnd(20,150);
      G.particles.spawn('blood',player.x+Math.cos(ang)*r,player.y+Math.sin(ang)*r,'');
    }
  }
  doBladeStorm(player,mobs,lv){
    const range = 200 + lv*10;
    const mult = 4 + (lv-1)*1.5; // 4x-10x
    const dmg = Math.floor(player.getAtk()*mult);
    for(const mob of mobs){
      if(mob.dead) continue;
      if(dist(player,mob)<range) mob.takeDamage(dmg,true);
    }
    for(let i=0;i<50;i++){
      const ang=rnd(0,Math.PI*2), r=rnd(20,200);
      G.particles.spawn('spark',player.x+Math.cos(ang)*r,player.y+Math.sin(ang)*r,'');
    }
  }
  update(dt){
    for(const id of SKILL_ORDER){
      if(this.cooldowns[id]>0) this.cooldowns[id]-=dt;
    }
  }
  serialize(){
    return Object.fromEntries(SKILL_ORDER.map(id=>[id,this.skills[id]]));
  }
  static deserialize(d){
    const st = new SkillTree();
    if(d) for(const id of SKILL_ORDER) if(d[id]!==undefined) st.skills[id]=d[id];
    return st;
  }
}

// === QUEST LOG ===
class QuestLog {
  constructor(){
    this.quests = {};
    for(const q of QUEST_DEFS){
      this.quests[q.id] = { status:'locked', progress:0 };
    }
  }
  update(player){
    for(const qd of QUEST_DEFS){
      const qs = this.quests[qd.id];
      if(qs.status==='locked' && player.level>=qd.unlockLv){ qs.status='available'; }
      if(qs.status==='active' && qd.collectNoah && player.inventory.noah>=qd.collectNoah){
        qs.progress = player.inventory.noah;
      }
    }
  }
  accept(id){
    const qs = this.quests[id];
    if(qs && qs.status==='available') qs.status='active';
  }
  abandon(id){
    const qs = this.quests[id];
    if(qs && qs.status==='active'){ qs.status='available'; qs.progress=0; }
  }
  onKill(mobType){
    for(const qd of QUEST_DEFS){
      if(!qd.killType) continue;
      const qs = this.quests[qd.id];
      if(qs.status!=='active') continue;
      if(qd.killType===mobType){
        qs.progress++;
        if(qs.progress>=qd.killCount) this.complete(qd.id);
      }
    }
  }
  checkNoah(noah){
    for(const qd of QUEST_DEFS){
      if(!qd.collectNoah) continue;
      const qs = this.quests[qd.id];
      if(qs.status!=='active') continue;
      qs.progress = noah;
      if(noah>=qd.collectNoah) this.complete(qd.id);
    }
  }
  complete(id){
    const qs = this.quests[id];
    const qd = QUEST_DEFS.find(q=>q.id===id);
    if(!qs||!qd||qs.status==='completed') return;
    qs.status='completed';
    G.player.gainExp(qd.rewards.exp);
    G.player.inventory.noah += qd.rewards.noah;
    for(const iid of (qd.rewards.items||[])){
      G.player.inventory.addItem(new Item(iid));
    }
    G.particles.spawn('levelup',G.player.x,G.player.y,'QUEST COMPLETE!');
  }
  getActive(){ return QUEST_DEFS.filter(q=>this.quests[q.id].status==='active'); }
  getAvailable(){ return QUEST_DEFS.filter(q=>this.quests[q.id].status==='available'); }
  getCompleted(){ return QUEST_DEFS.filter(q=>this.quests[q.id].status==='completed'); }
  serialize(){
    return Object.fromEntries(Object.entries(this.quests).map(([k,v])=>[k,{status:v.status,progress:v.progress}]));
  }
  static deserialize(d){
    const ql = new QuestLog();
    if(d) for(const id in d){ if(ql.quests[id]) Object.assign(ql.quests[id],d[id]); }
    return ql;
  }
}


// === VIRTUAL JOYSTICK ===
class VirtualJoystick {
  constructor(){
    this.active=false;
    this.baseX=120; this.baseY=H-120;
    this.stickX=this.baseX; this.stickY=this.baseY;
    this.nx=0; this.ny=0;
    this.touchId=null;
  }
  onTouchStart(t){
    if(t.clientX<W/2 && this.touchId===null){
      this.active=true;
      this.touchId=t.identifier;
      this.baseX=t.clientX; this.baseY=t.clientY;
      this.stickX=this.baseX; this.stickY=this.baseY;
    }
  }
  onTouchMove(t){
    if(t.identifier!==this.touchId) return;
    const dx=t.clientX-this.baseX, dy=t.clientY-this.baseY;
    const d=Math.hypot(dx,dy);
    const maxR=60;
    const r=Math.min(d,maxR);
    const ang=Math.atan2(dy,dx);
    this.stickX=this.baseX+Math.cos(ang)*r;
    this.stickY=this.baseY+Math.sin(ang)*r;
    this.nx=Math.cos(ang)*(r/maxR);
    this.ny=Math.sin(ang)*(r/maxR);
  }
  onTouchEnd(t){
    if(t.identifier===this.touchId){
      this.active=false; this.touchId=null;
      this.nx=0; this.ny=0;
      this.baseX=120; this.baseY=H-120;
      this.stickX=this.baseX; this.stickY=this.baseY;
    }
  }
  draw(){
    if(!this.active) return;
    ctx.globalAlpha=0.4;
    ctx.strokeStyle='#fff'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(this.baseX,this.baseY,60,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.2)';
    ctx.beginPath(); ctx.arc(this.baseX,this.baseY,60,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=0.7;
    ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.beginPath(); ctx.arc(this.stickX,this.stickY,25,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }
}

// === WORLD GENERATOR ===
class WorldGenerator {
  constructor(){
    this.decorations=[];
    this.generate();
  }
  generate(){
    // Trees
    for(let i=0;i<300;i++){
      this.decorations.push({
        type:'tree',
        x:rnd(0,WORLD_W), y:rnd(0,WORLD_H),
        r:rnd(8,16), h:rnd(20,35)
      });
    }
    // Rocks
    for(let i=0;i<200;i++){
      this.decorations.push({
        type:'rock',
        x:rnd(0,WORLD_W), y:rnd(0,WORLD_H),
        rx:rnd(8,18), ry:rnd(6,14),
        angle:rnd(0,Math.PI)
      });
    }
  }
  getZoneColor(wx,wy){
    const totalDist = Math.hypot(wx-0, wy-0);
    const highDist = Math.hypot(wx-WORLD_W*0.75, wy-WORLD_H*0.75);
    if(highDist<1800) return { ground:'#2a2a2a', grass:'#333' }; // high zone
    if(wx>1500||wy>1500) return { ground:'#3a2e1a', grass:'#4a3a20' }; // mid zone
    return { ground:'#1a2d1a', grass:'#2a3d2a' }; // starter zone
  }
  drawTile(wx,wy,cam){
    // Draw zone-specific tiles (called per-zone chunk)
  }
  draw(cam){
    // Draw ground zones
    // Starter zone
    ctx.fillStyle='#1a2d1a';
    const s1a = worldToScreen(0,0,cam);
    const s1b = worldToScreen(2000,2000,cam);
    ctx.fillRect(s1a.x,s1a.y,s1b.x-s1a.x,s1b.y-s1a.y);
    // Mid zone
    ctx.fillStyle='#3a2e1a';
    const s2a = worldToScreen(0,0,cam);
    const s2b = worldToScreen(WORLD_W,WORLD_H,cam);
    // Render full world first
    ctx.fillStyle='#3a2e1a';
    ctx.fillRect(s2a.x,s2a.y,s2b.x-s2a.x,s2b.y-s2a.y);
    // Overlay starter
    ctx.fillStyle='#1a2d1a';
    ctx.fillRect(s1a.x,s1a.y,s1b.x-s1a.x,s1b.y-s1a.y);
    // High zone
    ctx.fillStyle='#2a2a2a';
    const s3a = worldToScreen(2800,2800,cam);
    const s3b = worldToScreen(WORLD_W,WORLD_H,cam);
    ctx.fillRect(s3a.x,s3a.y,s3b.x-s3a.x,s3b.y-s3a.y);

    // Zone label guides (subtle)
    ctx.fillStyle='rgba(255,255,255,0.04)';
    ctx.font='bold 48px Arial'; ctx.textAlign='center';
    const sl = worldToScreen(1000,1000,cam);
    ctx.fillText('STARTER',sl.x,sl.y);
    const sm = worldToScreen(2000,2000,cam);
    ctx.fillText('MID ZONE',sm.x,sm.y);
    const sh = worldToScreen(3800,3800,cam);
    ctx.fillText('HIGH ZONE',sh.x,sh.y);

    // Grid lines (subtle)
    ctx.strokeStyle='rgba(255,255,255,0.03)';
    ctx.lineWidth=1;
    for(let gx=0;gx<=WORLD_W;gx+=500){
      const ga=worldToScreen(gx,0,cam);
      const gb=worldToScreen(gx,WORLD_H,cam);
      if(ga.x>-5&&ga.x<W+5){
        ctx.beginPath(); ctx.moveTo(ga.x,ga.y); ctx.lineTo(gb.x,gb.y); ctx.stroke();
      }
    }
    for(let gy=0;gy<=WORLD_H;gy+=500){
      const ga=worldToScreen(0,gy,cam);
      const gb=worldToScreen(WORLD_W,gy,cam);
      if(ga.y>-5&&ga.y<H+5){
        ctx.beginPath(); ctx.moveTo(ga.x,ga.y); ctx.lineTo(gb.x,gb.y); ctx.stroke();
      }
    }

    // Decorations
    for(const d of this.decorations){
      const s = worldToScreen(d.x,d.y,cam);
      if(s.x<-50||s.x>W+50||s.y<-50||s.y>H+50) continue;
      if(d.type==='tree'){
        // Trunk
        ctx.fillStyle='#5a3a20';
        ctx.fillRect(s.x-3,s.y-d.h*0.4,6,d.h*0.4);
        // Leaves
        ctx.fillStyle='#2a5a2a';
        ctx.beginPath();
        ctx.arc(s.x,s.y-d.h*0.4,d.r,0,Math.PI*2);
        ctx.fill();
        ctx.fillStyle='#3a6a3a';
        ctx.beginPath();
        ctx.arc(s.x-d.r*0.2,s.y-d.h*0.4-d.r*0.3,d.r*0.7,0,Math.PI*2);
        ctx.fill();
      } else if(d.type==='rock'){
        ctx.fillStyle='#666';
        ctx.beginPath();
        ctx.ellipse(s.x,s.y,d.rx,d.ry,d.angle,0,Math.PI*2);
        ctx.fill();
        ctx.fillStyle='#888';
        ctx.beginPath();
        ctx.ellipse(s.x-d.rx*0.2,s.y-d.ry*0.2,d.rx*0.5,d.ry*0.5,d.angle,0,Math.PI*2);
        ctx.fill();
      }
    }

    // World border
    ctx.strokeStyle='#f80';
    ctx.lineWidth=4;
    const bA=worldToScreen(0,0,cam);
    const bB=worldToScreen(WORLD_W,WORLD_H,cam);
    ctx.strokeRect(bA.x,bA.y,bB.x-bA.x,bB.y-bA.y);
  }
}

// === GAME INIT ===
function initGame(fresh){
  G.player = new Player();
  G.camera = new Camera();
  G.particles = new ParticleSystem();
  G.world = new WorldGenerator();
  G.joystick = new VirtualJoystick();
  G.skills = new SkillTree();
  G.quests = new QuestLog();
  G.mobs = [];
  G.groundItems = [];
  G.screenShake = 0;
  G.pendingStatScreen = false;

  // Spawn mobs
  for(const type in MOB_DEFS){
    const def = MOB_DEFS[type];
    for(let i=0;i<20;i++){
      const x = rnd(def.zone.x1+50, def.zone.x2-50);
      const y = rnd(def.zone.y1+50, def.zone.y2-50);
      G.mobs.push(new Mob(type,x,y));
    }
  }

  if(!fresh){
    loadGame();
  }
  G.camera.x = G.player.x;
  G.camera.y = G.player.y;
}

// === SAVE / LOAD ===
function saveGame(){
  const p = G.player;
  const data = {
    level: p.level, exp: p.exp, noah: p.inventory.noah,
    str: p.str, dex: p.dex, int: p.int,
    hp: p.hp, mp: p.mp,
    statPoints: p.statPoints, skillPoints: p.skillPoints,
    inventory: p.inventory.serialize(),
    skills: G.skills.serialize(),
    quests: G.quests.serialize(),
    pos: { x: p.x, y: p.y }
  };
  localStorage.setItem('knight_rpg_save', JSON.stringify(data));
}

function loadGame(){
  const raw = localStorage.getItem('knight_rpg_save');
  if(!raw) return;
  try {
    const d = JSON.parse(raw);
    const p = G.player;
    p.level = d.level||1;
    p.exp = d.exp||0;
    p.expNext = p.expNeeded(p.level);
    p.str = d.str||10; p.dex = d.dex||10; p.int = d.int||5;
    p.statPoints = d.statPoints||0; p.skillPoints = d.skillPoints||0;
    p.recalcStats();
    p.hp = Math.min(d.hp||p.maxHp, p.maxHp);
    p.mp = Math.min(d.mp||p.maxMp, p.maxMp);
    if(d.inventory) p.inventory = Inventory.deserialize(d.inventory);
    else { p.inventory = new Inventory(); }
    p.inventory.noah = d.noah||0;
    if(d.skills) G.skills = SkillTree.deserialize(d.skills);
    if(d.quests) G.quests = QuestLog.deserialize(d.quests);
    if(d.pos){ p.x=d.pos.x||500; p.y=d.pos.y||500; }
  } catch(e){ console.warn('Load failed',e); }
}

function hasSave(){ return !!localStorage.getItem('knight_rpg_save'); }

    const prog = q.killType ? `${Math.min(qs.progress,q.killCount)}/${q.killCount}` :
                 q.collectNoah ? `${Math.min(qs.progress,q.collectNoah)}/${q.collectNoah} Noah` : '';
    ctx.fillText(q.desc+' '+prog,tx+8,ty+38);
    // Progress bar
    const pct = q.killCount ? Math.min(qs.progress/q.killCount,1) :
                q.collectNoah ? Math.min(qs.progress/q.collectNoah,1) : 0;
    ctx.fillStyle='#333'; ctx.fillRect(tx+8,ty+46,tw-16,8);
    ctx.fillStyle='#4f4'; ctx.fillRect(tx+8,ty+46,(tw-16)*pct,8);
  }

  // === Skill bar (bottom-center) ===
  const sbW=7*56+8, sbX=W/2-sbW/2, sbY=H-70;
  ctx.fillStyle='rgba(0,0,0,0.8)';
  drawRoundRect(ctx,sbX-4,sbY-4,sbW+8,62,8,'rgba(0,0,0,0.8)','#555');

  for(let i=0;i<SKILL_ORDER.length;i++){
    const id=SKILL_ORDER[i];
    const def=SKILL_DEFS[id];
    const lv=G.skills.skills[id];
    const cd=G.skills.cooldowns[id];
    const sx=sbX+i*56, sy2=sbY;
    const unlocked = lv>0 && p.level>=def.unlockLv;
    // Slot bg
    ctx.fillStyle=unlocked?'rgba(40,30,10,0.9)':'rgba(20,20,20,0.9)';
    drawRoundRect(ctx,sx,sy2,50,54,4,unlocked?'rgba(40,30,10,0.9)':'rgba(20,20,20,0.9)','#444');
    if(unlocked){
      // Icon
      ctx.fillStyle=def.color;
      ctx.beginPath(); ctx.arc(sx+25,sy2+18,16,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1.5; ctx.stroke();
      // Skill symbol
      ctx.fillStyle='#fff'; ctx.font='bold 12px Arial'; ctx.textAlign='center';
      ctx.fillText(def.name.slice(0,3),sx+25,sy2+23);
      // Hotkey
      ctx.fillStyle='#aaa'; ctx.font='11px Arial';
      ctx.fillText(''+(i+1),sx+25,sy2+40);
      // Level
      ctx.fillStyle='#fd0'; ctx.font='10px Arial';
      ctx.fillText('Lv'+lv,sx+25,sy2+52);
      // Cooldown overlay
      if(cd>0){
        ctx.fillStyle='rgba(0,0,0,0.65)';
        drawRoundRect(ctx,sx,sy2,50,54,4,'rgba(0,0,0,0.65)',null);
        ctx.fillStyle='#fff'; ctx.font='bold 14px Arial'; ctx.textAlign='center';
        ctx.fillText(Math.ceil(cd)+'s',sx+25,sy2+32);
      }
      // MP cost
      if(cd<=0){
        const canUse = p.mp>=def.mp;
        ctx.fillStyle=canUse?'rgba(0,100,255,0.2)':'rgba(100,0,0,0.3)';
        ctx.fillRect(sx,sy2+44,50*(p.mp/p.maxMp),10);
      }
    } else {
      ctx.fillStyle='#555'; ctx.font='10px Arial'; ctx.textAlign='center';
      ctx.fillText('Lv'+def.unlockLv,sx+25,sy2+28);
      ctx.fillStyle='#333'; ctx.font='10px Arial';
      ctx.fillText(def.name.slice(0,5),sx+25,sy2+40);
    }
  }

  // === Mini-map (bottom-right) ===
  const mmX=W-134, mmY=H-134, mmW=120, mmH=120;
  ctx.fillStyle='rgba(0,0,0,0.8)';
  ctx.fillRect(mmX,mmY,mmW,mmH);
  ctx.strokeStyle='#888'; ctx.lineWidth=1.5;
  ctx.strokeRect(mmX,mmY,mmW,mmH);
  // World bounds
  ctx.strokeStyle='#444'; ctx.lineWidth=1;
  ctx.strokeRect(mmX+1,mmY+1,mmW-2,mmH-2);

  const scaleX=mmW/WORLD_W, scaleY=mmH/WORLD_H;
  // Mobs (red dots)
  for(const mob of G.mobs){
    if(mob.dead) continue;
    ctx.fillStyle='#f44';
    ctx.fillRect(mmX+mob.x*scaleX-1,mmY+mob.y*scaleY-1,2,2);
  }
  // Player (gold dot)
  ctx.fillStyle='#fd0';
  ctx.beginPath();
  ctx.arc(mmX+p.x*scaleX,mmY+p.y*scaleY,3,0,Math.PI*2);
  ctx.fill();

  // Zone labels on minimap
  ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.font='8px Arial'; ctx.textAlign='left';
  ctx.fillText('S',mmX+4,mmY+12);
  ctx.fillText('M',mmX+50,mmY+60);
  ctx.fillText('H',mmX+90,mmY+100);

  // Controls hint
  ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.font='10px Arial'; ctx.textAlign='right';
  ctx.fillText('I:Inv  K:Skills  J:Quests',W-8,H-10);
  ctx.fillText('U:Anvil  P:Stats  F5:Save  F9:Load',W-8,H-22);

  if(G.screenShake>0){ ctx.restore(); G.screenShake-=1/60; }
}


// === PANEL: INVENTORY ===
function drawInventoryPanel(){
  const pw=640, ph=460, px=(W-pw)/2, py=(H-ph)/2;
  // Background
  ctx.fillStyle='rgba(5,2,10,0.97)';
  drawRoundRect(ctx,px,py,pw,ph,10,'rgba(5,2,10,0.97)','#a80');
  ctx.lineWidth=2;

  // Title
  ctx.fillStyle='#fd0'; ctx.font='bold 18px Arial'; ctx.textAlign='center';
  ctx.fillText('INVENTORY',px+pw/2,py+28);
  ctx.fillStyle='#aaa'; ctx.font='12px Arial';
  ctx.fillText('Click: Use/Equip  Shift+Click: Drop  [I] Close',px+pw/2,py+44);

  const p = G.player;
  // === Item slots (left) ===
  const slotSize=48, slotPad=4, gridX=px+15, gridY=py+55;
  const cols=6, rows=4;

  for(let i=0;i<24;i++){
    const col=i%cols, row=Math.floor(i/cols);
    const sx=gridX+col*(slotSize+slotPad);
    const sy=gridY+row*(slotSize+slotPad);
    const item=p.inventory.slots[i];
    // Slot bg
    ctx.fillStyle=G.hoveredSlot===i?'rgba(80,60,20,0.8)':'rgba(30,20,10,0.8)';
    drawRoundRect(ctx,sx,sy,slotSize,slotSize,4,G.hoveredSlot===i?'rgba(80,60,20,0.8)':'rgba(30,20,10,0.8)','#444');
    if(item && item.valid){
      // Glow for enhanced items
      if(item.enhance>=7){
        ctx.save();
        const gc=item.getGlowColor();
        if(gc){ ctx.shadowColor=gc; ctx.shadowBlur=12; }
        else { // Rainbow
          G.rainbowAngle += 0.001;
          ctx.shadowColor=`hsl(${(Date.now()*0.2)%360},100%,60%)`;
          ctx.shadowBlur=15;
        }
      }
      ctx.fillStyle=item.color||'#888';
      ctx.beginPath(); ctx.arc(sx+slotSize/2,sy+slotSize/2,18,0,Math.PI*2); ctx.fill();
      if(item.enhance>=7) ctx.restore();
      ctx.fillStyle='#fff'; ctx.font='bold 16px Arial'; ctx.textAlign='center';
      ctx.fillText(item.symbol||'?',sx+slotSize/2,sy+slotSize/2+6);
      if(item.enhance>0){
        ctx.fillStyle='#fd0'; ctx.font='bold 10px Arial';
        ctx.fillText('+'+item.enhance,sx+slotSize-8,sy+12);
      }
      // Item count or type indicator
      ctx.fillStyle='rgba(0,0,0,0.5)';
      ctx.fillRect(sx,sy+slotSize-14,slotSize,14);
      ctx.fillStyle='#ccc'; ctx.font='9px Arial';
      ctx.fillText(item.name.slice(0,8),sx+slotSize/2,sy+slotSize-3);
    }
    ctx.strokeStyle='#555'; ctx.lineWidth=1;
    ctx.strokeRect(sx,sy,slotSize,slotSize);
    // Slot number
    ctx.fillStyle='#333'; ctx.font='9px Arial'; ctx.textAlign='left';
    ctx.fillText(i+1,sx+2,sy+10);
  }

  // === Equipment slots (right) ===
  const eqX=px+340, eqY=py+55;
  ctx.fillStyle='#fd0'; ctx.font='bold 14px Arial'; ctx.textAlign='left';
  ctx.fillText('EQUIPMENT',eqX,eqY+14);

  const equipSlots=[
    {key:'weapon',label:'Weapon',y:eqY+26},
    {key:'head',label:'Head',y:eqY+82},
    {key:'chest',label:'Chest',y:eqY+138},
    {key:'legs',label:'Legs',y:eqY+194},
    {key:'boots',label:'Boots',y:eqY+250},
  ];
  for(const es of equipSlots){
    const item=p.inventory.equipment[es.key];
    const hover=G.hoveredEquip===es.key;
    ctx.fillStyle=hover?'rgba(80,60,20,0.8)':'rgba(30,20,10,0.8)';
    drawRoundRect(ctx,eqX,es.y,270,50,4,hover?'rgba(80,60,20,0.8)':'rgba(30,20,10,0.8)','#666');
    ctx.fillStyle='#888'; ctx.font='11px Arial'; ctx.textAlign='left';
    ctx.fillText('['+es.label+']',eqX+6,es.y+16);
    if(item&&item.valid){
      if(item.enhance>=7){
        ctx.save();
        const gc=item.getGlowColor();
        ctx.shadowColor=gc||`hsl(${(Date.now()*0.2)%360},100%,60%)`;
        ctx.shadowBlur=10;
      }
      ctx.fillStyle=item.color||'#888';
      ctx.beginPath(); ctx.arc(eqX+20,es.y+33,14,0,Math.PI*2); ctx.fill();
      if(item.enhance>=7) ctx.restore();
      ctx.fillStyle='#fff'; ctx.font='bold 13px Arial'; ctx.textAlign='center';
      ctx.fillText(item.symbol,eqX+20,es.y+38);
      ctx.fillStyle='#eee'; ctx.font='12px Arial'; ctx.textAlign='left';
      ctx.fillText(item.getDisplayName(),eqX+40,es.y+30);
      const stats=[];
      if(item.getEnhancedAtk()>0) stats.push('ATK+'+item.getEnhancedAtk());
      if(item.getEnhancedDef()>0) stats.push('DEF+'+item.getEnhancedDef());
      if(item.getEnhancedHp()>0) stats.push('HP+'+item.getEnhancedHp());
      ctx.fillStyle='#aaa'; ctx.font='10px Arial';
      ctx.fillText(stats.join(' '),eqX+40,es.y+44);
      ctx.fillStyle='#a66'; ctx.font='10px Arial';
      ctx.fillText('Right-click to unequip',eqX+160,es.y+44);
    } else {
      ctx.fillStyle='#444'; ctx.font='12px Arial'; ctx.textAlign='center';
      ctx.fillText('Empty',eqX+135,es.y+30);
    }
  }

  // === Player stat summary ===
  const statX=eqX, statY=eqY+310;
  ctx.fillStyle='rgba(20,15,5,0.8)';
  drawRoundRect(ctx,statX,statY,270,100,4,'rgba(20,15,5,0.8)','#555');
  ctx.fillStyle='#fd0'; ctx.font='bold 12px Arial'; ctx.textAlign='left';
  ctx.fillText('CHARACTER STATS',statX+8,statY+16);
  ctx.fillStyle='#ccc'; ctx.font='11px Arial';
  ctx.fillText(`ATK: ${Math.floor(p.getAtk())}  DEF: ${Math.floor(p.getDef())}`,statX+8,statY+34);
  ctx.fillText(`HP: ${Math.floor(p.hp)}/${p.maxHp}  MP: ${Math.floor(p.mp)}/${p.maxMp}`,statX+8,statY+50);
  ctx.fillText(`Crit: ${(p.critChance*100).toFixed(1)}%  Speed: ${p.speed}`,statX+8,statY+66);
  ctx.fillStyle='#fd0'; ctx.font='bold 12px Arial';
  ctx.fillText(`Noah: ${p.inventory.noah}`,statX+8,statY+84);

  // Tooltip for hovered item
  if(G.hoveredSlot>=0 && G.hoveredSlot<24){
    const item=p.inventory.slots[G.hoveredSlot];
    if(item&&item.valid) drawItemTooltip(item, G.mouseX, G.mouseY);
  }
  if(G.hoveredEquip){
    const item=p.inventory.equipment[G.hoveredEquip];
    if(item&&item.valid) drawItemTooltip(item, G.mouseX, G.mouseY);
  }
}

function drawItemTooltip(item, mx, my){
  const lines=[item.getDisplayName()];
  if(item.type) lines.push('Type: '+item.type);
  if(item.atk||item.getEnhancedAtk()>0) lines.push('ATK: +'+item.getEnhancedAtk());
  if(item.def||item.getEnhancedDef()>0) lines.push('DEF: +'+item.getEnhancedDef());
  if(item.hp||item.getEnhancedHp()>0) lines.push('HP: +'+item.getEnhancedHp());
  if(item.heal) lines.push('Heal: '+item.heal+' HP');
  if(item.mp) lines.push('Restore: '+item.mp+' MP');
  if(item.atk_buff) lines.push('ATK Buff: +'+(item.atk_buff*100)+'%');
  if(item.value) lines.push('Value: '+item.value+' Noah');
  if(item.enhance>0) lines.push('Enhance: +'+item.enhance);
  const tw=200, th=16+lines.length*16+8;
  let tx=mx+15, ty=my-th/2;
  if(tx+tw>W) tx=mx-tw-5;
  if(ty<0) ty=0;
  if(ty+th>H) ty=H-th;
  ctx.fillStyle='rgba(5,2,15,0.95)';
  drawRoundRect(ctx,tx,ty,tw,th,6,'rgba(5,2,15,0.95)','#fd0');
  ctx.fillStyle='#fd0'; ctx.font='bold 12px Arial'; ctx.textAlign='left';
  ctx.fillText(lines[0],tx+8,ty+16);
  ctx.fillStyle='#ccc'; ctx.font='11px Arial';
  for(let i=1;i<lines.length;i++) ctx.fillText(lines[i],tx+8,ty+16+i*15);
}

// === PANEL: SKILLS ===
function drawSkillPanel(){
  const pw=560, ph=500, px=(W-pw)/2, py=(H-ph)/2;
  ctx.fillStyle='rgba(5,2,10,0.97)';
  drawRoundRect(ctx,px,py,pw,ph,10,'rgba(5,2,10,0.97)','#a0f');
  ctx.lineWidth=2;
  ctx.fillStyle='#a0f'; ctx.font='bold 18px Arial'; ctx.textAlign='center';
  ctx.fillText('SKILL TREE',px+pw/2,py+28);
  const p=G.player;
  ctx.fillStyle='#fd0'; ctx.font='bold 14px Arial';
  ctx.fillText(`Skill Points: ${p.skillPoints}`,px+pw/2,py+46);

  for(let i=0;i<SKILL_ORDER.length;i++){
    const id=SKILL_ORDER[i];
    const def=SKILL_DEFS[id];
    const lv=G.skills.skills[id];
    const unlocked=p.level>=def.unlockLv;
    const sy=py+65+i*58;
    // Row bg
    ctx.fillStyle=unlocked?'rgba(30,20,50,0.8)':'rgba(15,10,25,0.8)';
    drawRoundRect(ctx,px+10,sy,pw-20,52,6,unlocked?'rgba(30,20,50,0.8)':'rgba(15,10,25,0.8)','#333');
    // Icon
    ctx.fillStyle=unlocked?def.color:'#444';
    ctx.beginPath(); ctx.arc(px+36,sy+26,20,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=unlocked?def.color:'#333'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.fillStyle='#fff'; ctx.font='bold 10px Arial'; ctx.textAlign='center';
    ctx.fillText(def.name.slice(0,3),px+36,sy+30);
    // Name + info
    ctx.fillStyle=unlocked?'#eee':'#555'; ctx.font='bold 13px Arial'; ctx.textAlign='left';
    ctx.fillText(`${i+1}. ${def.name}`,px+64,sy+16);
    ctx.fillStyle=unlocked?'#aaa':'#444'; ctx.font='11px Arial';
    ctx.fillText(`${def.desc}  |  MP:${def.mp}  CD:${def.cd}s`,px+64,sy+30);
    // Unlock info
    if(!unlocked){
      ctx.fillStyle='#f44'; ctx.font='bold 11px Arial';
      ctx.fillText(`Requires Lv ${def.unlockLv}`,px+64,sy+44);
    } else {
      ctx.fillStyle='#fd0'; ctx.font='11px Arial';
      ctx.fillText(`Lv: ${lv}/${def.maxLv}`,px+64,sy+44);
    }
    // Stars
    for(let s=0;s<def.maxLv;s++){
      ctx.fillStyle=s<lv?'#fd0':'#333';
      ctx.beginPath(); ctx.arc(px+350+s*18,sy+26,7,0,Math.PI*2); ctx.fill();
    }
    // + button
    if(unlocked && lv<def.maxLv && p.skillPoints>0){
      ctx.fillStyle='#4f4';
      drawRoundRect(ctx,px+pw-65,sy+12,50,28,6,'#4f4','#2a2');
      ctx.fillStyle='#000'; ctx.font='bold 14px Arial'; ctx.textAlign='center';
      ctx.fillText('+ UP',px+pw-40,sy+30);
    } else if(lv>=def.maxLv && unlocked){
      ctx.fillStyle='#fd0'; ctx.font='bold 11px Arial'; ctx.textAlign='center';
      ctx.fillText('MAX',px+pw-40,sy+28);
    }
  }
}


// === PANEL: QUEST LOG ===
function drawQuestPanel(){
  const pw=560, ph=480, px=(W-pw)/2, py=(H-ph)/2;
  ctx.fillStyle='rgba(5,2,10,0.97)';
  drawRoundRect(ctx,px,py,pw,ph,10,'rgba(5,2,10,0.97)','#a80');
  ctx.lineWidth=2;
  ctx.fillStyle='#fd0'; ctx.font='bold 18px Arial'; ctx.textAlign='center';
  ctx.fillText('QUEST LOG',px+pw/2,py+28);

  // Tabs
  const tabs=['active','available','completed'];
  for(let i=0;i<tabs.length;i++){
    const tx=px+10+i*180, ty=py+38;
    const active=G.questTab===tabs[i];
    ctx.fillStyle=active?'rgba(100,70,0,0.9)':'rgba(30,20,10,0.8)';
    drawRoundRect(ctx,tx,ty,170,24,4,active?'rgba(100,70,0,0.9)':'rgba(30,20,10,0.8)',active?'#fd0':'#555');
    ctx.fillStyle=active?'#fff':'#888'; ctx.font='bold 12px Arial'; ctx.textAlign='center';
    ctx.fillText(tabs[i].charAt(0).toUpperCase()+tabs[i].slice(1),tx+85,ty+16);
  }

  let quests;
  if(G.questTab==='active') quests=G.quests.getActive();
  else if(G.questTab==='available') quests=G.quests.getAvailable();
  else quests=G.quests.getCompleted();

  const listY=py+72;
  if(quests.length===0){
    ctx.fillStyle='#555'; ctx.font='14px Arial'; ctx.textAlign='center';
    ctx.fillText('No quests here.',px+pw/2,listY+60);
  }

  for(let i=0;i<quests.length;i++){
    const q=quests[i];
    const qs=G.quests.quests[q.id];
    const qy=listY+i*90;
    if(qy>py+ph-40) break;
    ctx.fillStyle='rgba(20,15,5,0.9)';
    drawRoundRect(ctx,px+10,qy,pw-20,82,6,'rgba(20,15,5,0.9)','#664');

    ctx.fillStyle='#fd0'; ctx.font='bold 14px Arial'; ctx.textAlign='left';
    ctx.fillText(q.name,px+18,qy+18);
    ctx.fillStyle='#ccc'; ctx.font='12px Arial';
    ctx.fillText(q.desc,px+18,qy+34);

    // Progress
    if(G.questTab==='active'){
      const total=q.killCount||q.collectNoah;
      const prog=Math.min(qs.progress,total);
      const pct=prog/total;
      ctx.fillStyle='#333'; ctx.fillRect(px+18,qy+42,pw-60,8);
      ctx.fillStyle='#4f4'; ctx.fillRect(px+18,qy+42,(pw-60)*pct,8);
      ctx.fillStyle='#aaa'; ctx.font='11px Arial';
      ctx.fillText(`${prog}/${total}`,px+18,qy+64);
    }

    // Rewards
    const rewards=[];
    rewards.push(q.rewards.exp+' EXP');
    rewards.push(q.rewards.noah+' Noah');
    if(q.rewards.items&&q.rewards.items.length>0) rewards.push(q.rewards.items.map(id=>ITEM_DEFS[id]?ITEM_DEFS[id].name:'?').join(', '));
    ctx.fillStyle='#a80'; ctx.font='11px Arial'; ctx.textAlign='left';
    ctx.fillText('Reward: '+rewards.join(' | '),px+18,G.questTab==='active'?qy+78:qy+54);

    // Buttons
    if(G.questTab==='available'){
      ctx.fillStyle='#4a4';
      drawRoundRect(ctx,px+pw-90,qy+25,75,28,6,'#4a4','#2a2');
      ctx.fillStyle='#fff'; ctx.font='bold 12px Arial'; ctx.textAlign='center';
      ctx.fillText('Accept',px+pw-52,qy+43);
    } else if(G.questTab==='active'){
      ctx.fillStyle='#833';
      drawRoundRect(ctx,px+pw-100,qy+25,85,28,6,'#833','#622');
      ctx.fillStyle='#fff'; ctx.font='bold 12px Arial'; ctx.textAlign='center';
      ctx.fillText('Abandon',px+pw-57,qy+43);
    } else {
      ctx.fillStyle='#353';
      drawRoundRect(ctx,px+pw-90,qy+25,75,28,6,'#353','#242');
      ctx.fillStyle='#4f4'; ctx.font='bold 12px Arial'; ctx.textAlign='center';
      ctx.fillText('DONE',px+pw-52,qy+43);
    }
  }
}

// === PANEL: STAT ASSIGNMENT ===
function drawStatPanel(){
  const pw=400, ph=380, px=(W-pw)/2, py=(H-ph)/2;
  ctx.fillStyle='rgba(5,2,10,0.97)';
  drawRoundRect(ctx,px,py,pw,ph,10,'rgba(5,2,10,0.97)','#fd0');

  ctx.fillStyle='#fd0'; ctx.font='bold 18px Arial'; ctx.textAlign='center';
  ctx.fillText('STAT ASSIGNMENT',px+pw/2,py+28);
  ctx.fillStyle='#fff'; ctx.font='bold 14px Arial';
  ctx.fillText(`Available Points: ${p.statPoints}`,px+pw/2,py+48);

  if(!G.statPanelStats){
    G.statPanelStats={str:p.str,dex:p.dex,int:p.int,extraHp:0,extraMp:0,points:p.statPoints};
  }
  const sp=G.statPanelStats;

  const statRows=[
    {key:'str',label:'STR',desc:'ATK, DEF, MaxHP',val:sp.str},
    {key:'dex',label:'DEX',desc:'Crit Chance, Speed',val:sp.dex},
    {key:'int',label:'INT',desc:'MaxMP, Skill Power',val:sp.int},
    {key:'extraHp',label:'HP+',desc:'+30 MaxHP per point',val:sp.extraHp},
    {key:'extraMp',label:'MP+',desc:'+20 MaxMP per point',val:sp.extraMp},
  ];

  for(let i=0;i<statRows.length;i++){
    const row=statRows[i];
    const ry=py+70+i*52;
    ctx.fillStyle='rgba(20,15,5,0.8)';
    drawRoundRect(ctx,px+15,ry,pw-30,44,6,'rgba(20,15,5,0.8)','#444');
    ctx.fillStyle='#fd0'; ctx.font='bold 14px Arial'; ctx.textAlign='left';
    ctx.fillText(row.label,px+28,ry+18);
    ctx.fillStyle='#ccc'; ctx.font='11px Arial';
    ctx.fillText(row.desc,px+70,ry+18);
    ctx.fillStyle='#fff'; ctx.font='bold 16px Arial'; ctx.textAlign='center';
    ctx.fillText(row.val,px+270,ry+28);
    // - button

function doAnvilEnhance(){
  if(!G.anvilSelected) return;
  const it=G.anvilSelected.item;
  const inv=G.player.inventory;
  const en=it.enhance;
  if(en>=10){ G.anvilMsg='Already MAX enhance!'; G.anvilMsgTimer=2; return; }
  const cost=en>=6?(en+1)*300:(en+1)*100;
  if(inv.noah<cost){ G.anvilMsg='Not enough Noah!'; G.anvilMsgTimer=2; return; }
  inv.noah-=cost;

  let successChance,burnChance=0;
  if(en<6){ successChance=0.60; }
  else if(en===6){ successChance=0.60; }
  else if(en===7){ successChance=0.70; burnChance=0.30; }
  else if(en===8){ successChance=0.50; burnChance=0.50; }
  else if(en===9){ successChance=0.30; burnChance=0.70; }
  else { successChance=0.10; burnChance=0.90; }

  const roll=Math.random();
  if(roll<successChance){
    it.enhance++;
    G.anvilMsg='SUCCESS! +'+it.enhance;
    G.anvilMsgTimer=2;
    G.particles.spawn('spark',G.player.x,G.player.y,'');
    G.particles.spawn('spark',G.player.x+20,G.player.y-20,'');
  } else if(en>=6 && roll<successChance+burnChance){
    // Destroy item
    G.anvilMsg='DESTROYED! Item burned to ash!';
    G.anvilMsgTimer=3;
    G.anvilFlash=1;
    G.particles.spawn('burn',G.player.x,G.player.y,'');
    // Remove from inventory or equipment
    if(G.anvilSelected.src==='inv'){
      inv.slots[G.anvilSelected.idx]=null;
    } else {
      inv.equipment[G.anvilSelected.slot]=null;
      G.player.recalcStats();
    }
    G.anvilSelected=null;
  } else {
    G.anvilMsg='FAILED! Noah lost.';
    G.anvilMsgTimer=2;
  }
}

function updateMenuParticles(dt){
  G.menuTimer+=dt;
  if(G.menuParticles.length<60){
    G.menuParticles.push({
      x:rnd(0,W), y:H+10,
      vx:rnd(-20,20), vy:rnd(-50,-150),
      color:`hsl(${rnd(30,60)},100%,${rnd(50,80)}%)`,
      life:rnd(3,7), maxLife:rnd(3,7), r:rnd(2,5)
    });
  }
  for(let i=G.menuParticles.length-1;i>=0;i--){
    const p=G.menuParticles[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt;
    p.life-=dt;
    if(p.life<=0||p.y<-20) G.menuParticles.splice(i,1);
  }
}

// === GROUND ITEMS DRAWING ===
function drawGroundItems(cam){
  for(let i=G.groundItems.length-1;i>=0;i--){
    const gi=G.groundItems[i];
    gi.glowTimer+=1/60;
    const s=worldToScreen(gi.x,gi.y,cam);
    if(s.x<-30||s.x>W+30||s.y<-30||s.y>H+30) continue;
    const glow=Math.sin(gi.glowTimer*4)*0.3+0.7;
    ctx.save();
    ctx.shadowColor=gi.item.color||'#fff';
    ctx.shadowBlur=12*glow;
    ctx.fillStyle=gi.item.color||'#aaa';
    ctx.beginPath(); ctx.arc(s.x,s.y,10,0,Math.PI*2); ctx.fill();
    ctx.restore();
    ctx.fillStyle='#fff'; ctx.font='bold 10px Arial'; ctx.textAlign='center';
    ctx.fillText(gi.item.symbol||'?',s.x,s.y+4);
    // Pick up if player nearby
    if(dist(G.player,gi)<30){
      const picked=G.player.inventory.addItem(gi.item);
      if(picked) G.groundItems.splice(i,1);
    }
  }
}

// === INPUT HANDLERS ===
function setupInput(){
  document.addEventListener('keydown',e=>{
    G.keys[e.code]=true;
    if(G.state==='playing'||G.state==='inventory'||G.state==='skills'||G.state==='quests'||G.state==='anvil'||G.state==='stat'){
      // Skill hotkeys
      if(G.state==='playing'){
        const skillKeys=['Digit1','Digit2','Digit3','Digit4','Digit5','Digit6','Digit7'];
        const si=skillKeys.indexOf(e.code);
        if(si>=0 && si<SKILL_ORDER.length) G.skills.use(SKILL_ORDER[si],G.player,G.mobs);
      }
      if(e.code==='KeyI'){ G.state=G.state==='inventory'?'playing':'inventory'; e.preventDefault(); }
      if(e.code==='KeyK'){ G.state=G.state==='skills'?'playing':'skills'; e.preventDefault(); }
      if(e.code==='KeyJ'){ G.state=G.state==='quests'?'playing':'quests'; e.preventDefault(); }
      if(e.code==='KeyU'){ G.state=G.state==='anvil'?'playing':'anvil'; e.preventDefault(); }
      if(e.code==='KeyP'){
        if(G.state==='stat'){ applyStatPanel(); G.state='playing'; }
        else { G.statPanelStats=null; G.state='stat'; }
        e.preventDefault();
      }
      if(e.code==='Escape'){
        if(G.state!=='playing') G.state='playing';
        else G.state='menu';
        e.preventDefault();
      }
      if(e.code==='F5'){ e.preventDefault(); saveGame(); G.particles.spawn('heal',G.player.x,G.player.y,'Saved!'); }
      if(e.code==='F9'){ e.preventDefault(); loadGame(); G.particles.spawn('heal',G.player.x,G.player.y,'Loaded!'); }
    }
  });
  document.addEventListener('keyup',e=>{ G.keys[e.code]=false; });

  canvas.addEventListener('mousemove',e=>{
    G.mouseX=e.clientX; G.mouseY=e.clientY;
    if(G.state==='inventory'){
      const p=G.player;
      const pw=640, ph=460, px=(W-pw)/2, py=(H-ph)/2;
      const slotSize=48, slotPad=4, gridX=px+15, gridY=py+55;
      G.hoveredSlot=-1; G.hoveredEquip=null;
      for(let i=0;i<24;i++){
        const col=i%6, row=Math.floor(i/6);
        const sx=gridX+col*(slotSize+slotPad);
        const sy=gridY+row*(slotSize+slotPad);
        if(G.mouseX>=sx&&G.mouseX<=sx+slotSize&&G.mouseY>=sy&&G.mouseY<=sy+slotSize) G.hoveredSlot=i;
      }
      const eqX=px+340, equipSlotDefs=[
        {key:'weapon',y:py+81},{key:'head',y:py+137},{key:'chest',y:py+193},{key:'legs',y:py+249},{key:'boots',y:py+305}
      ];
      for(const es of equipSlotDefs){
        if(G.mouseX>=eqX&&G.mouseX<=eqX+270&&G.mouseY>=es.y&&G.mouseY<=es.y+50) G.hoveredEquip=es.key;
      }
    }
  });

  canvas.addEventListener('click',e=>{
    const mx=e.clientX, my=e.clientY;
    if(G.state==='menu'){
      const btns=[
        {label:'New Game', y:H/2-30},
        {label:'Continue', y:H/2+30},
        {label:'Controls', y:H/2+90},
      ];
      for(const btn of btns){
        if(mx>=W/2-110&&mx<=W/2+110&&my>=btn.y&&my<=btn.y+44){
          if(btn.label==='New Game'){ initGame(true); G.state='playing'; }
          else if(btn.label==='Continue'&&hasSave()){ initGame(false); G.state='playing'; }
          else if(btn.label==='Controls'){
            // Show controls inline (toggle)
          }
        }
      }
      return;
    }
    if(G.state==='dead'){
      // Respawn button
      if(mx>=W/2-130&&mx<=W/2-10&&my>=H/2+20&&my<=H/2+64){
        G.player.x=500; G.player.y=500;
        G.player.hp=Math.floor(G.player.maxHp*0.5);
        G.player.mp=G.player.maxMp;
        G.camera.x=500; G.camera.y=500;
        G.state='playing';
      }
      // Load button
      if(mx>=W/2+10&&mx<=W/2+130&&my>=H/2+20&&my<=H/2+64){
        loadGame();
        G.player.hp=Math.floor(G.player.maxHp*0.5);
        G.camera.x=G.player.x; G.camera.y=G.player.y;
        G.state='playing';
      }
      return;
    }
    if(G.state==='inventory'){
      const p=G.player;
      const pw=640, ph=460, px2=(W-pw)/2, py2=(H-ph)/2;
      const slotSize=48, slotPad=4, gridX=px2+15, gridY=py2+55;
      for(let i=0;i<24;i++){
        const col=i%6, row=Math.floor(i/6);
        const sx=gridX+col*(slotSize+slotPad);
        const sy=gridY+row*(slotSize+slotPad);
        if(mx>=sx&&mx<=sx+slotSize&&my>=sy&&my<=sy+slotSize){
          const item=p.inventory.slots[i];
          if(item){
            if(e.shiftKey){ // Drop
              G.groundItems.push({x:p.x+rnd(-30,30),y:p.y+rnd(-30,30),item,glowTimer:0});
              p.inventory.slots[i]=null;
            } else {
              const equipTypes=['weapon','head','chest','legs','boots'];
              if(equipTypes.includes(item.type)) p.inventory.equip(i,p);
              else p.inventory.usePotion(i,p);
            }
          }
          return;
        }
      }
      // Equip slots - right click to unequip
      const eqX=px2+340;
      const equipSlotDefs=[
        {key:'weapon',y:py2+81},{key:'head',y:py2+137},{key:'chest',y:py2+193},{key:'legs',y:py2+249},{key:'boots',y:py2+305}
      ];
      for(const es of equipSlotDefs){
        if(mx>=eqX&&mx<=eqX+270&&my>=es.y&&my<=es.y+50){
          p.inventory.unequip(es.key,p);
          return;
        }
      }
      return;
    }
    if(G.state==='skills'){
      const pw=560, ph=500, px2=(W-pw)/2, py2=(H-ph)/2;
      for(let i=0;i<SKILL_ORDER.length;i++){
        const id=SKILL_ORDER[i];
        const def=SKILL_DEFS[id];
        const lv=G.skills.skills[id];
        const sy=py2+65+i*58;
        // + button area
        if(mx>=px2+pw-65&&mx<=px2+pw-15&&my>=sy+12&&my<=sy+40){
          if(G.player.level>=def.unlockLv && lv<def.maxLv && G.player.skillPoints>0){
            G.skills.upgrade(id,G.player);
          }
          return;
        }
      }
      return;
    }
    if(G.state==='quests'){
      const pw=560, ph=480, px2=(W-pw)/2, py2=(H-ph)/2;
      // Tab clicks
      const tabs=['active','available','completed'];
      for(let i=0;i<tabs.length;i++){
        const tx=px2+10+i*180, ty=py2+38;
        if(mx>=tx&&mx<=tx+170&&my>=ty&&my<=ty+24){ G.questTab=tabs[i]; return; }
      }
      // Quest buttons
      let quests;
      if(G.questTab==='active') quests=G.quests.getActive();
      else if(G.questTab==='available') quests=G.quests.getAvailable();
      else quests=G.quests.getCompleted();
      const listY=py2+72;
      for(let i=0;i<quests.length;i++){
        const q=quests[i];
        const qy=listY+i*90;
        if(qy>py2+ph-40) break;
        if(G.questTab==='available'){
          if(mx>=px2+pw-90&&mx<=px2+pw-15&&my>=qy+25&&my<=qy+53){ G.quests.accept(q.id); return; }
        } else if(G.questTab==='active'){
          if(mx>=px2+pw-100&&mx<=px2+pw-15&&my>=qy+25&&my<=qy+53){ G.quests.abandon(q.id); return; }
        }
      }
      return;
    }
    if(G.state==='stat'){
      handleStatPanelClick(mx,my);
      return;
    }
    if(G.state==='anvil'){
      handleAnvilClick(mx,my);
      return;
    }
  });

  canvas.addEventListener('contextmenu',e=>{
    e.preventDefault();
    if(G.state==='playing'){
      const cam=G.camera;
      G.player.moveTarget={
        x: e.clientX - W/2 + cam.x,
        y: e.clientY - H/2 + cam.y
      };
    }
  });

  // Touch events
  canvas.addEventListener('touchstart',e=>{
    e.preventDefault();
    for(const t of e.changedTouches){
      G.joystick.onTouchStart(t);
      // Right side tap = attack button
      if(t.clientX>W*0.6 && t.clientY>H*0.5){
        // Auto-attack is on timer, but also try skill 1
        if(t.clientY<H*0.75){
          G.skills.use(SKILL_ORDER[0],G.player,G.mobs);
        }
      }
    }
  },{passive:false});
  canvas.addEventListener('touchmove',e=>{
    e.preventDefault();
    for(const t of e.changedTouches) G.joystick.onTouchMove(t);
  },{passive:false});
  canvas.addEventListener('touchend',e=>{
    e.preventDefault();
    for(const t of e.changedTouches) G.joystick.onTouchEnd(t);
  },{passive:false});

  window.addEventListener('resize',()=>{
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
  });
}

function handleStatPanelClick(mx,my){
  const pw=400, ph=380, px=(W-pw)/2, py=(H-ph)/2;
  const p=G.player;
  if(!G.statPanelStats) G.statPanelStats={str:p.str,dex:p.dex,int:p.int,extraHp:0,extraMp:0,points:p.statPoints};
  const sp=G.statPanelStats;
  const statKeys=['str','dex','int','extraHp','extraMp'];

  for(let i=0;i<statKeys.length;i++){
    const key=statKeys[i];
    const ry=py+70+i*52;
    // - button
    if(mx>=px+230&&mx<=px+254&&my>=ry+10&&my<=ry+34){
      const base={str:p.str,dex:p.dex,int:p.int,extraHp:0,extraMp:0};
      if(sp[key]>base[key]||sp[key]>0){
        if(key==='str'&&sp.str>p.str){ sp.str--; sp.points++; }
        else if(key==='dex'&&sp.dex>p.dex){ sp.dex--; sp.points++; }
        else if(key==='int'&&sp.int>p.int){ sp.int--; sp.points++; }
        else if(key==='extraHp'&&sp.extraHp>0){ sp.extraHp--; sp.points++; }
        else if(key==='extraMp'&&sp.extraMp>0){ sp.extraMp--; sp.points++; }
      }
      return;
    }
    // + button
    if(mx>=px+300&&mx<=px+324&&my>=ry+10&&my<=ry+34){
      if(sp.points>0){
        sp[key]++;
        sp.points--;
      }
      return;
    }
  }
  // Confirm
  if(mx>=px+pw/2-70&&mx<=px+pw/2+70&&my>=py+ph-55&&my<=py+ph-19){
    applyStatPanel();
    G.state='playing';
    G.pendingStatScreen=false;
  }
}

function applyStatPanel(){
  if(!G.statPanelStats) return;
  const sp=G.statPanelStats;
  const p=G.player;
  p.str=sp.str; p.dex=sp.dex; p.int=sp.int;
  p.maxHp+=sp.extraHp*30;
  p.maxMp+=sp.extraMp*20;
  p.statPoints=sp.points;
  p.recalcStats();
  G.statPanelStats=null;
}

function handleAnvilClick(mx,my){
  const pw=580, ph=480, px=(W-pw)/2, py=(H-ph)/2;
  const p=G.player;
  const inv=p.inventory;
  const equipTypes=['weapon','head','chest','legs','boots'];
  const enhanceable=[];
  for(let i=0;i<24;i++){
    const it=inv.slots[i];
    if(it&&equipTypes.includes(it.type)) enhanceable.push({item:it,src:'inv',idx:i});
  }
  for(const slot of equipTypes){
    const it=inv.equipment[slot];
    if(it) enhanceable.push({item:it,src:'equip',slot});
  }

  const listX=px+10, listY=py+58;
  for(let i=0;i<Math.min(enhanceable.length,9);i++){
    const iy=listY+i*40;
    if(mx>=listX&&mx<=listX+240&&my>=iy&&my<=iy+36){
      G.anvilSelected=enhanceable[i];
      return;
    }
  }

  // Enhance button
  if(G.anvilSelected){
    const selX=px+270, selY=py+55;
    const bx=selX+30, by=selY+272, bw=pw-340, bh=44;
    if(mx>=bx&&mx<=bx+bw&&my>=by&&my<=by+bh){
      doAnvilEnhance();
      return;
    }
  }
}


// === MOBILE UI BUTTONS ===
function drawMobileUI(){
  const isMobile = ('ontouchstart' in window);
  if(!isMobile) return;
  // Joystick
  G.joystick.draw();

  // Attack button (right side)
  ctx.globalAlpha=0.7;
  ctx.fillStyle='rgba(200,30,30,0.8)';
  ctx.beginPath(); ctx.arc(W-80,H-130,44,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#f44'; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle='#fff'; ctx.font='bold 14px Arial'; ctx.textAlign='center';
  ctx.fillText('ATK',W-80,H-125);

  // Mini skill buttons
  const skillBtns=[
    {id:SKILL_ORDER[0],x:W-160,y:H-100,r:28},
    {id:SKILL_ORDER[1],x:W-200,y:H-170,r:28},
    {id:SKILL_ORDER[2],x:W-130,y:H-200,r:28},
    {id:SKILL_ORDER[3],x:W-60,y:H-210,r:28},
  ];
  for(const sb of skillBtns){
    const def=SKILL_DEFS[sb.id];
    const lv=G.skills.skills[sb.id];
    const cd=G.skills.cooldowns[sb.id];
    ctx.fillStyle=lv>0?def.color:'rgba(40,40,40,0.8)';
    ctx.beginPath(); ctx.arc(sb.x,sb.y,sb.r,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1; ctx.stroke();
    ctx.fillStyle='#fff'; ctx.font='bold 10px Arial'; ctx.textAlign='center';
    ctx.fillText(def.name.slice(0,3),sb.x,sb.y+4);
    if(cd>0){
      ctx.fillStyle='rgba(0,0,0,0.6)';
      ctx.beginPath(); ctx.arc(sb.x,sb.y,sb.r,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#fff'; ctx.font='bold 11px Arial';
      ctx.fillText(Math.ceil(cd),sb.x,sb.y+5);
    }
  }
  ctx.globalAlpha=1;
}

// === MAIN GAME LOOP ===
let lastTime=0;
function gameLoop(ts){
  const dt=Math.min((ts-lastTime)/1000, 0.05);
  lastTime=ts;

  ctx.clearRect(0,0,W,H);

  if(G.state==='menu'){
    updateMenuParticles(dt);
    drawMenuScreen();
    requestAnimationFrame(gameLoop);
    return;
  }

  if(G.state==='dead'){
    // Still draw world behind
    if(G.world) G.world.draw(G.camera);
    drawDeathScreen();
    requestAnimationFrame(gameLoop);
    return;
  }

  // === UPDATE ===
  if(G.state==='playing'){
    G.player.update(dt, G.keys, G.mobs);
    G.camera.follow(G.player, dt);
    G.skills.update(dt);
    G.quests.update(G.player);
    G.quests.checkNoah(G.player.inventory.noah);

    // Mob updates + respawn
    for(const mob of G.mobs){
      if(mob.dead){
        if(mob.respawnTimer>0){
          mob.respawnTimer-=dt;
          if(mob.respawnTimer<=0) mob.respawn();
        }
      } else {
        mob.update(dt, G.player);
      }
    }

    G.particles.update(dt);

    if(G.pendingStatScreen){
      G.pendingStatScreen=false;
      G.statPanelStats=null;
      G.state='stat';
    }
  } else {
    // Still update particles + camera in panels
    G.particles.update(dt);
    G.camera.follow(G.player, dt);
    G.skills.update(dt);
    G.quests.update(G.player);
    G.quests.checkNoah(G.player.inventory.noah);
  }

  // === DRAW WORLD ===
  G.world.draw(G.camera);
  drawGroundItems(G.camera);

  // Draw mobs
  for(const mob of G.mobs){
    if(!mob.dead || mob.deadTimer>0) mob.draw(G.camera);
  }

  // Draw player
  G.player.draw(G.camera);

  // Draw particles
  G.particles.draw(G.camera);

  // === DRAW HUD ===
  drawHUD();
  drawMobileUI();

  // === DRAW PANELS ===
  if(G.state==='inventory') drawInventoryPanel();
  else if(G.state==='skills') drawSkillPanel();
  else if(G.state==='quests') drawQuestPanel();
  else if(G.state==='stat') drawStatPanel();
  else if(G.state==='anvil') drawAnvilPanel();

  requestAnimationFrame(gameLoop);
}

// === STARTUP ===
setupInput();

// Init with menu particles
G.menuParticles=[];
G.menuTimer=0;
G.rainbowAngle=0;

// Start menu loop
requestAnimationFrame(gameLoop);

}; // end window.onload
</script>

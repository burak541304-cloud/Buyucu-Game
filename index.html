<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Savaşçının Yolculuğu - 2D RPG</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0d1420;--fg:#e8dcc8;--card:rgba(20,28,40,0.92);--card-solid:#141c28;
--border:#1e2a3a;--muted:#1a2233;--muted-fg:#6b7a8d;
--primary-h:45;--primary-s:90%;--primary-l:55%;
--primary:hsl(45,90%,55%);--primary-fg:#0d1420;
--secondary:hsl(0,70%,45%);--secondary-fg:#f5f0e8;
--accent:hsl(280,50%,40%);
}
body{background:var(--bg);color:var(--fg);font-family:'Inter',sans-serif;overflow:hidden;user-select:none;-webkit-user-select:none;touch-action:none;margin:0;padding:0}
canvas{display:block;position:absolute;top:0;left:0}
.hud-bars{position:absolute;top:8px;left:8px;width:220px;z-index:10;pointer-events:none}
.hud-card{background:var(--card);backdrop-filter:blur(8px);border-radius:6px;padding:8px;border:1px solid var(--border)}
.bar-row{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.bar-icon{font-size:11px;width:16px;text-align:center}
.bar-track{flex:1;height:16px;background:var(--muted);border-radius:3px;overflow:hidden;position:relative}
.bar-fill{height:100%;transition:width .3s}
.bar-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--fg);text-shadow:0 1px 2px rgba(0,0,0,.6)}
.bar-hp .bar-fill{background:linear-gradient(90deg,hsl(0,70%,35%),hsl(0,70%,50%))}
.bar-mp .bar-fill{background:linear-gradient(90deg,hsl(220,70%,35%),hsl(220,70%,55%))}
.bar-pwr .bar-fill{background:linear-gradient(90deg,hsl(30,80%,40%),hsl(45,90%,55%))}
.bar-xp .bar-fill{background:linear-gradient(90deg,hsl(120,40%,25%),hsl(120,50%,45%))}
.hud-stats{display:flex;justify-content:space-between;font-size:9px;color:var(--muted-fg);margin-top:3px}
.player-info{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px}
.player-name{font-family:'Cinzel',serif;font-weight:700;color:var(--primary)}
.combat-log{position:absolute;bottom:8px;left:8px;width:260px;z-index:10;pointer-events:none}
.log-card{background:var(--card);backdrop-filter:blur(8px);border-radius:6px;padding:8px;border:1px solid var(--border);max-height:90px;overflow:hidden}
.log-line{font-size:9px;line-height:1.4}
.log-line:first-child{color:var(--fg)}.log-line:not(:first-child){color:var(--muted-fg)}
.menu-btns{position:absolute;z-index:20;display:flex;gap:6px}
.menu-btn{display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:4px;background:var(--card);border:1px solid var(--border);color:var(--fg);font-size:11px;cursor:pointer;transition:background .2s}
.menu-btn:hover{background:var(--muted)}
.menu-btn.active{background:rgba(200,170,50,.2);border-color:var(--primary)}
.menu-shortcut{font-size:7px;color:var(--muted-fg)}
.skill-bar{position:absolute;z-index:20;display:flex;gap:8px}
.skill-btn{position:relative;width:56px;height:56px;border-radius:6px;border:2px solid var(--primary);background:var(--card-solid);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.skill-btn:hover:not(.disabled){background:rgba(200,170,50,.15)}
.skill-btn:active:not(.disabled){transform:scale(.93)}
.skill-btn.disabled{border-color:var(--muted);opacity:.5;cursor:not-allowed}
.skill-btn.ultimate{border-color:#f59e0b;animation:pulse 1.5s infinite}
.skill-icon{font-size:20px;z-index:1}.skill-key{font-size:7px;color:var(--muted-fg);z-index:1}
.skill-mana{position:absolute;top:-4px;right:-4px;background:hsl(220,70%,50%);font-size:6px;color:#fff;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-weight:700}
.skill-cd{position:absolute;inset:0;background:rgba(26,34,51,.7);border-radius:4px}
.potion-btn{width:48px;height:56px;border-radius:6px;border:1px solid var(--border);background:var(--card-solid);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.potion-btn:hover:not(.disabled){background:rgba(200,170,50,.1)}
.potion-btn.disabled{opacity:.3;cursor:not-allowed}
.potion-icon{font-size:18px}.potion-count{font-size:7px;color:var(--muted-fg)}
@keyframes pulse{0%,100%{box-shadow:0 0 5px rgba(245,158,11,.3)}50%{box-shadow:0 0 15px rgba(245,158,11,.6)}}
.joystick-area{position:absolute;bottom:32px;left:32px;width:112px;height:112px;z-index:20}
.joystick-base{position:absolute;inset:0;border-radius:50%;background:rgba(26,34,51,.4);border:2px solid rgba(30,42,58,.5)}
.joystick-knob{position:absolute;width:48px;height:48px;border-radius:50%;background:rgba(200,170,50,.5);border:2px solid var(--primary);box-shadow:0 2px 10px rgba(0,0,0,.3);transition:none}
.panel-overlay{position:absolute;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;background:rgba(13,20,32,.8);backdrop-filter:blur(4px)}
.panel{background:var(--card-solid);border:1px solid var(--border);border-radius:8px;padding:16px;width:90vw;max-width:480px;max-height:80vh;overflow-y:auto}
.panel h2{font-family:'Cinzel',serif;color:var(--primary);font-size:18px;font-weight:700}
.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.close-btn{color:var(--muted-fg);font-size:20px;cursor:pointer;background:none;border:none}
.close-btn:hover{color:var(--fg)}
.equip-row{display:flex;gap:8px;margin-bottom:12px;padding:8px;background:rgba(26,34,51,.3);border-radius:6px}
.equip-slot{flex:1;padding:8px;background:var(--card-solid);border-radius:4px;border:1px solid var(--border);text-align:center}
.equip-label{font-size:9px;color:var(--muted-fg);margin-bottom:4px}
.equip-icon{font-size:20px}
.equip-name{font-size:8px;margin-top:2px}
.equip-stats{font-size:7px;color:var(--muted-fg)}
.inv-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.inv-slot{aspect-ratio:1;border-radius:4px;border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;cursor:pointer;transition:border-color .2s;background:rgba(26,34,51,.15)}
.inv-slot:hover{border-color:var(--primary)}.inv-slot.equipped{box-shadow:0 0 0 1px var(--primary)}
.inv-slot .item-icon{font-size:16px}.inv-slot .item-name{font-size:6px;line-height:1.2}
.inv-slot .lock-icon{position:absolute;top:1px;left:3px;font-size:7px}
.inv-actions{position:absolute;bottom:0;left:0;right:0;display:flex;font-size:6px}
.inv-actions button{flex:1;border:none;cursor:pointer;padding:1px 0;font-size:6px}
.act-equip{background:rgba(200,170,50,.7);color:var(--primary-fg)}.act-equip:hover{background:var(--primary)}
.act-sell{background:rgba(180,50,50,.7);color:var(--secondary-fg)}.act-sell:hover{background:var(--secondary)}
.act-lock{background:var(--muted);color:var(--muted-fg)}.act-lock:hover{background:var(--accent)}
.trash-btn{width:100%;padding:6px;margin-bottom:8px;border-radius:4px;background:var(--secondary);color:var(--secondary-fg);border:none;cursor:pointer;font-size:11px;transition:opacity .2s}
.trash-btn:hover{opacity:.8}
.shop-item{display:flex;align-items:center;justify-content:space-between;padding:8px;background:rgba(26,34,51,.2);border-radius:4px;margin-bottom:4px}
.shop-item:hover{background:rgba(26,34,51,.4)}
.shop-info{display:flex;align-items:center;gap:8px}
.shop-icon{font-size:18px}
.shop-name{font-size:12px;font-weight:500}
.shop-stats{font-size:9px;color:var(--muted-fg)}
.buy-btn{font-size:11px;padding:4px 8px;border-radius:4px;border:none;cursor:pointer;transition:opacity .2s}
.buy-btn.can-buy{background:var(--primary);color:var(--primary-fg)}.buy-btn.can-buy:hover{opacity:.8}
.buy-btn.no-buy{background:var(--muted);color:var(--muted-fg);cursor:not-allowed}
.quest-block{padding:12px;background:rgba(26,34,51,.3);border-radius:6px;border:1px solid var(--border);margin-bottom:8px}
.quest-title{font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:var(--primary)}
.quest-desc{font-size:11px;color:var(--muted-fg);margin-top:4px}
.quest-progress{margin-top:8px;display:flex;align-items:center;gap:8px}
.quest-bar{flex:1;height:8px;background:var(--muted);border-radius:4px;overflow:hidden}
.quest-bar-fill{height:100%;background:linear-gradient(90deg,hsl(120,40%,25%),hsl(120,50%,45%));transition:width .3s}
.quest-count{font-size:11px;font-weight:700}
.quest-rewards{font-size:9px;color:var(--muted-fg);margin-top:8px}
.quest-accept-btn,.quest-turnin-btn{width:100%;padding:8px;margin-top:12px;border-radius:4px;border:none;cursor:pointer;font-family:'Cinzel',serif;font-size:13px;transition:opacity .2s}
.quest-accept-btn{background:var(--primary);color:var(--primary-fg)}.quest-accept-btn:hover{opacity:.85}
.quest-turnin-btn{background:var(--primary);color:var(--primary-fg)}.quest-turnin-btn:hover{opacity:.85}
.quest-tracker{position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:none}
.tracker-card{background:var(--card);backdrop-filter:blur(4px);border-radius:4px;padding:4px 12px;border:1px solid var(--border);text-align:center;white-space:nowrap}
.tracker-name{font-size:10px;color:var(--primary);font-family:'Cinzel',serif}
.tracker-count{font-size:10px;color:var(--muted-fg);margin-left:8px}
.death-overlay{position:absolute;inset:0;z-index:40;display:flex;align-items:center;justify-content:center;background:rgba(13,20,32,.92);backdrop-filter:blur(8px)}
.death-title{font-family:'Cinzel',serif;font-size:36px;font-weight:700;color:var(--secondary);text-shadow:0 0 10px rgba(180,50,50,.6)}
.death-sub{color:var(--muted-fg);font-size:13px;margin:12px 0 20px}
.respawn-btn{padding:12px 24px;border-radius:6px;background:var(--primary);color:var(--primary-fg);font-family:'Cinzel',serif;font-size:16px;border:none;cursor:pointer;transition:opacity .2s}
.respawn-btn:hover{opacity:.85}
.kb-hints{position:absolute;bottom:8px;right:8px;z-index:10;pointer-events:none}
.kb-card{background:rgba(20,28,40,.6);backdrop-filter:blur(4px);border-radius:4px;padding:6px;border:1px solid var(--border);font-size:7px;color:var(--muted-fg);line-height:1.6}
.gold-display{font-size:12px;color:hsl(45,90%,55%)}
.rarity-common{color:#9ca3af}.rarity-uncommon{color:#22c55e}.rarity-rare{color:#3b82f6}.rarity-epic{color:#a855f7}.rarity-legendary{color:#f59e0b}
.auto-sell-row{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;margin-bottom:8px;background:rgba(26,34,51,.3);border-radius:4px;border:1px solid var(--border)}
.auto-sell-label{font-size:10px;color:var(--muted-fg)}
.auto-sell-toggles{display:flex;gap:4px}
.auto-sell-btn{padding:2px 6px;border-radius:3px;border:1px solid var(--border);background:var(--muted);color:var(--muted-fg);font-size:8px;cursor:pointer;transition:all .2s}
.auto-sell-btn.active{background:var(--primary);color:var(--primary-fg);border-color:var(--primary)}
</style>
</head>

// ==================== UTILITIES ====================
let nextId=1;
function uid(){return 'id_'+(nextId++)}
function dist(a,b){return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2)}
function calcDamage(atk,def,mult){const base=Math.max(1,atk*mult-def*.5);return Math.floor(base*(.9+Math.random()*.2))}
function seededRandom(x,y,seed){let h=seed+x*374761393+y*668265263;h=(h^(h>>13))*1274126177;h=h^(h>>16);return(h&0x7fffffff)/0x7fffffff}

// ==================== PARTICLES & EFFECTS ====================
const particles=[];
const floatingTexts=[];
let screenShake={x:0,y:0,intensity:0,duration:0};

function addParticle(x,y,color,count,speed,life,size){
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2;
    const spd=speed*(0.5+Math.random());
    particles.push({x,y,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,life:life*(0.7+Math.random()*0.6),maxLife:life,color,size:size*(0.5+Math.random())});
  }
}

function addFloatingText(x,y,text,color,size){
  floatingTexts.push({x,y,text,color,size:size||14,life:1.2,maxLife:1.2,vy:-40});
}

function shakeScreen(intensity,duration){
  screenShake.intensity=intensity;screenShake.duration=duration;
}

function updateParticles(delta){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*delta;p.y+=p.vy*delta;
    p.vy+=80*delta; // gravity
    p.life-=delta;
    if(p.life<=0)particles.splice(i,1);
  }
  for(let i=floatingTexts.length-1;i>=0;i--){
    const ft=floatingTexts[i];
    ft.y+=ft.vy*delta;
    ft.life-=delta;
    if(ft.life<=0)floatingTexts.splice(i,1);
  }
  if(screenShake.duration>0){
    screenShake.duration-=delta;
    screenShake.x=(Math.random()-0.5)*screenShake.intensity*2;
    screenShake.y=(Math.random()-0.5)*screenShake.intensity*2;
    if(screenShake.duration<=0){screenShake.x=0;screenShake.y=0;screenShake.intensity=0;}
  }
}

function drawParticles(ox,oy){
  particles.forEach(p=>{
    const alpha=Math.max(0,p.life/p.maxLife);
    ctx.globalAlpha=alpha;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x*SCALE+ox,p.y*SCALE+oy,p.size,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;
  floatingTexts.forEach(ft=>{
    const alpha=Math.max(0,ft.life/ft.maxLife);
    ctx.globalAlpha=alpha;
    ctx.fillStyle=ft.color;
    ctx.font='bold '+ft.size+'px Inter';
    ctx.textAlign='center';
    ctx.fillText(ft.text,ft.x*SCALE+ox,ft.y*SCALE+oy);
  });
  ctx.globalAlpha=1;
}

// ==================== ENEMY CREATION ====================
function generateLoot(enemyType,level,isBoss){
  const items=[];
  const table=LOOT_TABLES[enemyType]||LOOT_TABLES.worm;
  const dropChance=isBoss?1:(0.3+level*0.02);
  
  if(Math.random()<dropChance){
    // Pick from loot table weighted by rarity
    const weights={common:40,uncommon:25,rare:15,epic:8,legendary:2};
    if(isBoss){weights.rare=30;weights.epic=25;weights.legendary=15;}
    const candidates=table.filter(l=>{
      const w=weights[l.rarity]||10;
      return Math.random()*100<w;
    });
    if(candidates.length>0){
      const loot=candidates[Math.floor(Math.random()*candidates.length)];
      const item={id:uid(),name:loot.name,type:loot.type,rarity:loot.rarity,icon:loot.icon,
        locked:false,equipped:false,healAmount:0,manaAmount:0};
      if(loot.type==='trash'){
        item.value=Math.floor(loot.valueBase*(1+level*0.3)*(isBoss?3:1));
        item.attackBonus=0;item.defenseBonus=0;
      }else{
        item.attackBonus=Math.floor((loot.atkBase||0)*(1+level*0.2)*(isBoss?2:1));
        item.defenseBonus=Math.floor((loot.defBase||0)*(1+level*0.2)*(isBoss?2:1));
        item.value=Math.floor(20*(1+level*0.5)*(isBoss?3:1)*(RARITY_ORDER.indexOf(loot.rarity)+1));
      }
      items.push(item);
    }
  }
  // Extra trash drop
  if(Math.random()<0.5){
    const trashTable=table.filter(l=>l.type==='trash');
    if(trashTable.length>0){
      const t=trashTable[Math.floor(Math.random()*trashTable.length)];
      items.push({id:uid(),name:t.name,type:'trash',rarity:t.rarity,icon:t.icon,
        value:Math.floor(t.valueBase*(1+level*0.2)),attackBonus:0,defenseBonus:0,healAmount:0,manaAmount:0,locked:false,equipped:false});
    }
  }
  return items;
}

function createEnemy(type,level,isBoss){
  const configs={
    worm:{zone:WORM_ZONE,zoneR:30,baseHp:60,baseAtk:8,baseDef:3,spd:1.5,name:'Solucan',bossName:'Dev Solucan',color:'#a855f7',bossColor:'#dc2626'},
    wolf:{zone:WOLF_ZONE,zoneR:30,baseHp:80,baseAtk:12,baseDef:5,spd:2.2,name:'Kurt',bossName:'Alfa Kurt',color:'#6b7280',bossColor:'#f59e0b'},
    skeleton:{zone:SKELETON_ZONE,zoneR:30,baseHp:100,baseAtk:15,baseDef:8,spd:1.8,name:'İskelet',bossName:'İskelet Kral',color:'#d1d5db',bossColor:'#a855f7'},
    golem:{zone:GOLEM_ZONE,zoneR:30,baseHp:200,baseAtk:20,baseDef:20,spd:1,name:'Golem',bossName:'Taş Dev',color:'#78716c',bossColor:'#f97316'},
  };
  const c=configs[type]||configs.worm;
  const m=1+(level-1)*0.2,bm=isBoss?5:1;
  const hp=Math.floor(c.baseHp*m*bm),atk=Math.floor(c.baseAtk*m*bm),def=Math.floor(c.baseDef*m*bm);
  const angle=Math.random()*Math.PI*2,d=10+Math.random()*c.zoneR;
  const items=generateLoot(type,level,isBoss);
  return{id:uid(),name:isBoss?c.bossName:(c.name+' Lv.'+level),level,type,
    stats:{maxHp:hp,hp,maxMp:0,mp:0,attack:atk,defense:def,speed:c.spd},
    position:{x:c.zone.x+Math.cos(angle)*d,y:c.zone.y+Math.sin(angle)*d},
    isBoss,color:isBoss?c.bossColor:c.color,
    reward:{exp:Math.floor((isBoss?200:30)*m*(type==='golem'?2:type==='skeleton'?1.5:type==='wolf'?1.2:1)),
            gold:Math.floor((isBoss?100:15)*m*(type==='golem'?2:type==='skeleton'?1.5:type==='wolf'?1.2:1)),items},
    attackCooldown:isBoss?2:1.5,currentAttackCooldown:0,hitFlash:0};
}

function spawnEnemies(){
  const e=[];
  for(let i=0;i<5;i++)e.push(createEnemy('worm',Math.floor(Math.random()*5)+1));
  e.push(createEnemy('worm',5,true));

}

    isAlive:true,attackRange:60,facingRight:true,isAttacking:false,attackAnimTimer:0,
    autoSell:{common:false,uncommon:false}
  };
}

function recalcStats(p){
  let ba=0,bd=0;
  if(p.equippedSword){ba+=p.equippedSword.attackBonus;bd+=p.equippedSword.defenseBonus||0;}
  if(p.equippedArmor){bd+=p.equippedArmor.defenseBonus;ba+=p.equippedArmor.attackBonus||0;}
  p.stats.maxHp=p.baseStats.maxHp;p.stats.maxMp=p.baseStats.maxMp;
  p.stats.attack=p.baseStats.attack+ba;p.stats.defense=p.baseStats.defense+bd;
  p.stats.speed=p.baseStats.speed;
  p.stats.hp=Math.min(p.stats.hp,p.stats.maxHp);
  p.stats.mp=Math.min(p.stats.mp,p.stats.maxMp);
}

function checkLevelUp(p,log){
  while(p.exp>=p.expToNext){
    p.exp-=p.expToNext;p.level++;
    p.expToNext=Math.floor(EXP_BASE*Math.pow(EXP_GROWTH,p.level-1));
    p.baseStats.maxHp+=STATS_PER_LEVEL.maxHp;p.baseStats.maxMp+=STATS_PER_LEVEL.maxMp;
    p.baseStats.attack+=STATS_PER_LEVEL.attack;p.baseStats.defense+=STATS_PER_LEVEL.defense;
    p.baseStats.speed+=STATS_PER_LEVEL.speed;
    recalcStats(p);p.stats.hp=p.stats.maxHp;p.stats.mp=p.stats.maxMp;
    log.push('⬆️ Seviye '+p.level+'! Tüm statlar arttı!');
    // Level up effect
    addParticle(p.position.x,p.position.y,'#fbbf24',20,30,1.5,4);
    addParticle(p.position.x,p.position.y,'#22c55e',15,25,1.2,3);
    addFloatingText(p.position.x,p.position.y-10,'SEVİYE '+p.level+'!','#fbbf24',18);
    p.skills.forEach(s=>{if(s.unlockLevel===p.level)log.push('🔓 Yeni yetenek: '+s.name+'!')});
  }
}

function addToInventory(p,item){
  // Auto-sell check
  if(p.autoSell&&p.autoSell[item.rarity]&&!item.locked){
    p.gold+=item.value||0;
    state.combatLog.push('🔄 Oto-satış: '+item.name+' → '+item.value+'G');
    return true;
  }
  const slot=p.inventory.findIndex(s=>s===null);
  if(slot===-1)return false;
  p.inventory[slot]={...item,id:uid()};return true;
}

// ==================== TERRAIN ====================
const TERRAIN_SEED=42;
const terrainDecorations=[];const terrainTrees=[];const terrainRocks=[];const terrainFlowers=[];

for(let wx=-MAP_LIMIT;wx<=MAP_LIMIT;wx+=8){
  for(let wy=-MAP_LIMIT;wy<=MAP_LIMIT;wy+=8){
    const r=seededRandom(wx,wy,TERRAIN_SEED);
    if(r<0.12)terrainDecorations.push({x:wx+seededRandom(wx,wy,1)*6,y:wy+seededRandom(wx,wy,2)*6,shade:seededRandom(wx,wy,3)});
    if(r>0.87&&r<0.93){
      const colors=['#ff6b8a','#ffdb4d','#ff9f43','#a29bfe','#fd79a8','#ffeaa7'];
      terrainFlowers.push({x:wx+seededRandom(wx,wy,4)*6,y:wy+seededRandom(wx,wy,5)*6,color:colors[Math.floor(seededRandom(wx,wy,6)*colors.length)]});
    }
  }
}
for(let wx=-MAP_LIMIT;wx<=MAP_LIMIT;wx+=25){
  for(let wy=-MAP_LIMIT;wy<=MAP_LIMIT;wy+=25){
    const r=seededRandom(wx,wy,77);
    if(r<0.2){
      const tx=wx+seededRandom(wx,wy,78)*20-10,ty=wy+seededRandom(wx,wy,79)*20-10;
      const zones=[SAFE_ZONE,WORM_ZONE,WOLF_ZONE,SKELETON_ZONE,GOLEM_ZONE];
      let tooClose=false;
      zones.forEach(z=>{if(Math.sqrt((tx-z.x)**2+(ty-z.y)**2)<40)tooClose=true;});
      if(!tooClose)terrainTrees.push({x:tx,y:ty,size:0.7+seededRandom(wx,wy,80)*0.6,type:seededRandom(wx,wy,81)>0.3?'oak':'pine'});
    }
  }
}
for(let wx=-MAP_LIMIT;wx<=MAP_LIMIT;wx+=35){
  for(let wy=-MAP_LIMIT;wy<=MAP_LIMIT;wy+=35){
    if(seededRandom(wx,wy,99)<0.15)terrainRocks.push({x:wx+seededRandom(wx,wy,100)*20,y:wy+seededRandom(wx,wy,101)*20,size:0.5+seededRandom(wx,wy,102)*0.8});
  }
}

function drawTerrain(ox,oy,W,H){
  ctx.fillStyle='#2d5a1e';ctx.fillRect(0,0,W,H);
  const tileSize=40;
  const startTX=Math.floor(-ox/tileSize)-1,startTY=Math.floor(-oy/tileSize)-1;
  const endTX=Math.ceil((W-ox)/tileSize)+1,endTY=Math.ceil((H-oy)/tileSize)+1;
  for(let tx=startTX;tx<=endTX;tx++){
    for(let ty=startTY;ty<=endTY;ty++){
      const sx=tx*tileSize+ox,sy=ty*tileSize+oy;
      const shade=seededRandom(tx,ty,TERRAIN_SEED+10);
      if(shade<0.3){ctx.fillStyle='rgba(45,110,30,0.3)';ctx.fillRect(sx,sy,tileSize,tileSize);}
      else if(shade>0.7){ctx.fillStyle='rgba(35,80,20,0.25)';ctx.fillRect(sx,sy,tileSize,tileSize);}
    }
  }
  // Paths
  function drawPath(x1,y1,x2,y2,cx2,cy2,curved){
    ctx.strokeStyle='#6B5B3E';ctx.lineWidth=16;ctx.lineCap='round';ctx.beginPath();
    ctx.moveTo(x1*SCALE+ox,y1*SCALE+oy);
    if(curved)ctx.quadraticCurveTo(cx2*SCALE+ox,cy2*SCALE+oy,x2*SCALE+ox,y2*SCALE+oy);
    else ctx.lineTo(x2*SCALE+ox,y2*SCALE+oy);ctx.stroke();
    ctx.strokeStyle='#C4A97D';ctx.lineWidth=10;ctx.beginPath();
    ctx.moveTo(x1*SCALE+ox,y1*SCALE+oy);
    if(curved)ctx.quadraticCurveTo(cx2*SCALE+ox,cy2*SCALE+oy,x2*SCALE+ox,y2*SCALE+oy);
    else ctx.lineTo(x2*SCALE+ox,y2*SCALE+oy);ctx.stroke();
    ctx.strokeStyle='#D4B98A';ctx.lineWidth=4;ctx.beginPath();
    ctx.moveTo(x1*SCALE+ox,y1*SCALE+oy);
    if(curved)ctx.quadraticCurveTo(cx2*SCALE+ox,cy2*SCALE+oy,x2*SCALE+ox,y2*SCALE+oy);
    else ctx.lineTo(x2*SCALE+ox,y2*SCALE+oy);ctx.stroke();
  }
  drawPath(0,0,WORM_ZONE.x,WORM_ZONE.y,50,30,true);
  drawPath(0,0,WOLF_ZONE.x,WOLF_ZONE.y,-50,30,true);
  drawPath(0,0,SKELETON_ZONE.x,SKELETON_ZONE.y,-40,-40,true);
  drawPath(0,0,GOLEM_ZONE.x,GOLEM_ZONE.y,60,-30,true);
  drawPath(0,0,-15,-5,0,0,false);
  drawPath(0,0,15,-5,0,0,false);
  
  const viewMinX=(-ox)/SCALE-20,viewMaxX=(W-ox)/SCALE+20;
  const viewMinY=(-oy)/SCALE-20,viewMaxY=(H-oy)/SCALE+20;
  
  terrainDecorations.forEach(d=>{
    if(d.x<viewMinX||d.x>viewMaxX||d.y<viewMinY||d.y>viewMaxY)return;
    const sx=d.x*SCALE+ox,sy=d.y*SCALE+oy;
    ctx.strokeStyle='rgb('+Math.floor(30+d.shade*20)+','+Math.floor(80+d.shade*60)+','+Math.floor(20+d.shade*15)+')';
    ctx.lineWidth=1.5;
    for(let i=-1;i<=1;i++){ctx.beginPath();ctx.moveTo(sx+i*3,sy);ctx.lineTo(sx+i*3+i,sy-5-d.shade*4);ctx.stroke();}
  });
  terrainFlowers.forEach(f=>{
    if(f.x<viewMinX||f.x>viewMaxX||f.y<viewMinY||f.y>viewMaxY)return;
    const sx=f.x*SCALE+ox,sy=f.y*SCALE+oy;
    ctx.fillStyle=f.color;ctx.beginPath();ctx.arc(sx,sy,2.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffeaa7';ctx.beginPath();ctx.arc(sx,sy,1,0,Math.PI*2);ctx.fill();
  });
  terrainRocks.forEach(r=>{
    if(r.x<viewMinX||r.x>viewMaxX||r.y<viewMinY||r.y>viewMaxY)return;
    const sx=r.x*SCALE+ox,sy=r.y*SCALE+oy,s=r.size*SCALE;
    ctx.fillStyle='#6b6b6b';ctx.beginPath();ctx.ellipse(sx,sy,s*2.5,s*1.8,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#8a8a8a';ctx.beginPath();ctx.ellipse(sx-s*.3,sy-s*.3,s*1.5,s*1,0,0,Math.PI*2);ctx.fill();
  });
  terrainTrees.forEach(t=>{
    if(t.x<viewMinX||t.x>viewMaxX||t.y<viewMinY||t.y>viewMaxY)return;
    const sx=t.x*SCALE+ox,sy=t.y*SCALE+oy,s=t.size;
    ctx.fillStyle='rgba(0,0,0,0.15)';ctx.beginPath();ctx.ellipse(sx,sy+12*s,10*s,4*s,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#5D4037';ctx.fillRect(sx-3*s,sy-10*s,6*s,22*s);
    if(t.type==='oak'){
      ctx.fillStyle='#1B5E20';ctx.beginPath();ctx.arc(sx,sy-22*s,14*s,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#2E7D32';ctx.beginPath();ctx.arc(sx-5*s,sy-18*s,10*s,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#43A047';ctx.beginPath();ctx.arc(sx+4*s,sy-24*s,8*s,0,Math.PI*2);ctx.fill();
    }else{
      ctx.fillStyle='#1B5E20';ctx.beginPath();ctx.moveTo(sx,sy-35*s);ctx.lineTo(sx-12*s,sy-8*s);ctx.lineTo(sx+12*s,sy-8*s);ctx.closePath();ctx.fill();
      ctx.fillStyle='#2E7D32';ctx.beginPath();ctx.moveTo(sx,sy-28*s);ctx.lineTo(sx-9*s,sy-13*s);ctx.lineTo(sx+9*s,sy-13*s);ctx.closePath();ctx.fill();
    }
  });
}

function drawZone(ox,oy,zone,radius,color,label,bgAlpha){
  const zx=zone.x*SCALE+ox,zy=zone.y*SCALE+oy,zr=radius*SCALE;
  ctx.fillStyle=color.replace('1)',bgAlpha+')');ctx.beginPath();ctx.arc(zx,zy,zr,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=color;ctx.lineWidth=2;ctx.setLineDash([10,5]);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle=color;ctx.font='bold 12px Inter';ctx.textAlign='center';
  ctx.fillText(label,zx,zy-zr-8);
}

function drawEnemy(e,ox,oy){
  if(e.stats.hp<=0)return;
  const ex=e.position.x*SCALE+ox,ey=e.position.y*SCALE+oy;
  const sz=e.isBoss?22:13;
  
  // Shadow
  ctx.fillStyle='rgba(0,0,0,.3)';ctx.beginPath();
  ctx.ellipse(ex,ey+(e.isBoss?26:18),e.isBoss?22:14,5,0,0,Math.PI*2);ctx.fill();
  
  // Hit flash
  const flashAlpha=e.hitFlash||0;
  
  if(e.type==='wolf'){
    // Wolf body
    ctx.fillStyle=flashAlpha>0?'#fff':e.color;
    ctx.beginPath();ctx.ellipse(ex,ey,sz*0.9,sz*0.5,0,0,Math.PI*2);ctx.fill();
    // Head
    ctx.beginPath();ctx.arc(ex+(e.isBoss?8:5),ey-sz*0.3,sz*0.4,0,Math.PI*2);ctx.fill();
    // Ears
    ctx.beginPath();ctx.moveTo(ex+sz*0.5,ey-sz*0.6);ctx.lineTo(ex+sz*0.3,ey-sz);ctx.lineTo(ex+sz*0.7,ey-sz*0.5);ctx.fill();
    ctx.beginPath();ctx.moveTo(ex+sz*0.2,ey-sz*0.6);ctx.lineTo(ex,ey-sz);ctx.lineTo(ex+sz*0.4,ey-sz*0.5);ctx.fill();
    // Eyes
    ctx.fillStyle=e.isBoss?'#f59e0b':'#ef4444';
    ctx.beginPath();ctx.arc(ex+sz*0.4,ey-sz*0.4,2,0,Math.PI*2);ctx.fill();
    // Tail
    ctx.strokeStyle=flashAlpha>0?'#fff':e.color;ctx.lineWidth=2;ctx.beginPath();
    ctx.moveTo(ex-sz*0.8,ey);ctx.quadraticCurveTo(ex-sz,ey-sz*0.5,ex-sz*0.7,ey-sz*0.3);ctx.stroke();
  }else if(e.type==='skeleton'){
    // Skeleton
    ctx.fillStyle=flashAlpha>0?'#fff':e.color;
    // Skull
    ctx.beginPath();ctx.arc(ex,ey-sz*0.7,sz*0.4,0,Math.PI*2);ctx.fill();
    // Body
    ctx.strokeStyle=flashAlpha>0?'#fff':e.color;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(ex,ey-sz*0.3);ctx.lineTo(ex,ey+sz*0.3);ctx.stroke();
    // Arms
    ctx.beginPath();ctx.moveTo(ex-sz*0.5,ey);ctx.lineTo(ex+sz*0.5,ey);ctx.stroke();
    // Legs
    ctx.beginPath();ctx.moveTo(ex,ey+sz*0.3);ctx.lineTo(ex-sz*0.3,ey+sz*0.7);ctx.stroke();
    ctx.beginPath();ctx.moveTo(ex,ey+sz*0.3);ctx.lineTo(ex+sz*0.3,ey+sz*0.7);ctx.stroke();
    // Eyes
    ctx.fillStyle='#000';
    ctx.beginPath();ctx.arc(ex-3,ey-sz*0.75,2,0,Math.PI*2);ctx.arc(ex+3,ey-sz*0.75,2,0,Math.PI*2);ctx.fill();
    // Sword
    if(e.isBoss){
      ctx.fillStyle='#a855f7';ctx.fillRect(ex+sz*0.5,ey-sz*0.5,3,sz);
      ctx.fillStyle='#d8b4fe';ctx.fillRect(ex+sz*0.5-2,ey-sz*0.1,7,3);
    }
  }else if(e.type==='golem'){
    // Golem - big rocky body
    ctx.fillStyle=flashAlpha>0?'#fff':e.color;
    // Body
    ctx.beginPath();ctx.roundRect?ctx.roundRect(ex-sz*0.6,ey-sz*0.5,sz*1.2,sz*1.2,4):ctx.fillRect(ex-sz*0.6,ey-sz*0.5,sz*1.2,sz*1.2);ctx.fill();
    // Head
    ctx.fillStyle=flashAlpha>0?'#fff':(e.isBoss?'#92400e':'#57534e');
    ctx.beginPath();ctx.roundRect?ctx.roundRect(ex-sz*0.4,ey-sz,sz*0.8,sz*0.6,3):ctx.fillRect(ex-sz*0.4,ey-sz,sz*0.8,sz*0.6);ctx.fill();
    // Eyes - glowing
    ctx.fillStyle=e.isBoss?'#f97316':'#22d3ee';
    ctx.beginPath();ctx.arc(ex-4,ey-sz*0.75,3,0,Math.PI*2);ctx.arc(ex+4,ey-sz*0.75,3,0,Math.PI*2);ctx.fill();
    // Arms
    ctx.fillStyle=flashAlpha>0?'#fff':e.color;
    ctx.fillRect(ex-sz*0.9,ey-sz*0.3,sz*0.3,sz*0.8);
    ctx.fillRect(ex+sz*0.6,ey-sz*0.3,sz*0.3,sz*0.8);
    // Cracks
    ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(ex-sz*0.2,ey-sz*0.3);ctx.lineTo(ex+sz*0.1,ey+sz*0.2);ctx.stroke();
  }else{
    // Worm (original)
    ctx.fillStyle=flashAlpha>0?'#fff':e.color;
    for(let i=0;i<4;i++){
      const sx2=ex+Math.sin(Date.now()/300+i)*3,sy2=ey-i*(sz/3);
      ctx.beginPath();ctx.arc(sx2,sy2,sz/2-i,0,Math.PI*2);ctx.fill();
    }
    ctx.fillStyle='#fff';ctx.beginPath();
    ctx.arc(ex-3,ey-sz+2,2,0,Math.PI*2);ctx.arc(ex+3,ey-sz+2,2,0,Math.PI*2);ctx.fill();
  }
  
  // HP bar
  const bw=e.isBoss?60:40,bh=6,by=ey-(e.type==='golem'?sz+25:sz+15);
  ctx.fillStyle='#1f2937';ctx.fillRect(ex-bw/2,by,bw,bh);
  const hr=e.stats.hp/e.stats.maxHp;
  ctx.fillStyle=hr>.5?'#22c55e':hr>.25?'#f59e0b':'#ef4444';
  ctx.fillRect(ex-bw/2,by,bw*hr,bh);
  ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=1;ctx.strokeRect(ex-bw/2,by,bw,bh);
  ctx.fillStyle='#fff';ctx.font='bold 8px Inter';ctx.textAlign='center';
  ctx.fillText(e.stats.hp+'/'+e.stats.maxHp,ex,by-2);
  ctx.fillStyle=e.isBoss?'#f59e0b':'#d1d5db';
  ctx.font='bold '+(e.isBoss?11:9)+'px Inter';ctx.fillText(e.name,ex,by-12);
}

function drawGame(){
  const W=canvas.width,H=canvas.height;
  const p=state.player;
  const cx=W/2,cy=H/2;
  const shk=screenShake;
  const ox=cx-p.position.x*SCALE+shk.x,oy=cy-p.position.y*SCALE+shk.y;

  drawTerrain(ox,oy,W,H);

  // Zones
  drawZone(ox,oy,SAFE_ZONE,SAFE_ZONE.radius,'rgba(34,197,94,1)','🏠 Güvenli Bölge',0.12);
  drawZone(ox,oy,WORM_ZONE,40,'rgba(168,85,247,1)','🪱 Solucan Bölgesi',0.06);
  drawZone(ox,oy,WOLF_ZONE,35,'rgba(107,114,128,1)','🐺 Kurt Bölgesi',0.06);
  drawZone(ox,oy,SKELETON_ZONE,35,'rgba(209,213,219,1)','💀 İskelet Bölgesi',0.06);
  drawZone(ox,oy,GOLEM_ZONE,35,'rgba(120,113,108,1)','🪨 Golem Bölgesi',0.06);

  // NPCs
  drawNPC(-15*SCALE+ox,-5*SCALE+oy,'🏪','Market');
  drawNPC(15*SCALE+ox,-5*SCALE+oy,'📜','Görevler');

  // Map border
  const ls=MAP_LIMIT*SCALE;
  ctx.strokeStyle='rgba(255,68,68,0.4)';ctx.lineWidth=4;ctx.setLineDash([12,8]);
  ctx.strokeRect(ox-ls,oy-ls,ls*2,ls*2);ctx.setLineDash([]);

  // Enemies
  state.enemies.forEach(e=>drawEnemy(e,ox,oy));

  // Player
  const px=cx+shk.x,py=cy+shk.y;
  ctx.fillStyle='rgba(0,0,0,.4)';ctx.beginPath();ctx.ellipse(px,py+18,14,5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#3b82f6';ctx.fillRect(px-8,py-10,16,20);
  ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(px,py-16,8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#6b7280';ctx.beginPath();ctx.arc(px,py-18,9,Math.PI,0);ctx.fill();
  const sa=p.isAttacking?(p.facingRight?-.5:.5):(p.facingRight?.3:-.3);
  const swX=p.facingRight?px+12:px-12;
  ctx.save();ctx.translate(swX,py-5);ctx.rotate(sa);
  ctx.fillStyle='#d1d5db';ctx.fillRect(-2,-18,4,20);
  ctx.fillStyle='#fbbf24';ctx.fillRect(-4,0,8,4);ctx.restore();
  ctx.fillStyle='#fbbf24';ctx.font='bold 11px Cinzel';ctx.textAlign='center';
  ctx.fillText(p.name+' Lv.'+p.level,px,py-30);

  // Particles
  drawParticles(ox,oy);

  // Coords
  ctx.fillStyle='#e8dcc8';ctx.font='10px Inter';ctx.textAlign='left';
  ctx.fillText('X:'+Math.round(p.position.x)+' Y:'+Math.round(p.position.y),10,H-10);

  // Minimap
  const ms=120,mx=W-ms-10,my=10,mmRange=100,msc2=ms/mmRange;
  const mmCx=mx+ms/2,mmCy=my+ms/2,ppx=p.position.x,ppy=p.position.y;
  ctx.save();
  ctx.fillStyle='#2d5a1e';ctx.fillRect(mx,my,ms,ms);
  ctx.strokeStyle='#5D4037';ctx.lineWidth=2;ctx.strokeRect(mx,my,ms,ms);
  ctx.beginPath();ctx.rect(mx,my,ms,ms);ctx.clip();
  // Zones on minimap
  [{z:SAFE_ZONE,r:SAFE_ZONE.radius,c:'rgba(34,197,94,.3)'},{z:WORM_ZONE,r:40,c:'rgba(168,85,247,.15)'},
   {z:WOLF_ZONE,r:35,c:'rgba(107,114,128,.15)'},{z:SKELETON_ZONE,r:35,c:'rgba(209,213,219,.15)'},
   {z:GOLEM_ZONE,r:35,c:'rgba(120,113,108,.15)'}].forEach(zd=>{
    ctx.fillStyle=zd.c;ctx.beginPath();
    ctx.arc(mmCx+(zd.z.x-ppx)*msc2,mmCy+(zd.z.y-ppy)*msc2,zd.r*msc2,0,Math.PI*2);ctx.fill();
  });
  // Paths on minimap
  ctx.strokeStyle='#C4A97D';ctx.lineWidth=1;
  [WORM_ZONE,WOLF_ZONE,SKELETON_ZONE,GOLEM_ZONE].forEach(z=>{
    ctx.beginPath();ctx.moveTo(mmCx+(0-ppx)*msc2,mmCy+(0-ppy)*msc2);
    ctx.lineTo(mmCx+(z.x-ppx)*msc2,mmCy+(z.y-ppy)*msc2);ctx.stroke();
  });
  // Border
  ctx.strokeStyle='#ff4444';ctx.lineWidth=1;
  ctx.strokeRect(mmCx+(-MAP_LIMIT-ppx)*msc2,mmCy+(-MAP_LIMIT-ppy)*msc2,MAP_LIMIT*2*msc2,MAP_LIMIT*2*msc2);
  // Enemies
  state.enemies.forEach(e=>{if(e.stats.hp<=0)return;ctx.fillStyle=e.isBoss?'#f59e0b':e.color;
    ctx.beginPath();ctx.arc(mmCx+(e.position.x-ppx)*msc2,mmCy+(e.position.y-ppy)*msc2,e.isBoss?3:2,0,Math.PI*2);ctx.fill()});
  // Player
  ctx.fillStyle='#3b82f6';ctx.beginPath();ctx.arc(mmCx,mmCy,4,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#93c5fd';ctx.lineWidth=1;ctx.stroke();
  // NPCs
  ctx.font='7px serif';ctx.textAlign='center';
  ctx.fillText('🏪',mmCx+(-15-ppx)*msc2,mmCy+(-5-ppy)*msc2);
  ctx.fillText('📜',mmCx+(15-ppx)*msc2,mmCy+(-5-ppy)*msc2);
  ctx.restore();
  ctx.fillStyle='#C4A97D';ctx.font='bold 8px Inter';ctx.textAlign='center';
  ctx.fillText('MİNİ HARİTA',mx+ms/2,my+ms+10);
}

// ==================== COMBAT ====================
function useSkill(skillId){
  const p=state.player;const log=state.combatLog;
  if(!p.isAlive)return;

  if(skillId==='potion_hp'||skillId==='potion_mp'){
    const pt=skillId==='potion_hp'?'hp_potion':'mp_potion';
    const idx=p.inventory.findIndex(i=>i?.type===pt);if(idx===-1)return;
    const pot=p.inventory[idx];
    if(pt==='hp_potion'){
      const heal=pot.healAmount;
      p.stats.hp=Math.min(p.stats.maxHp,p.stats.hp+heal);
      log.push('❤️ Can Potu! +'+heal+' HP');
      addParticle(p.position.x,p.position.y,'#ef4444',8,15,0.8,3);
      addFloatingText(p.position.x,p.position.y-8,'+'+heal+' HP','#22c55e',14);
    }else{
      const mana=pot.manaAmount;
      p.stats.mp=Math.min(p.stats.maxMp,p.stats.mp+mana);
      log.push('💙 Mana Potu! +'+mana+' MP');
      addParticle(p.position.x,p.position.y,'#3b82f6',8,15,0.8,3);
      addFloatingText(p.position.x,p.position.y-8,'+'+mana+' MP','#60a5fa',14);
    }
    p.inventory[idx]=null;renderUI();return;
  }

  const skill=p.skills.find(s=>s.id===skillId);if(!skill)return;
  if(skill.unlockLevel>p.level||skill.currentCooldown>0)return;
  if(skill.manaCost>p.stats.mp){log.push('⚠️ Yeterli mana yok!');trimLog();renderUI();return}
  if(skill.requiresPowerBar&&p.powerBar<p.maxPowerBar){log.push('⚠️ Power Bar dolu değil!');trimLog();renderUI();return}

  p.stats.mp-=skill.manaCost;
  if(skill.requiresPowerBar)p.powerBar=0;
  skill.currentCooldown=skill.cooldown;

  // Heal skill
  if(skill.isHeal){
    const heal=Math.floor(p.stats.maxHp*skill.healAmount);
    p.stats.hp=Math.min(p.stats.maxHp,p.stats.hp+heal);
    log.push('💚 '+skill.name+': +'+heal+' HP!');
    addParticle(p.position.x,p.position.y,'#22c55e',12,20,1,3);
    addFloatingText(p.position.x,p.position.y-8,'+'+heal+' HP','#22c55e',16);
    trimLog();renderUI();return;
  }

  p.isAttacking=true;p.attackAnimTimer=.3;
  
  // Attack effect particles
  if(skill.isAoe){
    addParticle(p.position.x,p.position.y,'#fbbf24',15,40,0.8,3);
    addParticle(p.position.x,p.position.y,'#f97316',10,35,0.6,2);
    if(skill.requiresPowerBar){
      addParticle(p.position.x,p.position.y,'#ef4444',25,60,1.2,5);
      addParticle(p.position.x,p.position.y,'#fbbf24',20,50,1,4);
      shakeScreen(8,0.5);
    }else{
      shakeScreen(3,0.2);
    }
  }else{
    const dir=p.facingRight?1:-1;
    addParticle(p.position.x+dir*10,p.position.y-5,'#d1d5db',6,20,0.5,2);
  }

  let hitCount=0;
  state.enemies.forEach(e=>{
    if(e.stats.hp<=0)return;
    const d=dist(p.position,e.position);
    const inRange=skill.isAoe?(skill.aoeRadius>=999||d<=skill.aoeRadius):d<=p.attackRange;
    if(!inRange)return;
    const dmg=calcDamage(p.stats.attack,e.stats.defense,skill.damageMultiplier);
    e.stats.hp=Math.max(0,e.stats.hp-dmg);hitCount++;
    e.hitFlash=0.15;
    
    // Hit particles
    addParticle(e.position.x,e.position.y-3,'#ef4444',5,20,0.5,2);
    addFloatingText(e.position.x+(Math.random()-0.5)*5,e.position.y-8,'-'+dmg,
      dmg>50?'#f59e0b':'#ef4444',dmg>100?18:dmg>50?15:12);
    
    log.push('⚔️ '+skill.name+' → '+e.name+': '+dmg+' hasar!');
    if(!skill.requiresPowerBar)p.powerBar=Math.min(p.maxPowerBar,p.powerBar+8);
    if(e.stats.hp<=0){
      // Death effects
      addParticle(e.position.x,e.position.y,'#fbbf24',15,30,1,3);
      addParticle(e.position.x,e.position.y,e.color,10,25,0.8,4);
      addFloatingText(e.position.x,e.position.y-12,'+'+e.reward.exp+'EXP','#22c55e',13);
      addFloatingText(e.position.x+5,e.position.y-6,'+'+e.reward.gold+'G','#fbbf24',11);
      
      log.push('💀 '+e.name+' yenildi! +'+e.reward.exp+'EXP +'+e.reward.gold+'G');
      p.exp+=e.reward.exp;p.gold+=e.reward.gold;
      const etype=e.type||'worm';
      p.killCount[etype]=(p.killCount[etype]||0)+1;
      if(e.isBoss)p.killCount.boss=(p.killCount.boss||0)+1;
      p.killCount.any=(p.killCount.any||0)+1;
      
      e.reward.items.forEach(item=>{
        if(addToInventory(p,item))log.push('📦 '+item.name+' bulundu!');
        else log.push('⚠️ Envanter dolu!');
      });
      if(p.activeQuest&&!p.activeQuest.turnedIn){
        const q=p.activeQuest;
        const match=(q.target==='any')||(q.target===etype)||(q.target==='boss'&&e.isBoss);
        if(match){
          q.currentCount++;
          if(q.currentCount>=q.targetCount){q.completed=true;log.push('🎯 Görev tamamlandı! NPC\'ye dön.')}
        }
      }
      checkLevelUp(p,log);
    }
  });
  if(hitCount===0)log.push('💨 Hedef menzil dışında!');

  // Respawn
  ['worm','wolf','skeleton','golem'].forEach(type=>{
    const alive=state.enemies.filter(e=>e.stats.hp>0&&e.type===type&&!e.isBoss).length;
    const minCount=type==='golem'?2:3;
    if(alive<minCount){
      const lvl=type==='golem'?Math.floor(Math.random()*4)+5:type==='skeleton'?Math.floor(Math.random()*5)+3:
        type==='wolf'?Math.floor(Math.random()*5)+2:Math.floor(Math.random()*5)+1;
      state.enemies.push(createEnemy(type,lvl));
    }
    if(!state.enemies.some(e=>e.isBoss&&e.type===type&&e.stats.hp>0)){
      const bossLvl=type==='golem'?8:type==='skeleton'?7:type==='wolf'?6:5;
      state.enemies.push(createEnemy(type,bossLvl,true));
    }
  });
  trimLog();renderUI();
}

function trimLog(){while(state.combatLog.length>50)state.combatLog.shift()}

// ==================== TICK ====================
function tick(delta){
  const p=state.player;const log=state.combatLog;
  state.gameTime+=delta;

  p.skills.forEach(s=>{if(s.currentCooldown>0)s.currentCooldown=Math.max(0,s.currentCooldown-delta)});
  if(p.attackAnimTimer>0){p.attackAnimTimer-=delta;if(p.attackAnimTimer<=0)p.isAttacking=false}

  // Enemy hit flash decay
  state.enemies.forEach(e=>{if(e.hitFlash>0)e.hitFlash=Math.max(0,e.hitFlash-delta)});

  updateParticles(delta);

  if(p.isAlive){
    state.enemies.forEach(e=>{
      if(e.stats.hp<=0)return;
      const d=dist(p.position,e.position);
      if(d<100&&d>30){
        const dx=p.position.x-e.position.x,dy=p.position.y-e.position.y;
        const len=Math.sqrt(dx*dx+dy*dy);
        e.position.x+=(dx/len)*e.stats.speed*delta;
        e.position.y+=(dy/len)*e.stats.speed*delta;
      }
      e.currentAttackCooldown-=delta;
      if(d<=40&&e.currentAttackCooldown<=0){
        const dmg=calcDamage(e.stats.attack,p.stats.defense,1);
        p.stats.hp=Math.max(0,p.stats.hp-dmg);
        e.currentAttackCooldown=e.attackCooldown;
        addParticle(p.position.x,p.position.y-3,'#ef4444',4,15,0.4,2);
        addFloatingText(p.position.x,p.position.y-10,'-'+dmg,'#ef4444',13);
        shakeScreen(2,0.1);
        log.push('🔴 '+e.name+' sana '+dmg+' hasar verdi!');
        if(p.stats.hp<=0){
          p.isAlive=false;
          addParticle(p.position.x,p.position.y,'#ef4444',20,30,1.5,4);
          shakeScreen(6,0.4);
          log.push('💀 Öldün! Yeniden doğmak için butona bas.');
        }
      }
    });

    // Safe zone regen
    if(dist(p.position,{x:0,y:0})<SAFE_ZONE.radius){
      p.stats.hp=Math.min(p.stats.maxHp,p.stats.hp+p.stats.maxHp*.03*delta);
      p.stats.mp=Math.min(p.stats.maxMp,p.stats.mp+p.stats.maxMp*.04*delta);
    }
  }
  trimLog();
}

function movePlayer(dx,dy){
  if(!state.player.isAlive)return;
  const s=state.player.stats.speed;
  let nx=state.player.position.x+dx*s,ny=state.player.position.y+dy*s;
  if(Math.abs(nx)<=MAP_LIMIT)state.player.position.x=nx;
  if(Math.abs(ny)<=MAP_LIMIT)state.player.position.y=ny;
  if(dx!==0)state.player.facingRight=dx>0;
}

const uiRoot=document.getElementById('ui-root');

  html+=bar(p.stats.mp,p.stats.maxMp,'bar-mp','MP','💎');
  html+=bar(p.powerBar,p.maxPowerBar,'bar-pwr','PWR','⚡');
  html+=bar(p.exp,p.expToNext,'bar-xp','EXP','✨');
  html+='<div class="hud-stats"><span>⚔️'+p.stats.attack+'</span><span>🛡️'+p.stats.defense+'</span><span>💰'+p.gold+'G</span><span>🏆'+p.killCount.any+'</span></div>';

  // Combat log

    html+='<div class="log-line" style="color:'+(i===0?'var(--fg)':'var(--muted-fg)')+'">'+m+'</div>';
  });
  html+='</div></div>';

  // Menu buttons

  html+='<button class="menu-btn'+(state.showInventory?' active':'')+'" onclick="toggleInventory()">🎒 <span class="menu-shortcut">[I]</span></button>';

    html+='<button class="menu-btn'+(state.showQuest?' active':'')+'" onclick="toggleQuest()">📜 <span class="menu-shortcut">[J]</span></button>';
  }
  // Auto-sell toggle
  html+='<button class="menu-btn'+(p.autoSell.common||p.autoSell.uncommon?' active':'')+'" onclick="toggleAutoSellPanel()" title="Otomatik Satış">🔄 <span class="menu-shortcut">[T]</span></button>';

  }

  // Skill bar
  const avail=p.skills.filter(s=>s.unlockLevel<=p.level);
  html+='<div class="skill-bar" style="'+(isMobile?'bottom:16px;right:16px;flex-direction:column':'bottom:16px;left:50%;transform:translateX(-50%);flex-direction:row')+'">';
  avail.forEach(sk=>{
    const onCd=sk.currentCooldown>0;const noMana=p.stats.mp<sk.manaCost;
    const noPwr=sk.requiresPowerBar&&p.powerBar<p.maxPowerBar;
    const dis=onCd||noMana||noPwr;
    const cdPct=onCd?(sk.currentCooldown/sk.cooldown)*100:0;
    const cls='skill-btn'+(dis?' disabled':'')+(sk.requiresPowerBar&&!noPwr?' ultimate':'');
    html+='<button class="'+cls+'" onclick="useSkill(\''+sk.id+'\')"><span class="skill-icon">'+sk.icon+'</span>';
    if(onCd)html+='<div class="skill-cd" style="clip-path:inset('+(100-cdPct)+'% 0 0 0)"></div>';
    html+='<span class="skill-key">'+(onCd?Math.ceil(sk.currentCooldown)+'s':'['+sk.key+']')+'</span>';
    if(sk.manaCost>0)html+='<span class="skill-mana">'+sk.manaCost+'</span>';
    html+='</button>';
  });
  const hpCount=p.inventory.filter(i=>i?.type==='hp_potion').length;
  const mpCount=p.inventory.filter(i=>i?.type==='mp_potion').length;
  html+='<div style="display:flex;gap:8px;margin-left:16px">';
  html+='<button class="potion-btn'+(hpCount===0?' disabled':'')+'" onclick="useSkill(\'potion_hp\')"><span class="potion-icon">❤️</span><span class="potion-count">'+hpCount+'x'+(isMobile?'':' [Q]')+'</span></button>';
  html+='<button class="potion-btn'+(mpCount===0?' disabled':'')+'" onclick="useSkill(\'potion_mp\')"><span class="potion-icon">💙</span><span class="potion-count">'+mpCount+'x'+(isMobile?'':' [E]')+'</span></button>';
  html+='</div></div>';

  // Joystick
  if(isMobile){
    html+='<div class="joystick-area" id="joystickArea"><div class="joystick-base"></div><div class="joystick-knob" id="joystickKnob"></div></div>';
  }

  // Panels
  if(state.showInventory||state.showShop)html+=renderInventoryPanel();
  if(state.showQuest)html+=renderQuestPanel();
  if(state.showAutoSell)html+=renderAutoSellPanel();

  // Death
  if(!p.isAlive){
    html+='<div class="death-overlay"><div style="text-align:center"><div class="death-title">💀 ÖLDÜN</div><div class="death-sub">Güvenli bölgede yeniden doğacaksın.</div><button class="respawn-btn" onclick="respawn()">🔄 Yeniden Doğ</button></div></div>';
  }

  // KB hints
  if(!isMobile){
    html+='<div class="kb-hints"><div class="kb-card"><div>WASD: Hareket | 1-6: Yetenekler</div><div>Q: Can Potu | E: Mana Potu</div><div>I: Envanter | B: Market | J: Görev | T: Oto-Satış</div></div></div>';
  }

  uiRoot.innerHTML=html;
  if(isMobile)setupJoystick();
}

function bar(val,max,cls,label,icon){
  const pct=Math.max(0,Math.min(100,(val/max)*100));
  return '<div class="bar-row"><span class="bar-icon">'+icon+'</span><div class="bar-track '+cls+'"><div class="bar-fill" style="width:'+pct+'%"></div><span class="bar-text">'+Math.floor(val)+'/'+max+' '+label+'</span></div></div>';
}

function renderAutoSellPanel(){
  const p=state.player;let h='';
  h+='<div class="panel-overlay" onclick="if(event.target===this){state.showAutoSell=false;renderUI()}"><div class="panel" style="max-width:340px">';
  h+='<div class="panel-header"><h2>🔄 Otomatik Satış</h2><button class="close-btn" onclick="state.showAutoSell=false;renderUI()">✕</button></div>';
  h+='<p style="font-size:10px;color:var(--muted-fg);margin-bottom:12px">Seçilen nadirlikteki düşen eşyalar otomatik olarak satılır. Kilitli eşyalar etkilenmez.</p>';
  
  RARITY_ORDER.forEach(r=>{
    if(r==='legendary')return; // legendary never auto-sell
    const active=p.autoSell[r]||false;
    h+='<div class="auto-sell-row"><span class="auto-sell-label"><span class="rarity-'+r+'">● '+r.charAt(0).toUpperCase()+r.slice(1)+'</span></span>';
    h+='<button class="auto-sell-btn'+(active?' active':'')+'" onclick="toggleAutoSell(\''+r+'\')">'+
      (active?'✅ AÇIK':'❌ KAPALI')+'</button></div>';
  });
  h+='</div></div>';return h;
}

function toggleAutoSellPanel(){
  state.showAutoSell=!state.showAutoSell;
  state.showInventory=false;state.showShop=false;state.showQuest=false;
  renderUI();
}
function toggleAutoSell(rarity){
  state.player.autoSell[rarity]=!state.player.autoSell[rarity];
  renderUI();
}

function renderInventoryPanel(){
  const p=state.player;let h='';
  h+='<div class="panel-overlay" onclick="if(event.target===this)closePanel()"><div class="panel">';
  h+='<div class="panel-header"><h2>'+(state.showShop?'🏪 Market':'🎒 Envanter')+'</h2><div style="display:flex;align-items:center;gap:8px"><span class="gold-display">💰 '+p.gold+'G</span><button class="close-btn" onclick="closePanel()">✕</button></div></div>';
  h+='<div class="equip-row">'+equipSlot('Kılıç',p.equippedSword)+equipSlot('Zırh',p.equippedArmor)+'</div>';
  if(state.showShop){
    SHOP_ITEMS.forEach((item,i)=>{
      h+='<div class="shop-item"><div class="shop-info"><span class="shop-icon">'+item.icon+'</span><div><div class="shop-name rarity-'+item.rarity+'">'+item.name+'</div><div class="shop-stats">';
      if(item.attackBonus>0)h+='⚔️+'+item.attackBonus+' ';if(item.defenseBonus>0)h+='🛡️+'+item.defenseBonus+' ';
      if(item.healAmount>0)h+='❤️+'+item.healAmount+' ';if(item.manaAmount>0)h+='💙+'+item.manaAmount;
      h+='</div></div></div><button class="buy-btn '+(p.gold>=item.value?'can-buy':'no-buy')+'" onclick="buyItem('+i+')">'+item.value+'G</button></div>';
    });
  }else{
    const trashItems=p.inventory.filter(i=>i?.type==='trash'&&!i.locked);
    const trashVal=trashItems.reduce((s,i)=>s+(i?.value??0),0);
    if(trashItems.length>0)h+='<button class="trash-btn" onclick="sellAllTrash()">🗑️ Tüm Çöpleri Sat ('+trashItems.length+' = '+trashVal+'G)</button>';
    h+='<div class="inv-grid">';
    p.inventory.forEach((item,i)=>{
      h+='<div class="inv-slot'+(item?.equipped?' equipped':'')+'">';
      if(item){
        h+='<span class="item-icon">'+item.icon+'</span><span class="item-name rarity-'+item.rarity+'">'+item.name.slice(0,8)+'</span>';
        if(item.locked)h+='<span class="lock-icon">🔒</span>';
        h+='<div class="inv-actions">';
        if((item.type==='sword'||item.type==='armor')&&!item.equipped)h+='<button class="act-equip" onclick="event.stopPropagation();equipItem('+i+')">E</button>';
        if(!item.locked)h+='<button class="act-sell" onclick="event.stopPropagation();sellItem('+i+')">S</button>';
        h+='<button class="act-lock" onclick="event.stopPropagation();lockItem('+i+')">'+(item.locked?'🔓':'🔒')+'</button></div>';
      }
      h+='</div>';
    });
    h+='</div>';
  }
  h+='</div></div>';return h;
}

function equipSlot(label,item){
  let h='<div class="equip-slot"><div class="equip-label">'+label+'</div>';
  if(item){
    h+='<div class="equip-icon">'+item.icon+'</div><div class="equip-name rarity-'+item.rarity+'">'+item.name+'</div>';
    h+='<div class="equip-stats">';if(item.attackBonus>0)h+='⚔️+'+item.attackBonus+' ';if(item.defenseBonus>0)h+='🛡️+'+item.defenseBonus;h+='</div>';
  }else h+='<span style="color:var(--muted-fg);font-size:11px">Boş</span>';
  return h+'</div>';
}

function renderQuestPanel(){
  const p=state.player;const q=p.activeQuest;let h='';
  h+='<div class="panel-overlay" onclick="if(event.target===this)closePanel()"><div class="panel">';
  h+='<div class="panel-header"><h2>📜 Görevler</h2><button class="close-btn" onclick="closePanel()">✕</button></div>';
  if(q&&!q.turnedIn){
    h+='<div class="quest-block"><div class="quest-title">'+q.name+'</div><div class="quest-desc">'+q.description+'</div>';
    const qpct=Math.min(100,(q.currentCount/q.targetCount)*100);
    h+='<div class="quest-progress"><div class="quest-bar"><div class="quest-bar-fill" style="width:'+qpct+'%"></div></div><span class="quest-count">'+q.currentCount+'/'+q.targetCount+'</span></div>';
    h+='<div class="quest-rewards">Ödül: ✨'+q.rewardExp+' EXP | 💰'+q.rewardGold+'G';
    if(q.rewardItem)h+=' | <span class="rarity-'+q.rewardItem.rarity+'">'+q.rewardItem.icon+' '+q.rewardItem.name+'</span>';
    h+='</div></div>';
    if(q.completed&&!q.turnedIn)h+='<button class="quest-turnin-btn" onclick="turnInQuest()">✅ Görevi Teslim Et</button>';
  }else{
    if(!window._availQuest)window._availQuest=generateQuest();
    const aq=window._availQuest;
    h+='<p style="font-size:11px;color:var(--muted-fg);margin-bottom:8px">Görevci NPC yeni bir görev sunuyor:</p>';
    h+='<div class="quest-block"><div class="quest-title">'+aq.name+'</div><div class="quest-desc">'+aq.description+'</div>';
    h+='<div class="quest-rewards">Ödül: ✨'+aq.rewardExp+' EXP | 💰'+aq.rewardGold+'G';
    if(aq.rewardItem)h+=' | <span class="rarity-'+aq.rewardItem.rarity+'">'+aq.rewardItem.icon+' '+aq.rewardItem.name+'</span>';
    h+='</div></div>';
    h+='<button class="quest-accept-btn" onclick="acceptQuest()">📜 Görevi Kabul Et</button>';
  }
  h+='</div></div>';return h;
}

// ==================== ACTIONS ====================
function toggleInventory(){state.showInventory=!state.showInventory;state.showShop=false;state.showQuest=false;state.showAutoSell=false;renderUI()}
function toggleShop(){state.showShop=!state.showShop;state.showInventory=false;state.showQuest=false;state.showAutoSell=false;renderUI()}
function toggleQuest(){state.showQuest=!state.showQuest;state.showInventory=false;state.showShop=false;state.showAutoSell=false;renderUI()}
function closePanel(){state.showInventory=false;state.showShop=false;state.showQuest=false;state.showAutoSell=false;renderUI()}

function equipItem(i){
  const p=state.player;const item=p.inventory[i];if(!item)return;
  if(item.type==='sword'){
    if(p.equippedSword){p.equippedSword.equipped=false;p.inventory[i]=p.equippedSword}else p.inventory[i]=null;
    item.equipped=true;p.equippedSword=item;
  }else if(item.type==='armor'){
    if(p.equippedArmor){p.equippedArmor.equipped=false;p.inventory[i]=p.equippedArmor}else p.inventory[i]=null;
    item.equipped=true;p.equippedArmor=item;
  }
  recalcStats(p);state.combatLog.push('🔧 '+item.name+' kuşanıldı!');trimLog();renderUI();
}

function sellItem(i){
  const p=state.player;const item=p.inventory[i];if(!item||item.locked)return;
  p.gold+=item.value;state.combatLog.push('💰 '+item.name+' satıldı: '+item.value+'G');
  p.inventory[i]=null;trimLog();renderUI();
}

function sellAllTrash(){
  const p=state.player;let total=0;
  p.inventory.forEach((item,i)=>{if(item?.type==='trash'&&!item.locked){total+=item.value;p.inventory[i]=null}});
  if(total>0){p.gold+=total;state.combatLog.push('🗑️ Tüm çöpler satıldı: '+total+'G')}
  trimLog();renderUI();
}

function lockItem(i){const item=state.player.inventory[i];if(item)item.locked=!item.locked;renderUI()}

function buyItem(shopIdx){
  const p=state.player;const item=SHOP_ITEMS[shopIdx];
  if(p.gold<item.value){state.combatLog.push('⚠️ Yeterli altın yok!');trimLog();renderUI();return}
  const newItem={...item,id:uid()};
  if(!addToInventory(p,newItem)){state.combatLog.push('⚠️ Envanter dolu!');trimLog();renderUI();return}
  p.gold-=item.value;state.combatLog.push('🛒 '+newItem.name+' satın alındı!');trimLog();renderUI();
}

function acceptQuest(){
  if(!window._availQuest)return;
  state.player.activeQuest=window._availQuest;
  state.combatLog.push('📜 Görev kabul edildi: '+window._availQuest.name);
  window._availQuest=null;state.showQuest=false;trimLog();renderUI();
}

function turnInQuest(){
  const p=state.player;const q=p.activeQuest;if(!q||!q.completed)return;
  p.exp+=q.rewardExp;p.gold+=q.rewardGold;
  if(q.rewardItem){if(addToInventory(p,q.rewardItem))state.combatLog.push('🎁 '+q.rewardItem.name+' ödül olarak alındı!');
    else state.combatLog.push('⚠️ Envanter dolu!')}
  state.combatLog.push('✅ '+q.name+' tamamlandı! +'+q.rewardExp+'EXP +'+q.rewardGold+'G');
  q.turnedIn=true;p.activeQuest=null;checkLevelUp(p,state.combatLog);
  addParticle(p.position.x,p.position.y,'#fbbf24',15,25,1,3);
  state.showQuest=false;trimLog();renderUI();
}

function respawn(){
  const p=state.player;p.isAlive=true;p.stats.hp=p.stats.maxHp;p.stats.mp=p.stats.maxMp;
  p.position={x:0,y:0};p.powerBar=0;
  state.combatLog.push('🔄 Güvenli bölgede yeniden doğdun!');trimLog();renderUI();
}

// ==================== JOYSTICK ====================
function setupJoystick(){
  const area=document.getElementById('joystickArea');
  const knob=document.getElementById('joystickKnob');
  if(!area||!knob)return;
  let active=false;const maxR=40;
  function update(cx,cy){
    const rect=area.getBoundingClientRect();
    const centerX=rect.left+rect.width/2,centerY=rect.top+rect.height/2;
    let dx=cx-centerX,dy=cy-centerY;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d>maxR){dx=(dx/d)*maxR;dy=(dy/d)*maxR}
    knob.style.left='calc(50% + '+dx+'px - 24px)';knob.style.top='calc(50% + '+dy+'px - 24px)';
    state.joystickDir={x:dx/maxR,y:dy/maxR};
  }
  function end(){active=false;knob.style.left='calc(50% - 24px)';knob.style.top='calc(50% - 24px)';
    knob.style.transition='all .2s';state.joystickDir={x:0,y:0}}
  area.addEventListener('touchstart',e=>{e.preventDefault();active=true;knob.style.transition='none';update(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});
  area.addEventListener('touchmove',e=>{e.preventDefault();if(active){knob.style.transition='none';update(e.touches[0].clientX,e.touches[0].clientY)}},{passive:false});
  area.addEventListener('touchend',end);
  area.addEventListener('mousedown',e=>{active=true;knob.style.transition='none';update(e.clientX,e.clientY)});
  area.addEventListener('mousemove',e=>{if(active){knob.style.transition='none';update(e.clientX,e.clientY)}});
  area.addEventListener('mouseup',end);area.addEventListener('mouseleave',end);
}

// ==================== KEYBOARD ====================
if(!isMobile){
  window.addEventListener('keydown',e=>{
    keys.add(e.key.toLowerCase());
    switch(e.key){
      case '1':useSkill('basic_attack');break;case '2':useSkill('power_strike');break;
      case '3':useSkill('whirlwind');break;case '4':useSkill('sword_spin');break;
      case '5':useSkill('heal');break;case '6':useSkill('dragon_strike');break;
      case 'q':useSkill('potion_hp');break;case 'e':useSkill('potion_mp');break;
      case 'i':toggleInventory();break;case 'b':toggleShop();break;
      case 'j':toggleQuest();break;case 't':toggleAutoSellPanel();break;
    }
  });
  window.addEventListener('keyup',e=>keys.delete(e.key.toLowerCase()));
}

// ==================== GAME LOOP ====================
let lastTime=performance.now();
let uiTimer=0;
let saveTimer=0;

state.showAutoSell=false;

function gameLoop(time){
  const delta=Math.min((time-lastTime)/1000,.1);
  lastTime=time;

  // Movement
  if(!isMobile){
    let dx=0,dy=0;
    if(keys.has('w')||keys.has('arrowup'))dy=-1;
    if(keys.has('s')||keys.has('arrowdown'))dy=1;
    if(keys.has('a')||keys.has('arrowleft'))dx=-1;
    if(keys.has('d')||keys.has('arrowright'))dx=1;
    if(dx||dy){const len=Math.sqrt(dx*dx+dy*dy);movePlayer(dx/len,dy/len)}
  }else{
    if(state.joystickDir.x||state.joystickDir.y)movePlayer(state.joystickDir.x,state.joystickDir.y);
  }

  tick(delta);
  drawGame();

  uiTimer+=delta;
  if(uiTimer>.15){uiTimer=0;renderUI()}

  saveTimer+=delta;
  if(saveTimer>10){saveTimer=0;saveGame(state)}

  requestAnimationFrame(gameLoop);
}

renderUI();
requestAnimationFrame(gameLoop);
</script>

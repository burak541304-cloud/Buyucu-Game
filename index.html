<!DOCTYPE html>
<html>
<head>
    <title>Genflow's Ultimate RPG Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #333; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { border: 1px solid #000; background-color: #000; }
        #mobileControls {
            position: absolute;
            bottom: 10px;
            left: 10px;
            display: none; /* Will be shown if isMobile is true */
        }
        #joystick {
            width: 100px;
            height: 100px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            position: relative;
            float: left;
        }
        #joystick-handle {
            width: 40px;
            height: 40px;
            background-color: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        #skillBar {
            float: right;
            margin-left: 20px;
            display: flex;
        }
        .skillButton {
            width: 50px;
            height: 50px;
            background-color: rgba(0, 0, 0, 0.5);
            border: 2px solid #fff;
            border-radius: 5px;
            margin: 0 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="mobileControls">
        <div id="joystick">
            <div id="joystick-handle"></div>
        </div>
        <div id="skillBar">
            <div class="skillButton" data-skill="attack">A</div>
            <div class="skillButton" data-skill="skill1">1</div>
            <div class="skillButton" data-skill="skill2">2</div>
            <div class="skillButton" data-skill="skill3">3</div>
        </div>
    </div>

    <script>
        // Genflow: The super assistant of Terabox is starting the RPG engine!

        window.onload = function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');

            if (!ctx) {
                console.error("Canvas context not available. Aborting game initialization.");
                return; // Zero-Black Screen protocol: Ensure context exists before proceeding.
            }

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // Mobile Detection and Controls Setup
            const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
            const mobileControls = document.getElementById('mobileControls');
            const joystickHandle = document.getElementById('joystick-handle');
            const skillButtons = document.querySelectorAll('.skillButton');

            if (isMobile) {
                mobileControls.style.display = 'block';
                canvas.width = 800; // Fixed width for better mobile control layout
                canvas.height = 600;
            }

            // Prevent scrolling on mobile
            document.body.addEventListener('touchstart', function(e) {
                if (isMobile) e.preventDefault();
            }, { passive: false });
            document.body.addEventListener('touchmove', function(e) {
                if (isMobile) e.preventDefault();
            }, { passive: false });
            document.body.addEventListener('touchend', function(e) {
                if (isMobile) e.preventDefault();
            }, { passive: false });


            // --- Game State Management ---
            const GAME_STATE = {
                MENU: 'MENU',
                PLAYING: 'PLAYING',
                INVENTORY: 'INVENTORY',
                UPGRADE: 'UPGRADE',
                QUESTS: 'QUESTS',
                DEAD: 'DEAD'
            };
            let currentState = GAME_STATE.MENU;

            // --- Game Core Variables ---
            let lastTime = 0;
            let player;
            let camera;
            let mobs = [];
            let items = [];
            let particles = [];
            let quests = [];
            let currentQuest = null;
            let messages = []; // For in-game notifications
            let levelUpFireworks = [];

            // --- Utility Functions ---
            function distance(x1, y1, x2, y2) {
                return Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
            }

            function randomInt(min, max) {
                return Math.floor(Math.random() * (max - min + 1)) + min;
            }

            function drawRect(x, y, width, height, color, alpha = 1) {
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = color;
                ctx.fillRect(x, y, width, height);
                ctx.restore();
            }

            function drawCircle(x, y, radius, color, alpha = 1) {
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            function drawText(text, x, y, color, size = 16, align = 'left', alpha = 1) {
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = color;
                ctx.font = `${size}px Arial`;
                ctx.textAlign = align;
                ctx.fillText(text, x, y);
                ctx.restore();
            }

            function applyShadow(color, blur, offsetX, offsetY) {
                ctx.shadowColor = color;
                ctx.shadowBlur = blur;
                ctx.shadowOffsetX = offsetX;
                ctx.shadowOffsetY = offsetY;
            }

            function clearShadow() {
                ctx.shadowColor = 'rgba(0,0,0,0)';
                ctx.shadowBlur = 0;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 0;
            }

            // --- Classes ---

            // Particle System
            class Particle {
                constructor(x, y, color, size, velocityX, velocityY, life, type = 'default') {
                    this.x = x;
                    this.y = y;
                    this.color = color;
                    this.size = size;
                    this.vx = velocityX;
                    this.vy = velocityY;
                    this.life = life; // in milliseconds
                    this.maxLife = life;
                    this.type = type; // e.g., 'explosion', 'damage', 'levelup'
                    this.text = null; // For damage/critical text
                }

                draw() {
                    const alpha = this.life / this.maxLife;
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    if (this.text) {
                        drawText(this.text, this.x - camera.x, this.y - camera.y, this.color, this.size, 'center', alpha);
                    } else {
                        drawCircle(this.x - camera.x, this.y - camera.y, this.size / 2, this.color, alpha);
                    }
                    ctx.restore();
                }

                update(deltaTime) {
                    this.x += this.vx * deltaTime / 1000;
                    this.y += this.vy * deltaTime / 1000;
                    this.life -= deltaTime;

                    if (this.type === 'damage' || this.type === 'critical') {
                        this.y -= 0.1 * deltaTime; // Float upwards
                        this.size += 0.05; // Grow slightly
                    }
                }
            }

            // Camera Class
            class Camera {
                constructor(x, y, width, height, worldWidth, worldHeight) {
                    this.x = x;
                    this.y = y;
                    this.width = width;
                    this.height = height;
                    this.worldWidth = worldWidth;
                    this.worldHeight = worldHeight;
                }

                update(targetX, targetY) {
                    this.x = targetX - this.width / 2;
                    this.y = targetY - this.height / 2;

                    // Clamp camera to world boundaries
                    this.x = Math.max(0, Math.min(this.x, this.worldWidth - this.width));
                    this.y = Math.max(0, Math.min(this.y, this.worldHeight - this.height));
                }
            }

            // Player Class
            class Player {
                constructor(x, y, size, color) {
                    this.x = x;
                    this.y = y;
                    this.size = size;
                    this.color = color;
                    this.speed = 150; // pixels per second

                    this.level = 1;
                    this.exp = 0;
                    this.expToNextLevel = 100;
                    this.skillPoints = 0;
                    this.statPoints = 0;
                    this.gold = 0; // Noah

                    // Base Stats
                    this.baseStats = {
                        STR: 10,
                        HP: 100,
                        DEX: 10,
                        INT: 10
                    };
                    this.currentHP = this.getMaxHP();

                    // Equipment (will influence stats)
                    this.equipment = {
                        weapon: null,
                        armor: null,
                        accessory: null
                    };

                    this.inventory = new Inventory(16); // 16 slots

                    this.skills = {
                        attack: new Skill('Basic Attack', 0, 1000, 10, 'Melee', 0), // name, cooldown, damage, range, type, mana cost
                        piercingShot: new Skill('Piercing Shot', 5000, 25, 'Ranged', 5),
                        fireball: new Skill('Fireball', 8000, 40, 'Magic', 10),
                        heal: new Skill('Heal', 10000, -30, 'Support', 15) // negative damage for heal
                    };
                    this.availableSkills = ['attack']; // Skills player can use
                    this.skillLevels = {
                        'Basic Attack': 1,
                        'Piercing Shot': 0,
                        'Fireball': 0,
                        'Heal': 0
                    };
                    this.skillUnlockLevels = {
                        'Piercing Shot': 10,
                        'Fireball': 20,
                        'Heal': 45
                    };
                    this.mana = this.getMaxMana();
                    this.maxMana = 50;
                    this.manaRegen = 1; // mana per second

                    this.isMoving = { up: false, down: false, left: false, right: false };
                    this.facing = 'down'; // 'up', 'down', 'left', 'right'

                    this.attackCooldown = 0;
                    this.isAttacking = false;
                    this.lastAttackTime = 0;
                    this.currentSkillCooldowns = {}; // { skillName: remainingTime }
                    Object.keys(this.skills).forEach(key => this.currentSkillCooldowns[key] = 0);

                    this.isDead = false;
                    this.respawnTimer = 0;
                }

                getMaxHP() {
                    return this.baseStats.HP + (this.baseStats.STR * 5); // Example calculation
                }

                getMaxMana() {
                    return this.maxMana + (this.baseStats.INT * 2); // Example calculation
                }

                getDamage() {
                    let weaponDamage = this.equipment.weapon ? this.equipment.weapon.damage : 5;
                    return weaponDamage + (this.baseStats.STR * 0.5) + (this.baseStats.DEX * 0.2); // Example calculation
                }

                getDefense() {
                    let armorDefense = this.equipment.armor ? this.equipment.armor.defense : 0;
                    return armorDefense + (this.baseStats.STR * 0.1); // Example calculation
                }

                addExp(amount) {
                    this.exp += amount;
                    while (this.exp >= this.expToNextLevel) {
                        this.exp -= this.expToNextLevel;
                        this.levelUp();
                    }
                }

                levelUp() {
                    this.level++;
                    this.expToNextLevel = Math.floor(this.expToNextLevel * 1.5); // Increase exp required
                    this.statPoints += 5; // Award stat points
                    this.skillPoints += 1; // Award skill points
                    this.currentHP = this.getMaxHP(); // Heal to full
                    this.mana = this.getMaxMana(); // Restore mana

                    messages.push({ text: `Level Up! You are now level ${this.level}!`, color: 'lime', duration: 3000 });
                    levelUpFireworks.push({ x: this.x, y: this.y, timer: 1000 });

                    // Check for skill unlocks
                    for (const skillName in this.skillUnlockLevels) {
                        if (this.level >= this.skillUnlockLevels[skillName] && !this.availableSkills.includes(skillName)) {
                            this.availableSkills.push(skillName);
                            messages.push({ text: `${skillName} Unlocked!`, color: 'cyan', duration: 3000 });
                        }
                    }
                }

                applyStatPoint(stat) {
                    if (this.statPoints > 0 && this.baseStats[stat] !== undefined) {
                        this.baseStats[stat]++;
                        this.statPoints--;
                        // Recalculate max HP/Mana if affecting those
                        if (stat === 'HP' || stat === 'STR') this.currentHP = Math.min(this.currentHP, this.getMaxHP());
                        if (stat === 'INT') this.mana = Math.min(this.mana, this.getMaxMana());
                        saveGame(); // Save changes
                    }
                }

                applySkillPoint(skillName) {
                    if (this.skillPoints > 0 && this.skillLevels[skillName] !== undefined && this.skillLevels[skillName] < 5) { // Max skill level 5
                        this.skillLevels[skillName]++;
                        this.skillPoints--;
                        messages.push({ text: `${skillName} skill level increased to ${this.skillLevels[skillName]}!`, color: 'gold', duration: 2000 });
                        saveGame();
                    }
                }

                takeDamage(amount) {
                    let damageTaken = Math.max(0, amount - this.getDefense());
                    this.currentHP -= damageTaken;
                    particles.push(new Particle(this.x + randomInt(-10, 10), this.y + randomInt(-10, 10), 'red', 18, randomInt(-20, 20), randomInt(-50, -20), 1000, 'damage', damageTaken.toFixed(0)));
                    if (this.currentHP <= 0) {
                        this.currentHP = 0;
                        this.die();
                    }
                }

                die() {
                    this.isDead = true;
                    this.respawnTimer = 5000; // 5 seconds to respawn
                    currentState = GAME_STATE.DEAD;
                    messages.push({ text: "You have died!", color: 'darkred', duration: 5000 });
                }

                respawn() {
                    this.isDead = false;
                    this.currentHP = this.getMaxHP();
                    this.mana = this.getMaxMana();
                    this.x = world.width / 2;
                    this.y = world.height / 2;
                    currentState = GAME_STATE.PLAYING;
                    messages.push({ text: "You have respawned!", color: 'lime', duration: 2000 });
                }

                useSkill(skillName) {
                    const skill = this.skills[skillName];
                    if (!skill || !this.availableSkills.includes(skillName)) return;
                    if (this.currentSkillCooldowns[skillName] > 0) {
                        messages.push({ text: `${skillName} is on cooldown!`, color: 'red', duration: 1000 });
                        return;
                    }
                    if (this.mana < skill.manaCost) {
                        messages.push({ text: "Not enough mana!", color: 'blue', duration: 1000 });
                        return;
                    }

                    this.mana -= skill.manaCost;
                    this.currentSkillCooldowns[skillName] = skill.cooldown;
                    this.lastAttackTime = performance.now(); // Reset basic attack cooldown for fairness

                    if (skill.damage < 0) { // It's a heal
                        this.currentHP = Math.min(this.getMaxHP(), this.currentHP - skill.damage * (1 + this.skillLevels[skillName] * 0.1)); // Scale with skill level
                        messages.push({ text: `Healed for ${(-skill.damage).toFixed(0)} HP!`, color: 'green', duration: 1500 });
                        particles.push(new Particle(this.x, this.y - this.size, 'green', 25, 0, -20, 1000, 'heal'));
                        return;
                    }

                    let targets = [];
                    if (skill.type === 'Melee' || skill.type === 'AOE') {
                        mobs.forEach(mob => {
                            if (distance(this.x, this.y, mob.x, mob.y) < (skill.range + this.size / 2 + mob.size / 2)) {
                                targets.push(mob);
                            }
                        });
                    } else if (skill.type === 'Ranged' || skill.type === 'Magic') {
                        // For ranged/magic, find the closest mob within range
                        let closestMob = null;
                        let minDistance = skill.range;
                        mobs.forEach(mob => {
                            const dist = distance(this.x, this.y, mob.x, mob.y);
                            if (dist < minDistance) {
                                minDistance = dist;
                                closestMob = mob;
                            }
                        });
                        if (closestMob) {
                            targets.push(closestMob);
                        }
                    }

                    targets.forEach(target => {
                        let totalDamage = skill.damage * (1 + this.skillLevels[skillName] * 0.1) + this.getDamage();
                        let isCrit = Math.random() < (this.baseStats.DEX * 0.01); // DEX for critical chance
                        if (isCrit) {
                            totalDamage *= 1.5; // Critical damage multiplier
                            particles.push(new Particle(target.x + randomInt(-10, 10), target.y + randomInt(-10, 10), 'gold', 24, randomInt(-30, 30), randomInt(-70, -30), 1200, 'critical'));
                            particles[particles.length - 1].text = `CRIT! ${totalDamage.toFixed(0)}`;
                        } else {
                            particles.push(new Particle(target.x + randomInt(-10, 10), target.y + randomInt(-10, 10), 'white', 18, randomInt(-20, 20), randomInt(-50, -20), 1000, 'damage'));
                            particles[particles.length - 1].text = totalDamage.toFixed(0);
                        }
                        target.takeDamage(totalDamage);
                        target.aggroTarget = this; // Aggro the target
                    });

                    this.isAttacking = true;
                    setTimeout(() => this.isAttacking = false, 200); // Visual attack duration
                }

                update(deltaTime) {
                    if (this.isDead) {
                        this.respawnTimer -= deltaTime;
                        if (this.respawnTimer <= 0) {
                            this.respawn();
                        }
                        return;
                    }

                    const dtSeconds = deltaTime / 1000;
                    let dx = 0, dy = 0;

                    if (this.isMoving.up) dy -= 1;
                    if (this.isMoving.down) dy += 1;
                    if (this.isMoving.left) dx -= 1;
                    if (this.isMoving.right) dx += 1;

                    if (dx !== 0 || dy !== 0) {
                        const magnitude = Math.sqrt(dx * dx + dy * dy);
                        this.x += (dx / magnitude) * this.speed * dtSeconds;
                        this.y += (dy / magnitude) * this.speed * dtSeconds;

                        // Update facing direction
                        if (Math.abs(dx) > Math.abs(dy)) {
                            this.facing = dx > 0 ? 'right' : 'left';
                        } else {
                            this.facing = dy > 0 ? 'down' : 'up';
                        }
                    }

                    // Mana regeneration
                    this.mana = Math.min(this.getMaxMana(), this.mana + this.manaRegen * dtSeconds);

                    // Cooldowns
                    for (const skillName in this.currentSkillCooldowns) {
                        if (this.currentSkillCooldowns[skillName] > 0) {
                            this.currentSkillCooldowns[skillName] -= deltaTime;
                            if (this.currentSkillCooldowns[skillName] < 0) {
                                this.currentSkillCooldowns[skillName] = 0;
                            }
                        }
                    }

                    // Clamp to world boundaries
                    this.x = Math.max(0 + this.size / 2, Math.min(this.x, world.width - this.size / 2));
                    this.y = Math.max(0 + this.size / 2, Math.min(this.y, world.height - this.size / 2));
                }

                draw() {
                    ctx.save();
                    ctx.translate(this.x - camera.x, this.y - camera.y);

                    // Body
                    drawCircle(0, 0, this.size / 2, this.color);
                    drawRect(-5, -this.size / 2 - 10, 10, 5, 'red'); // HP bar background
                    drawRect(-5, -this.size / 2 - 10, 10 * (this.currentHP / this.getMaxHP()), 5, 'lime'); // HP bar
                    drawRect(-5, -this.size / 2 - 4, 10, 3, 'darkblue'); // Mana bar background
                    drawRect(-5, -this.size / 2 - 4, 10 * (this.mana / this.getMaxMana()), 3, 'cyan'); // Mana bar

                    // Equipment Visuals (simplistic)
                    if (this.equipment.weapon) {
                        applyShadow('rgba(255,255,0,0.8)', 10, 0, 0); // Elemental Glow
                        drawRect(this.size / 2 - 5, -5, 10, 5, this.equipment.weapon.color); // Example weapon visual
                        clearShadow();
                    }
                    if (this.equipment.armor) {
                        drawRect(-this.size / 2 + 2, -this.size / 2 + 2, this.size - 4, this.size - 4, this.equipment.armor.color, 0.5); // Example armor overlay
                    }

                    if (this.isAttacking) {
                        // Simple attack animation based on facing direction
                        ctx.strokeStyle = 'white';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        if (this.facing === 'up') {
                            ctx.moveTo(0, -this.size / 2);
                            ctx.lineTo(0, -this.size / 2 - 10);
                        } else if (this.facing === 'down') {
                            ctx.moveTo(0, this.size / 2);
                            ctx.lineTo(0, this.size / 2 + 10);
                        } else if (this.facing === 'left') {
                            ctx.moveTo(-this.size / 2, 0);
                            ctx.lineTo(-this.size / 2 - 10, 0);
                        } else if (this.facing === 'right') {
                            ctx.moveTo(this.size / 2, 0);
                            ctx.lineTo(this.size / 2 + 10, 0);
                        }
                        ctx.stroke();
                    }

                    // Level and Name
                    drawText(`Lv${this.level}`, 0, this.size / 2 + 15, 'white', 12, 'center');
                    drawText('Player', 0, this.size / 2 + 30, 'lightblue', 14, 'center');


                    ctx.restore();
                }
            }

            // Skill Class
            class Skill {
                constructor(name, cooldown, baseDamage, range, type, manaCost) {
                    this.name = name;
                    this.cooldown = cooldown; // in milliseconds
                    this.baseDamage = baseDamage;
                    this.range = range;
                    this.type = type; // 'Melee', 'Ranged', 'Magic', 'AOE', 'Support'
                    this.manaCost = manaCost;
                }
            }

            // Mob Class
            class Mob {
                constructor(x, y, type) {
                    this.x = x;
                    this.y = y;
                    this.type = type;
                    this.isDead = false;
                    this.aggroTarget = null;
                    this.lastAttackTime = 0;

                    // Mob specific properties based on type
                    switch (type) {
                        case 'Worm':
                            this.size = 15;
                            this.color = 'brown';
                            this.maxHP = 50;
                            this.currentHP = 50;
                            this.damage = 5;
                            this.attackSpeed = 1500; // ms between attacks
                            this.aggroRange = 100;
                            this.speed = 50;
                            this.expDrop = 10;
                            this.lootTable = [{ item: new Item('Small Potion', 'potion', 'red', 10), chance: 0.3 }];
                            break;
                        case 'Wolf':
                            this.size = 20;
                            this.color = 'gray';
                            this.maxHP = 80;
                            this.currentHP = 80;
                            this.damage = 10;
                            this.attackSpeed = 1200;
                            this.aggroRange = 150;
                            this.speed = 70;
                            this.expDrop = 15;
                            this.lootTable = [{ item: new Item('Wolf Fur', 'material', 'tan', 1), chance: 0.5 }, { item: new Item('Rusty Sword', 'weapon', 'gray', 5), chance: 0.1 }];
                            break;
                        case 'Skeleton':
                            this.size = 25;
                            this.color = 'lightgray';
                            this.maxHP = 120;
                            this.currentHP = 120;
                            this.damage = 15;
                            this.attackSpeed = 1800;
                            this.aggroRange = 120;
                            this.speed = 40;
                            this.expDrop = 25;
                            this.lootTable = [{ item: new Item('Bone Shard', 'material', 'white', 1), chance: 0.7 }, { item: new Item('Old Shield', 'armor', 'silver', 10), chance: 0.15 }];
                            break;
                        case 'Golem':
                            this.size = 40;
                            this.color = 'darkslategray';
                            this.maxHP = 300;
                            this.currentHP = 300;
                            this.damage = 25;
                            this.attackSpeed = 2500;
                            this.aggroRange = 80;
                            this.speed = 30;
                            this.expDrop = 50;
                            this.lootTable = [{ item: new Item('Stone Fragment', 'material', 'gray', 1), chance: 0.8 }, { item: new Item('Golem Core', 'material', 'orange', 10), chance: 0.2 }];
                            break;
                        case 'Harpy':
                            this.size = 22;
                            this.color = 'lightseagreen';
                            this.maxHP = 100;
                            this.currentHP = 100;
                            this.damage = 12;
                            this.attackSpeed = 1000;
                            this.aggroRange = 200;
                            this.speed = 90;
                            this.expDrop = 30;
                            this.lootTable = [{ item: new Item('Harpy Feather', 'material', 'blue', 1), chance: 0.6 }, { item: new Item('Harpy Claw', 'weapon', 'yellow', 8), chance: 0.1 }];
                            break;
                        case 'Troll':
                            this.size = 35;
                            this.color = 'olivedrab';
                            this.maxHP = 200;
                            this.currentHP = 200;
                            this.damage = 20;
                            this.attackSpeed = 2000;
                            this.aggroRange = 180;
                            this.speed = 60;
                            this.expDrop = 40;
                            this.lootTable = [{ item: new Item('Troll Hide', 'material', 'green', 1), chance: 0.7 }, { item: new Item('Club', 'weapon', 'brown', 12), chance: 0.15 }];
                            break;
                    }
                }

                takeDamage(amount) {
                    this.currentHP -= amount;
                    particles.push(new Particle(this.x + randomInt(-10, 10), this.y + randomInt(-10, 10), 'red', 18, randomInt(-20, 20), randomInt(-50, -20), 1000, 'damage', amount.toFixed(0)));
                    if (this.currentHP <= 0) {
                        this.isDead = true;
                        player.addExp(this.expDrop);
                        player.gold += randomInt(1, 5); // Small gold drop

                        // Loot Drop
                        this.lootTable.forEach(drop => {
                            if (Math.random() < drop.chance) {
                                let droppedItem = drop.item.clone();
                                droppedItem.x = this.x + randomInt(-20, 20);
                                droppedItem.y = this.y + randomInt(-20, 20);
                                items.push(droppedItem);
                            }
                        });

                        // Update quest progress
                        quests.forEach(quest => {
                            if (quest.type === 'kill' && quest.target === this.type && quest.currentAmount < quest.requiredAmount) {
                                quest.currentAmount++;
                                messages.push({ text: `Quest: ${quest.name} (${quest.currentAmount}/${quest.requiredAmount})`, color: 'lightgray', duration: 1500 });
                            }
                        });
                    }
                }

                update(deltaTime) {
                    if (this.isDead) return;

                    const dtSeconds = deltaTime / 1000;
                    const distToPlayer = distance(this.x, this.y, player.x, player.y);

                    if (this.aggroTarget) {
                        // Chase aggro target
                        const angle = Math.atan2(this.aggroTarget.y - this.y, this.aggroTarget.x - this.x);
                        let dx = Math.cos(angle);
                        let dy = Math.sin(angle);

                        // If within attack range, stop and attack
                        if (distToPlayer < this.size / 2 + player.size / 2 + 5) { // Close enough to attack
                            dx = 0; dy = 0; // Stop moving
                            if (performance.now() - this.lastAttackTime > this.attackSpeed) {
                                player.takeDamage(this.damage);
                                particles.push(new Particle(player.x, player.y, 'red', 15, 0, 0, 500, 'damage')); // Small visual indicator of hit
                                this.lastAttackTime = performance.now();
                            }
                        } else {
                            this.x += dx * this.speed * dtSeconds;
                            this.y += dy * this.speed * dtSeconds;
                        }

                        // If target too far, lose aggro
                        if (distToPlayer > this.aggroRange * 2) {
                            this.aggroTarget = null;
                        }

                    } else if (distToPlayer < this.aggroRange) {
                        this.aggroTarget = player; // Aggro player
                    }
                }

                draw() {
                    ctx.save();
                    ctx.translate(this.x - camera.x, this.y - camera.y);

                    // Body
                    drawCircle(0, 0, this.size / 2, this.color);
                    drawRect(-this.size / 2, -this.size / 2 - 10, this.size, 5, 'darkred'); // HP bar background
                    drawRect(-this.size / 2, -this.size / 2 - 10, this.size * (this.currentHP / this.maxHP), 5, 'red'); // HP bar

                    drawText(this.type, 0, this.size / 2 + 15, 'white', 12, 'center');

                    ctx.restore();
                }
            }

            // Item Class
            class Item {
                constructor(name, type, color, value, stats = {}, enchantmentLevel = 0) {
                    this.name = name;
                    this.type = type; // 'weapon', 'armor', 'potion', 'material', 'quest'
                    this.color = color;
                    this.value = value; // Gold value or specific effect value
                    this.stats = stats; // e.g., { damage: 10, defense: 5 } for equipment
                    this.enchantmentLevel = enchantmentLevel; // +1 to +10
                    this.x = 0;
                    this.y = 0;
                    this.size = 10;
                }

                clone() {
                    return new Item(this.name, this.type, this.color, this.value, { ...this.stats }, this.enchantmentLevel);
                }

                draw() {
                    ctx.save();
                    ctx.translate(this.x - camera.x, this.y - camera.y);
                    drawRect(-this.size / 2, -this.size / 2, this.size, this.size, this.color);
                    drawText(this.name, 0, this.size / 2 + 10, 'white', 10, 'center');
                    ctx.restore();
                }

                get damage() { return this.stats.damage || 0; }
                get defense() { return this.stats.defense || 0; }
            }

            // Inventory Class
            class Inventory {
                constructor(slots) {
                    this.slots = Array(slots).fill(null);
                }

                addItem(item) {
                    const existingStack = this.slots.find(slot => slot && slot.name === item.name && slot.type !== 'weapon' && slot.type !== 'armor');
                    if (existingStack) { // Simple stacking for non-equipment items
                        // For now, no stack limit. Just add.
                        // In a real game, you'd have item.stackSize
                    }
                    for (let i = 0; i < this.slots.length; i++) {
                        if (this.slots[i] === null) {
                            this.slots[i] = item;
                            messages.push({ text: `Picked up ${item.name}`, color: 'lightgreen', duration: 1500 });
                            saveGame();
                            return true;
                        }
                    }
                    messages.push({ text: `Inventory is full!`, color: 'red', duration: 1500 });
                    return false; // Inventory full
                }

                removeItem(itemToRemove) {
                    const index = this.slots.indexOf(itemToRemove);
                    if (index !== -1) {
                        this.slots[index] = null;
                        saveGame();
                        return true;
                    }
                    return false;
                }

                getItem(index) {
                    return this.slots[index];
                }

                useItem(itemIndex) {
                    const item = this.slots[itemIndex];
                    if (!item) return;

                    switch (item.type) {
                        case 'potion':
                            player.currentHP = Math.min(player.getMaxHP(), player.currentHP + item.value);
                            messages.push({ text: `Used ${item.name}. Restored ${item.value} HP!`, color: 'green', duration: 1500 });
                            this.removeItem(item);
                            break;
                        case 'weapon':
                        case 'armor':
                            // Unequip current item, equip new one
                            const oldEquip = player.equipment[item.type];
                            if (oldEquip) {
                                this.slots[itemIndex] = oldEquip; // Replace slot with old equipment
                            } else {
                                this.slots[itemIndex] = null; // Clear slot if no old equipment
                            }
                            player.equipment[item.type] = item;
                            messages.push({ text: `Equipped ${item.name}!`, color: 'lightblue', duration: 1500 });
                            break;
                        default:
                            messages.push({ text: `Cannot use ${item.name}`, color: 'yellow', duration: 1500 });
                            break;
                    }
                    saveGame();
                }

                draw(offsetX, offsetY) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    ctx.fillRect(offsetX, offsetY, 220, 300); // Inventory background

                    drawText('Inventory', offsetX + 110, offsetY + 20, 'white', 20, 'center');

                    const slotSize = 40;
                    const padding = 10;
                    const startX = offsetX + padding;
                    const startY = offsetY + 40;

                    for (let i = 0; i < this.slots.length; i++) {
                        const row = Math.floor(i / 4);
                        const col = i % 4;
                        const x = startX + col * (slotSize + padding);
                        const y = startY + row * (slotSize + padding);

                        ctx.strokeStyle = 'gray';
                        ctx.strokeRect(x, y, slotSize, slotSize);

                        const item = this.slots[i];
                        if (item) {
                            drawRect(x + 2, y + 2, slotSize - 4, slotSize - 4, item.color);
                            if (item.enchantmentLevel > 0) {
                                applyShadow('yellow', 5, 0, 0); // Enchant glow
                                drawText(`+${item.enchantmentLevel}`, x + slotSize - 10, y + slotSize - 5, 'gold', 10, 'right');
                                clearShadow();
                            }
                            drawText(item.name.substring(0, 3), x + slotSize / 2, y + slotSize / 2 + 5, 'white', 10, 'center'); // Abbreviated name
                        }
                    }
                }
            }

            // Quest Class
            class Quest {
                constructor(id, name, description, type, target, requiredAmount, rewardExp, rewardGold, rewardItem = null) {
                    this.id = id;
                    this.name = name;
                    this.description = description;
                    this.type = type; // 'kill', 'collect', 'reachLevel'
                    this.target = target; // e.g., 'Wolf', 'Noah', 10
                    this.requiredAmount = requiredAmount;
                    this.currentAmount = 0;
                    this.rewardExp = rewardExp;
                    this.rewardGold = rewardGold;
                    this.rewardItem = rewardItem;
                    this.isCompleted = false;
                    this.isClaimed = false;
                }

                checkCompletion() {
                    if (this.isCompleted) return;

                    switch (this.type) {
                        case 'kill':
                            if (this.currentAmount >= this.requiredAmount) {
                                this.isCompleted = true;
                            }
                            break;
                        case 'collect':
                            if (this.target === 'Noah' && player.gold >= this.requiredAmount) {
                                this.isCompleted = true;
                            } else {
                                // For collecting specific items, need to check inventory
                                // (not implemented in a robust way yet for this example)
                            }
                            break;
                        case 'reachLevel':
                            if (player.level >= this.requiredAmount) {
                                this.isCompleted = true;
                            }
                            break;
                    }

                    if (this.isCompleted) {
                        messages.push({ text: `Quest Completed: ${this.name}!`, color: 'gold', duration: 3000 });
                        saveGame();
                    }
                }

                claimReward() {
                    if (this.isCompleted && !this.isClaimed) {
                        player.addExp(this.rewardExp);
                        player.gold += this.rewardGold;
                        if (this.rewardItem) {
                            player.inventory.addItem(this.rewardItem.clone());
                        }
                        this.isClaimed = true;
                        messages.push({ text: `Rewards claimed for ${this.name}!`, color: 'lime', duration: 2000 });
                        saveGame();
                    }
                }
            }


            // --- Game World ---
            const world = {
                width: 2000,
                height: 1500,
                tiles: [] // Could be used for a grid-based map
            };

            function generateWorld() {
                // Simplistic world generation: just a big open space for now
            }

            function spawnMobs(count) {
                const mobTypes = ['Worm', 'Wolf', 'Skeleton', 'Golem', 'Harpy', 'Troll'];
                for (let i = 0; i < count; i++) {
                    const type = mobTypes[randomInt(0, mobTypes.length - 1)];
                    const x = randomInt(50, world.width - 50);
                    const y = randomInt(50, world.height - 50);
                    mobs.push(new Mob(x, y, type));
                }
            }

            function initializeQuests() {
                quests.push(new Quest(1, "First Hunt", "Kill 5 Wolves", "kill", "Wolf", 5, 50, 10, new Item('Basic Ring', 'accessory', 'silver', 5, { STR: 1 })));
                quests.push(new Quest(2, "Goblin Slayer", "Kill 10 Skeletons", "kill", "Skeleton", 10, 100, 20));
                quests.push(new Quest(3, "Reach Level 5", "Reach player level 5", "reachLevel", 5, 5, 200, 50, new Item('Steel Armor', 'armor', 'gray', 20, { defense: 5 })));
            }

            // --- Game Initialization ---
            function initGame() {
                player = new Player(world.width / 2, world.height / 2, 20, 'blue');
                camera = new Camera(0, 0, canvas.width, canvas.height, world.width, world.height);
                generateWorld();
                spawnMobs(10); // Initial mob spawn
                initializeQuests();
                loadGame(); // Try to load saved game
                currentState = GAME_STATE.MENU;
            }


            // --- Game Loop ---
            function gameLoop(currentTime) {
                const deltaTime = currentTime - lastTime;
                lastTime = currentTime;

                update(deltaTime);
                draw();

                requestAnimationFrame(gameLoop);
            }

            function update(deltaTime) {
                // Global Particle update
                particles = particles.filter(p => p.life > 0);
                particles.forEach(p => p.update(deltaTime));

                // Level up fireworks update
                levelUpFireworks = levelUpFireworks.filter(f => f.timer > 0);
                levelUpFireworks.forEach(f => {
                    f.timer -= deltaTime;
                    for (let i = 0; i < 2; i++) { // Spawn new particles
                        if (f.timer > 0) {
                            particles.push(new Particle(f.x + randomInt(-20, 20), f.y + randomInt(-20, 20),
                                `hsl(${randomInt(0, 360)}, 100%, 50%)`, randomInt(5, 15),
                                randomInt(-100, 100), randomInt(-100, -50), randomInt(500, 1000), 'explosion'));
                        }
                    }
                });


                switch (currentState) {
                    case GAME_STATE.MENU:
                        // No game logic update in menu
                        break;
                    case GAME_STATE.PLAYING:
                        player.update(deltaTime);
                        camera.update(player.x, player.y);

                        // Mobs update
                        mobs = mobs.filter(mob => !mob.isDead); // Remove dead mobs
                        if (mobs.length < 5) { // Respawn if too few mobs
                            spawnMobs(5);
                        }
                        mobs.forEach(mob => mob.update(deltaTime));

                        // Item interaction
                        items.forEach(item => {
                            if (distance(player.x, player.y, item.x, item.y) < player.size / 2 + item.size / 2 + 10) {
                                if (player.inventory.addItem(item)) {
                                    items = items.filter(i => i !== item); // Remove item from world
                                }
                            }
                        });

                        // Quest updates
                        quests.forEach(quest => quest.checkCompletion());

                        break;
                    case GAME_STATE.INVENTORY:
                    case GAME_STATE.UPGRADE:
                    case GAME_STATE.QUESTS:
                    case GAME_STATE.DEAD:
                        // Paused states, no active game logic
                        if (currentState === GAME_STATE.DEAD && player.isDead) {
                            player.update(deltaTime); // To handle respawn timer
                        }
                        break;
                }

                // Update messages
                messages = messages.filter(msg => msg.duration > 0);
                messages.forEach(msg => msg.duration -= deltaTime);
            }

            function draw() {
                // Clear canvas
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                drawRect(0, 0, canvas.width, canvas.height, '#333'); // Background for the whole canvas

                // Draw world (simplified as a large rect for now)
                ctx.save();
                ctx.translate(-camera.x, -camera.y);
                drawRect(0, 0, world.width, world.height, 'forestgreen'); // World ground
                ctx.restore();

                switch (currentState) {
                    case GAME_STATE.MENU:
                        drawMenu();
                        break;
                    case GAME_STATE.PLAYING:
                    case GAME_STATE.INVENTORY:
                    case GAME_STATE.UPGRADE:
                    case GAME_STATE.QUESTS:
                    case GAME_STATE.DEAD: // Player still drawn even if dead for visual feedback
                        // Draw world objects only if not in menu
                        items.forEach(item => item.draw());
                        mobs.forEach(mob => mob.draw());
                        player.draw();

                        // Draw all particles
                        particles.forEach(p => p.draw());

                        if (currentState === GAME_STATE.INVENTORY) {
                            drawInventoryScreen();
                        } else if (currentState === GAME_STATE.UPGRADE) {
                            drawUpgradeScreen();
                        } else if (currentState === GAME_STATE.QUESTS) {
                            drawQuestScreen();
                        } else if (currentState === GAME_STATE.DEAD) {
                            drawDeathScreen();
                        }
                        break;
                }

                drawUI(); // UI elements always on top
            }

            function drawMenu() {
                drawRect(0, 0, canvas.width, canvas.height, 'rgba(0,0,0,0.8)');
                drawText('Genflow RPG: Knight Online Clone', canvas.width / 2, canvas.height / 2 - 100, 'white', 48, 'center');
                drawText('Press [S] to Start Game', canvas.width / 2, canvas.height / 2, 'lime', 24, 'center');
                drawText('Press [L] to Load Game', canvas.width / 2, canvas.height / 2 + 50, 'cyan', 24, 'center');
            }

            function drawUI() {
                // Player HUD (HP/MP)
                const barWidth = 200;
                const barHeight = 20;
                drawRect(10, 10, barWidth, barHeight, 'darkred');
                drawRect(10, 10, barWidth * (player.currentHP / player.getMaxHP()), barHeight, 'red');
                drawText(`HP: ${player.currentHP.toFixed(0)}/${player.getMaxHP().toFixed(0)}`, 10 + barWidth / 2, 10 + barHeight / 2 + 5, 'white', 14, 'center');

                drawRect(10, 35, barWidth, barHeight, 'darkblue');
                drawRect(10, 35, barWidth * (player.mana / player.getMaxMana()), barHeight, 'blue');
                drawText(`MP: ${player.mana.toFixed(0)}/${player.getMaxMana().toFixed(0)}`, 10 + barWidth / 2, 35 + barHeight / 2 + 5, 'white', 14, 'center');

                // EXP Bar
                const expBarWidth = canvas.width - 20;
                const expBarHeight = 10;
                drawRect(10, canvas.height - expBarHeight - 10, expBarWidth, expBarHeight, 'darkgray');
                drawRect(10, canvas.height - expBarHeight - 10, expBarWidth * (player.exp / player.expToNextLevel), expBarHeight, 'purple');
                drawText(`Lv ${player.level} | EXP: ${player.exp}/${player.expToNextLevel}`, canvas.width / 2, canvas.height - expBarHeight - 2, 'white', 12, 'center');

                // Gold (Noah)
                drawText(`Noah: ${player.gold}`, canvas.width - 10, 25, 'gold', 18, 'right');

                // Stat Points
                if (player.statPoints > 0) {
                    drawText(`Stat Points: ${player.statPoints}`, canvas.width - 10, 50, 'yellow', 18, 'right');
                }
                // Skill Points
                if (player.skillPoints > 0) {
                    drawText(`Skill Points: ${player.skillPoints}`, canvas.width - 10, 75, 'yellow', 18, 'right');
                }

                // Skill Bar (bottom center)
                const skillBarY = canvas.height - 70;
                const skillIconSize = 40;
                const skillBarStartX = canvas.width / 2 - (player.availableSkills.length * (skillIconSize + 5)) / 2;

                player.availableSkills.forEach((skillName, index) => {
                    const skill = player.skills[skillName];
                    const x = skillBarStartX + index * (skillIconSize + 5);
                    drawRect(x, skillBarY, skillIconSize, skillIconSize, 'rgba(0,0,0,0.5)'); // Background

                    const cooldownRemaining = player.currentSkillCooldowns[skillName];
                    if (cooldownRemaining > 0) {
                        const cooldownRatio = cooldownRemaining / skill.cooldown;
                        drawRect(x, skillBarY, skillIconSize, skillIconSize * cooldownRatio, 'rgba(100,100,100,0.7)'); // Cooldown overlay
                        drawText((cooldownRemaining / 1000).toFixed(1), x + skillIconSize / 2, skillBarY + skillIconSize / 2 + 5, 'white', 14, 'center');
                    }
                    drawText(skillName[0].toUpperCase(), x + skillIconSize / 2, skillBarY + skillIconSize / 2 + 5, 'white', 18, 'center'); // First letter as icon
                });


                // In-game messages
                let messageY = canvas.height / 2 - 100;
                messages.forEach(msg => {
                    const alpha = msg.duration / 3000; // Fade out over 3 seconds
                    drawText(msg.text, canvas.width / 2, messageY, msg.color, 20, 'center', alpha);
                    messageY += 25;
                });
            }

            function drawInventoryScreen() {
                drawRect(0, 0, canvas.width, canvas.height, 'rgba(0,0,0,0.8)'); // Dark overlay
                player.inventory.draw(canvas.width / 2 - 200, canvas.height / 2 - 150); // Centered inventory

                // Equipment display
                const equipX = canvas.width / 2 + 50;
                const equipY = canvas.height / 2 - 150;
                drawText('Equipment', equipX + 75, equipY + 20, 'white', 20, 'center');
                const slotSize = 40;
                drawText('Weapon:', equipX, equipY + 50, 'white', 14, 'left');
                drawRect(equipX + 60, equipY + 40, slotSize, slotSize, 'rgba(50,50,50,0.8)');
                if (player.equipment.weapon) {
                    drawRect(equipX + 62, equipY + 42, slotSize - 4, slotSize - 4, player.equipment.weapon.color);
                    if (player.equipment.weapon.enchantmentLevel > 0) {
                        applyShadow('yellow', 5, 0, 0);
                        drawText(`+${player.equipment.weapon.enchantmentLevel}`, equipX + 60 + slotSize - 10, equipY + 40 + slotSize - 5, 'gold', 10, 'right');
                        clearShadow();
                    }
                    drawText(player.equipment.weapon.name.substring(0, 3), equipX + 60 + slotSize / 2, equipY + 40 + slotSize / 2 + 5, 'white', 10, 'center');
                }

                drawText('Armor:', equipX, equipY + 100, 'white', 14, 'left');
                drawRect(equipX + 60, equipY + 90, slotSize, slotSize, 'rgba(50,50,50,0.8)');
                if (player.equipment.armor) {
                    drawRect(equipX + 62, equipY + 92, slotSize - 4, slotSize - 4, player.equipment.armor.color);
                    if (player.equipment.armor.enchantmentLevel > 0) {
                        applyShadow('yellow', 5, 0, 0);
                        drawText(`+${player.equipment.armor.enchantmentLevel}`, equipX + 60 + slotSize - 10, equipY + 90 + slotSize - 5, 'gold', 10, 'right');
                        clearShadow();
                    }
                    drawText(player.equipment.armor.name.substring(0, 3), equipX + 60 + slotSize / 2, equipY + 90 + slotSize / 2 + 5, 'white', 10, 'center');
                }
            }

            function drawUpgradeScreen() {
                drawRect(0, 0, canvas.width, canvas.height, 'rgba(0,0,0,0.8)'); // Dark overlay

                const anvilX = canvas.width / 2 - 150;
                const anvilY = canvas.height / 2 - 100;
                const anvilWidth = 300;
                const anvilHeight = 200;

                drawRect(anvilX, anvilY, anvilWidth, anvilHeight, 'rgba(50,50,50,0.9)');
                drawText('Anvil (Upgrade Item)', anvilX + anvilWidth / 2, anvilY + 30, 'white', 24, 'center');

                drawText('Drag item here', anvilX + anvilWidth / 2, anvilY + anvilHeight / 2, 'gray', 18, 'center');

                // Display player inventory for selection
                player.inventory.draw(anvilX - 220, anvilY); // Display inventory next to anvil
            }

            function drawQuestScreen() {
                drawRect(0, 0, canvas.width, canvas.height, 'rgba(0,0,0,0.8)'); // Dark overlay
                const panelX = canvas.width / 2 - 250;
                const panelY = canvas.height / 2 - 200;
                const panelWidth = 500;
                const panelHeight = 400;

                drawRect(panelX, panelY, panelWidth, panelHeight, 'rgba(0,0,0,0.7)');
                drawText('Quest Log', panelX + panelWidth / 2, panelY + 30, 'white', 28, 'center');

                let questDisplayY = panelY + 60;
                quests.forEach(quest => {
                    const color = quest.isClaimed ? 'gray' : (quest.isCompleted ? 'lime' : 'white');
                    drawText(`${quest.name} (${quest.currentAmount}/${quest.requiredAmount})`, panelX + 30, questDisplayY, color, 18, 'left');
                    drawText(quest.description, panelX + 50, questDisplayY + 20, 'lightgray', 14, 'left');
                    drawText(`Reward: ${quest.rewardExp} EXP, ${quest.rewardGold} Noah`, panelX + 50, questDisplayY + 40, 'lightgray', 14, 'left');

                    if (quest.isCompleted && !quest.isClaimed) {
                        drawText('[Claim Reward]', panelX + panelWidth - 120, questDisplayY + 20, 'gold', 16, 'left');
                    }
                    questDisplayY += 70;
                });

            function drawDeathScreen() {
                drawRect(0, 0, canvas.width, canvas.height, 'rgba(100,0,0,0.8)');
                drawText('You Died!', canvas.width / 2, canvas.height / 2 - 50, 'white', 48, 'center');
                drawText(`Respawning in ${(player.respawnTimer / 1000).toFixed(0)} seconds...`, canvas.width / 2, canvas.height / 2, 'lightgray', 24, 'center');
            }

            // --- Event Listeners ---
            const keys = {};
            window.addEventListener('keydown', (e) => {
                keys[e.key] = true;
                handleKeyPress(e.key);
            });
            window.addEventListener('keyup', (e) => {
                keys[e.key] = false;
            });

            function handleKeyPress(key) {
                switch (currentState) {
                    case GAME_STATE.MENU:
                        if (key === 's') {
                            currentState = GAME_STATE.PLAYING;
                            messages.push({ text: "Game Started! Good luck!", color: 'lime', duration: 2000 });
                        } else if (key === 'l') {
                            loadGame();
                            currentState = GAME_STATE.PLAYING; // Assume if loaded, player wants to play
                            messages.push({ text: "Game Loaded!", color: 'cyan', duration: 2000 });
                        }
                        break;
                    case GAME_STATE.PLAYING:
                        if (key === 'w') player.isMoving.up = true;
                        if (key === 's') player.isMoving.down = true;
                        if (key === 'a') player.isMoving.left = true;
                        if (key === 'd') player.isMoving.right = true;
                        if (key === 'i') currentState = GAME_STATE.INVENTORY;
                        if (key === 'u') currentState = GAME_STATE.UPGRADE;
                        if (key === 'q') currentState = GAME_STATE.QUESTS;
                        if (key === '1') player.useSkill(player.availableSkills[0] || 'attack');
                        if (key === '2') player.useSkill(player.availableSkills[1] || 'attack');
                        if (key === '3') player.useSkill(player.availableSkills[2] || 'attack');
                        if (key === '4') player.useSkill(player.availableSkills[3] || 'attack');
                        if (key === ' ') player.useSkill('attack'); // Spacebar for basic attack
                        // Stat point allocation (simplistic, just for example)
                        if (key === 'p' && player.statPoints > 0) currentState = GAME_STATE.INVENTORY; // Go to inventory to show stats and buttons
                        break;
                    case GAME_STATE.INVENTORY:
                    case GAME_STATE.UPGRADE:
                    case GAME_STATE.QUESTS:
                        if (key === 'escape' || key === 'i' || key === 'u' || key === 'q') {
                            currentState = GAME_STATE.PLAYING; // Exit these screens
                        }
                        break;
                    case GAME_STATE.DEAD:
                        // Only respawn logic here, no other actions
                        break;
                }
            }

            window.addEventListener('keyup', (e) => {
                if (currentState === GAME_STATE.PLAYING) {
                    if (e.key === 'w') player.isMoving.up = false;
                    if (e.key === 's') player.isMoving.down = false;
                    if (e.key === 'a') player.isMoving.left = false;
                    if (e.key === 'd') player.isMoving.right = false;
                }
            });

            // Mouse Click Handling for UI
            canvas.addEventListener('click', (e) => {
                const mouseX = e.clientX - canvas.getBoundingClientRect().left;
                const mouseY = e.clientY - canvas.getBoundingClientRect().top;

                if (currentState === GAME_STATE.MENU) {
                    // Check for start/load buttons (if they were drawn as clickable regions)
                    // For now, rely on keyboard 's' and 'l'
                } else if (currentState === GAME_STATE.INVENTORY) {
                    const offsetX = canvas.width / 2 - 200;
                    const offsetY = canvas.height / 2 - 150;
                    const slotSize = 40;
                    const padding = 10;
                    const startX = offsetX + padding;
                    const startY = offsetY + 40;

                    for (let i = 0; i < player.inventory.slots.length; i++) {
                        const row = Math.floor(i / 4);
                        const col = i % 4;
                        const x = startX + col * (slotSize + padding);
                        const y = startY + row * (slotSize + padding);

                        if (mouseX > x && mouseX < x + slotSize && mouseY > y && mouseY < y + slotSize) {
                            player.inventory.useItem(i);
                            return;
                        }
                    }
                } else if (currentState === GAME_STATE.QUESTS) {
                    const panelX = canvas.width / 2 - 250;
                    const panelY = canvas.height / 2 - 200;
                    const panelWidth = 500;

                    let questDisplayY = panelY + 60;
                    quests.forEach(quest => {
                        if (quest.isCompleted && !quest.isClaimed) {
                            const claimBtnX = panelX + panelWidth - 120;
                            const claimBtnY = questDisplayY + 5;
                            const claimBtnWidth = 100;
                            const claimBtnHeight = 25;
                            if (mouseX > claimBtnX && mouseX < claimBtnX + claimBtnWidth && mouseY > claimBtnY && mouseY < claimBtnY + claimBtnHeight) {
                                quest.claimReward();
                                return;
                            }
                        }
                        questDisplayY += 70;
                    });
                }
            });

            // Mobile Controls
            let joystickActive = false;
            let joystickCenterX, joystickCenterY;
            let joystickCurrentX, joystickCurrentY;

            if (isMobile) {
                const joystickDiv = document.getElementById('joystick');
                const joystickHandleDiv = document.getElementById('joystick-handle');

                joystickDiv.addEventListener('touchstart', (e) => {
                    joystickActive = true;
                    const touch = e.touches[0];
                    const rect = joystickDiv.getBoundingClientRect();
                    joystickCenterX = rect.left + rect.width / 2;
                    joystickCenterY = rect.top + rect.height / 2;
                    joystickCurrentX = touch.clientX;
                    joystickCurrentY = touch.clientY;
                    joystickHandleDiv.style.left = `${joystickCurrentX - rect.left}px`;
                    joystickHandleDiv.style.top = `${joystickCurrentY - rect.top}px`;
                });

                joystickDiv.addEventListener('touchmove', (e) => {
                    if (!joystickActive) return;
                    const touch = e.touches[0];
                    const rect = joystickDiv.getBoundingClientRect();

                    let newX = touch.clientX;
                    let newY = touch.clientY;

                    const dist = distance(joystickCenterX, joystickCenterY, newX, newY);
                    const maxDist = rect.width / 2 - joystickHandleDiv.offsetWidth / 2;

                    if (dist > maxDist) {
                        const angle = Math.atan2(newY - joystickCenterY, newX - joystickCenterX);
                        newX = joystickCenterX + Math.cos(angle) * maxDist;
                        newY = joystickCenterY + Math.sin(angle) * maxDist;
                    }

                    joystickHandleDiv.style.left = `${newX - rect.left}px`;
                    joystickHandleDiv.style.top = `${newY - rect.top}px`;

                    // Update player movement based on joystick handle position
                    let dx = (newX - joystickCenterX) / maxDist;
                    let dy = (newY - joystickCenterY) / maxDist;

                    player.isMoving.up = dy < -0.1;
                    player.isMoving.down = dy > 0.1;
                    player.isMoving.left = dx < -0.1;
                    player.isMoving.right = dx > 0.1;
                });

                joystickDiv.addEventListener('touchend', () => {
                    joystickActive = false;
                    joystickHandleDiv.style.left = '50%';
                    joystickHandleDiv.style.top = '50%';
                    player.isMoving.up = player.isMoving.down = player.isMoving.left = player.isMoving.right = false;
                });

                skillButtons.forEach(button => {
                    button.addEventListener('touchend', (e) => {
                        const skillName = e.currentTarget.dataset.skill;
                        if (skillName === 'attack') player.useSkill('attack');
                        if (skillName === 'skill1') player.useSkill(player.availableSkills[1] || 'attack');
                        if (skillName === 'skill2') player.useSkill(player.availableSkills[2] || 'attack');
                        if (skillName === 'skill3') player.useSkill(player.availableSkills[3] || 'attack');
                    });
                });
            }

            // --- Save/Load System ---
            function saveGame() {
                const gameData = {
                    player: {
                        x: player.x,
                        y: player.y,
                        level: player.level,
                        exp: player.exp,
                        expToNextLevel: player.expToNextLevel,
                        statPoints: player.statPoints,
                        skillPoints: player.skillPoints,
                        gold: player.gold,
                        baseStats: { ...player.baseStats },
                        currentHP: player.currentHP,
                        mana: player.mana,
                        maxMana: player.maxMana,
                        inventory: player.inventory.slots.map(item => item ? {
                            name: item.name, type: item.type, color: item.color, value: item.value, stats: item.stats, enchantmentLevel: item.enchantmentLevel
                        } : null),
                        equipment: {
                            weapon: player.equipment.weapon ? {
                                name: player.equipment.weapon.name, type: player.equipment.weapon.type, color: player.equipment.weapon.color, value: player.equipment.weapon.value, stats: player.equipment.weapon.stats, enchantmentLevel: player.equipment.weapon.enchantmentLevel
                            } : null,
                            armor: player.equipment.armor ? {
                                name: player.equipment.armor.name, type: player.equipment.armor.type, color: player.equipment.armor.color, value: player.equipment.armor.value, stats: player.equipment.armor.stats, enchantmentLevel: player.equipment.armor.enchantmentLevel
                            } : null,
                            accessory: player.equipment.accessory ? {
                                name: player.equipment.accessory.name, type: player.equipment.accessory.type, color: player.equipment.accessory.color, value: player.equipment.accessory.value, stats: player.equipment.accessory.stats, enchantmentLevel: player.equipment.accessory.enchantmentLevel
                            } : null
                        },
                        skillLevels: { ...player.skillLevels },
                        availableSkills: [...player.availableSkills]
                    },
                    quests: quests.map(quest => ({
                        id: quest.id,
                        name: quest.name,
                        description: quest.description,
                        type: quest.type,
                        target: quest.target,
                        requiredAmount: quest.requiredAmount,
                        currentAmount: quest.currentAmount,
                        rewardExp: quest.rewardExp,
                        rewardGold: quest.rewardGold,
                        rewardItem: quest.rewardItem ? {
                            name: quest.rewardItem.name, type: quest.rewardItem.type, color: quest.rewardItem.color, value: quest.rewardItem.value, stats: quest.rewardItem.stats, enchantmentLevel: quest.rewardItem.enchantmentLevel
                        } : null,
                        isCompleted: quest.isCompleted,
                        isClaimed: quest.isClaimed
                    })),
                    // Mobs and items on map are volatile, not saved for simplicity
                };
                localStorage.setItem('genflowRpgSave', JSON.stringify(gameData));
                messages.push({ text: "Game Saved!", color: 'lime', duration: 1500 });
                console.log("Game Saved:", gameData);
            }

            function loadGame() {
                const savedData = localStorage.getItem('genflowRpgSave');
                if (savedData) {
                    const gameData = JSON.parse(savedData);

                    // Restore Player
                    player.x = gameData.player.x;
                    player.y = gameData.player.y;
                    player.level = gameData.player.level;
                    player.exp = gameData.player.exp;
                    player.expToNextLevel = gameData.player.expToNextLevel;
                    player.statPoints = gameData.player.statPoints;
                    player.skillPoints = gameData.player.skillPoints;
                    player.gold = gameData.player.gold;
                    player.baseStats = { ...gameData.player.baseStats };
                    player.currentHP = gameData.player.currentHP;
                    player.mana = gameData.player.mana;
                    player.maxMana = gameData.player.maxMana;

                    player.inventory.slots = gameData.player.inventory.map(itemData => itemData ? new Item(itemData.name, itemData.type, itemData.color, itemData.value, itemData.stats, itemData.enchantmentLevel) : null);
                    if (gameData.player.equipment.weapon) player.equipment.weapon = new Item(gameData.player.equipment.weapon.name, gameData.player.equipment.weapon.type, gameData.player.equipment.weapon.color, gameData.player.equipment.weapon.value, gameData.player.equipment.weapon.stats, gameData.player.equipment.weapon.enchantmentLevel);
                    if (gameData.player.equipment.armor) player.equipment.armor = new Item(gameData.player.equipment.armor.name, gameData.player.equipment.armor.type, gameData.player.equipment.armor.color, gameData.player.equipment.armor.value, gameData.player.equipment.armor.stats, gameData.player.equipment.armor.enchantmentLevel);
                    if (gameData.player.equipment.accessory) player.equipment.accessory = new Item(gameData.player.equipment.accessory.name, gameData.player.equipment.accessory.type, gameData.player.equipment.accessory.color, gameData.player.equipment.accessory.value, gameData.player.equipment.accessory.stats, gameData.player.equipment.accessory.enchantmentLevel);

                    player.skillLevels = { ...gameData.player.skillLevels };
                    player.availableSkills = [...gameData.player.availableSkills];

                    // Restore Quests
                    quests = gameData.quests.map(questData => {
                        const q = new Quest(questData.id, questData.name, questData.description, questData.type, questData.target, questData.requiredAmount, questData.rewardExp, questData.rewardGold, questData.rewardItem ? new Item(questData.rewardItem.name, questData.rewardItem.type, questData.rewardItem.color, questData.rewardItem.value, questData.rewardItem.stats, questData.rewardItem.enchantmentLevel) : null);
                        q.currentAmount = questData.currentAmount;
                        q.isCompleted = questData.isCompleted;
                        q.isClaimed = questData.isClaimed;
                        return q;
                    });
                    messages.push({ text: "Game Loaded Successfully!", color: 'cyan', duration: 2000 });
                } else {
                    messages.push({ text: "No saved game found.", color: 'orange', duration: 2000 });
                }
            }


            // Start the game after all initializations
            initGame();
            requestAnimationFrame(gameLoop);
        }; // End of window.onload
    </script>

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>The Warrior's Journey — 2D RPG</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0f1419;--fg:#e8dcc8;--card:rgba(18,24,33,0.92);--card-fg:#e8dcc8;
  --primary:#d4a520;--primary-fg:#0f1419;
  --secondary:#b33030;--secondary-fg:#f5f0e8;
  --muted:#1e2736;--muted-fg:#6b7a8d;
  --border:#2a3444;--accent:#7c3aed;
  --hp-bar:linear-gradient(90deg,#8b2020,#cc3333);
  --mp-bar:linear-gradient(90deg,#1e3a8a,#3b82f6);
  --power-bar:linear-gradient(90deg,#92400e,#d4a520);
  --xp-bar:linear-gradient(90deg,#14532d,#22c55e);
  --gold:#d4a520;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--fg);font-family:'Inter',sans-serif;user-select:none;-webkit-user-select:none;touch-action:none;}
canvas{display:block;position:absolute;top:0;left:0;}
.font-d{font-family:'Cinzel',serif;}

/* HUD */
#hud{position:absolute;top:8px;left:8px;width:220px;z-index:10;pointer-events:none;}
#hud .box{background:var(--card);backdrop-filter:blur(6px);border:1px solid var(--border);border-radius:6px;padding:8px;}
.bar-wrap{display:flex;align-items:center;gap:5px;margin:2px 0;}
.bar-icon{font-size:11px;width:16px;text-align:center;}
.bar-outer{flex:1;height:16px;background:var(--muted);border-radius:3px;overflow:hidden;position:relative;}
.bar-inner{height:100%;transition:width .3s;}
.bar-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--fg);text-shadow:0 1px 2px #000;}
.bar-hp .bar-inner{background:var(--hp-bar);}
.bar-mp .bar-inner{background:var(--mp-bar);}
.bar-pw .bar-inner{background:var(--power-bar);}
.bar-xp .bar-inner{background:var(--xp-bar);}
.stat-row{display:flex;justify-content:space-between;font-size:9px;color:var(--muted-fg);padding-top:3px;}

/* Combat log */
#combatLog{position:absolute;bottom:8px;left:8px;width:260px;z-index:10;pointer-events:none;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:6px;max-height:90px;overflow:hidden;}
#combatLog div{font-size:10px;line-height:1.3;}
#combatLog div:first-child{color:var(--fg);}
#combatLog div:not(:first-child){color:var(--muted-fg);}

/* Skill bar */
#skillBar{position:absolute;z-index:20;display:flex;gap:6px;}
.skill-btn{width:52px;height:52px;border-radius:6px;border:2px solid var(--border);background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:all .15s;}
.skill-btn:not(.disabled):hover{border-color:var(--primary);background:rgba(212,165,32,.15);}
.skill-btn:not(.disabled):active{transform:scale(.93);}
.skill-btn.disabled{opacity:.5;cursor:not-allowed;}
.skill-btn.glow-pulse{border-color:var(--gold);animation:pulse-glow 1.5s infinite;}
@keyframes pulse-glow{0%,100%{box-shadow:0 0 6px rgba(212,165,32,.3);}50%{box-shadow:0 0 16px rgba(212,165,32,.6);}}
.skill-icon{font-size:20px;z-index:1;}
.skill-key{font-size:8px;color:var(--muted-fg);z-index:1;}
.skill-cd{position:absolute;inset:0;background:rgba(30,39,54,.75);border-radius:4px;}
.skill-mana{position:absolute;top:-4px;right:-4px;background:#3b82f6;font-size:7px;font-weight:700;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;}

.potion-btn{width:48px;height:52px;border-radius:6px;border:1px solid var(--border);background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.potion-btn:not(.disabled):hover{background:rgba(255,255,255,.05);}
.potion-btn:not(.disabled):active{transform:scale(.93);}
.potion-btn.disabled{opacity:.35;cursor:not-allowed;}
.potion-icon{font-size:18px;}
.potion-count{font-size:8px;color:var(--muted-fg);}

/* Menu buttons */
#menuBtns{position:absolute;z-index:20;display:flex;gap:6px;}
.menu-btn{display:flex;align-items:center;gap:4px;padding:6px 10px;border-radius:6px;background:var(--card);border:1px solid var(--border);font-size:12px;color:var(--fg);cursor:pointer;transition:background .15s;}
.menu-btn:hover{background:var(--muted);}
.menu-btn .shortcut{font-size:8px;color:var(--muted-fg);}

/* Panels (Inventory/Shop/Quest) */
.panel-overlay{position:absolute;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;background:rgba(15,20,25,.85);backdrop-filter:blur(4px);}
.panel{background:rgba(18,24,33,.97);border:1px solid var(--border);border-radius:10px;padding:16px;width:90vw;max-width:480px;max-height:80vh;overflow-y:auto;}
.panel h2{font-family:'Cinzel',serif;color:var(--primary);font-size:18px;font-weight:700;}
.panel .close-btn{font-size:20px;color:var(--muted-fg);cursor:pointer;background:none;border:none;}
.panel .close-btn:hover{color:var(--fg);}
.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.gold-display{font-size:13px;color:var(--gold);}

/* Equip slots */
.equip-slots{display:flex;gap:8px;margin-bottom:12px;padding:8px;background:rgba(30,39,54,.4);border-radius:6px;}
.equip-slot{flex:1;padding:8px;background:var(--card);border:1px solid var(--border);border-radius:6px;text-align:center;}
.equip-slot .label{font-size:9px;color:var(--muted-fg);margin-bottom:4px;}
.equip-slot .icon{font-size:20px;}
.equip-slot .name{font-size:9px;}
.equip-slot .bonus{font-size:8px;color:var(--muted-fg);}

/* Inventory grid */
.inv-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;}
.inv-slot{aspect-ratio:1;border-radius:5px;border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;cursor:pointer;transition:border-color .15s;font-size:10px;background:rgba(30,39,54,.2);}
.inv-slot:hover{border-color:var(--primary);}
.inv-slot.empty{opacity:.4;cursor:default;}
.inv-slot .item-icon{font-size:18px;}
.inv-slot .item-name{font-size:7px;line-height:1.1;max-width:100%;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.inv-slot .lock-badge{position:absolute;top:1px;left:3px;font-size:8px;}
.inv-slot .actions{position:absolute;bottom:0;left:0;right:0;display:flex;font-size:7px;}
.inv-slot .actions button{flex:1;border:none;cursor:pointer;padding:1px;font-size:7px;}
.inv-slot .actions .equip-btn{background:rgba(212,165,32,.7);color:var(--primary-fg);}
.inv-slot .actions .sell-btn{background:rgba(179,48,48,.7);color:#fff;}
.inv-slot .actions .lock-btn{background:var(--muted);color:var(--muted-fg);}

.sell-trash-btn{width:100%;padding:7px;margin-bottom:8px;border-radius:5px;background:var(--secondary);color:var(--secondary-fg);border:none;cursor:pointer;font-size:11px;transition:opacity .15s;}
.sell-trash-btn:hover{opacity:.85;}

/* Shop */
.shop-item{display:flex;align-items:center;justify-content:space-between;padding:8px;background:rgba(30,39,54,.25);border-radius:5px;margin-bottom:4px;}
.shop-item:hover{background:rgba(30,39,54,.45);}
.shop-item .info{display:flex;align-items:center;gap:8px;}
.shop-item .info .icon{font-size:20px;}
.shop-item .info .name{font-size:13px;font-weight:500;}
.shop-item .info .stats{font-size:9px;color:var(--muted-fg);}
.buy-btn{padding:4px 10px;border-radius:5px;border:none;font-size:11px;cursor:pointer;background:var(--primary);color:var(--primary-fg);font-weight:600;}
.buy-btn:disabled{background:var(--muted);color:var(--muted-fg);cursor:not-allowed;}

/* Quest */
.quest-box{padding:12px;background:rgba(30,39,54,.35);border:1px solid var(--border);border-radius:6px;}
.quest-box h3{font-family:'Cinzel',serif;font-size:14px;color:var(--primary);font-weight:700;}
.quest-box p{font-size:11px;color:var(--muted-fg);margin-top:4px;}
.quest-progress{margin-top:8px;display:flex;align-items:center;gap:6px;}
.quest-progress .track{flex:1;height:8px;background:var(--muted);border-radius:4px;overflow:hidden;}
.quest-progress .fill{height:100%;background:var(--xp-bar);}
.quest-progress .count{font-size:11px;font-weight:700;}
.quest-reward{margin-top:8px;font-size:9px;color:var(--muted-fg);}
.quest-btn{width:100%;padding:10px;margin-top:12px;border-radius:6px;border:none;background:var(--primary);color:var(--primary-fg);font-family:'Cinzel',serif;font-size:14px;cursor:pointer;transition:opacity .15s;}
.quest-btn:hover{opacity:.88;}

/* Quest tracker */
#questTracker{position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:none;}
#questTracker .inner{background:var(--card);backdrop-filter:blur(4px);border:1px solid var(--border);border-radius:5px;padding:4px 12px;text-align:center;}
#questTracker .qname{font-size:10px;color:var(--primary);font-family:'Cinzel',serif;}
#questTracker .qcount{font-size:10px;color:var(--muted-fg);margin-left:8px;}

/* Death screen */
#deathScreen{position:absolute;inset:0;z-index:40;display:none;align-items:center;justify-content:center;background:rgba(15,20,25,.92);backdrop-filter:blur(8px);}
#deathScreen.show{display:flex;}
#deathScreen .inner{text-align:center;}
#deathScreen h1{font-family:'Cinzel',serif;font-size:40px;font-weight:900;color:var(--secondary);text-shadow:0 0 15px rgba(179,48,48,.6);}
#deathScreen p{color:var(--muted-fg);font-size:13px;margin:16px 0;}
#deathScreen button{padding:12px 32px;border-radius:8px;background:var(--primary);color:var(--primary-fg);font-family:'Cinzel',serif;font-size:18px;border:none;cursor:pointer;transition:opacity .15s;}
#deathScreen button:hover{opacity:.88;}

/* Joystick */
#joystick{position:absolute;bottom:32px;left:32px;width:128px;height:128px;z-index:9999;touch-action:none;display:none;}
#joystick .base{position:absolute;inset:0;border-radius:50%;background:rgba(30,39,54,.35);border:2px solid rgba(42,52,68,.5);}
#joystick .deadzone-ring{position:absolute;border-radius:50%;border:1px solid rgba(42,52,68,.25);}
#joystick .knob{position:absolute;width:56px;height:56px;border-radius:50%;background:rgba(212,165,32,.55);border:2px solid var(--primary);box-shadow:0 2px 10px rgba(0,0,0,.4);left:calc(50% - 28px);top:calc(50% - 28px);transition:transform .15s ease-out;}

/* PC hints */
#pcHints{position:absolute;bottom:8px;right:8px;z-index:10;pointer-events:none;background:rgba(18,24,33,.6);backdrop-filter:blur(4px);border:1px solid var(--border);border-radius:5px;padding:5px 8px;font-size:8px;color:var(--muted-fg);line-height:1.4;}

/* Rarity colors */
.r-common{color:#9ca3af;}.r-uncommon{color:#22c55e;}.r-rare{color:#3b82f6;}.r-epic{color:#a855f7;}.r-legendary{color:#f59e0b;}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<!-- HUD -->
<div id="hud"><div class="box">
  <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px;">
    <span class="font-d" style="color:var(--primary);font-weight:700;" id="hudName">Savaşçı</span>
    <span style="color:var(--muted-fg)" id="hudLevel">Lv.1</span>
  </div>
  <div class="bar-wrap bar-hp"><span class="bar-icon">❤️</span><div class="bar-outer"><div class="bar-inner" id="barHp"></div><span class="bar-text" id="barHpText"></span></div></div>
  <div class="bar-wrap bar-mp"><span class="bar-icon">💎</span><div class="bar-outer"><div class="bar-inner" id="barMp"></div><span class="bar-text" id="barMpText"></span></div></div>
  <div class="bar-wrap bar-pw"><span class="bar-icon">⚡</span><div class="bar-outer"><div class="bar-inner" id="barPw"></div><span class="bar-text" id="barPwText"></span></div></div>
  <div class="bar-wrap bar-xp"><span class="bar-icon">✨</span><div class="bar-outer"><div class="bar-inner" id="barXp"></div><span class="bar-text" id="barXpText"></span></div></div>
  <div class="stat-row"><span id="hudAtk">⚔️ ATK: 15</span><span id="hudDef">🛡️ DEF: 10</span><span id="hudGold">💰 100G</span></div>
</div></div>

<div id="combatLog"></div>
<div id="skillBar"></div>
<div id="menuBtns"></div>
<div id="questTracker" style="display:none;"><div class="inner"><span class="qname" id="qtName"></span><span class="qcount" id="qtCount"></span></div></div>
<div id="deathScreen"><div class="inner"><h1>💀 ÖLDÜN</h1><p>Güvenli bölgede yeniden doğacaksın.</p><button onclick="respawn()">🔄 Yeniden Doğ</button></div></div>
<div id="joystick"><div class="base"></div><div class="deadzone-ring"></div><div class="knob" id="joystickKnob"></div></div>
<div id="pcHints">WASD: Hareket | 1-4: Yetenekler<br>Q: Can Potu | E: Mana Potu<br>I: Envanter | B: Market | J: Görev</div>

<!-- Panels rendered dynamically -->
<div id="panelContainer"></div>

<script>
// ============================================================
// THE WARRIOR'S JOURNEY — STANDALONE ENGINE
// ============================================================

// === CONSTANTS ===
const WORLD_W=200,WORLD_H=200,SAFE_ZONE={x:0,y:0,radius:30},WORM_ZONE={x:50,y:50};
const INV_SIZE=20,TILE=40,SCALE=4,EXP_BASE=100,EXP_GROWTH=1.5;
const BASE_STATS={maxHp:150,hp:150,maxMp:50,mp:50,attack:15,defense:10,speed:3};
const STATS_PER_LVL={maxHp:20,maxMp:8,attack:3,defense:2,speed:0.1};
const RARITY_COLORS={common:'#9ca3af',uncommon:'#22c55e',rare:'#3b82f6',epic:'#a855f7',legendary:'#f59e0b'};

const WARRIOR_SKILLS=[
  {id:'basic_attack',name:'Temel Vuruş',desc:'Basit bir kılıç darbesi.',unlock:1,mana:0,cd:0.8,mult:1,aoe:false,aoeR:0,needsPower:false,curCd:0,icon:'⚔️',key:'1'},
  {id:'power_strike',name:'Güçlü Vuruş',desc:'%150 hasar, 20 Mana. 5sn.',unlock:3,mana:20,cd:5,mult:1.5,aoe:false,aoeR:0,needsPower:false,curCd:0,icon:'🗡️',key:'2'},
  {id:'sword_spin',name:'Kılıç Döngüsü',desc:'AOE hasar, 35 Mana. 10sn.',unlock:7,mana:35,cd:10,mult:1.2,aoe:true,aoeR:80,needsPower:false,curCd:0,icon:'🌀',key:'3'},
  {id:'dragon_strike',name:'Ejderha Vuruşu',desc:'5x hasar! Power Bar gerekli.',unlock:10,mana:0,cd:0,mult:5,aoe:true,aoeR:999,needsPower:true,curCd:0,icon:'🐉',key:'4'},
];

const SHOP_ITEMS=[
  {name:'Demir Kılıç',type:'sword',rarity:'common',value:50,atk:5,def:0,heal:0,mana:0,icon:'🗡️'},
  {name:'Çelik Kılıç',type:'sword',rarity:'uncommon',value:150,atk:12,def:0,heal:0,mana:0,icon:'⚔️'},
  {name:'Deri Zırh',type:'armor',rarity:'common',value:40,atk:0,def:5,heal:0,mana:0,icon:'🛡️'},
  {name:'Zincir Zırh',type:'armor',rarity:'uncommon',value:120,atk:0,def:10,heal:0,mana:0,icon:'🛡️'},
  {name:'Can Potu',type:'hp_potion',rarity:'common',value:20,atk:0,def:0,heal:50,mana:0,icon:'❤️'},
  {name:'Mana Potu',type:'mp_potion',rarity:'common',value:25,atk:0,def:0,heal:0,mana:30,icon:'💙'},
];

const QUEST_TEMPLATES=[
  {name:'Solucan Avı',desc:'3 solucan öldür.',target:'worm',count:3,rExp:150,rGold:80,rItem:{name:'Solucan Kırıcı',type:'sword',rarity:'rare',value:200,atk:18,def:0,heal:0,mana:0,icon:'🔥',locked:true}},
  {name:'Büyük Tehdit',desc:'Boss Solucanı yenilgiye uğrat!',target:'boss',count:1,rExp:500,rGold:300,rItem:{name:'Ejderha Zırhı',type:'armor',rarity:'epic',value:500,atk:5,def:25,heal:0,mana:0,icon:'🐲',locked:true}},
  {name:'Solucan Katliamı',desc:'7 solucan öldür.',target:'worm',count:7,rExp:400,rGold:200,rItem:{name:'Kaos Kılıcı',type:'sword',rarity:'epic',value:600,atk:30,def:0,heal:0,mana:0,icon:'⚡',locked:true}},
];

// === UID ===
let _uid=1;const uid=()=>'id_'+(_uid++);

// === STATE ===
let isMobile=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)||window.innerWidth<768;
let state,keys=new Set(),joystickDir={x:0,y:0},combatLog=['⚔️ Savaşçının Yolculuğu başladı!'];
let showInventory=false,showShop=false,showQuest=false;

function makeItem(o){return{id:uid(),name:o.name,type:o.type,rarity:o.rarity,value:o.value,atk:o.atk||0,def:o.def||0,heal:o.heal||0,mana:o.mana||0,locked:o.locked||false,equipped:false,icon:o.icon};}

function createPlayer(){
  return{
    name:'Savaşçı',level:1,exp:0,expToNext:EXP_BASE,
    stats:{...BASE_STATS},baseStats:{...BASE_STATS},
    pos:{x:0,y:0},gold:100,powerBar:0,maxPowerBar:100,
    inventory:new Array(INV_SIZE).fill(null),
    eqSword:null,eqArmor:null,
    skills:WARRIOR_SKILLS.map(s=>({...s})),
    quest:null,kills:{worm:0,boss:0},
    alive:true,atkRange:60,facingRight:true,isAttacking:false,atkTimer:0,
  };
}

function createWorm(level,isBoss=false){
  const m=1+(level-1)*0.2,bm=isBoss?5:1;
  const hp=Math.floor(60*m*bm),atk=Math.floor(8*m*bm),def=Math.floor(3*m*bm);
  const a=Math.random()*Math.PI*2,d=10+Math.random()*30;
  return{
    id:uid(),name:isBoss?'Büyük Solucan':'Solucan Lv.'+level,level,isBoss,
    stats:{maxHp:hp,hp,maxMp:0,mp:0,attack:atk,defense:def,speed:1.5},
    pos:{x:WORM_ZONE.x+Math.cos(a)*d,y:WORM_ZONE.y+Math.sin(a)*d},
    reward:{exp:Math.floor((isBoss?200:30)*m),gold:Math.floor((isBoss?100:15)*m),items:genLoot(level,isBoss)},
    atkCd:isBoss?2:1.5,curAtkCd:0,
  };
}

function genLoot(lv,boss){
  const items=[];const roll=Math.random();
  if(boss||roll<0.4){
    const rs=boss?['rare','epic','legendary']:['common','uncommon','rare'];
    const r=rs[Math.floor(Math.random()*rs.length)];
    const isW=Math.random()>0.5;
    items.push(makeItem({name:isW?(r==='legendary'?'Efsane Kılıcı':'Savaş Kılıcı'):(r==='legendary'?'Efsane Zırhı':'Savaş Zırhı'),
      type:isW?'sword':'armor',rarity:r,value:Math.floor(30*(1+lv*0.5)*(boss?3:1)),
      atk:isW?Math.floor(5+lv*3*(boss?2:1)):0,def:!isW?Math.floor(4+lv*2*(boss?2:1)):0,icon:isW?'⚔️':'🛡️'}));
  }
  if(Math.random()<0.6){
    items.push(makeItem({name:'Solucan Derisi',type:'trash',rarity:'common',value:Math.floor(5+lv*2),icon:'🪱'}));
  }
  return items;
}

function spawnEnemies(){
  const e=[];for(let i=0;i<5;i++)e.push(createWorm(Math.floor(Math.random()*5)+1));
  e.push(createWorm(5,true));return e;
}

function dist(a,b){return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2);}
function calcDmg(atk,def,mult){const base=Math.max(1,atk*mult-def*0.5);return Math.floor(base*(0.9+Math.random()*0.2));}

function recalcStats(p){
  let ba=0,bd=0;
  if(p.eqSword)ba+=p.eqSword.atk;
  if(p.eqArmor)bd+=p.eqArmor.def;
  p.stats.maxHp=p.baseStats.maxHp;p.stats.maxMp=p.baseStats.maxMp;
  p.stats.attack=p.baseStats.attack+ba;p.stats.defense=p.baseStats.defense+bd;
  p.stats.speed=p.baseStats.speed;
  p.stats.hp=Math.min(p.stats.hp,p.stats.maxHp);
  p.stats.mp=Math.min(p.stats.mp,p.stats.maxMp);
}

function checkLevelUp(p){
  while(p.exp>=p.expToNext){
    p.exp-=p.expToNext;p.level++;
    p.expToNext=Math.floor(EXP_BASE*Math.pow(EXP_GROWTH,p.level-1));
    p.baseStats.maxHp+=STATS_PER_LVL.maxHp;p.baseStats.maxMp+=STATS_PER_LVL.maxMp;
    p.baseStats.attack+=STATS_PER_LVL.attack;p.baseStats.defense+=STATS_PER_LVL.defense;
    p.baseStats.speed+=STATS_PER_LVL.speed;
    recalcStats(p);p.stats.hp=p.stats.maxHp;p.stats.mp=p.stats.maxMp;
    addLog('⬆️ Seviye '+p.level+'! Statlar arttı.');
    p.skills.forEach(s=>{if(s.unlock===p.level)addLog('🔓 Yeni yetenek: '+s.name+'!');});
  }
}

function addToInv(p,item){const i=p.inventory.indexOf(null);if(i===-1)return false;p.inventory[i]={...item,id:uid()};return true;}
function addLog(msg){combatLog.push(msg);if(combatLog.length>50)combatLog=combatLog.slice(-50);}

function genQuest(){
  const t=QUEST_TEMPLATES[Math.floor(Math.random()*QUEST_TEMPLATES.length)];
  return{id:uid(),name:t.name,desc:t.desc,target:t.target,targetCount:t.count,curCount:0,
    rExp:t.rExp,rGold:t.rGold,rItem:t.rItem?makeItem(t.rItem):null,completed:false,turnedIn:false};
}

// === SAVE/LOAD ===
const SAVE_KEY='warriors_journey_save';
function saveGame(){try{localStorage.setItem(SAVE_KEY,JSON.stringify({p:state.player,t:state.gameTime}));}catch(e){}}
function loadGame(){try{const d=localStorage.getItem(SAVE_KEY);if(!d)return null;const o=JSON.parse(d);if(!o.p||typeof o.p.level!=='number')return null;return o;}catch(e){localStorage.removeItem(SAVE_KEY);return null;}}

function initState(){
  const saved=loadGame();
  let p;
  if(saved&&saved.p){p=createPlayer();Object.assign(p,saved.p);
    // Fix inventory size
    while(p.inventory.length<INV_SIZE)p.inventory.push(null);
    p.inventory=p.inventory.slice(0,INV_SIZE);
    if(!p.skills||!p.skills.length)p.skills=WARRIOR_SKILLS.map(s=>({...s}));
    if(!p.baseStats)p.baseStats={...BASE_STATS};
    if(!p.kills)p.kills={worm:0,boss:0};
    if(p.alive===undefined)p.alive=true;
  }else{p=createPlayer();}
  recalcStats(p);
  state={player:p,enemies:spawnEnemies(),gameTime:saved?.t||0};
}

// === ACTIONS ===
function movePlayer(dir){
  if(!state.player.alive)return;
  const p=state.player,sp=p.stats.speed;
  p.pos.x+=dir.x*sp;p.pos.y+=dir.y*sp;
  if(dir.x!==0)p.facingRight=dir.x>0;
}

function useSkill(skillId){
  const p=state.player;if(!p.alive)return;
  // Potions
  if(skillId==='potion_hp'||skillId==='potion_mp'){
    const pt=skillId==='potion_hp'?'hp_potion':'mp_potion';
    const idx=p.inventory.findIndex(i=>i&&i.type===pt);if(idx===-1)return;
    const pot=p.inventory[idx];
    if(pt==='hp_potion'){p.stats.hp=Math.min(p.stats.maxHp,p.stats.hp+pot.heal);addLog('❤️ Can Potu kullanıldı! +'+pot.heal+' HP');}
    else{p.stats.mp=Math.min(p.stats.maxMp,p.stats.mp+pot.mana);addLog('💙 Mana Potu kullanıldı! +'+pot.mana+' MP');}
    p.inventory[idx]=null;return;
  }
  const sk=p.skills.find(s=>s.id===skillId);if(!sk)return;
  if(sk.unlock>p.level)return;
  if(sk.curCd>0)return;
  if(sk.mana>p.stats.mp){addLog('⚠️ Yeterli mana yok!');return;}
  if(sk.needsPower&&p.powerBar<p.maxPowerBar){addLog('⚠️ Power Bar dolu değil!');return;}
  p.stats.mp-=sk.mana;
  if(sk.needsPower)p.powerBar=0;
  sk.curCd=sk.cd;p.isAttacking=true;p.atkTimer=0.3;

  let hits=0;
  state.enemies.forEach(e=>{
    if(e.stats.hp<=0)return;
    const d=dist(p.pos,e.pos);
    const inRange=sk.aoe?(sk.aoeR>=999||d<=sk.aoeR):d<=p.atkRange;
    if(!inRange)return;
    const dmg=calcDmg(p.stats.attack,e.stats.defense,sk.mult);
    e.stats.hp=Math.max(0,e.stats.hp-dmg);hits++;
    addLog('⚔️ '+sk.name+' → '+e.name+': '+dmg+' hasar!');
    if(!sk.needsPower)p.powerBar=Math.min(p.maxPowerBar,p.powerBar+8);
    if(e.stats.hp<=0){
      addLog('💀 '+e.name+' yenildi! +'+e.reward.exp+'EXP +'+e.reward.gold+'G');
      p.exp+=e.reward.exp;p.gold+=e.reward.gold;
      p.kills[e.isBoss?'boss':'worm']++;
      e.reward.items.forEach(it=>{if(addToInv(p,it))addLog('📦 '+it.name+' bulundu!');else addLog('⚠️ Envanter dolu!');});
      if(p.quest&&!p.quest.turnedIn){
        const q=p.quest;
        if((q.target==='worm'&&!e.isBoss)||(q.target==='boss'&&e.isBoss)){
          q.curCount++;if(q.curCount>=q.targetCount){q.completed=true;addLog("🎯 Görev tamamlandı! NPC'ye git.");}
        }
      }
      checkLevelUp(p);
    }
  });
  if(hits===0)addLog('💨 Hedef menzil dışında!');
  // Respawn dead enemies
  const alive=state.enemies.filter(e=>e.stats.hp>0&&!e.isBoss).length;
  if(alive<3)state.enemies.push(createWorm(Math.floor(Math.random()*5)+1));
  if(!state.enemies.some(e=>e.isBoss&&e.stats.hp>0))state.enemies.push(createWorm(5,true));
}

function tick(delta){
  const p=state.player;state.gameTime+=delta;
  p.skills.forEach(s=>{if(s.curCd>0)s.curCd=Math.max(0,s.curCd-delta);});
  if(p.atkTimer>0){p.atkTimer-=delta;if(p.atkTimer<=0)p.isAttacking=false;}
  if(p.alive){
    state.enemies.forEach(e=>{
      if(e.stats.hp<=0)return;const d=dist(p.pos,e.pos);
      if(d<100&&d>30){const dx=p.pos.x-e.pos.x,dy=p.pos.y-e.pos.y,l=Math.sqrt(dx*dx+dy*dy);e.pos.x+=(dx/l)*e.stats.speed*delta;e.pos.y+=(dy/l)*e.stats.speed*delta;}
      e.curAtkCd-=delta;
      if(d<=40&&e.curAtkCd<=0){
        const dmg=calcDmg(e.stats.attack,p.stats.defense,1);p.stats.hp=Math.max(0,p.stats.hp-dmg);e.curAtkCd=e.atkCd;
        addLog('🔴 '+e.name+' sana '+dmg+' hasar verdi!');
        if(p.stats.hp<=0){p.alive=false;addLog('💀 Öldün! Yeniden doğmak için butona bas.');}
      }
    });
  }
  if(p.alive&&dist(p.pos,{x:0,y:0})<SAFE_ZONE.radius){
    p.stats.hp=Math.min(p.stats.maxHp,p.stats.hp+p.stats.maxHp*0.02*delta);
    p.stats.mp=Math.min(p.stats.maxMp,p.stats.mp+p.stats.maxMp*0.03*delta);
  }
}

function respawn(){
  const p=state.player;p.alive=true;p.stats.hp=p.stats.maxHp;p.stats.mp=p.stats.maxMp;p.pos={x:0,y:0};p.powerBar=0;
  addLog('🔄 Güvenli bölgede yeniden doğdun!');
}

function equipItem(idx){
  const p=state.player,item=p.inventory[idx];if(!item)return;
  if(item.type==='sword'){
    if(p.eqSword){p.eqSword.equipped=false;p.inventory[idx]=p.eqSword;}else p.inventory[idx]=null;
    item.equipped=true;p.eqSword=item;
  }else if(item.type==='armor'){
    if(p.eqArmor){p.eqArmor.equipped=false;p.inventory[idx]=p.eqArmor;}else p.inventory[idx]=null;
    item.equipped=true;p.eqArmor=item;
  }else return;
  recalcStats(p);addLog('🔧 '+item.name+' kuşanıldı!');
}

function sellItem(idx){const p=state.player,item=p.inventory[idx];if(!item||item.locked)return;p.gold+=item.value;addLog('💰 '+item.name+' satıldı: '+item.value+'G');p.inventory[idx]=null;}
function sellAllTrash(){const p=state.player;let t=0;p.inventory.forEach((it,i)=>{if(it&&it.type==='trash'&&!it.locked){t+=it.value;p.inventory[i]=null;}});if(t>0){p.gold+=t;addLog('🗑️ Tüm çöpler satıldı: '+t+'G');}}
function lockItem(idx){const it=state.player.inventory[idx];if(it)it.locked=!it.locked;}
function buyItem(shopItem){
  const p=state.player;if(p.gold<shopItem.value){addLog('⚠️ Yeterli altın yok!');return;}
  const ni=makeItem(shopItem);if(!addToInv(p,ni)){addLog('⚠️ Envanter dolu!');return;}
  p.gold-=shopItem.value;addLog('🛒 '+ni.name+' satın alındı!');
}
function acceptQuest(q){state.player.quest=q;addLog('📜 Görev kabul edildi: '+q.name);showQuest=false;}
function turnInQuest(){
  const p=state.player,q=p.quest;if(!q||!q.completed)return;
  p.exp+=q.rExp;p.gold+=q.rGold;
  if(q.rItem){if(!addToInv(p,q.rItem))addLog('⚠️ Envanter dolu!');else addLog('🎁 '+q.rItem.name+' ödül olarak alındı!');}
  addLog('✅ '+q.name+' tamamlandı! +'+q.rExp+'EXP +'+q.rGold+'G');
  q.turnedIn=true;p.quest=null;checkLevelUp(p);showQuest=false;
}

// === CANVAS RENDERING ===
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');

function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
window.addEventListener('resize',()=>{resizeCanvas();layoutUI();});
resizeCanvas();

function drawGame(){
  const cw=canvas.width,ch=canvas.height,p=state.player;
  const cx=cw/2,cy=ch/2;
  const ox=cx-p.pos.x*SCALE,oy=cy-p.pos.y*SCALE;

  ctx.fillStyle='#0d1117';ctx.fillRect(0,0,cw,ch);

  // Grid
  ctx.strokeStyle='#1a2233';ctx.lineWidth=1;
  const gs=40,sx=Math.floor(-ox/gs)*gs,sy=Math.floor(-oy/gs)*gs;
  for(let gx=sx;gx<cw-ox;gx+=gs){ctx.beginPath();ctx.moveTo(gx+ox,0);ctx.lineTo(gx+ox,ch);ctx.stroke();}
  for(let gy=sy;gy<ch-oy;gy+=gs){ctx.beginPath();ctx.moveTo(0,gy+oy);ctx.lineTo(cw,gy+oy);ctx.stroke();}

  // Safe zone
  ctx.fillStyle='rgba(34,197,94,0.08)';ctx.beginPath();ctx.arc(SAFE_ZONE.x*SCALE+ox,SAFE_ZONE.y*SCALE+oy,SAFE_ZONE.radius*SCALE,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(34,197,94,0.3)';ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='#22c55e';ctx.font='bold 12px Inter';ctx.textAlign='center';
  ctx.fillText('🏠 Güvenli Bölge',SAFE_ZONE.x*SCALE+ox,SAFE_ZONE.y*SCALE+oy-SAFE_ZONE.radius*SCALE-10);

  // NPCs
  drawNPC(ctx,-15*SCALE+ox,-5*SCALE+oy,'🏪','Market');
  drawNPC(ctx,15*SCALE+ox,-5*SCALE+oy,'📜','Görevler');

  // Worm zone
  ctx.fillStyle='rgba(239,68,68,0.06)';ctx.beginPath();ctx.arc(WORM_ZONE.x*SCALE+ox,WORM_ZONE.y*SCALE+oy,40*SCALE,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(239,68,68,0.2)';ctx.lineWidth=1;ctx.stroke();
  ctx.fillStyle='#ef4444';ctx.font='bold 12px Inter';ctx.fillText('☠️ Solucan Bölgesi',WORM_ZONE.x*SCALE+ox,WORM_ZONE.y*SCALE+oy-42*SCALE);

  // Enemies
  state.enemies.forEach(e=>{
    if(e.stats.hp<=0)return;
    const ex=e.pos.x*SCALE+ox,ey=e.pos.y*SCALE+oy;
    ctx.fillStyle='rgba(0,0,0,0.3)';ctx.beginPath();ctx.ellipse(ex,ey+(e.isBoss?24:16),e.isBoss?20:12,5,0,0,Math.PI*2);ctx.fill();
    const sz=e.isBoss?20:12;ctx.fillStyle=e.isBoss?'#dc2626':'#a855f7';
    for(let i=0;i<4;i++){const sx2=ex+Math.sin(Date.now()/300+i)*3,sy2=ey-i*(sz/3);ctx.beginPath();ctx.arc(sx2,sy2,sz/2-i,0,Math.PI*2);ctx.fill();}
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ex-3,ey-sz+2,2,0,Math.PI*2);ctx.arc(ex+3,ey-sz+2,2,0,Math.PI*2);ctx.fill();
    const bw=e.isBoss?60:40,bh=6,by=ey-sz-20;
    ctx.fillStyle='#1f2937';ctx.fillRect(ex-bw/2,by,bw,bh);
    const hr=e.stats.hp/e.stats.maxHp;ctx.fillStyle=hr>0.5?'#22c55e':hr>0.25?'#f59e0b':'#ef4444';
    ctx.fillRect(ex-bw/2,by,bw*hr,bh);
    ctx.fillStyle='#fff';ctx.font='bold 9px Inter';ctx.textAlign='center';ctx.fillText(e.stats.hp+'/'+e.stats.maxHp,ex,by-3);
    ctx.fillStyle=e.isBoss?'#f59e0b':'#d1d5db';ctx.font='bold '+(e.isBoss?11:9)+'px Inter';ctx.fillText(e.name,ex,by-14);
  });

  // Player
  const px=cx,py=cy;
  ctx.fillStyle='rgba(0,0,0,0.4)';ctx.beginPath();ctx.ellipse(px,py+18,14,5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#3b82f6';ctx.fillRect(px-8,py-10,16,20);
  ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(px,py-16,8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#6b7280';ctx.beginPath();ctx.arc(px,py-18,9,Math.PI,0);ctx.fill();
  const sa=p.isAttacking?(p.facingRight?-0.5:0.5):(p.facingRight?0.3:-0.3);
  const swx=p.facingRight?px+12:px-12;
  ctx.save();ctx.translate(swx,py-5);ctx.rotate(sa);
  ctx.fillStyle='#d1d5db';ctx.fillRect(-2,-18,4,20);ctx.fillStyle='#fbbf24';ctx.fillRect(-4,0,8,4);ctx.restore();
  ctx.fillStyle='#fbbf24';ctx.font='bold 11px Cinzel';ctx.textAlign='center';ctx.fillText(p.name+' Lv.'+p.level,px,py-30);
  ctx.fillStyle='#6b7280';ctx.font='10px Inter';ctx.textAlign='left';ctx.fillText('X:'+Math.round(p.pos.x)+' Y:'+Math.round(p.pos.y),10,ch-10);

  // Minimap
  const ms=100,mx=cw-ms-10,my=10,msc=ms/120;
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(mx,my,ms,ms);ctx.strokeStyle='#374151';ctx.strokeRect(mx,my,ms,ms);
  ctx.fillStyle='rgba(34,197,94,0.3)';ctx.beginPath();ctx.arc(mx+10*msc,my+10*msc,SAFE_ZONE.radius*msc,0,Math.PI*2);ctx.fill();
  state.enemies.forEach(e=>{if(e.stats.hp<=0)return;ctx.fillStyle=e.isBoss?'#f59e0b':'#ef4444';ctx.beginPath();ctx.arc(mx+(e.pos.x+10)*msc,my+(e.pos.y+10)*msc,e.isBoss?3:2,0,Math.PI*2);ctx.fill();});
  ctx.fillStyle='#3b82f6';ctx.beginPath();ctx.arc(mx+(p.pos.x+10)*msc,my+(p.pos.y+10)*msc,3,0,Math.PI*2);ctx.fill();
}

function drawNPC(c,x,y,emoji,label){c.font='24px serif';c.textAlign='center';c.fillText(emoji,x,y);c.fillStyle='#fbbf24';c.font='bold 10px Inter';c.fillText(label,x,y+20);}

// === UI UPDATE ===
function updateHUD(){
  const p=state.player;
  document.getElementById('hudName').textContent=p.name;
  document.getElementById('hudLevel').textContent='Lv.'+p.level;
  setBar('barHp','barHpText',p.stats.hp,p.stats.maxHp,'HP');
  setBar('barMp','barMpText',p.stats.mp,p.stats.maxMp,'MP');
  setBar('barPw','barPwText',p.powerBar,p.maxPowerBar,'PWR');
  setBar('barXp','barXpText',p.exp,p.expToNext,'EXP');
  document.getElementById('hudAtk').textContent='⚔️ ATK: '+p.stats.attack;
  document.getElementById('hudDef').textContent='🛡️ DEF: '+p.stats.defense;
  document.getElementById('hudGold').textContent='💰 '+p.gold+'G';

  // Combat log
  const cl=document.getElementById('combatLog');
  cl.innerHTML=combatLog.slice(-5).reverse().map((m,i)=>'<div'+(i>0?' style="color:var(--muted-fg)"':'')+'>'+m+'</div>').join('');

  // Death screen
  document.getElementById('deathScreen').className=p.alive?'':'show';

  // Quest tracker
  const qt=document.getElementById('questTracker');
  if(p.quest&&!p.quest.turnedIn){qt.style.display='';document.getElementById('qtName').textContent=p.quest.name;document.getElementById('qtCount').textContent=p.quest.curCount+'/'+p.quest.targetCount;}
  else qt.style.display='none';
}

function setBar(barId,textId,val,max,label){
  const pct=Math.max(0,Math.min(100,(val/max)*100));
  document.getElementById(barId).style.width=pct+'%';
  document.getElementById(textId).textContent=Math.floor(val)+'/'+max+' '+label;
}

function renderSkillBar(){
  const p=state.player,sb=document.getElementById('skillBar');
  const avail=p.skills.filter(s=>s.unlock<=p.level);
  let html='';
  avail.forEach(sk=>{
    const onCd=sk.curCd>0,noMana=p.stats.mp<sk.mana,noPow=sk.needsPower&&p.powerBar<p.maxPowerBar;
    const dis=onCd||noMana||noPow;
    const cdPct=onCd?(sk.curCd/sk.cd)*100:0;
    html+='<button class="skill-btn'+(dis?' disabled':'')+(sk.needsPower&&!noPow?' glow-pulse':'')+'" onclick="useSkill(\''+sk.id+'\')">';
    if(onCd)html+='<div class="skill-cd" style="clip-path:inset('+(100-cdPct)+'% 0 0 0)"></div>';
    html+='<span class="skill-icon">'+sk.icon+'</span>';
    html+='<span class="skill-key">'+(onCd?Math.ceil(sk.curCd)+'s':'['+sk.key+']')+'</span>';
    if(sk.mana>0)html+='<span class="skill-mana">'+sk.mana+'</span>';
    html+='</button>';
  });
  // Potions
  const hpCount=p.inventory.filter(i=>i&&i.type==='hp_potion').length;
  const mpCount=p.inventory.filter(i=>i&&i.type==='mp_potion').length;
  html+='<div style="display:flex;gap:6px;margin-left:16px;">';
  html+='<button class="potion-btn'+(hpCount===0?' disabled':'')+'" onclick="useSkill(\'potion_hp\')"><span class="potion-icon">❤️</span><span class="potion-count">'+hpCount+'x'+(isMobile?'':' [Q]')+'</span></button>';
  html+='<button class="potion-btn'+(mpCount===0?' disabled':'')+'" onclick="useSkill(\'potion_mp\')"><span class="potion-icon">💙</span><span class="potion-count">'+mpCount+'x'+(isMobile?'':' [E]')+'</span></button>';
  html+='</div>';
  sb.innerHTML=html;
}

function renderMenuBtns(){
  const inSafe=dist(state.player.pos,{x:0,y:0})<SAFE_ZONE.radius;
  let html='<button class="menu-btn" onclick="togglePanel(\'inv\')">🎒 <span class="shortcut">[I]</span></button>';
  if(inSafe){
    html+='<button class="menu-btn" onclick="togglePanel(\'shop\')">🏪 <span class="shortcut">[B]</span></button>';
    html+='<button class="menu-btn" onclick="togglePanel(\'quest\')">📜 <span class="shortcut">[J]</span></button>';
  }
  document.getElementById('menuBtns').innerHTML=html;
}

function togglePanel(type){
  if(type==='inv'){showInventory=!showInventory;showShop=false;showQuest=false;}
  else if(type==='shop'){showShop=!showShop;showInventory=false;showQuest=false;}
  else if(type==='quest'){showQuest=!showQuest;showInventory=false;showShop=false;}
  renderPanel();
}

function renderPanel(){
  const pc=document.getElementById('panelContainer');
  if(!showInventory&&!showShop&&!showQuest){pc.innerHTML='';return;}
  const p=state.player;
  let html='<div class="panel-overlay" onclick="if(event.target===this){showInventory=showShop=showQuest=false;renderPanel();}"><div class="panel">';

  if(showInventory||showShop){
    html+='<div class="panel-header"><h2>'+(showShop?'🏪 Market':'🎒 Envanter')+'</h2><div style="display:flex;align-items:center;gap:10px;"><span class="gold-display">💰 '+p.gold+'G</span><button class="close-btn" onclick="showInventory=showShop=false;renderPanel()">✕</button></div></div>';
    // Equip slots
    html+='<div class="equip-slots">';
    html+=eqSlotHTML('Kılıç',p.eqSword);
    html+=eqSlotHTML('Zırh',p.eqArmor);
    html+='</div>';

    if(showShop){
      SHOP_ITEMS.forEach((it,i)=>{
        html+='<div class="shop-item"><div class="info"><span class="icon">'+it.icon+'</span><div><span class="name r-'+it.rarity+'">'+it.name+'</span><div class="stats">';
        if(it.atk>0)html+='⚔️+'+it.atk+' ';if(it.def>0)html+='🛡️+'+it.def+' ';if(it.heal>0)html+='❤️+'+it.heal+' ';if(it.mana>0)html+='💙+'+it.mana;
        html+='</div></div></div><button class="buy-btn" '+(p.gold<it.value?'disabled':'')+' onclick="buyItem(SHOP_ITEMS['+i+']);renderPanel();">'+it.value+'G</button></div>';
      });
    }else{
      // Sell all trash
      const tc=p.inventory.filter(i=>i&&i.type==='trash').length;
      const tv=p.inventory.filter(i=>i&&i.type==='trash').reduce((s,i)=>s+(i?i.value:0),0);
      if(tc>0)html+='<button class="sell-trash-btn" onclick="sellAllTrash();renderPanel();">🗑️ Tüm Çöpleri Sat ('+tc+' eşya = '+tv+'G)</button>';
      html+='<div class="inv-grid">';
      for(let i=0;i<INV_SIZE;i++){
        const it=p.inventory[i];
        if(!it){html+='<div class="inv-slot empty"></div>';continue;}
        html+='<div class="inv-slot" title="'+it.name+'\nDeğer: '+it.value+'G">';
        if(it.locked)html+='<span class="lock-badge">🔒</span>';
        html+='<span class="item-icon">'+it.icon+'</span>';
        html+='<span class="item-name r-'+it.rarity+'">'+it.name.slice(0,8)+'</span>';
        html+='<div class="actions">';
        if((it.type==='sword'||it.type==='armor')&&!it.equipped)html+='<button class="equip-btn" onclick="event.stopPropagation();equipItem('+i+');renderPanel();">E</button>';
        if(!it.locked)html+='<button class="sell-btn" onclick="event.stopPropagation();sellItem('+i+');renderPanel();">S</button>';
        html+='<button class="lock-btn" onclick="event.stopPropagation();lockItem('+i+');renderPanel();">'+(it.locked?'🔓':'🔒')+'</button>';
        html+='</div></div>';
      }
      html+='</div>';
    }
  }else if(showQuest){
    html+='<div class="panel-header"><h2>📜 Görevler</h2><button class="close-btn" onclick="showQuest=false;renderPanel()">✕</button></div>';
    const q=p.quest;
    if(q&&!q.turnedIn){
      html+='<div class="quest-box"><h3>'+q.name+'</h3><p>'+q.desc+'</p>';
      html+='<div class="quest-progress"><div class="track"><div class="fill" style="width:'+Math.min(100,(q.curCount/q.targetCount)*100)+'%"></div></div><span class="count">'+q.curCount+'/'+q.targetCount+'</span></div>';
      html+='<div class="quest-reward">Ödül: ✨'+q.rExp+' EXP | 💰'+q.rGold+'G';
      if(q.rItem)html+=' | <span class="r-'+q.rItem.rarity+'">'+q.rItem.icon+' '+q.rItem.name+'</span>';
      html+='</div>';
      if(q.completed)html+='<button class="quest-btn" onclick="turnInQuest();renderPanel();">✅ Görevi Teslim Et</button>';
      html+='</div>';
    }else{
      if(!window._availQuest)window._availQuest=genQuest();
      const aq=window._availQuest;
      html+='<p style="font-size:11px;color:var(--muted-fg);margin-bottom:12px;">Görevci NPC yeni bir görev sunuyor:</p>';
      html+='<div class="quest-box"><h3>'+aq.name+'</h3><p>'+aq.desc+'</p>';
      html+='<div class="quest-reward">Ödül: ✨'+aq.rExp+' EXP | 💰'+aq.rGold+'G';
      if(aq.rItem)html+=' | <span class="r-'+aq.rItem.rarity+'">'+aq.rItem.icon+' '+aq.rItem.name+'</span>';
      html+='</div></div>';
      html+='<button class="quest-btn" onclick="acceptQuest(window._availQuest);window._availQuest=genQuest();renderPanel();">📜 Görevi Kabul Et</button>';
    }
  }

  html+='</div></div>';
  pc.innerHTML=html;
}

function eqSlotHTML(label,item){
  let h='<div class="equip-slot"><div class="label">'+label+'</div>';
  if(item){h+='<span class="icon">'+item.icon+'</span><div class="name r-'+item.rarity+'">'+item.name+'</div><div class="bonus">';
    if(item.atk>0)h+='⚔️+'+item.atk+' ';if(item.def>0)h+='🛡️+'+item.def;h+='</div>';}
  else h+='<span style="color:var(--muted-fg);font-size:11px;">Boş</span>';
  return h+'</div>';
}

// === LAYOUT ===
function layoutUI(){
  const sb=document.getElementById('skillBar');
  const mb=document.getElementById('menuBtns');
  const jk=document.getElementById('joystick');
  const hints=document.getElementById('pcHints');
  if(isMobile){
    sb.style.cssText='bottom:16px;right:16px;flex-direction:column;';
    mb.style.cssText='top:8px;right:8px;flex-direction:column;';
    jk.style.display='block';hints.style.display='none';
  }else{
    sb.style.cssText='bottom:16px;left:50%;transform:translateX(-50%);flex-direction:row;';
    mb.style.cssText='top:8px;right:120px;flex-direction:row;';
    jk.style.display='none';hints.style.display='block';
  }
}

// === KEYBOARD ===
window.addEventListener('keydown',e=>{
  if(isMobile)return;
  keys.add(e.key.toLowerCase());
  switch(e.key){
    case '1':useSkill('basic_attack');break;case '2':useSkill('power_strike');break;
    case '3':useSkill('sword_spin');break;case '4':useSkill('dragon_strike');break;
    case 'q':useSkill('potion_hp');break;case 'e':useSkill('potion_mp');break;
    case 'i':togglePanel('inv');break;case 'b':togglePanel('shop');break;case 'j':togglePanel('quest');break;
  }
});
window.addEventListener('keyup',e=>{keys.delete(e.key.toLowerCase());});

// === JOYSTICK ===
(function setupJoystick(){
  const el=document.getElementById('joystick');
  const knob=document.getElementById('joystickKnob');
  const MAX_R=44,DEADZONE=0.12;
  let active=false;

  function compute(cx2,cy2){
    const rect=el.getBoundingClientRect();
    const ccx=rect.left+rect.width/2,ccy=rect.top+rect.height/2;
    let dx=cx2-ccx,dy=cy2-ccy;
    const d=Math.sqrt(dx*dx+dy*dy);
    const cd=Math.min(d,MAX_R);
    if(d>0){dx=(dx/d)*cd;dy=(dy/d)*cd;}
    knob.style.transition='none';knob.style.transform='translate('+dx+'px,'+dy+'px)';
    const nd=cd/MAX_R;
    if(nd<DEADZONE){joystickDir={x:0,y:0};return;}
    const angle=Math.atan2(dy,dx),mag=(nd-DEADZONE)/(1-DEADZONE);
    joystickDir={x:Math.cos(angle)*mag,y:Math.sin(angle)*mag};
  }
  function end(){active=false;knob.style.transition='transform .15s ease-out';knob.style.transform='translate(0,0)';joystickDir={x:0,y:0};}

  el.addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();active=true;compute(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
  el.addEventListener('touchmove',e=>{e.preventDefault();e.stopPropagation();if(active)compute(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();e.stopPropagation();end();},{passive:false});
  el.addEventListener('touchcancel',e=>{e.preventDefault();end();},{passive:false});
  el.addEventListener('mousedown',e=>{e.preventDefault();active=true;compute(e.clientX,e.clientY);});
  el.addEventListener('mousemove',e=>{if(active)compute(e.clientX,e.clientY);});
  el.addEventListener('mouseup',()=>{if(active)end();});
  el.addEventListener('mouseleave',()=>{if(active)end();});

  // Deadzone ring visual
  const dzRing=el.querySelector('.deadzone-ring');
  const dzPct=DEADZONE*100;
  dzRing.style.width=dzPct+'%';dzRing.style.height=dzPct+'%';
  dzRing.style.left=(50-dzPct/2)+'%';dzRing.style.top=(50-dzPct/2)+'%';
})();

// === MAIN LOOP ===
initState();layoutUI();
let lastTime=performance.now(),saveTimer=0;

function gameLoop(time){
  const delta=Math.min((time-lastTime)/1000,0.1);lastTime=time;

  // KB movement
  if(!isMobile){
    const dir={x:0,y:0};
    if(keys.has('w')||keys.has('arrowup'))dir.y=-1;
    if(keys.has('s')||keys.has('arrowdown'))dir.y=1;
    if(keys.has('a')||keys.has('arrowleft'))dir.x=-1;
    if(keys.has('d')||keys.has('arrowright'))dir.x=1;
    if(dir.x!==0||dir.y!==0){const l=Math.sqrt(dir.x*dir.x+dir.y*dir.y);movePlayer({x:dir.x/l,y:dir.y/l});}
  }

  // Joystick movement
  if(isMobile&&(joystickDir.x!==0||joystickDir.y!==0)){movePlayer(joystickDir);}

  tick(delta);
  drawGame();
  updateHUD();
  renderSkillBar();
  renderMenuBtns();

  // Auto-save
  saveTimer+=delta;if(saveTimer>=10){saveTimer=0;saveGame();}

  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
</script>
